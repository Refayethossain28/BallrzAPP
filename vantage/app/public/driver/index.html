<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<link rel="manifest" href="./manifest.json" />
<title>Vantage Driver</title>
<style>
  :root{--bg:#0b0d12;--panel:#13161d;--panel2:#181c25;--line:#262c39;--ink:#e8ecf4;
    --muted:#8a93a6;--gold:#c8a35b;--gold2:#e3c585;--green:#3ecf8e;--amber:#e3b341;--blue:#5b8def;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);max-width:520px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:5}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#7a5e26);display:grid;place-items:center;font-weight:800;color:#0b0d12}
  h1{font-size:15px;margin:0;letter-spacing:.4px} header small{color:var(--muted);font-size:11px;display:block}
  .gps{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted)} .dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
  main{padding:14px}
  .banner{background:var(--panel);border:1px solid var(--gold);border-radius:12px;padding:14px;margin-bottom:14px}
  .banner h3{margin:0 0 4px;font-size:14px;color:var(--gold2)} .banner p{margin:0 0 10px;color:var(--muted);font-size:13px}
  button{font:inherit;font-weight:600;border:none;border-radius:10px;padding:13px 16px;width:100%;cursor:pointer}
  .btn{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#0b0d12}
  .btn-ghost{background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
  .btn:active,.btn-ghost:active{filter:brightness(1.1)}
  .trip{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--blue);border-radius:12px;padding:14px;margin-bottom:12px}
  .trip.airport{border-left-color:var(--amber)}
  .trip .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .trip .who{font-weight:700;font-size:16px} .trip .badge{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .trip .row{display:flex;gap:8px;font-size:14px;padding:3px 0}
  .trip .row span{color:var(--muted);min-width:64px} .trip .row b{font-weight:600}
  .trip .pay{color:var(--gold2);font-weight:700;font-size:15px}
  .trip .actions{margin-top:12px;display:flex;gap:8px}
  .empty{color:var(--muted);text-align:center;padding:40px 20px}
  .flight{margin-top:6px;font-size:13px}
  .map{margin-top:8px;font-size:12px;color:var(--muted)}
  .pill{font-size:11px;padding:3px 9px;border-radius:999px;background:var(--panel2)}
  .pill.assigned{color:var(--blue)} .pill.in_progress{color:var(--green)}
</style>
</head>
<body>
<header>
  <div class="brand"><div class="logo">V</div><div><h1>VANTAGE DRIVER</h1><small id="who">—</small></div></div>
  <div class="gps"><span class="dot" id="gpsdot"></span><span id="gpslabel">GPS off</span></div>
</header>
<main>
  <div id="onboard" class="banner" style="display:none">
    <h3>Get paid for your trips</h3>
    <p>Connect your bank to receive payouts after each completed trip.</p>
    <button class="btn" id="onboard-btn">Set up payouts</button>
  </div>
  <button class="btn-ghost" id="gps-btn" style="margin-bottom:14px">📍 Start sharing location</button>
  <div id="trips"></div>
</main>
<script src="./driver.js"></script>
</body>
</html>
