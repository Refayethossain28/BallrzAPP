<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ApexVIP · Live Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
:root{
  --bg:#050505;
  --fg:#f4f0ea;
  --fg-2:#d8d0c4;
  --fg-3:#a89d8e;
  --fg-4:#7a7168;
  --fg-5:#4a453e;
  --surface:rgba(255,255,255,.05);
  --surface-2:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.10);
  --gold:#C8A97E;
  --gold-2:rgba(200,169,126,.22);
  --gold-3:rgba(200,169,126,.10);
  --gold-dark:#0c0b09;
  --font-serif:'Cormorant Garamond',Georgia,serif;
  --ease-spring:cubic-bezier(0.16,1,0.3,1);
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,sans-serif}
#map{position:fixed;inset:0;z-index:0}
.sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(8,7,6,.82);
  backdrop-filter:blur(60px) saturate(180%);
  -webkit-backdrop-filter:blur(60px) saturate(180%);
  border-top:1px solid var(--border);
  border-radius:28px 28px 0 0;
  padding:12px 22px 40px;
  animation:slideUp .5s var(--ease-spring) both;
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.pill-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.18);margin:0 auto 18px}
.wordmark{font-family:var(--font-serif);font-size:13px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:16px;text-align:center}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:18px}
.status-dot{width:10px;height:10px;border-radius:50%;background:#22c55e;flex-shrink:0;box-shadow:0 0 8px rgba(34,197,94,.5);animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.2)}}
.status-text{font-size:14px;font-weight:600;flex:1}
.eta-chip{font-size:13px;font-weight:700;color:var(--gold);background:var(--gold-3);border:1px solid var(--gold-2);border-radius:10px;padding:4px 10px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.info-cell{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px}
.info-label{font-size:10px;color:var(--fg-4);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:5px}
.info-value{font-size:14px;font-weight:600;color:var(--fg-2)}
.driver-row{display:flex;align-items:center;gap:14px;padding:16px;background:var(--gold-3);border:1px solid var(--gold-2);border-radius:18px;margin-bottom:16px}
.driver-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold-2),var(--gold-3));border:1.5px solid var(--gold-2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.driver-name{font-size:16px;font-weight:700;margin-bottom:3px}
.driver-plate{font-size:12px;color:var(--fg-3);font-weight:500;letter-spacing:.5px}
.verified-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:8px;padding:3px 7px;font-size:10px;color:#22c55e;margin-top:5px}
.share-btn{width:100%;padding:15px;border-radius:16px;background:var(--surface);border:1px solid var(--border);color:var(--fg-2);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.share-btn:active{transform:scale(.97)}
.footer-note{text-align:center;font-size:11px;color:var(--fg-4);margin-top:14px;line-height:1.6}

/* Loading state */
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
.loading-wordmark{font-family:var(--font-serif);font-size:38px;font-weight:300;letter-spacing:5px;color:var(--gold);animation:fadeIn 1.2s var(--ease-spring) both}
.loading-sub{font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:var(--fg-4);margin-top:8px;animation:fadeIn 1.2s .3s var(--ease-spring) both}
.loading-spinner{margin-top:36px;width:24px;height:24px;border:2px solid var(--gold-2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Error state */
.error-sheet{padding:48px 24px;text-align:center}
.error-icon{font-size:40px;margin-bottom:16px}
.error-title{font-size:20px;font-weight:700;margin-bottom:8px}
.error-text{font-size:14px;color:var(--fg-3);line-height:1.6}
</style>
</head>
<body>

<div id="loader" class="loading-screen">
  <div class="loading-wordmark">ApexVIP</div>
  <div class="loading-sub">Live Tracking</div>
  <div class="loading-spinner"></div>
</div>

<div id="map"></div>

<div id="sheet" class="sheet" style="display:none">
  <div class="pill-handle"></div>
  <div class="wordmark">ApexVIP · Live Trip</div>

  <div id="driver-section"></div>
  <div id="status-section"></div>
  <div id="info-section"></div>

  <button class="share-btn" id="share-btn" onclick="handleShare()">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
    </svg>
    <span id="share-label">Share tracking link</span>
  </button>

  <div class="footer-note">
    This link is secure and expires when the trip ends.<br>
    Powered by <strong style="color:var(--gold)">ApexVIP</strong> luxury chauffeur service.
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const ref = params.get('ref') || 'APX-0000';
const driverName = params.get('d') ? decodeURIComponent(params.get('d').replace(/\+/g,' ')) : 'Driver';
const plate = params.get('p') ? decodeURIComponent(params.get('p').replace(/\+/g,' ')) : '';
const pickup = params.get('pu') ? decodeURIComponent(params.get('pu').replace(/\+/g,' ')) : '';
const dropoff = params.get('do') ? decodeURIComponent(params.get('do').replace(/\+/g,' ')) : '';
const driverId = params.get('driverId') || '';

let _db = null, _trackingUnsub = null, _usingRealData = false;

try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY' && driverId) {
    firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    firebase.auth().signInAnonymously().then(() => {
      _db = firebase.firestore();
      startFirebaseTracking();
    }).catch(() => {});
  }
} catch(e) {}

function startFirebaseTracking() {
  if (!_db || !driverId) return;
  _trackingUnsub = _db.collection('drivers').doc(driverId).onSnapshot(doc => {
    if (!doc.exists) return;
    const d = doc.data();
    if (!d.lat || !d.lng) return;
    if (!_usingRealData) {
      _usingRealData = true;
      // Stop the simulation interval now that real data is arriving
      if (window._simInterval) { clearInterval(window._simInterval); window._simInterval = null; }
      // Update status dot to green "Live"
      const dot = document.querySelector('.status-dot');
      const txt = document.querySelector('.status-text');
      if (dot) { dot.style.background = '#22c55e'; dot.style.boxShadow = '0 0 8px rgba(34,197,94,.5)'; }
      if (txt) txt.textContent = 'Live · Your driver is on the way';
    }
    const pos = [d.lat, d.lng];
    if (driverMarker) {
      driverMarker.setLatLng(pos);
      if (!map.getBounds().contains(pos)) map.panTo(pos, {animate: true});
    }
  }, () => {});
}

// Simulated driver position (London) — in production this would be a Firestore real-time listener
let driverLat = 51.5074 + (Math.random()-.5)*.02;
let driverLng = -0.1278 + (Math.random()-.5)*.02;
const destLat = 51.5245;
const destLng = -0.0865;

let map, driverMarker, etaSeconds = 420 + Math.floor(Math.random()*300);
let etaInterval;

function formatEta(s) {
  if (s <= 0) return 'Arriving now';
  const m = Math.ceil(s/60);
  return m < 2 ? '1 min' : m + ' mins';
}

function initMap() {
  map = L.map('map', {zoomControl:false, attributionControl:false, scrollWheelZoom:false})
    .setView([driverLat, driverLng], 14);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {maxZoom:19}).addTo(map);

  // Driver marker
  const driverIcon = L.divIcon({
    className:'',
    html:`<div style="width:38px;height:38px;border-radius:50%;background:#0c0b09;border:2.5px solid #C8A97E;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(200,169,126,.4)">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#C8A97E" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3m-1 9h-5m-1 0a2 2 0 100 4 2 2 0 000-4zm8 0a2 2 0 100 4 2 2 0 000-4zm-6-9h5l3 5"/></svg>
    </div>`,
    iconSize:[38,38], iconAnchor:[19,19]
  });
  driverMarker = L.marker([driverLat, driverLng], {icon:driverIcon}).addTo(map);

  // Destination marker
  const destIcon = L.divIcon({
    className:'',
    html:`<div style="width:30px;height:30px;border-radius:50%;background:rgba(34,197,94,.15);border:2px solid #22c55e;display:flex;align-items:center;justify-content:center">
      <div style="width:10px;height:10px;border-radius:50%;background:#22c55e"></div>
    </div>`,
    iconSize:[30,30], iconAnchor:[15,15]
  });
  if (dropoff) L.marker([destLat, destLng], {icon:destIcon}).addTo(map)
    .bindPopup(`<b style="font-size:12px;font-family:sans-serif">Drop-off</b><br><span style="font-size:11px;color:#888">${dropoff}</span>`);

  // Route line (simplified straight line — in production use OSRM)
  L.polyline([[driverLat, driverLng],[destLat, destLng]], {
    color:'rgba(200,169,126,.5)', weight:2, dashArray:'6,8'
  }).addTo(map);

  // Only run simulation when no real Firebase driver is being tracked
  if (!driverId) {
    animateDriver();
  }
}

function animateDriver() {
  const stepLat = (destLat - driverLat) / 180;
  const stepLng = (destLng - driverLng) / 180;
  let steps = 0;
  window._simInterval = setInterval(() => {
    if (steps > 120) return;
    steps++;
    driverLat += stepLat * (0.5 + Math.random());
    driverLng += stepLng * (0.5 + Math.random());
    if (driverMarker) driverMarker.setLatLng([driverLat, driverLng]);
    updateStatus();
  }, 3000);
}

function updateStatus() {
  const etaEl = document.getElementById('eta-chip');
  if (etaEl) etaEl.textContent = formatEta(etaSeconds);
}

function renderSheet() {
  // Driver section
  document.getElementById('driver-section').innerHTML = `
    <div class="driver-row">
      <div class="driver-avatar">🚘</div>
      <div style="flex:1;min-width:0">
        <div class="driver-name">${driverName}</div>
        ${plate ? `<div class="driver-plate">${plate}</div>` : ''}
        <div class="verified-badge">
          <svg width="9" height="9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
          PCO Licensed · Verified
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:11px;color:var(--fg-4);margin-bottom:4px">RATING</div>
        <div style="font-size:15px;font-weight:700;color:var(--gold)">4.96 ★</div>
      </div>
    </div>`;

  // Status row — grey "Simulated" when no real driverId, green "Live" otherwise
  const simDotStyle = !driverId ? 'background:#6b7280;box-shadow:none;animation:none' : '';
  const simLabel = !driverId ? 'Simulated · Your driver is on the way' : 'Your driver is on the way';
  document.getElementById('status-section').innerHTML = `
    <div class="status-row" style="margin-bottom:14px">
      <div class="status-dot" style="${simDotStyle}"></div>
      <span class="status-text">${simLabel}</span>
      <span class="eta-chip" id="eta-chip">${formatEta(etaSeconds)}</span>
    </div>`;

  // Info grid
  document.getElementById('info-section').innerHTML = `
    <div class="info-grid" style="margin-bottom:16px">
      <div class="info-cell">
        <div class="info-label">Booking Ref</div>
        <div class="info-value" style="font-size:13px;letter-spacing:.5px">${ref}</div>
      </div>
      <div class="info-cell">
        <div class="info-label">Vehicle</div>
        <div class="info-value">S-Class</div>
      </div>
      ${pickup ? `<div class="info-cell"><div class="info-label">Pickup</div><div class="info-value" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pickup}</div></div>` : ''}
      ${dropoff ? `<div class="info-cell"><div class="info-label">Drop-off</div><div class="info-value" style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${dropoff}</div></div>` : ''}
    </div>`;
}

function handleShare() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title:'Track my ApexVIP ride', text:`I'm on my way — track my ride in real time`, url });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      document.getElementById('share-label').textContent = '✓ Link copied';
      setTimeout(() => { document.getElementById('share-label').textContent = 'Share tracking link'; }, 2200);
    });
  }
}

// Init
window.addEventListener('load', () => {
  if (!ref || ref === 'APX-0000') {
    document.getElementById('loader').innerHTML = `
      <div class="error-sheet">
        <div class="error-icon">🔒</div>
        <div class="error-title">Invalid tracking link</div>
        <div class="error-text">This link is either expired or invalid.<br>Please ask the booker to resend it.</div>
      </div>`;
    return;
  }

  setTimeout(() => {
    initMap();
    renderSheet();

    // ETA countdown
    etaInterval = setInterval(() => {
      etaSeconds = Math.max(0, etaSeconds - 3);
      updateStatus();
      if (etaSeconds === 0) clearInterval(etaInterval);
    }, 3000);

    document.getElementById('loader').style.animation = 'fadeOut .4s ease both';
    document.getElementById('loader').style.animationFillMode = 'forwards';
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('sheet').style.display = 'block';
    }, 400);
  }, 1400);
});
</script>
</body>
</html>
