name: Deploy to GitHub Pages

# Publishes the FULL site so every app is reachable under /BallrzAPP/…:
#   • ApexVIP client / driver / admin + all PWA assets at the site root
#   • the RentMatch prototype (rentmatch.html) + its PWA assets at the root
#   • the runnable prototypes (concierge-split, flow-game) under /concepts/
#   • the FX trading app under /trading-app/
#   • the Ripple messenger PWA under /ripple/
#   • the browser LLM demo under /llm/ (built on demand, cached between runs)
#
# This is the single Pages source — it replaces the previous _site that only
# contained the trading app + LLM demo (which made apexvip-*.html 404).

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Always-published static site (fast) ─────────────────────────────────
      - name: Assemble site
        run: |
          set -e
          mkdir -p _site

          # ApexVIP apps + every PWA asset, at the site root.
          cp apexvip-client.html apexvip-driver.html apexvip-admin.html _site/ 2>/dev/null || true
          cp apexvip-core.js apexvip-lib.js firebase.js firebase-messaging-sw.js _site/ 2>/dev/null || true
          cp manifest*.json _site/ 2>/dev/null || true
          cp icon-*.png _site/ 2>/dev/null || true
          cp -r splashes _site/ 2>/dev/null || true

          # Landing page + Jekyll opt-out so files starting with _ are served.
          cp index.html _site/index.html 2>/dev/null || true
          cp .nojekyll _site/.nojekyll 2>/dev/null || touch _site/.nojekyll

          # RentMatch prototype + its PWA assets (manifest*.json above does not
          # match rentmatch-manifest.json, so copy them explicitly).
          cp rentmatch.html _site/ 2>/dev/null || true
          cp rentmatch-manifest.json rentmatch-sw.js _site/ 2>/dev/null || true
          cp rentmatch-icon-*.png rentmatch-icon.svg _site/ 2>/dev/null || true

          # Runnable prototypes keep their original paths.
          mkdir -p _site/concepts
          cp -r concepts/prototypes _site/concepts/ 2>/dev/null || true

          # FX trading app.
          mkdir -p _site/trading-app
          cp trading-app/fx-signal-pro.html _site/trading-app/ 2>/dev/null || true

          # Ripple messenger — full PWA (app, engine, QR encoder, config, SW, icons).
          mkdir -p _site/ripple
          cp -r ripple/. _site/ripple/ 2>/dev/null || true

          # Velvet (concierge/) — the subscription VIP concierge PWA (app,
          # engine, cloud config, SW, icons) — plus the other standalone PWAs
          # the landing page links to, which were missing from this allowlist
          # and 404ed: Cusp, Omni, Imposter, Lingua.
          for app in concierge cusp omni imposter lingua; do
            mkdir -p "_site/$app"
            cp -r "$app/." "_site/$app/" 2>/dev/null || true
          done

          # Fixr — luxury ground-transport + concierge prototype (static demo).
          # The full Fixr app is a Node server; deploy it to Render (fixr/app/DEPLOY.md).
          mkdir -p _site/fixr
          cp fixr/index.html _site/fixr/index.html 2>/dev/null || true

          echo "Assembled _site:"; ls -1 _site | head -40

      # ── Apex landlord OS — static build of the real app ─────────────────────
      # Served at /BallrzAPP/apex/. The landing page and UI are fully browsable;
      # signing in and data flows light up once the Firebase backend is deployed
      # (one-time commands in rentmatch/README.md). Reloading a deep link 404s
      # (no SPA rewrites on Pages) — start from /apex/.
      - name: Set up Node (Apex demo)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build Apex demo
        run: |
          set -e
          cd rentmatch
          npm install
          npm --workspace apps/web run build -- --base=/BallrzAPP/apex/
          mkdir -p ../_site/apex
          cp -r apps/web/dist/. ../_site/apex/

      # ── Browser LLM demo (optional, cached) ─────────────────────────────────
      # Restore a previously-trained model. Only (re)train on a manual run or
      # when the LLM sources change — keeps ordinary ApexVIP deploys quick.
      - name: Set up Python
        if: hashFiles('llm-from-scratch/**.py') != ''
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache trained LLM model
        if: hashFiles('llm-from-scratch/**.py') != ''
        id: llm-cache
        uses: actions/cache@v4
        with:
          path: llm-from-scratch/web/model.json
          # Include the committed model.json in the key so that when we commit a
          # freshly-trained model, the key changes → no stale cached copy is
          # restored over it. (The committed weights are the source of truth now.)
          key: llm-model-${{ hashFiles('llm-from-scratch/web/model.json', 'llm-from-scratch/**.py', 'llm-from-scratch/requirements.txt') }}

      - name: Train and export the browser LLM (manual run, on cache miss)
        if: github.event_name == 'workflow_dispatch' && steps.llm-cache.outputs.cache-hit != 'true'
        working-directory: llm-from-scratch
        run: |
          pip install -r requirements.txt
          python fetch_data.py shakespeare || echo "download failed; falling back to sample corpus"
          DATA=data/shakespeare.txt
          [ -f "$DATA" ] || DATA=data/input.txt
          echo "training on $DATA"
          python train.py --data "$DATA" --tokenizer bpe --vocab_size 512 \
            --steps 1200 --n_layer 6 --n_head 8 --n_embd 128 \
            --block_size 64 --batch_size 16 --out ckpt.npz
          python export_web.py --ckpt ckpt.npz --out web/model.json

      - name: Add LLM demo to site (if a model is available)
        run: |
          if [ -f llm-from-scratch/web/model.json ]; then
            mkdir -p _site/llm
            # The full installable PWA: page, JS engine, weights, plus the
            # manifest / offline service worker / icons so install + offline work.
            cp llm-from-scratch/web/index.html    _site/llm/index.html
            cp llm-from-scratch/web/gpt.js        _site/llm/gpt.js
            cp llm-from-scratch/web/model.json    _site/llm/model.json
            cp llm-from-scratch/web/manifest.json _site/llm/manifest.json 2>/dev/null || true
            cp llm-from-scratch/web/sw.js         _site/llm/sw.js          2>/dev/null || true
            cp llm-from-scratch/web/icon.svg      _site/llm/icon.svg       2>/dev/null || true
            cp llm-from-scratch/web/icon-*.png    _site/llm/               2>/dev/null || true
            echo "LLM demo included."
          else
            echo "No trained model yet — skipping /llm (run this workflow manually to build it)."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
