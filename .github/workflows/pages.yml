name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "trading-app/fx-signal-pro.html"
      - "llm-from-scratch/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install LLM dependencies
        run: pip install -r llm-from-scratch/requirements.txt

      # If a model has been committed at web/model.json (e.g. trained on a GPU
      # via notebooks/train_gpt_colab.ipynb), serve it as-is. Otherwise train a
      # small one in CI as a fallback. Training is CPU-only here, so a committed
      # GPU-trained model is both better and faster to deploy.
      - name: Build or reuse the browser model
        working-directory: llm-from-scratch
        run: |
          if [ -f web/model.json ]; then
            echo "Using committed web/model.json ($(du -h web/model.json | cut -f1)); skipping training."
          else
            echo "No committed model; training one in CI."
            python fetch_data.py shakespeare || echo "download failed; falling back to sample corpus"
            DATA=data/shakespeare.txt
            [ -f "$DATA" ] || DATA=data/input.txt
            echo "training on $DATA"
            python train.py --data "$DATA" --tokenizer bpe --vocab_size 512 \
              --steps 1200 --n_layer 6 --n_head 8 --n_embd 128 \
              --block_size 64 --batch_size 16 --out ckpt.npz
            python export_web.py --ckpt ckpt.npz --out web/model.json
          fi

      - name: Assemble site
        run: |
          mkdir -p _site/llm
          # Trading app stays at the site root.
          cp trading-app/fx-signal-pro.html _site/index.html
          # LLM demo lives at /llm/ (index.html, gpt.js, model.json).
          cp llm-from-scratch/web/index.html _site/llm/index.html
          cp llm-from-scratch/web/gpt.js _site/llm/gpt.js
          cp llm-from-scratch/web/model.json _site/llm/model.json

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
