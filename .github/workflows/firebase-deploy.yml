name: Deploy Firebase (rules • storage • functions)

# Auto-publishes the Firebase backend whenever its config changes on main, so
# rules/functions never have to be deployed by hand. Needs one repo secret:
#   FIREBASE_SERVICE_ACCOUNT = the full JSON of a service-account key for the
#   apexvip-1b4a9 project (Firebase console → Project settings → Service accounts
#   → Generate new private key). Give that service account the "Editor" role in
#   Google Cloud IAM so it can deploy rules and functions.
#
# Until the secret is set, the job skips cleanly (stays green) with a notice.

on:
  push:
    branches: ["main"]
    paths:
      - "firestore.rules"
      - "storage.rules"
      - "firestore.indexes.json"
      - "firebase.json"
      - "functions/**"
      - ".github/workflows/firebase-deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for the service-account secret
        id: gate
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Firebase auto-deploy idle::Add the FIREBASE_SERVICE_ACCOUNT repo secret to enable automatic deploys."
          fi

      - name: Set up Node
        if: steps.gate.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Write service-account key
        if: steps.gate.outputs.ok == 'true'
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: printf '%s' "$SA" > "$RUNNER_TEMP/sa.json"

      - name: Install Firebase CLI + function deps
        if: steps.gate.outputs.ok == 'true'
        run: |
          npm install -g firebase-tools
          npm --prefix functions install

      # Rules are the critical part — this step must succeed.
      - name: Deploy Firestore + Storage rules
        if: steps.gate.outputs.ok == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          firebase deploy --only firestore:rules,storage \
            --project apexvip-1b4a9 --non-interactive --force

      # Indexes + functions are a bonus — don't fail the run if IAM perms or the
      # Cloud Functions APIs aren't fully set up yet.
      - name: Deploy indexes + functions (best effort)
        if: steps.gate.outputs.ok == 'true'
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          firebase deploy --only firestore:indexes,functions \
            --project apexvip-1b4a9 --non-interactive --force
