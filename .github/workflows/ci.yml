name: CI

# Real CI: typecheck + tests on every push and PR, so a change that breaks the
# money math, the callable contract, or the booking→driver dispatch loop fails
# the check instead of merging green. (Replaces the old placeholder that only
# echoed "Hello, world!".)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # Fast gate: typechecks + unit tests + the prototype smoke test.
  test:
    runs-on: ubuntu-latest
    env:
      # apexvip-web depends on playwright; Chromium isn't needed for unit tests.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22" # node --test --experimental-strip-types needs 22+

      - name: Root — prototype smoke + pure-logic tests
        run: |
          npm install --no-audit --no-fund
          npm test

      - name: Backend (functions) — typecheck + tests
        run: |
          npm --prefix functions install --no-audit --no-fund
          npm --prefix functions run typecheck
          npm --prefix functions test

      - name: Frontend (apexvip-web) — typecheck + tests
        run: |
          npm --prefix apexvip-web install --no-audit --no-fund
          npm --prefix apexvip-web run typecheck
          npm --prefix apexvip-web test

      - name: Engine bundle stays in sync with source
        run: |
          npm --prefix apexvip-web run build:engine
          git diff --exit-code apexvip-engine.js \
            || (echo "::error::apexvip-engine.js is stale — run 'npm run build:engine' and commit." && exit 1)

      # Every file the published pages / SW precache reference must exist and be
      # copied by pages.yml — the class of bug that 404'd apexvip-engine.js for
      # every visitor and silently emptied the offline shell (apexvip-dubai).
      - name: Published-asset references resolve
        run: node scripts/check-published-assets.mjs

  # Integration gate: the booking → dispatch → driver-claim loop, against the
  # real Firebase emulator (needs Java + firebase-tools).
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21" # firebase-tools requires JDK 21+
      - name: Install firebase-tools + function deps
        run: |
          npm install -g firebase-tools
          npm --prefix functions install --no-audit --no-fund
          npm --prefix functions-side install --no-audit --no-fund
      - name: Emulator test — booking dispatches to a driver
        run: npm --prefix functions run test:emulator
      - name: Security rules tests
        run: npm --prefix functions run test:rules

  # UI gate: the real prototype pages driven in Chromium — the client booking
  # flow end-to-end (guest → hourly → vehicle → summary fare → payment screen),
  # an XSS-escaping canary, and zero-page-error loads for driver + admin.
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install apexvip-web deps + Chromium
        run: |
          npm --prefix apexvip-web install --no-audit --no-fund
          npx --prefix apexvip-web playwright install --with-deps chromium
      - name: Booking-flow e2e
        run: npm --prefix apexvip-web run test:e2e:booking

  # TimeCoin gate: drive the real coin/index.html in Chromium against an
  # in-process relay — locks in the receipt-authorisation rule (no forged
  # receipts from gossip) and circle money-isolation (a neighbour can't reorg
  # your chain or rewrite your credit limits). Playwright is CI-only; the app
  # itself stays zero-dependency.
  coin-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Chromium (dev-only)
        run: |
          npm install --no-save --no-audit --no-fund playwright
          npx playwright install --with-deps chromium
      - name: TimeCoin end-to-end regression tests
        run: node scripts/test-coin-e2e.mjs
