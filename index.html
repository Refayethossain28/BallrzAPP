<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ApexVIP</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#fff;font-family:'Cormorant Garamond',Georgia,serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;-webkit-font-smoothing:antialiased}
.logo{font-size:42px;font-weight:600;letter-spacing:6px;color:#D4A843;margin-bottom:6px}
.sub{font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.35);margin-bottom:56px;text-transform:uppercase;font-family:-apple-system,system-ui,sans-serif}
.cards{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px}
a{display:block;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:22px 24px;text-decoration:none;color:#fff;transition:all .2s}
a:active{background:rgba(212,168,67,.08);border-color:rgba(212,168,67,.4)}
.app-icon{font-size:26px;margin-bottom:10px}
.app-name{font-size:18px;font-weight:600;margin-bottom:3px}
.app-desc{font-size:12px;color:rgba(255,255,255,.4);font-family:-apple-system,system-ui,sans-serif;letter-spacing:.3px}
.gold{border-color:rgba(212,168,67,.3);background:rgba(212,168,67,.05)}
.gold .app-name{color:#D4A843}
</style>
</head>
<body>
<div class="logo">APEXVIP</div>
<div class="sub">Luxury Chauffeur Services</div>
<div class="cards">
  <a href="apexvip-client.html" class="gold">
    <div class="app-icon">🚘</div>
    <div class="app-name">Client App</div>
    <div class="app-desc">Book a luxury chauffeur</div>
  </a>
  <a href="apexvip-driver.html">
    <div class="app-icon">🧭</div>
    <div class="app-name">Driver App</div>
    <div class="app-desc">Driver portal — accept & manage jobs</div>
  </a>
  <a href="apexvip-admin.html">
    <div class="app-icon">⚙️</div>
    <div class="app-name">Admin Panel</div>
    <div class="app-desc">Operations & fleet management</div>
  </a>
</div>
</body>
</html>
