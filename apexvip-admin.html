<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;
  --bg:#080808;--fg:#f0ece4;--fg-muted:#c8bfb0;--fg-dim:#8a8278;--fg-subtle:#5a5550;--fg-ghost:#3a3632;--fg-faint:#28251f;
  --surface:rgba(255,255,255,.045);--surface-b:rgba(255,255,255,.03);--surface-c:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border-b:rgba(255,255,255,.05);--divider:rgba(255,255,255,.04);
  --gold:#D4A843;--gold-dim:rgba(212,168,67,.14)}
body.light{
  --bg:#f5f0e8;--fg:#1a1612;--fg-muted:#3d3730;--fg-dim:#6b6258;--fg-subtle:#9a9088;--fg-ghost:#c8bfb0;--fg-faint:#e0d8cc;
  --surface:rgba(0,0,0,.04);--surface-b:rgba(0,0,0,.025);--surface-c:rgba(0,0,0,.065);
  --border:rgba(0,0,0,.08);--border-b:rgba(0,0,0,.05);--divider:rgba(0,0,0,.04)}

/* ── Sidebar ── */
.sidebar{width:240px;min-height:100vh;background:rgba(10,9,8,.92);border-right:1px solid var(--border);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50;transition:transform .25s;backdrop-filter:blur(24px)}
body.light .sidebar{background:rgba(240,235,226,.92)}
.main{margin-left:240px;flex:1;padding:32px;min-height:100vh}
@media(max-width:768px){.sidebar{transform:translateX(-240px)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px 16px 80px}}

/* ── Sidebar nav items ── */
.s-nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;color:var(--fg-subtle);font-size:14px;transition:all .15s;border-left:3px solid transparent;position:relative}
.s-nav-item:hover{color:var(--fg);background:var(--surface)}
.s-nav-item.on{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}

/* ── Keyframes ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes logoReveal{0%{opacity:0;letter-spacing:18px}60%{opacity:1}100%{opacity:1;letter-spacing:10px}}
@keyframes subtitleReveal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;flex:1;min-width:150px}

/* ── Buttons ── */
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-gold{background:var(--gold);color:#000}
.btn-glass{background:var(--surface-c);border:1px solid var(--border);color:var(--fg)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;color:var(--fg-subtle);font-size:10px;font-weight:700;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px}
td{padding:12px 14px;border-bottom:1px solid var(--divider);font-size:14px;vertical-align:middle}
tr:hover td{background:var(--surface-b)}
input,select{background:var(--surface-c);border:1px solid var(--border);border-radius:8px;color:var(--fg);padding:10px 14px;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--gold)}
select option{background:#111}
body.light select option{background:#f5f0e8}

/* ── Tags ── */
.tag{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.tag-gold{background:rgba(212,168,67,.14);color:var(--gold)}
.tag-green{background:rgba(34,197,94,.14);color:#22c55e}
.tag-blue{background:rgba(59,130,246,.14);color:#3b82f6}
.tag-amber{background:rgba(245,158,11,.14);color:#f59e0b}
.tag-purple{background:rgba(168,85,247,.14);color:#a855f7}
.tag-red{background:rgba(239,68,68,.14);color:#ef4444}
.tag-gray{background:rgba(120,120,120,.14);color:var(--fg-dim)}

/* ── Misc ── */
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fg-subtle)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.section-title{font-size:22px;font-weight:700}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;flex-shrink:0}
.screen{animation:fadeIn .2s ease}
.bar{border-radius:4px 4px 0 0;background:var(--gold);opacity:.75;flex:1}
.menu-toggle{display:none;position:fixed;top:16px;left:16px;z-index:60;background:var(--surface-c);border:1px solid var(--border);border-radius:10px;padding:9px;cursor:pointer;color:var(--fg)}
@media(max-width:768px){.menu-toggle{display:flex}}

/* ── Modal (bottom-sheet on mobile, centred on desktop) ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.modal-bg{align-items:center;padding:20px}}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:28px;width:100%;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:20px;max-width:480px}}
</style>
</head>

let S={screen:'login',bFilter:'all',dFilter:'all',cFilter:'all',theme:localStorage.getItem('apexvip_admin_theme')||'dark'};

if(S.theme==='light') document.body.classList.add('light');

function toggleTheme(){
  S.theme=S.theme==='light'?'dark':'light';
  localStorage.setItem('apexvip_admin_theme',S.theme);
  document.body.classList.toggle('light',S.theme==='light');
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=S.theme==='light'?'🌙':'☀️';
}

function go(s){S.screen=s;render();document.getElementById('sidebar').classList.remove('open');window.scrollTo(0,0);}
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');}
function openModal(h){document.getElementById('modal-box').innerHTML=h;document.getElementById('modal-bg').style.display='flex';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}

async function adminLogin(){
  if(!FIREBASE_ENABLED){go('dashboard');return;}
  const email=document.querySelector('input[type=email]')?.value||'';
  const pass=document.querySelector('input[type=password]')?.value||'';
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pass);
    const doc=await db.collection('users').doc(cred.user.uid).get();
    if(doc.exists&&doc.data().role==='admin'){go('dashboard');}
    else{auth.signOut();alert('Access denied. Admin accounts only.');}
  }catch(err){alert('Invalid credentials');}
}

async function createBookingInFirestore(){
  if(!FIREBASE_ENABLED){closeModal();return;}
  const inputs=document.querySelectorAll('#modal-box input,#modal-box select');
  const ref='APX-'+(Math.floor(1000+Math.random()*9000));
  try{
    await db.collection('bookings').add({
      ref,clientName:inputs[0]?.value||'',pickup:inputs[1]?.value||'',
      dropoff:inputs[2]?.value||'',date:inputs[3]?.value||'',
      time:inputs[4]?.value||'',flight:inputs[5]?.value||'',
      vehicle:(inputs[6]?.value||'').includes('V-Class')?'V-Class':'S-Class',
      status:'pending',driver:'—',price:185,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(err){console.warn('Create booking:',err.message);}
  closeModal();render();
}

async function updateBookingStatus(id,status){
  if(!FIREBASE_ENABLED)return;
  try{await db.collection('bookings').doc(id).update({status});}catch(e){}
}

function badge(s){
  const m={
    pending:'tag-amber Pending',confirmed:'tag-blue Confirmed',active:'tag-green Active',
    completed:'tag-gray Completed',cancelled:'tag-red Cancelled',
    online:'tag-green Online',ontrip:'tag-amber On Trip',offline:'tag-gray Offline',
    available:'tag-green Available',vip:'tag-gold VIP',vvip:'tag-purple VVIP',standard:'tag-gray Standard'
  };
  const v=m[s]||('tag-gray '+s);const[c,...r]=v.split(' ');
  return`<span class="tag ${c}">${r.join(' ')}</span>`;
}
function av(initials,color,size=36){return`<div class="avatar" style="background:${color};width:${size}px;height:${size}px;font-size:${Math.round(size*.35)}px">${initials}</div>`;}
function stars(r){return'★'.repeat(Math.floor(r))+'☆'.repeat(5-Math.floor(r));}

function barChart(data,labels,height=70){
  const mx=Math.max(...data);
  return`<div style="display:flex;align-items:flex-end;gap:4px;height:${height}px">
    ${data.map((v,i)=>`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div class="bar" style="height:${Math.round((v/mx)*(.8*height))+6}px"></div>
      <div style="font-size:9px;color:var(--fg-subtle)">${labels?labels[i]:''}</div>
    </div>`).join('')}
  </div>`;
}

function renderSidebar(){
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=S.theme==='light'?'🌙':'☀️';
  if(S.screen==='login'){
    document.getElementById('sidebar').style.display='none';
    document.getElementById('main').style.marginLeft='0';
    const mt=document.querySelector('.menu-toggle');if(mt)mt.style.display='none';
    return;
  }
  document.getElementById('sidebar').style.display='flex';
  document.getElementById('main').style.marginLeft='';
  const mt=document.querySelector('.menu-toggle');if(mt)mt.style.display='';
  document.getElementById('sidenav').innerHTML=NAVITEMS.map(i=>`
    <div class="s-nav-item${S.screen===i.id?' on':''}" onclick="go('${i.id}')">
      <span style="font-size:16px">${i.icon}</span><span>${i.label}</span>
    </div>`).join('');
}

function filterBar(opts,current,key){
  return`<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    ${opts.map(([val,label])=>`<button class="btn btn-sm ${S[key]===val?'btn-gold':'btn-glass'}" onclick="S.${key}='${val}';render()">${label}</button>`).join('')}

}
function tabRow(opts,current,expr){
  return`<div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto">
    ${opts.map(([val,label])=>`<div onclick="${expr.replace('__VAL__',val)}" style="padding:10px 18px;cursor:pointer;font-size:14px;color:${current===val?'var(--gold)':'var(--fg-subtle)'};border-bottom:2px solid ${current===val?'var(--gold)':'transparent'};white-space:nowrap;transition:color .15s">${label}</div>`).join('')}

}

          ${av(i,'var(--surface-c)',32)}<div style="flex:1"><div style="font-size:13px;font-weight:500">${e}</div><div style="font-size:11px;color:var(--fg-subtle)">${r}</div></div>
        </div>`).join('')}
        <button class="btn btn-glass btn-sm" style="margin-top:12px">+ Add User</button>
      </div>
    </div>
  </div>
</div>`,
};

function showBooking(id){const b=BOOKINGS.find(x=>x.id===id);if(!b)return;
  openModal(`<div>
    <div style="font-size:17px;font-weight:700;margin-bottom:18px">Booking ${b.id}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">
      ${[['Client',b.client],['Vehicle',b.vehicle],['Pickup',b.pickup],['Driver',b.driver],['Drop-off',b.dropoff],['Date & Time',b.date+' '+b.time],['Price',`<span style="color:var(--gold);font-weight:700">${b.price}</span>`],['Status',badge(b.status)]].map(([l,v])=>`<div><div style="font-size:10px;color:var(--fg-subtle);margin-bottom:4px;letter-spacing:.5px">${l.toUpperCase()}</div><div style="font-size:14px;font-weight:500">${v}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-gold btn-sm" onclick="closeModal()">Assign Driver</button>
      <button class="btn btn-glass btn-sm" onclick="closeModal()">Edit</button>
      <button class="btn btn-danger btn-sm" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);}

function showDriver(id){const d=DRIVERS.find(x=>x.id===id);if(!d)return;
  openModal(`<div>
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      ${av(d.initials,d.color,52)}<div><div style="font-size:18px;font-weight:700">${d.name}</div><div style="color:var(--gold);margin-top:4px">★ ${d.rating} &nbsp; ${badge(d.status)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px">
      ${[['Vehicle',d.vehicle],['Total Trips',d.trips],['This Month',d.earnings],['Member Since','Jan 2023']].map(([l,v])=>`<div style="background:var(--surface-b);border-radius:10px;padding:12px;border:1px solid var(--border)"><div style="font-size:10px;color:var(--fg-subtle);margin-bottom:3px;letter-spacing:.5px">${l.toUpperCase()}</div><div style="font-size:15px;font-weight:600">${v}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gold btn-sm" onclick="closeModal()">Assign Job</button>
      <button class="btn btn-glass btn-sm" onclick="closeModal()">Edit Profile</button>
    </div>
  </div>`);}

function showClient(id){const c=CLIENTS.find(x=>x.id===id);if(!c)return;
  openModal(`<div>
    <div style="font-size:17px;font-weight:700;margin-bottom:18px">${c.name}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px">
      ${[['Email',c.email],['Phone',c.phone],['Total Bookings',c.bookings],['Total Spent',`<span style="color:var(--gold);font-weight:700">${c.spent}</span>`],['Tier',badge(c.tier)],['Member Since',c.joined]].map(([l,v])=>`<div><div style="font-size:10px;color:var(--fg-subtle);margin-bottom:4px;letter-spacing:.5px">${l.toUpperCase()}</div><div style="font-size:14px;font-weight:500">${v}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gold btn-sm" onclick="closeModal()">Book for Client</button>
      <button class="btn btn-glass btn-sm" onclick="closeModal()">Edit</button>
    </div>
  </div>`);}

function newBookingForm(){return`<div>
  <div style="font-size:17px;font-weight:700;margin-bottom:20px">New Booking</div>
  ${[['Client Name','text','e.g. Sarah Mitchell'],['Pickup Address','text','14 Park Lane, Mayfair'],['Dropoff / Airport','text','Heathrow Terminal 5'],['Date','date',''],['Time','time',''],['Flight Number (optional)','text','e.g. BA0247']].map(([l,t,p])=>`<div style="margin-bottom:12px"><label style="font-size:11px;color:var(--fg-subtle);display:block;margin-bottom:5px;letter-spacing:.5px">${l.toUpperCase()}</label><input type="${t}" placeholder="${p}" style="width:100%"/></div>`).join('')}
  <div style="margin-bottom:18px"><label style="font-size:11px;color:var(--fg-subtle);display:block;margin-bottom:5px;letter-spacing:.5px">VEHICLE</label><select style="width:100%"><option>Mercedes S-Class — £185</option><option>Mercedes V-Class — £225</option></select></div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-gold" style="flex:1" onclick="createBookingInFirestore()">Create Booking</button>
    <button class="btn btn-glass" onclick="closeModal()">Cancel</button>
  </div>
</div>`;}

function render(){
  renderSidebar();
  const fn=pages[S.screen]||pages.dashboard;
  document.getElementById('main').innerHTML=fn();
}

render();
</script>
