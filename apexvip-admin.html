const LoginScreen = ({ onLogin }) => {
  const [email, setEmail] = useState("");

// ─── Status Badge ─────────────────────────────────────────────────────────────
const StatusBadge = ({ status }) => {
  const map = {
    pending: ["badge-amber", "Pending"],
    confirmed: ["badge-blue", "Confirmed"],
    active: ["badge-green", "Active"],
    completed: ["badge-gray", "Completed"],
    cancelled: ["badge-red", "Cancelled"],
    "on-trip": ["badge-amber", "On Trip"],
    online: ["badge-green", "Online"],
    offline: ["badge-gray", "Offline"],
    available: ["badge-green", "Available"],
    "on trip": ["badge-amber", "On Trip"],
  };
  const [cls, label] = map[status] || ["badge-gray", status];
  return <span className={`badge ${cls}`}>{label}</span>;
};

// ─── Pricing Page ─────────────────────────────────────────────────────────────
const PricingPage = () => {
  const [rows, setRows] = useState(PRICING.map(r => ({ ...r })));
  const [saved, setSaved] = useState(false);

  const handleChange = (i, field, val) => {
    const updated = [...rows];
    updated[i] = { ...updated[i], [field]: val };
    setRows(updated);
    setSaved(false);
  };

  const handleSave = () => {
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  return (
    <div>
      <div className="page-title">Pricing</div>
      <div className="page-sub">Configure service rates and surcharges</div>

      <div className="card">
        <div style={{ marginBottom: 20, padding: "12px 16px", background: "rgba(201,168,76,0.06)", border: "1px solid rgba(201,168,76,0.12)", borderRadius: 8, fontSize: 13, color: "#C9A84C" }}>
          Edit pricing values directly in the table and click Save Changes to apply.
        </div>
        <table>
          <thead>
            <tr>
              <th style={{ width: "50%" }}>Service</th>
              <th>S-Class</th>
              <th>V-Class</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i}>
                <td style={{ fontWeight: 500 }}>{r.service}</td>
                <td>
                  <input value={r.sClass} onChange={e => handleChange(i, "sClass", e.target.value)} style={{ width: 120 }} />
                </td>
                <td>
                  <input value={r.vClass} onChange={e => handleChange(i, "vClass", e.target.value)} style={{ width: 120 }} />

              </tr>
            ))}

        <div style={{ marginTop: 24, display: "flex", justifyContent: "flex-end", gap: 12, alignItems: "center" }}>

      </div>
    </div>
  );
};

// ─── Main App ─────────────────────────────────────────────────────────────────
const App = () => {
  const [loggedIn, setLoggedIn] = useState(false);
  const [activePage, setActivePage] = useState("dashboard");

  if (!loggedIn) return <LoginScreen onLogin={() => setLoggedIn(true)} />;

  const renderPage = () => {
    switch (activePage) {
      case "dashboard": return <DashboardPage />;
      case "bookings": return <BookingsPage />;
      case "drivers": return <DriversPage />;
      case "clients": return <ClientsPage />;
      case "fleet": return <FleetPage />;
      case "pricing": return <PricingPage />;
      case "analytics": return <AnalyticsPage />;
      case "settings": return <SettingsPage />;
      default: return <DashboardPage />;
    }
  };

  return (
    <>
      <Sidebar active={activePage} setActive={setActivePage} onLogout={() => setLoggedIn(false)} />
      <main className="main">
        {renderPage()}
      </main>
    </>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
