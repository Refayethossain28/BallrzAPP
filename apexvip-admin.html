<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ApexVIP Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0f0f0f;color:#fff;font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;background:#161616;border-right:1px solid rgba(255,255,255,.06);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50;transition:transform .25s}
.main{margin-left:240px;flex:1;padding:32px;min-height:100vh}
@media(max-width:768px){.sidebar{transform:translateX(-240px)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px 16px 80px}}
.logo{padding:24px 20px;border-bottom:1px solid rgba(255,255,255,.06)}
.nav-item{display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;color:#777;font-size:14px;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{color:#ccc;background:rgba(255,255,255,.03)}
.nav-item.active{color:#C9A84C;background:rgba(201,168,76,.08);border-left-color:#C9A84C}
.card{background:#1c1c1c;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px}
.stat-card{background:#1c1c1c;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;flex:1;min-width:150px}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit}
.btn-gold{background:#C9A84C;color:#000}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15);color:#ccc}
.btn-sm{padding:6px 14px;font-size:13px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;color:#666;font-size:11px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.06);text-transform:uppercase;letter-spacing:.5px}
td{padding:13px 16px;border-bottom:1px solid rgba(255,255,255,.04);font-size:14px;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,.02)}
input,select{background:#222;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:#fff;padding:10px 14px;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{border-color:#C9A84C}
select option{background:#222}
.badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-pending{background:rgba(245,158,11,.15);color:#f59e0b}
.b-confirmed{background:rgba(59,130,246,.15);color:#3b82f6}
.b-active{background:rgba(34,197,94,.15);color:#22c55e}
.b-completed{background:rgba(100,100,100,.2);color:#888}
.b-cancelled{background:rgba(239,68,68,.15);color:#ef4444}
.b-online{background:rgba(34,197,94,.15);color:#22c55e}
.b-ontrip{background:rgba(245,158,11,.15);color:#f59e0b}
.b-offline{background:rgba(100,100,100,.2);color:#666}
.b-available{background:rgba(34,197,94,.15);color:#22c55e}
.b-vip{background:rgba(201,168,76,.15);color:#C9A84C}
.b-vvip{background:rgba(168,85,247,.15);color:#a855f7}
.b-standard{background:rgba(100,100,100,.2);color:#888}
.tab{padding:10px 18px;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:#C9A84C;border-bottom-color:#C9A84C}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.section-title{font-size:22px;font-weight:700}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#1c1c1c;border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:24px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.menu-toggle{display:none;position:fixed;top:16px;left:16px;z-index:60;background:#1c1c1c;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px;cursor:pointer;color:#fff}
@media(max-width:768px){.menu-toggle{display:flex}}
.screen{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bar{border-radius:4px 4px 0 0;background:#C9A84C;opacity:.75;flex:1}
</style>
</head>
<body>
<button class="menu-toggle" onclick="toggleMenu()">
  <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
</button>
<div id="sidebar" class="sidebar">
  <div class="logo">
    <div style="font-size:18px;font-weight:800;letter-spacing:4px;color:#C9A84C">APEX VIP</div>
    <div style="font-size:10px;color:#444;letter-spacing:3px;margin-top:2px">ADMIN PORTAL</div>
  </div>
  <nav style="flex:1;padding:12px 0;overflow-y:auto" id="sidenav"></nav>
  <div style="padding:16px 20px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:12px">
    <div class="avatar" style="background:linear-gradient(135deg,#C9A84C,#8B6914);width:36px;height:36px;font-size:13px">AD</div>
    <div><div style="font-size:13px;font-weight:600">Admin</div><div style="font-size:11px;color:#555">admin@apexvip.com</div></div>
    <button onclick="go('login')" style="margin-left:auto;background:none;border:none;color:#555;cursor:pointer;font-size:20px;line-height:1">⏻</button>

</div>
<div class="main" id="main"></div>
<div id="modal-bg" style="display:none" class="modal-bg" onclick="closeModal()">
  <div class="modal" id="modal-box" onclick="event.stopPropagation()"></div>
</div>
<script>

const DRIVERS=[

  {id:'D2',name:'Michael Torres',initials:'MT',color:'#3b82f6',rating:4.8,status:'ontrip',vehicle:'V-Class LX72 DEF',trips:189,earnings:'£2,210'},

const CLIENTS=[

  {id:'C2',name:'Robert Chen',email:'r.chen@email.com',phone:'+44 7700 900002',bookings:18,spent:'£3,510',tier:'vip',joined:'Mar 2024'},

  {id:'C4',name:'James Cooper',email:'j.cooper@email.com',phone:'+44 7700 900004',bookings:31,spent:'£6,240',tier:'vvip',joined:'Nov 2023'},
  {id:'C5',name:'Victoria Stone',email:'v.stone@email.com',phone:'+44 7700 900005',bookings:15,spent:'£2,890',tier:'vip',joined:'Feb 2024'},
  {id:'C6',name:'Oliver Hart',email:'o.hart@email.com',phone:'+44 7700 900006',bookings:7,spent:'£1,240',tier:'standard',joined:'Jun 2024'},
  {id:'C7',name:'Isabella Moore',email:'i.moore@email.com',phone:'+44 7700 900007',bookings:22,spent:'£4,180',tier:'vip',joined:'Dec 2023'},

const FLEET=[

  {model:'Mercedes S-Class',reg:'LX71 GHI',year:'2022',color:'Obsidian Black',status:'ontrip',driver:'David Kim',mileage:'34,180'},
  {model:'Mercedes V-Class',reg:'LX72 DEF',year:'2023',color:'Obsidian Black',status:'ontrip',driver:'Michael Torres',mileage:'22,650'},
  {model:'Mercedes V-Class',reg:'LX70 JKL',year:'2022',color:'Selenite Grey',status:'available',driver:'Unassigned',mileage:'41,320'},

const REV=[2400,3100,2800,3600,2900,4200,3840];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Today'];
const MREV=[28,31,26,34,38,42];
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun'];
const NAVITEMS=[{id:'dashboard',icon:'⊞',label:'Dashboard'},{id:'bookings',icon:'📋',label:'Bookings'},{id:'drivers',icon:'🚗',label:'Drivers'},{id:'clients',icon:'👤',label:'Clients'},{id:'fleet',icon:'🚙',label:'Fleet'},{id:'pricing',icon:'£',label:'Pricing'},{id:'analytics',icon:'📊',label:'Analytics'},{id:'settings',icon:'⚙',label:'Settings'}];

let S={screen:'login',bFilter:'all',dFilter:'all',cFilter:'all'};

function go(s){S.screen=s;render();document.getElementById('sidebar').classList.remove('open');window.scrollTo(0,0);}
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');}
function openModal(h){document.getElementById('modal-box').innerHTML=h;document.getElementById('modal-bg').style.display='flex';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}

function badge(s){
  const m={pending:'b-pending Pending',confirmed:'b-confirmed Confirmed',active:'b-active Active',completed:'b-completed Completed',cancelled:'b-cancelled Cancelled',online:'b-online Online',ontrip:'b-ontrip On Trip',offline:'b-offline Offline',available:'b-available Available',vip:'b-vip VIP',vvip:'b-vvip VVIP',standard:'b-standard Standard'};
  const v=m[s]||('b-standard '+s);const[c,...r]=v.split(' ');return`<span class="badge ${c}">${r.join(' ')}</span>`;
}
function av(initials,color,size=36){return`<div class="avatar" style="background:${color};width:${size}px;height:${size}px;font-size:${Math.round(size*.35)}px">${initials}</div>`;}
function stars(r){return'★'.repeat(Math.floor(r))+'☆'.repeat(5-Math.floor(r));}

function barChart(data,labels,height=70,color='#C9A84C'){
  const mx=Math.max(...data);
  return`<div style="display:flex;align-items:flex-end;gap:4px;height:${height}px">
    ${data.map((v,i)=>`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div style="font-size:9px;color:#555">${labels?labels[i]:''}</div>
      <div class="bar" style="height:${Math.round((v/mx)*(.8*height))+6}px"></div>
    </div>`).join('')}
  </div>`;
}

function renderSidebar(){
  if(S.screen==='login'){document.getElementById('sidebar').style.display='none';document.getElementById('main').style.marginLeft='0';document.querySelector('.menu-toggle').style.display='none';return;}
  document.getElementById('sidebar').style.display='flex';document.getElementById('main').style.marginLeft='';document.querySelector('.menu-toggle').style.display='';
  document.getElementById('sidenav').innerHTML=NAVITEMS.map(i=>`<div class="nav-item${S.screen===i.id?' active':''}" onclick="go('${i.id}')"><span style="font-size:16px">${i.icon}</span><span>${i.label}</span></div>`).join('');
}

const pages={
login:()=>`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
  <div style="width:100%;max-width:380px;padding:24px">

    </div>
    <div style="margin-bottom:14px"><label style="font-size:12px;color:#666;display:block;margin-bottom:5px">Email</label><input type="email" value="admin@apexvip.com" style="width:100%"/></div>
    <div style="margin-bottom:24px"><label style="font-size:12px;color:#666;display:block;margin-bottom:5px">Password</label><input type="password" value="admin123" style="width:100%"/></div>
    <button class="btn btn-gold" style="width:100%;padding:15px" onclick="go('dashboard')">Sign In</button>
    <div style="margin-top:14px;background:#1a1a1a;border-radius:8px;padding:12px;font-size:12px;color:#555">Demo: admin@apexvip.com / admin123</div>
  </div>
</div>`,

dashboard:()=>`<div class="screen">
  <div class="section-header">
    <div><div class="section-title">Dashboard</div><div style="color:#666;font-size:13px;margin-top:2px">Wednesday, 28 May 2026</div></div>
    <button class="btn btn-gold btn-sm" onclick="openModal(newBookingForm())">+ New Booking</button>
  </div>
  <div style="display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap">
    ${[["Today's Bookings",'12','+3 from yesterday','📋','#3b82f6'],['Active Rides','4','2 en route','🚗','#22c55e'],['Revenue Today','£3,840','+12% vs last week','£','#C9A84C'],['Drivers Online','6','2 on trip','👤','#a855f7']].map(([l,v,s,ic,c])=>`<div class="stat-card">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px"><span style="font-size:11px;color:#666;font-weight:600">${l}</span><span style="font-size:18px">${ic}</span></div>
      <div style="font-size:30px;font-weight:800;color:${c}">${v}</div>
      <div style="font-size:12px;color:#555;margin-top:4px">${s}</div>

      ${barChart(REV,DAYS,80)}

  </div>
  <div class="card">
    <div style="font-size:14px;font-weight:600;margin-bottom:14px">Recent Bookings</div>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Client</th><th>Route</th><th>Vehicle</th><th>Driver</th><th>Status</th><th>Time</th><th></th></tr></thead>
      <tbody>${BOOKINGS.slice(0,5).map(b=>`<tr>

    <tbody>${list.map(c=>`<tr>
      <td><div style="display:flex;align-items:center;gap:10px">${av(c.name.split(' ').map(n=>n[0]).join(''),'#2a2a2a',30)}<span style="font-weight:500">${c.name}</span></div></td>

function showBooking(id){const b=BOOKINGS.find(x=>x.id===id);if(!b)return;
  openModal(`<div><div style="font-size:17px;font-weight:700;margin-bottom:16px">Booking ${b.id}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      ${[['Client',b.client],['Vehicle',b.vehicle],['Pickup',b.pickup],['Driver',b.driver],['Dropoff',b.dropoff],['Date & Time',b.date+' '+b.time],['Price',b.price],['Status',badge(b.status)]].map(([l,v])=>`<div><div style="font-size:11px;color:#666;margin-bottom:3px">${l}</div><div style="font-size:14px;font-weight:500">${v}</div></div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-gold btn-sm" onclick="closeModal()">Assign Driver</button>
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Edit</button>
      <button class="btn btn-sm" style="background:rgba(239,68,68,.12);color:#ef4444;border:none;border-radius:8px" onclick="closeModal()">Cancel</button>
    </div>
  </div>`);}

    ${av(d.initials,d.color,52)}<div><div style="font-size:18px;font-weight:700">${d.name}</div><div style="color:#C9A84C;margin-top:3px">★ ${d.rating} &nbsp; ${badge(d.status)}</div></div></div>

function showClient(id){const c=CLIENTS.find(x=>x.id===id);if(!c)return;

      <button class="btn btn-outline btn-sm" onclick="closeModal()">Edit</button>

}
