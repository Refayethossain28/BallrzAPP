<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;
  --bg:#080808;--fg:#f0ece4;--fg-muted:#c8bfb0;--fg-dim:#8a8278;--fg-subtle:#5a5550;--fg-ghost:#3a3632;--fg-faint:#28251f;
  --surface:rgba(255,255,255,.045);--surface-b:rgba(255,255,255,.03);--surface-c:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border-b:rgba(255,255,255,.05);--divider:rgba(255,255,255,.04);
  --gold:#D4A843;--gold-dim:rgba(212,168,67,.14)}
body.light{
  --bg:#f5f0e8;--fg:#1a1612;--fg-muted:#3d3730;--fg-dim:#6b6258;--fg-subtle:#9a9088;--fg-ghost:#c8bfb0;--fg-faint:#e0d8cc;
  --surface:rgba(0,0,0,.04);--surface-b:rgba(0,0,0,.025);--surface-c:rgba(0,0,0,.065);
  --border:rgba(0,0,0,.08);--border-b:rgba(0,0,0,.05);--divider:rgba(0,0,0,.04)}

/* ── Sidebar ── */
.sidebar{width:240px;min-height:100vh;background:rgba(10,9,8,.92);border-right:1px solid var(--border);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50;transition:transform .25s;backdrop-filter:blur(24px)}
body.light .sidebar{background:rgba(240,235,226,.92)}
.main{margin-left:240px;flex:1;padding:32px;min-height:100vh}
@media(max-width:768px){.sidebar{transform:translateX(-240px)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px 16px 80px}}

/* ── Sidebar nav items ── */
.s-nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;color:var(--fg-subtle);font-size:14px;transition:all .15s;border-left:3px solid transparent;position:relative}
.s-nav-item:hover{color:var(--fg);background:var(--surface)}
.s-nav-item.on{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold)}

/* ── Keyframes ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes logoReveal{0%{opacity:0;letter-spacing:18px}60%{opacity:1}100%{opacity:1;letter-spacing:10px}}
@keyframes subtitleReveal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;flex:1;min-width:150px}

/* ── Buttons ── */
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-gold{background:var(--gold);color:#000}
.btn-glass{background:var(--surface-c);border:1px solid var(--border);color:var(--fg)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;color:var(--fg-subtle);font-size:10px;font-weight:700;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px}
td{padding:12px 14px;border-bottom:1px solid var(--divider);font-size:14px;vertical-align:middle}
tr:hover td{background:var(--surface-b)}
input,select{background:var(--surface-c);border:1px solid var(--border);border-radius:8px;color:var(--fg);padding:10px 14px;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--gold)}
select option{background:#111}
body.light select option{background:#f5f0e8}

/* ── Tags ── */
.tag{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.tag-gold{background:rgba(212,168,67,.14);color:var(--gold)}
.tag-green{background:rgba(34,197,94,.14);color:#22c55e}
.tag-blue{background:rgba(59,130,246,.14);color:#3b82f6}
.tag-amber{background:rgba(245,158,11,.14);color:#f59e0b}
.tag-purple{background:rgba(168,85,247,.14);color:#a855f7}
.tag-red{background:rgba(239,68,68,.14);color:#ef4444}
.tag-gray{background:rgba(120,120,120,.14);color:var(--fg-dim)}

/* ── Misc ── */
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fg-subtle)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.section-title{font-size:22px;font-weight:700}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;flex-shrink:0}
.screen{animation:fadeIn .2s ease}
.bar{border-radius:4px 4px 0 0;background:var(--gold);opacity:.75;flex:1}
.menu-toggle{display:none;position:fixed;top:16px;left:16px;z-index:60;background:var(--surface-c);border:1px solid var(--border);border-radius:10px;padding:9px;cursor:pointer;color:var(--fg)}
@media(max-width:768px){.menu-toggle{display:flex}}

/* ── Modal (bottom-sheet on mobile, centred on desktop) ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.modal-bg{align-items:center;padding:20px}}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:28px;width:100%;max-height:90vh;overflow-y:auto}
@media(min-width:640px){.modal{border-radius:20px;max-width:480px}}
</style>
</head>

function track(event, props){
  try{
    const ev={event,ts:Date.now(),...props};
    const key='apexvip_events';
    const arr=JSON.parse(localStorage.getItem(key)||'[]');
    arr.push(ev);
    if(arr.length>2000) arr.splice(0,arr.length-2000);
    localStorage.setItem(key,JSON.stringify(arr));
    if(FIREBASE_ENABLED) db.collection('analytics').add(ev).catch(()=>{});
  }catch(e){}
}

let S={screen:'login',bFilter:'all',dFilter:'all',cFilter:'all',theme:localStorage.getItem('apexvip_admin_theme')||'dark',_dispatchOpen:false,_dispatchRef:null};

if(S.theme==='light') document.body.classList.add('light');

function toggleTheme(){
  S.theme=S.theme==='light'?'dark':'light';
  localStorage.setItem('apexvip_admin_theme',S.theme);
  document.body.classList.toggle('light',S.theme==='light');
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=S.theme==='light'?'🌙':'☀️';
}

function go(s){S.screen=s;track('admin_screen_view',{screen:s,src:'admin'});render();document.getElementById('sidebar').classList.remove('open');window.scrollTo(0,0);}
function toggleMenu(){document.getElementById('sidebar').classList.toggle('open');}
function openModal(h){document.getElementById('modal-box').innerHTML=h;document.getElementById('modal-bg').style.display='flex';}
function closeModal(){document.getElementById('modal-bg').style.display='none';}

async function adminLogin(){
  const email=document.querySelector('input[type=email]')?.value||'';
  const pass=document.querySelector('input[type=password]')?.value||'';
  // Demo admin always works regardless of Firebase state
  if(email==='admin@apexvip.com'&&pass==='admin123'){
    track('admin_login',{method:'demo',src:'admin'});
    go('dashboard');return;
  }
  if(!FIREBASE_ENABLED){alert('Invalid credentials');return;}
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pass);
    const doc=await db.collection('users').doc(cred.user.uid).get();
    if(doc.exists&&doc.data().role==='admin'){track('admin_login',{method:'firebase',src:'admin'});go('dashboard');}
    else{auth.signOut();alert('Access denied. Admin accounts only.');}
  }catch(err){alert('Invalid credentials');}
}

async function createBookingInFirestore(){
  if(!FIREBASE_ENABLED){closeModal();return;}
  const inputs=document.querySelectorAll('#modal-box input,#modal-box select');
  const ref='APX-'+(Math.floor(1000+Math.random()*9000));
  try{
    await db.collection('bookings').add({
      ref,clientName:inputs[0]?.value||'',pickup:inputs[1]?.value||'',
      dropoff:inputs[2]?.value||'',date:inputs[3]?.value||'',
      time:inputs[4]?.value||'',flight:inputs[5]?.value||'',
      vehicle:(inputs[6]?.value||'').includes('V-Class')?'V-Class':'S-Class',
      status:'pending',driver:'—',price:185,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
  }catch(err){console.warn('Create booking:',err.message);}
  closeModal();render();
}

async function updateBookingStatus(id,status){
  if(!FIREBASE_ENABLED)return;
  try{await db.collection('bookings').doc(id).update({status});}catch(e){}
}

    });

    if(!['login'].includes(S.screen))render();

function badge(s){
  const m={
    pending:'tag-amber Pending',confirmed:'tag-blue Confirmed',active:'tag-green Active',
    completed:'tag-gray Completed',cancelled:'tag-red Cancelled',
    online:'tag-green Online',ontrip:'tag-amber On Trip',offline:'tag-gray Offline',
    available:'tag-green Available',vip:'tag-gold VIP',vvip:'tag-purple VVIP',standard:'tag-gray Standard'
  };
  const v=m[s]||('tag-gray '+s);const[c,...r]=v.split(' ');
  return`<span class="tag ${c}">${r.join(' ')}</span>`;
}
function av(initials,color,size=36){return`<div class="avatar" style="background:${color};width:${size}px;height:${size}px;font-size:${Math.round(size*.35)}px">${initials}</div>`;}
function stars(r){return'★'.repeat(Math.floor(r))+'☆'.repeat(5-Math.floor(r));}

function barChart(data,labels,height=70){
  const mx=Math.max(...data);
  return`<div style="display:flex;align-items:flex-end;gap:4px;height:${height}px">
    ${data.map((v,i)=>`<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div class="bar" style="height:${Math.round((v/mx)*(.8*height))+6}px"></div>
      <div style="font-size:9px;color:var(--fg-subtle)">${labels?labels[i]:''}</div>
    </div>`).join('')}
  </div>`;
}

function renderSidebar(){
  const btn=document.getElementById('theme-btn');
  if(btn) btn.textContent=S.theme==='light'?'🌙':'☀️';
  if(S.screen==='login'){
    document.getElementById('sidebar').style.display='none';
    document.getElementById('main').style.marginLeft='0';
    const mt=document.querySelector('.menu-toggle');if(mt)mt.style.display='none';
    return;
  }
  document.getElementById('sidebar').style.display='flex';
  document.getElementById('main').style.marginLeft='';
  const mt=document.querySelector('.menu-toggle');if(mt)mt.style.display='';
  document.getElementById('sidenav').innerHTML=NAVITEMS.map(i=>`
    <div class="s-nav-item${S.screen===i.id?' on':''}" onclick="go('${i.id}')">
      <span style="font-size:16px">${i.icon}</span><span>${i.label}</span>
    </div>`).join('');
}

function filterBar(opts,current,key){
  return`<div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    ${opts.map(([val,label])=>`<button class="btn btn-sm ${S[key]===val?'btn-gold':'btn-glass'}" onclick="S.${key}='${val}';render()">${label}</button>`).join('')}
  </div>`;
}
function tabRow(opts,current,expr){
  return`<div style="display:flex;border-bottom:1px solid var(--border);margin-bottom:20px;overflow-x:auto">
    ${opts.map(([val,label])=>`<div onclick="${expr.replace('__VAL__',val)}" style="padding:10px 18px;cursor:pointer;font-size:14px;color:${current===val?'var(--gold)':'var(--fg-subtle)'};border-bottom:2px solid ${current===val?'var(--gold)':'transparent'};white-space:nowrap;transition:color .15s">${label}</div>`).join('')}
  </div>`;
}

analytics:()=>{
  const raw=JSON.parse(localStorage.getItem('apexvip_events')||'[]');

  // ── Core datasets ──
  const bookings=raw.filter(e=>e.e==='booking_confirmed');
  const trips=raw.filter(e=>e.e==='trip_completed');
  const axcEarnEvts=raw.filter(e=>e.e==='apex_earned');
  const axcRedeemEvts=raw.filter(e=>e.e==='apex_redeemed');
  const jobAccepted=raw.filter(e=>e.e==='job_accepted');
  const jobDeclined=raw.filter(e=>e.e==='job_declined');
  const onlineEvts=raw.filter(e=>e.e==='driver_online');
  const offlineEvts=raw.filter(e=>e.e==='driver_offline');

  // ── Revenue Intelligence ──
  const totalRev=bookings.reduce((s,e)=>s+(e.price||0),0);
  const avgVal=bookings.length?Math.round(totalRev/bookings.length):0;
  const driverRev=trips.reduce((s,e)=>s+(e.pay||0),0);
  // Revenue per available driver hour
  let totalOnlineMs=0;
  onlineEvts.forEach((on,i)=>{const off=offlineEvts.find(o=>o.t>on.t);if(off)totalOnlineMs+=off.t-on.t;});
  const revPAH=totalOnlineMs>0?Math.round(driverRev/(totalOnlineMs/3600000)*10)/10:0;
  // Revenue by service
  const svcRev={airport:0,hourly:0,day:0}; const svcCnt={airport:0,hourly:0,day:0};
  bookings.forEach(e=>{const s=e.service||'airport';if(svcRev[s]!==undefined){svcRev[s]+=e.price||0;svcCnt[s]++;}});
  // Revenue by vehicle
  const vehRev={}; bookings.forEach(e=>{const v=e.vehicle||'Unknown';vehRev[v]=(vehRev[v]||0)+(e.price||0);});
  // Daily revenue (last 14 days)
  const dayRev={}; const now=Date.now();
  bookings.forEach(e=>{if(e.t){const d=new Date(e.t);const k=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});dayRev[k]=(dayRev[k]||0)+(e.price||0);}});
  const dayKeys=Object.keys(dayRev).slice(-14); const maxDay=Math.max(...Object.values(dayRev),1);

  // ── Customer Analytics ──
  const clientMap={};
  bookings.forEach(e=>{
    const k=e.user||'Guest';
    if(!clientMap[k])clientMap[k]={name:k,spend:0,count:0,first:e.t,last:e.t};
    clientMap[k].spend+=e.price||0; clientMap[k].count++;
    clientMap[k].first=Math.min(clientMap[k].first,e.t||now);
    clientMap[k].last=Math.max(clientMap[k].last,e.t||now);
  });
  const clients=Object.values(clientMap).sort((a,b)=>b.spend-a.spend);
  const uniqueClients=clients.length;
  const returningClients=clients.filter(c=>c.count>1).length;
  const retentionRate=uniqueClients?Math.round(returningClients/uniqueClients*100):0;
  const avgCLV=uniqueClients?Math.round(totalRev/uniqueClients):0;

  // ── Operational ──
  let totalTripMs=0; trips.forEach(e=>{totalTripMs+=(e.duration||0)*1000;});
  const utilisationRate=totalOnlineMs>0?Math.min(100,Math.round(totalTripMs/totalOnlineMs*100)):0;
  const acceptanceRate=(jobAccepted.length+jobDeclined.length)>0?Math.round(jobAccepted.length/(jobAccepted.length+jobDeclined.length)*100):0;
  const avgTripMins=trips.length?Math.round(totalTripMs/trips.length/60000):0;
  // Peak hours
  const hrs=Array(24).fill(0); bookings.forEach(e=>{if(e.t)hrs[new Date(e.t).getHours()]++;});
  const maxHr=Math.max(...hrs,1);
  const peakHour=hrs.indexOf(Math.max(...hrs));

  // ── Route Analytics ──
  const routeMap={};
  bookings.forEach(e=>{
    if(e.pickup&&e.dropoff){
      const k=(e.pickup+'→'+e.dropoff).slice(0,60);
      if(!routeMap[k])routeMap[k]={route:k,count:0,revenue:0};
      routeMap[k].count++; routeMap[k].revenue+=e.price||0;
    }
  });
  const topRoutes=Object.values(routeMap).sort((a,b)=>b.count-a.count).slice(0,8);

  // ── Booking lead time ──
  const leadTimes=bookings.filter(e=>e.scheduled_date&&e.t).map(e=>{
    try{const s=new Date(e.scheduled_date+'T'+(e.scheduled_time||'12:00')).getTime();return Math.max(0,(s-e.t)/3600000);}catch{return 0;}
  }).filter(h=>h>0);
  const avgLead=leadTimes.length?Math.round(leadTimes.reduce((a,b)=>a+b,0)/leadTimes.length):0;
  const advanceBookings=leadTimes.filter(h=>h>24).length;
  const sameDay=leadTimes.filter(h=>h<=24).length;

  // ── APEX Loyalty ──
  const totalEarned=axcEarnEvts.reduce((s,e)=>s+(e.amount||0),0);
  const totalRedeemed=axcRedeemEvts.reduce((s,e)=>s+(e.amount||0),0);
  const outstanding=Math.max(0,totalEarned-totalRedeemed);
  const velocity=totalEarned>0?Math.round(totalRedeemed/totalEarned*100):0;
  const apexUsers=axcEarnEvts.length;

  // ── Helpers ──
  function ago(t){const s=Math.round((Date.now()-t)/1000);return s<60?s+'s':s<3600?Math.round(s/60)+'m':s<86400?Math.round(s/3600)+'h':(Math.round(s/86400))+'d';}
  function bar(pct,color,h){return '<div style="height:'+h+'px;background:var(--surface-c);border-radius:3px"><div style="height:'+h+'px;background:'+color+';border-radius:3px;width:'+Math.min(100,pct)+'%;transition:width .5s ease"></div></div>';}
  function kpi(label,value,color,sub){return '<div class="stat-card"><div class="section-label" style="margin-bottom:8px">'+label+'</div><div style="font-size:26px;font-weight:800;color:'+color+'">'+value+'</div>'+(sub?'<div style="font-size:11px;color:var(--fg-ghost);margin-top:4px">'+sub+'</div>':'')+'</div>';}
  const evtColor={booking_confirmed:'#22c55e',apex_earned:'#D4A843',apex_redeemed:'#ef4444',trip_completed:'#a855f7',user_login:'#3b82f6',driver_login:'#3b82f6',vehicle_selected:'#f59e0b',job_accepted:'#22c55e',job_declined:'#ef4444',booking_started:'#64748b',checkout_started:'#8b5cf6',driver_online:'#22c55e',driver_offline:'#6b7280'};

  const noData=raw.length===0;
  let html='<div class="screen">';
  html+='<div class="section-header"><div class="section-title">Business Intelligence</div>';
  html+='<div style="display:flex;gap:8px"><button class="btn btn-glass btn-sm" onclick="render()">↺ Refresh</button><button class="btn btn-glass btn-sm" onclick="if(confirm(\'Clear all data?\'))localStorage.removeItem(\'apexvip_events\'),render()">Clear</button></div></div>';

  if(noData){
    html+='<div class="card" style="text-align:center;padding:60px 24px">';
    html+='<div style="font-size:52px;margin-bottom:16px">📊</div>';
    html+='<div style="font-size:20px;font-weight:700;margin-bottom:10px">No data yet</div>';
    html+='<div style="font-size:13px;color:var(--fg-subtle);line-height:1.7">Open the client or driver app and complete some actions.<br/>All interactions are tracked automatically and shown here in real time.</div></div>';
  } else {

  // ── 1. Revenue Intelligence ──────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">Revenue Intelligence</div>';
  html+='<div style="display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap">';
  html+=kpi('Total Revenue','£'+totalRev.toLocaleString(),'#D4A843','from '+bookings.length+' bookings');
  html+=kpi('Avg Booking Value','£'+avgVal,'#22c55e','per transaction');
  html+=kpi('Driver Earnings','£'+driverRev.toLocaleString(),'#3b82f6',trips.length+' trips completed');
  html+=kpi('Rev / Driver Hour',revPAH>0?'£'+revPAH:'—','#a855f7',totalOnlineMs>0?Math.round(totalOnlineMs/3600000)+'h tracked':'no hours data');
  html+='</div>';

  html+='<div style="display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap">';
  // Service revenue breakdown
  html+='<div class="card" style="flex:1;min-width:220px"><div style="font-size:14px;font-weight:600;margin-bottom:16px">Revenue by Service</div>';
  [['Airport Transfer','airport','#D4A843'],['By the Hour','hourly','#3b82f6'],['By the Day','day','#a855f7']].forEach(function(arr){
    const l=arr[0],k=arr[1],col=arr[2];
    const pct=totalRev>0?Math.round(svcRev[k]/totalRev*100):0;
    html+='<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">';
    html+='<span>'+l+'</span><span style="font-weight:700;color:'+col+'">£'+svcRev[k]+' <span style="font-size:10px;color:var(--fg-ghost)">('+pct+'%)</span></span></div>';
    html+=bar(pct,col,5)+'</div>';
  });
  html+='</div>';
  // Daily revenue chart
  html+='<div class="card" style="flex:2;min-width:280px"><div style="font-size:14px;font-weight:600;margin-bottom:14px">Revenue by Day</div>';
  if(dayKeys.length>0){
    html+='<div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:6px">';
    dayKeys.forEach(function(k){const v=dayRev[k]||0;const h=maxDay>0?Math.round(v/maxDay*70):0;html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:#D4A843;border-radius:3px 3px 0 0;height:'+h+'px;min-height:'+(v>0?2:0)+'px" title="'+k+': £'+v+'"></div></div>';});
    html+='</div><div style="display:flex;font-size:9px;color:var(--fg-ghost)">';
    dayKeys.forEach(function(k){html+='<div style="flex:1;text-align:center;overflow:hidden">'+k.split(' ')[0]+'</div>';});
    html+='</div>';
  } else {html+='<div style="color:var(--fg-ghost);font-size:13px">No daily data yet</div>';}
  html+='</div></div>';

  // ── 2. Customer Analytics ─────────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">Customer Analytics</div>';
  html+='<div style="display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap">';
  html+=kpi('Unique Clients',uniqueClients,'#3b82f6','identified users');
  html+=kpi('Return Rate',retentionRate+'%',retentionRate>=50?'#22c55e':'#f59e0b',returningClients+' clients booked again');
  html+=kpi('Avg CLV','£'+avgCLV,'#D4A843','lifetime value per client');
  html+=kpi('Avg Lead Time',avgLead+'h','#a855f7',advanceBookings+' advance · '+sameDay+' same-day');
  html+='</div>';
  if(clients.length>0){
    html+='<div class="card" style="margin-bottom:24px"><div style="font-size:14px;font-weight:600;margin-bottom:16px">Top Clients by Lifetime Value</div>';
    html+='<div style="overflow-x:auto"><table><thead><tr><th>Client</th><th>Bookings</th><th>Total Spend</th><th>Avg Booking</th><th>Last Seen</th></tr></thead><tbody>';
    clients.slice(0,8).forEach(function(cl){
      const avg2=cl.count?Math.round(cl.spend/cl.count):0;
      const lastSeen=cl.last?ago(cl.last)+' ago':'—';
      html+='<tr><td style="font-weight:600">'+cl.name+'</td><td>'+cl.count+'</td><td style="font-weight:700;color:var(--gold)">£'+cl.spend+'</td><td>£'+avg2+'</td><td style="color:var(--fg-ghost);font-size:12px">'+lastSeen+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  }

  // ── 3. Operational Metrics ────────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">Operational Metrics</div>';
  html+='<div style="display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap">';
  html+=kpi('Driver Utilisation',utilisationRate+'%',utilisationRate>=60?'#22c55e':utilisationRate>=40?'#f59e0b':'#ef4444','target: 60%+');
  html+=kpi('Job Acceptance',acceptanceRate+'%',acceptanceRate>=80?'#22c55e':'#f59e0b',jobAccepted.length+' accepted · '+jobDeclined.length+' declined');
  html+=kpi('Avg Trip Duration',avgTripMins+'min','#3b82f6',trips.length+' trips recorded');
  html+=kpi('Peak Hour',(peakHour===0?'12am':peakHour<12?peakHour+'am':peakHour===12?'12pm':(peakHour-12)+'pm'),'#a855f7',hrs[peakHour]+' bookings');
  html+='</div>';
  // Hourly heatmap
  html+='<div class="card" style="margin-bottom:24px"><div style="font-size:14px;font-weight:600;margin-bottom:14px">Demand by Hour of Day</div>';
  html+='<div style="display:flex;align-items:flex-end;gap:2px;height:64px;margin-bottom:4px">';
  hrs.forEach(function(v,i){
    const h2=maxHr>0?Math.round(v/maxHr*56):0;
    const isPeak=(i===peakHour&&v>0);
    html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:'+(isPeak?'#D4A843':'rgba(212,168,67,.35)')+';border-radius:2px 2px 0 0;height:'+h2+'px;min-height:'+(v?2:0)+'px" title="'+(i<12?i+'am':i===12?'12pm':(i-12)+'pm')+': '+v+' bookings"></div></div>';
  });
  html+='</div><div style="display:flex"><div style="flex:1;font-size:9px;color:var(--fg-ghost)">12am</div><div style="flex:1;text-align:center;font-size:9px;color:var(--fg-ghost)">6am</div><div style="flex:1;text-align:center;font-size:9px;color:var(--fg-ghost)">12pm</div><div style="flex:1;text-align:center;font-size:9px;color:var(--fg-ghost)">6pm</div><div style="flex:1;text-align:right;font-size:9px;color:var(--fg-ghost)">11pm</div></div>';
  html+='</div>';

  // ── 4. Route Analytics ────────────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">Popular Routes</div>';
  if(topRoutes.length>0){
    html+='<div class="card" style="margin-bottom:24px"><div style="overflow-x:auto"><table><thead><tr><th>Route</th><th>Bookings</th><th>Revenue</th><th>Avg Value</th></tr></thead><tbody>';
    const maxRoute=topRoutes[0].count;
    topRoutes.forEach(function(r){
      const avg3=r.count?Math.round(r.revenue/r.count):0;
      const pct=maxRoute>0?Math.round(r.count/maxRoute*100):0;
      html+='<tr><td style="font-weight:500;font-size:13px">'+r.route+'</td>';
      html+='<td><div style="display:flex;align-items:center;gap:8px"><span style="font-weight:700">'+r.count+'</span><div style="flex:1;max-width:80px">'+bar(pct,'#3b82f6',4)+'</div></div></td>';
      html+='<td style="font-weight:700;color:var(--gold)">£'+r.revenue+'</td><td>£'+avg3+'</td></tr>';
    });
    html+='</tbody></table></div></div>';
  } else {
    html+='<div class="card" style="margin-bottom:24px;color:var(--fg-ghost);font-size:13px;padding:20px">Routes appear here once bookings include pickup and destination data.</div>';
  }

  // ── 5. APEX Loyalty ───────────────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">APEX Loyalty</div>';
  html+='<div style="display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap">';
  html+=kpi('APEX Issued',Math.round(totalEarned)+' APEX','#D4A843','≈ £'+Math.round(totalEarned)+' value');
  html+=kpi('APEX Redeemed',Math.round(totalRedeemed)+' APEX',totalRedeemed>0?'#22c55e':'var(--fg-ghost)','used as payment');
  html+=kpi('Outstanding',Math.round(outstanding)+' APEX','#f59e0b','in user wallets');
  html+=kpi('Redemption Rate',velocity+'%',velocity>=30?'#22c55e':velocity>=10?'#f59e0b':'#ef4444','of issued APEX spent back');
  html+='</div>';
  // APEX velocity bar
  html+='<div class="card" style="margin-bottom:24px"><div style="font-size:14px;font-weight:600;margin-bottom:16px">APEX Flow</div>';
  html+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Issued</span><span style="font-weight:700;color:#D4A843">'+Math.round(totalEarned)+' APEX</span></div>'+bar(100,'#D4A843',6)+'</div>';
  html+='<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Redeemed</span><span style="font-weight:700;color:#22c55e">'+Math.round(totalRedeemed)+' APEX</span></div>'+bar(velocity,'#22c55e',6)+'</div>';
  html+='<div><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span>Outstanding in wallets</span><span style="font-weight:700;color:#f59e0b">'+Math.round(outstanding)+' APEX</span></div>'+bar(totalEarned>0?Math.round(outstanding/totalEarned*100):0,'#f59e0b',6)+'</div>';
  html+='</div>';

  // ── 6. Live Event Feed ────────────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">Live Event Feed</div>';
  html+='<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:16px">Recent Events <span style="font-size:12px;color:var(--fg-ghost);font-weight:400;margin-left:8px">'+raw.length+' total</span></div>';
  html+='<div style="overflow-x:auto"><table><thead><tr><th>Event</th><th>App</th><th>Detail</th><th>When</th></tr></thead><tbody>';
  raw.slice().reverse().slice(0,40).forEach(function(e){
    const col=evtColor[e.e]||'var(--fg-dim)';
    const detail=e.price?'£'+e.price:e.amount?(e.amount+' APEX'):e.screen?e.screen:e.service?e.service:e.pay?('£'+e.pay):e.vehicle||'';
    html+='<tr><td><span style="color:'+col+';font-weight:600;font-size:12px">'+e.e+'</span></td>';
    html+='<td><span class="tag tag-gray" style="font-size:10px">'+(e.src||'—')+'</span></td>';
    html+='<td style="color:var(--fg-dim);font-size:12px">'+detail+'</td>';
    html+='<td style="color:var(--fg-ghost);font-size:11px;white-space:nowrap">'+(e.t?ago(e.t)+' ago':'—')+'</td></tr>';
  });
  html+='</tbody></table></div></div>';

  } // end if !noData
  html+='</div>';
  return html;
},

settings:()=>`<div class="screen">

async function createCorporate(){
  const name=document.getElementById('corp_name')?.value||'';
  const email=document.getElementById('corp_email')?.value||'';
  const limit=parseInt(document.getElementById('corp_limit')?.value||'0');
  if(!name||!email){alert('Company name and billing email are required');return;}
  const newCorp={id:'C'+(Date.now()),name,email,members:0,limit:limit||5000,spent:0,active:true};
  if(!S._corps)S._corps=[];
  S._corps.unshift(newCorp);
  if(FIREBASE_ENABLED){
    db.collection('corporates').add({...newCorp,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
  }
  go('corporate');
}

function openDispatch(ref){
  S._dispatchRef=ref;
  S._dispatchOpen=true;
  render();
}

function confirmDispatch(driverIdOrName){
  const driver=DRIVERS.find(d=>d.id===driverIdOrName||d.name===driverIdOrName);
  if(!driver){S._dispatchOpen=false;render();return;}
  // Update booking in local state
  const booking=BOOKINGS.find(b=>b.id===S._dispatchRef||b.ref===S._dispatchRef);
  if(booking){
    booking.driverId=driver.id||driver.name;
    booking.driver=driver.name;
    booking.driverName=driver.name;
    booking.status='accepted';
    driver.status='ontrip';
  }
  // Update Firestore
  if(FIREBASE_ENABLED&&booking?.docId){
    db.collection('bookings').doc(booking.docId).update({
      driverId:driver.uid||driver.id||driver.name,
      driverName:driver.name,
      driverPlate:driver.reg||driver.plate||'',
      status:'accepted',
      assignedAt:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
    if(driver.uid){
      db.collection('jobs').add({
        driverId:driver.uid,bookingRef:booking.ref||booking.id,
        clientName:booking.client||booking.clientName||'',
        pickup:booking.pickup||'',dropoff:booking.dropoff||'',
        date:booking.date||'',time:booking.time||'',
        vehicle:driver.model||driver.vehicle||'',
        pay:parseInt((booking.price||'0').replace(/[^0-9]/g,'')),
        status:'pending',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      }).catch(()=>{});
    }
  }
  S._dispatchOpen=false;
  render();
}

function render(){
  renderSidebar();
  const fn=pages[S.screen]||pages.dashboard;
  document.getElementById('main').innerHTML=fn();
}

render();
</script>
