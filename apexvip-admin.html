<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:-webkit-fill-available}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none;-webkit-touch-callout:none;
  --bg:#050505;--fg:#f4f0ea;--fg-muted:#c8bfb0;--fg-dim:#8a8278;--fg-subtle:#5a5550;--fg-ghost:#3a3632;--fg-faint:#28251f;
  --surface:rgba(255,255,255,.045);--surface-b:rgba(255,255,255,.03);--surface-c:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border-b:rgba(255,255,255,.05);--divider:rgba(255,255,255,.04);
  --gold:#C8A97E;--gold-dim:rgba(200,169,126,.14)}
body.light{
  --bg:#f5f0e8;--fg:#1a1612;--fg-muted:#3d3730;--fg-dim:#6b6258;--fg-subtle:#9a9088;--fg-ghost:#c8bfb0;--fg-faint:#e0d8cc;
  --surface:rgba(0,0,0,.04);--surface-b:rgba(0,0,0,.025);--surface-c:rgba(0,0,0,.065);
  --border:rgba(0,0,0,.08);--border-b:rgba(0,0,0,.05);--divider:rgba(0,0,0,.04)}

/* ── Aurora background (behind main content) ── */
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:-1}
body::before{width:560px;height:560px;left:22%;top:-14%;background:radial-gradient(circle,rgba(200,169,126,.07),transparent 70%);animation:auroraA 26s ease-in-out infinite alternate}
body::after{width:480px;height:480px;right:-8%;bottom:-12%;background:radial-gradient(circle,rgba(90,80,160,.06),transparent 70%);animation:auroraB 32s ease-in-out infinite alternate}
@keyframes auroraA{from{transform:translate(0,0) scale(1)}to{transform:translate(120px,90px) scale(1.18)}}
@keyframes auroraB{from{transform:translate(0,0) scale(1.08)}to{transform:translate(-140px,-90px) scale(.92)}}

/* ── Sidebar ── */
.sidebar{width:240px;min-height:100vh;background:rgba(10,9,8,.92);border-right:1px solid var(--border);position:fixed;top:0;left:0;display:flex;flex-direction:column;z-index:50;transition:transform .25s;backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);box-shadow:inset -1px 0 0 rgba(255,255,255,.05);
  padding-top:env(safe-area-inset-top)}
body.light .sidebar{background:rgba(240,235,226,.92)}
.main{margin-left:240px;flex:1;padding:32px;min-height:100vh}
@media(max-width:768px){.sidebar{transform:translateX(-240px)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:calc(env(safe-area-inset-top) + 64px) 16px 80px}}
input,select,textarea{font-size:16px !important}

/* ── Sidebar nav items ── */
.s-nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;color:var(--fg-subtle);font-size:14px;transition:background .2s,color .2s;border-left:3px solid transparent;position:relative}
.s-nav-item:hover{color:var(--fg);background:var(--surface)}
.s-nav-item.on{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold);box-shadow:inset 0 0 20px rgba(200,169,126,.06)}

/* ── Keyframes ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes growBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes logoReveal{0%{opacity:0;letter-spacing:18px}60%{opacity:1}100%{opacity:1;letter-spacing:10px}}
/* Gold shimmer for the wordmark — moves the gradient, not the text */
@keyframes goldShimmer{from{background-position:0% center}to{background-position:300% center}}
@keyframes subtitleReveal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/* ── Staggered entrances ── */
.stagger>*{opacity:0;animation:fadeUp .4s ease forwards}
.stagger>*:nth-child(1){animation-delay:.03s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.13s}
.stagger>*:nth-child(4){animation-delay:.18s}
.stagger>*:nth-child(5){animation-delay:.23s}
.stagger>*:nth-child(6){animation-delay:.28s}
.stagger>*:nth-child(7){animation-delay:.33s}
.stagger>*:nth-child(8){animation-delay:.38s}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;transition:transform .18s,border-color .18s}
.card:hover{border-color:rgba(200,169,126,.22)}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;flex:1;min-width:150px;position:relative;overflow:hidden;border-top:1px solid rgba(255,255,255,.1);font-variant-numeric:tabular-nums;transition:transform .18s,border-color .18s}
.stat-card:hover{transform:translateY(-2px)}
.stat-watermark{position:absolute;right:12px;bottom:8px;font-size:44px;line-height:1;opacity:.06;pointer-events:none}

/* ── Buttons ── */
.btn{padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .12s}
.btn:active{opacity:.85;transform:scale(.97)}
.btn-gold{background:var(--gold);color:#000}
.btn-glass{background:var(--surface-c);border:1px solid var(--border);color:var(--fg)}
.btn-sm{padding:7px 14px;font-size:13px}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}

/* ── Table ── */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;color:var(--fg-subtle);font-size:10px;font-weight:700;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:1px}
td{padding:12px 14px;border-bottom:1px solid var(--divider);font-size:14px;vertical-align:middle;transition:background .15s}
tr:hover td{background:var(--surface-b)}
input,select,textarea{background:var(--surface-c);border:1px solid var(--border);border-radius:8px;color:var(--fg);padding:10px 14px;font-size:14px;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
select option{background:#111}
body.light select option{background:#f5f0e8}

/* ── Tags ── */
.tag{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.tag-gold{background:rgba(200,169,126,.14);color:var(--gold)}
.tag-green{background:rgba(34,197,94,.14);color:#22c55e}
.tag-blue{background:rgba(59,130,246,.14);color:#3b82f6}
.tag-amber{background:rgba(245,158,11,.14);color:#f59e0b}
.tag-purple{background:rgba(168,85,247,.14);color:#a855f7}
.tag-red{background:rgba(239,68,68,.14);color:#ef4444}
.tag-gray{background:rgba(120,120,120,.14);color:var(--fg-dim)}

/* ── Misc ── */
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fg-subtle)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.section-title{font-size:22px;font-weight:700}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;flex-shrink:0}
.screen{animation:fadeIn .2s ease}
.bar{border-radius:4px 4px 0 0;background:var(--gold);opacity:.75;flex:1;transform-origin:bottom;animation:growBar .5s ease both}
.menu-toggle{display:none;align-items:center;justify-content:center;position:fixed;top:calc(env(safe-area-inset-top) + 12px);left:16px;z-index:120;background:var(--gold);border:none;border-radius:12px;padding:11px;cursor:pointer;color:#000;box-shadow:0 4px 16px rgba(0,0,0,.4)}
@media(max-width:768px){.menu-toggle{display:flex}}

/* ── Modal (bottom-sheet on mobile, centred on desktop) ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fadeIn .2s ease}
@media(min-width:640px){.modal-bg{align-items:center;padding:20px}}
.modal{background:var(--bg);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:28px;width:100%;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(0.16,1,0.3,1) both}
@media(min-width:640px){.modal{border-radius:20px;max-width:480px;animation:scaleIn .25s ease both}}

/* ── Toast ── */
@keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px) scale(.94)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
#toast-container{position:fixed;top:20px;right:20px;z-index:9990;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(10,8,5,.97);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:11px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;pointer-events:auto;animation:toastIn .4s ease both;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.out{animation:toastOut .28s ease forwards}
.toast.success{border-color:rgba(34,197,94,.2);color:#4ade80}
.toast.error{border-color:rgba(239,68,68,.2);color:#f87171}
.toast.info{border-color:rgba(200,169,126,.2);color:var(--gold)}
body.light .toast{background:rgba(246,243,238,.98);color:var(--fg)}

/* ── Autofill ── */
input:-webkit-autofill,input:-webkit-autofill:hover,input:-webkit-autofill:focus,select:-webkit-autofill{-webkit-text-fill-color:var(--fg)!important;-webkit-box-shadow:0 0 0 1000px rgba(5,4,3,0) inset!important;transition:background-color 9999s ease-in-out 0s}

/* ── Stat card improvement ── */
.stat-card::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,transparent 60%);pointer-events:none}
.stat-card:hover{transform:translateY(-3px);border-color:rgba(200,169,126,.2);box-shadow:0 8px 24px rgba(0,0,0,.2)}

/* ── Sidebar active item glow ── */
.s-nav-item.on{position:relative}
.s-nav-item.on::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:60%;border-radius:2px;background:var(--gold)}

/* ── Table row entrance ── */
tbody tr{animation:fadeIn .3s ease both}
tbody tr:nth-child(1){animation-delay:.02s}
tbody tr:nth-child(2){animation-delay:.05s}
tbody tr:nth-child(3){animation-delay:.08s}
tbody tr:nth-child(4){animation-delay:.11s}
tbody tr:nth-child(5){animation-delay:.14s}
tbody tr:nth-child(n+6){animation-delay:.17s}

/* ── Liquid Glass ─────────────────────────────────────────────────── */
body{--lg-fill:linear-gradient(155deg,rgba(255,250,240,.10),rgba(255,250,240,.045) 55%,rgba(255,250,240,.07));--lg-border:rgba(255,250,240,.16);--lg-blur:saturate(180%) blur(18px);--lg-shadow:inset 0 1px .5px rgba(255,255,255,.4),inset 0 0 22px rgba(255,255,255,.035),0 12px 32px -14px rgba(0,0,0,.6)}
body.light{--lg-fill:linear-gradient(155deg,rgba(255,255,255,.62),rgba(255,255,255,.34) 55%,rgba(255,255,255,.5));--lg-border:rgba(255,255,255,.7);--lg-blur:saturate(160%) blur(16px);--lg-shadow:inset 0 1px .5px rgba(255,255,255,.9),0 10px 28px -14px rgba(0,0,0,.22)}
.card,.btn-glass{background:var(--lg-fill)!important;border:1px solid var(--lg-border)!important;box-shadow:var(--lg-shadow)!important;-webkit-backdrop-filter:var(--lg-blur);backdrop-filter:var(--lg-blur)}
.sidebar{background:rgba(8,6,3,.55)!important;-webkit-backdrop-filter:saturate(180%) blur(30px);backdrop-filter:saturate(180%) blur(30px);border-right:1px solid var(--lg-border)!important;box-shadow:inset -1px 0 0 rgba(255,255,255,.12)!important}
body.light .sidebar{background:rgba(240,235,226,.6)!important}
</style>

<script>
// ── UI utilities ───────────────────────────────────────────────────────
function showToast(msg,type='info',dur=3200){
  let c=document.getElementById('toast-container');
  if(!c){c=document.createElement('div');c.id='toast-container';document.body.appendChild(c);}
  const icons={success:'✓',error:'✕',info:'✦'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span style="font-size:14px">${icons[type]||'✦'}</span>${msg}`;
  c.appendChild(t);
  const dismiss=()=>{if(!t.parentNode)return;t.classList.add('out');t.addEventListener('animationend',()=>t.remove(),{once:true});};
  t._timer=setTimeout(dismiss,dur);
  t.addEventListener('click',()=>{clearTimeout(t._timer);dismiss();});
}

// ── Firebase init ──────────────────────────────────────────────────────
let auth, db, fns, FIREBASE_ENABLED = false;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    const _fbApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth(_fbApp);
    db = firebase.firestore(_fbApp);
    try { fns = firebase.functions(_fbApp); } catch(e){ fns = null; }
    FIREBASE_ENABLED = true;
    // Auto-restore session if admin was previously logged in
    auth.onAuthStateChanged(async user => {
      if(user && S.screen === 'login'){
        const doc = await db.collection('users').doc(user.uid).get().catch(()=>null);
        if(doc && doc.exists && doc.data().role === 'admin'){
          startAdminListeners();
          go('dashboard');
        }
      }
    });
  }
} catch(e) { console.warn('Firebase init:', e.message); }

let BOOKINGS=[]; // live from Firestore
let DRIVERS=[]; // live from Firestore
let CLIENTS=[]; // live from Firestore
let FLEET=[]; // fleet renders from the live VEHICLES collection
// Revenue series computed from live bookings (no seeds).
function revenue7(){
  const now=new Date(); const vals=[],labels=[];
  for(let i=6;i>=0;i--){
    const d=new Date(now); d.setDate(now.getDate()-i);
    const sum=BOOKINGS.filter(b=>b.status!=='cancelled'&&b._created&&b._created.toDateString()===d.toDateString())
      .reduce((a,b)=>a+(parseFloat(String(b.price).replace(/[^0-9.]/g,''))||0),0);
    vals.push(Math.round(sum)); labels.push(i===0?'Today':d.toLocaleDateString('en-GB',{weekday:'short'}));
  }
  return {vals,labels};
}
const NAVITEMS=[
  {id:'dashboard',icon:'⊞',label:'Dashboard'},

  {id:'settings',icon:'⚙',label:'Settings'},
  {id:'apexcoin',icon:'🪙',label:'ApexCoin'},
  {id:'corporate',icon:'🏢',label:'Corporate'},
  {id:'map',icon:'<svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>',label:'Live Map'},
  {id:'payouts',icon:'💸',label:'Payouts'},
  {id:'audit',icon:'🛡',label:'Audit Log'},
  {id:'errors',icon:'🐞',label:'Errors'},
  {id:'waitlist',icon:'✦',label:'Waitlist'},
  {id:'city-interest',icon:'🌍',label:'City Interest'},
];

const ADMIN_DEMO_FLIGHTS = []; // real tracked flights only

function track(event, props){
  try{
    const ev={e:event,event,t:Date.now(),ts:Date.now(),...props};
    const key='apexvip_events';
    const arr=JSON.parse(localStorage.getItem(key)||'[]');
    arr.push(ev);
    if(arr.length>2000) arr.splice(0,arr.length-2000);
    localStorage.setItem(key,JSON.stringify(arr));
    if(FIREBASE_ENABLED) db.collection('analytics').add(ev).catch(reportError);
  }catch(e){}

/* ── Concierge desk operations ─────────────────────────────────────────── */
function vcReq(docId){return VREQS.find(r=>r.docId===docId);}
function vcMember(uid){return VMEMBERS.find(m=>m.uid===uid)||{};}
function vcTier(r){const m=vcMember(r.ownerUid);return (m.sub&&m.sub.tierId)||'silver';}

// Advance a request along the lifecycle (engine-validated). 'options' also
// attaches the three priced options; the member picks + confirms in their app.
function vcAdvance(docId,to){
  const V=window.Velvet, r=vcReq(docId);
  if(!V||!r||!FIREBASE_ENABLED)return;
  if(!V.canTransition(r.status,to)){showToast('Not allowed from '+r.status);return;}
  const now=Date.now();
  const m=vcMember(r.ownerUid);
  const patch={status:to,updatedAt:now};
  if(to==='triaged'&&r.firstResponseAt==null)patch.firstResponseAt=now;
  if(to==='completed')patch.completedAt=now;
  if(to==='options')patch.options=V.proposeOptions(r);
  patch.messages=(r.messages||[]).concat([{from:'desk',text:V.deskLine(r,to,m.memberName||''),at:now}]);
  db.collection('velvet_requests').doc(docId).update(patch)
    .then(()=>{track('concierge_desk_advanced',{to,category:r.category,src:'admin'});showToast('Request → '+(V.STATUS_LABEL[to]||to));})
    .catch(e=>showToast('Update failed: '+e.message));
}

function vcReply(docId){
  const r=vcReq(docId);
  if(!r||!FIREBASE_ENABLED)return;
  const text=prompt('Reply to the member as the Concierge desk:');
  if(!text||!text.trim())return;
  const now=Date.now();
  db.collection('velvet_requests').doc(docId).update({
    messages:(r.messages||[]).concat([{from:'desk',text:text.trim(),at:now}]),
    updatedAt:now,
  }).then(()=>{track('concierge_desk_reply',{category:r.category,src:'admin'});showToast('Sent to the member');})
    .catch(e=>showToast('Send failed: '+e.message));
}

// ── ApexLifetime™ tier helpers ──
function clientLifetime(c){
  if(typeof ApexCore==='undefined')return null;
  try{
    const trips=parseInt(c.bookings)||0;
    const spend=parseFloat(String(c.spent||'').replace(/[^0-9.]/g,''))||0;
    if(!trips)return ApexCore.apexLifetime([]);
    // Synthesize a plausible booking history: trips spread one per month, most recent today
    const arr=[...Array(trips)].map((_,i)=>({price:spend/trips,date:new Date(Date.now()-i*30*86400000).toISOString().slice(0,10)}));
    return ApexCore.apexLifetime(arr);
  }catch(e){return null;}
}

concierge:()=>{
  const V=window.Velvet;
  if(!V)return '<div class="screen"><div class="card">concierge/engine.js failed to load.</div></div>';
  const now=Date.now();
  const RANK={silver:1,gold:2,black:3};
  const TIERTAG={silver:'tag-gray',gold:'tag-gold',black:'tag-blue'};
  const open=VREQS.filter(r=>!['completed','cancelled'].includes(r.status));
  const queue=V.queueOrder(open.map(r=>({request:r,tierRank:RANK[vcTier(r)]||1})),now).map(e=>e.request);
  const live=VMEMBERS.filter(m=>m.sub&&m.sub.status!=='canceled');
  const mrr=live.reduce((s,m)=>s+((V.TIERS[(m.sub&&m.sub.tierId)||'silver']||{}).pricePence||0),0);
  const breached=open.filter(r=>V.slaState(r.submittedAt,vcTier(r),now,r.firstResponseAt)==='breached').length;
  const needsDesk=open.filter(r=>['submitted','triaged','sourcing'].includes(r.status)).length;
  const confirmedRev=VREQS.filter(r=>r.chosenOption).reduce((s,r)=>s+(r.chosenOption.pricePence||0),0);
  const slaBadge=st=>({met:'tag-green Met',ok:'tag-blue OK',warning:'tag-amber Due',breached:'tag-red Breached'})[st]||'tag-gray —';
  const ago=t=>{const m=Math.round((now-t)/60000);return m<60?m+'m':m<1440?Math.round(m/60)+'h':Math.round(m/1440)+'d';};
  const nextActions=r=>({
    submitted:[['triaged','Triage']],
    triaged:[['sourcing','Start sourcing']],
    sourcing:[['options','Send options']],
    options:[],
    confirmed:[['completed','Complete']],
  })[r.status]||[];
  let html='<div class="screen">';
  html+='<div class="section-header"><div><div class="section-title">Concierge desk</div><div style="color:var(--fg-dim);font-size:13px;margin-top:2px">The ApexVIP Concierge app, staffed from this console — replies and status changes reach the member live.</div></div>'
    +'<a class="btn btn-glass btn-sm" href="concierge/ops.html" target="_blank" rel="noopener" style="text-decoration:none">\uD83D\uDCF1 Mobile ops</a></div>';
  html+='<div class="stagger" style="display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap">';
  const kpi=(l,v,c,sub)=>'<div class="stat-card"><div class="section-label" style="margin-bottom:8px">'+l+'</div><div style="font-size:26px;font-weight:800;color:'+(c||'var(--fg)')+'">'+v+'</div>'+(sub?'<div style="font-size:11px;color:var(--fg-ghost);margin-top:4px">'+sub+'</div>':'')+'</div>';
  html+=kpi('Open requests',open.length,'var(--gold)',needsDesk+' need the desk');
  html+=kpi('SLA breached',breached,breached?'var(--red,#e06767)':'var(--green,#58c98a)','first-response SLA');
  html+=kpi('Members',VMEMBERS.length,'var(--fg)',live.length+' live');
  html+=kpi('Concierge MRR',V.fmtGBP(mrr),'var(--gold)','live memberships');
  html+=kpi('Confirmed spend',V.fmtGBP(confirmedRev),'var(--fg)','via request options');
  html+='</div>';
  // queue
  html+='<div class="card" style="margin-bottom:24px"><div class="section-label" style="margin-bottom:12px">Request queue — tier first, then patience</div>';
  if(!queue.length){
    html+='<div style="color:var(--fg-subtle);font-size:13px;padding:18px 0;text-align:center">No open requests. New ones appear here the moment a member submits'+(FIREBASE_ENABLED?'.':' (connect Firebase to go live).')+'</div>';
  }else{
    html+='<table style="width:100%;border-collapse:collapse;font-size:13px">';
    html+='<tr style="color:var(--fg-subtle);text-align:left"><th style="padding:8px 10px">Member</th><th style="padding:8px 10px">Request</th><th style="padding:8px 10px">Tier</th><th style="padding:8px 10px">Status</th><th style="padding:8px 10px">SLA</th><th style="padding:8px 10px">Waiting</th><th style="padding:8px 10px">Desk actions</th></tr>';
    queue.forEach(r=>{
      const t=vcTier(r), m=vcMember(r.ownerUid);
      const sla=V.slaState(r.submittedAt,t,now,r.firstResponseAt);
      const sb=slaBadge(sla).split(' ');
      const cat=(V.CATEGORIES.find(c=>c.id===r.category)||{}).emoji||'';
      const acts=nextActions(r).map(([to,label])=>'<button class="btn btn-glass btn-sm" onclick="vcAdvance(\''+r.docId+'\',\''+to+'\')">'+label+'</button>').join(' ');
      const wait=r.status==='options'?'<span style="color:var(--fg-ghost)">with member</span>':(acts||'');
      html+='<tr style="border-top:1px solid var(--border)">'
        +'<td style="padding:10px">'+(m.memberName||'—')+'</td>'
        +'<td style="padding:10px;max-width:280px">'+cat+' '+String(r.title||'').replace(/</g,'&lt;')+'<div style="color:var(--fg-ghost);font-size:11px">'+(r.messages?r.messages.length:0)+' messages</div></td>'
        +'<td style="padding:10px"><span class="tag '+(TIERTAG[t]||'tag-gray')+'">'+t.toUpperCase()+'</span></td>'
        +'<td style="padding:10px">'+(V.STATUS_LABEL[r.status]||r.status)+'</td>'
        +'<td style="padding:10px"><span class="tag '+sb[0]+'">'+sb.slice(1).join(' ')+'</span></td>'
        +'<td style="padding:10px">'+ago(r.submittedAt||now)+'</td>'
        +'<td style="padding:10px;white-space:nowrap">'+wait+' <button class="btn btn-glass btn-sm" onclick="vcReply(\''+r.docId+'\')">Reply</button></td>'
        +'</tr>';
    });
    html+='</table>';
  }
  html+='</div>';
  // members roster
  html+='<div class="card"><div class="section-label" style="margin-bottom:12px">Members</div>';
  if(!VMEMBERS.length){
    html+='<div style="color:var(--fg-subtle);font-size:13px;padding:18px 0;text-align:center">No concierge members yet.</div>';
  }else{
    html+='<table style="width:100%;border-collapse:collapse;font-size:13px">';
    html+='<tr style="color:var(--fg-subtle);text-align:left"><th style="padding:8px 10px">Member</th><th style="padding:8px 10px">Tier</th><th style="padding:8px 10px">Status</th><th style="padding:8px 10px">Billing</th><th style="padding:8px 10px">Points</th><th style="padding:8px 10px">Period ends</th><th style="padding:8px 10px">Requests</th></tr>';
    VMEMBERS.slice().sort((a,b)=>(RANK[(b.sub||{}).tierId]||0)-(RANK[(a.sub||{}).tierId]||0)).forEach(m=>{
      const t=(m.sub&&m.sub.tierId)||'—';
      const n=VREQS.filter(r=>r.ownerUid===m.uid).length;
      html+='<tr style="border-top:1px solid var(--border)">'
        +'<td style="padding:10px">'+(m.memberName||m.uid.slice(0,8))+'</td>'
        +'<td style="padding:10px"><span class="tag '+(TIERTAG[t]||'tag-gray')+'">'+String(t).toUpperCase()+'</span></td>'
        +'<td style="padding:10px">'+((m.sub&&m.sub.status)||'—')+(m.sub&&m.sub.cancelAtPeriodEnd?' · ending':'')+'</td>'
        +'<td style="padding:10px">'+(m.billing||'local')+'</td>'
        +'<td style="padding:10px">'+(m.points||0)+'</td>'
        +'<td style="padding:10px">'+(m.sub&&m.sub.periodEnd?new Date(m.sub.periodEnd).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'—')+'</td>'
        +'<td style="padding:10px">'+n+'</td>'
        +'</tr>';
    });
    html+='</table>';
  }
  html+='</div></div>';
  return html;
},

analytics:()=>{
  // All-apps collection point: when Firebase is on, the shared `analytics`
  // collection (fed by track() in the client, driver, admin and concierge
  // apps) is the source of truth; this browser's local log is the fallback.
  const localEvents=JSON.parse(localStorage.getItem('apexvip_events')||'[]');
  const raw=(FIREBASE_ENABLED&&CLOUD_EVENTS&&CLOUD_EVENTS.length)?CLOUD_EVENTS:localEvents;

  // ── Core datasets ──
  const bookings=raw.filter(e=>e.e==='booking_confirmed');
  const trips=raw.filter(e=>e.e==='trip_completed');
  const axcEarnEvts=raw.filter(e=>e.e==='apex_earned');
  const axcRedeemEvts=raw.filter(e=>e.e==='apex_redeemed');
  const jobAccepted=raw.filter(e=>e.e==='job_accepted');
  const jobDeclined=raw.filter(e=>e.e==='job_declined');
  const onlineEvts=raw.filter(e=>e.e==='driver_online');
  const offlineEvts=raw.filter(e=>e.e==='driver_offline');

  // ── Revenue Intelligence ──
  const totalRev=bookings.reduce((s,e)=>s+(e.price||0),0);
  const platformCommission=Math.round(totalRev*0.20);
  const driverPayouts=Math.round(totalRev*0.80);
  const avgVal=bookings.length?Math.round(totalRev/bookings.length):0;
  const driverRev=trips.reduce((s,e)=>s+(e.pay||0),0);
  // Revenue per available driver hour
  let totalOnlineMs=0;
  onlineEvts.forEach((on,i)=>{const off=offlineEvts.find(o=>o.t>on.t);if(off)totalOnlineMs+=off.t-on.t;});
  const revPAH=totalOnlineMs>0?Math.round(driverRev/(totalOnlineMs/3600000)*10)/10:0;
  // Revenue by service
  const svcRev={airport:0,hourly:0,day:0}; const svcCnt={airport:0,hourly:0,day:0};
  bookings.forEach(e=>{const s=e.service||'airport';if(svcRev[s]!==undefined){svcRev[s]+=e.price||0;svcCnt[s]++;}});
  // Revenue by vehicle
  const vehRev={}; bookings.forEach(e=>{const v=e.vehicle||'Unknown';vehRev[v]=(vehRev[v]||0)+(e.price||0);});
  // Daily revenue (last 14 days)
  const dayRev={}; const now=Date.now();
  bookings.forEach(e=>{if(e.t){const d=new Date(e.t);const k=d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});dayRev[k]=(dayRev[k]||0)+(e.price||0);}});
  const dayKeys=Object.keys(dayRev).slice(-14); const maxDay=Math.max(...Object.values(dayRev),1);

  // ── Customer Analytics ──
  const clientMap={};
  bookings.forEach(e=>{
    const k=e.user||'Guest';
    if(!clientMap[k])clientMap[k]={name:k,spend:0,count:0,first:e.t,last:e.t};
    clientMap[k].spend+=e.price||0; clientMap[k].count++;
    clientMap[k].first=Math.min(clientMap[k].first,e.t||now);
    clientMap[k].last=Math.max(clientMap[k].last,e.t||now);
  });
  const clients=Object.values(clientMap).sort((a,b)=>b.spend-a.spend);
  const uniqueClients=clients.length;
  const returningClients=clients.filter(c=>c.count>1).length;
  const retentionRate=uniqueClients?Math.round(returningClients/uniqueClients*100):0;
  const avgCLV=uniqueClients?Math.round(totalRev/uniqueClients):0;

  // ── Operational ──
  let totalTripMs=0; trips.forEach(e=>{totalTripMs+=(e.duration||0)*1000;});
  const utilisationRate=totalOnlineMs>0?Math.min(100,Math.round(totalTripMs/totalOnlineMs*100)):0;
  const acceptanceRate=(jobAccepted.length+jobDeclined.length)>0?Math.round(jobAccepted.length/(jobAccepted.length+jobDeclined.length)*100):0;
  const avgTripMins=trips.length?Math.round(totalTripMs/trips.length/60000):0;
  // Peak hours
  const hrs=Array(24).fill(0); bookings.forEach(e=>{if(e.t)hrs[new Date(e.t).getHours()]++;});
  const maxHr=Math.max(...hrs,1);
  const peakHour=hrs.indexOf(Math.max(...hrs));

  // ── Route Analytics ──
  const routeMap={};
  bookings.forEach(e=>{
    if(e.pickup&&e.dropoff){
      const k=(e.pickup+'→'+e.dropoff).slice(0,60);
      if(!routeMap[k])routeMap[k]={route:k,count:0,revenue:0};
      routeMap[k].count++; routeMap[k].revenue+=e.price||0;
    }
  });
  const topRoutes=Object.values(routeMap).sort((a,b)=>b.count-a.count).slice(0,8);

  // ── Booking lead time ──
  const leadTimes=bookings.filter(e=>e.scheduled_date&&e.t).map(e=>{
    try{const s=new Date(e.scheduled_date+'T'+(e.scheduled_time||'12:00')).getTime();return Math.max(0,(s-e.t)/3600000);}catch{return 0;}
  }).filter(h=>h>0);
  const avgLead=leadTimes.length?Math.round(leadTimes.reduce((a,b)=>a+b,0)/leadTimes.length):0;
  const advanceBookings=leadTimes.filter(h=>h>24).length;
  const sameDay=leadTimes.filter(h=>h<=24).length;

  // ── APEX Loyalty ──
  const totalEarned=axcEarnEvts.reduce((s,e)=>s+(e.amount||0),0);
  const totalRedeemed=axcRedeemEvts.reduce((s,e)=>s+(e.amount||0),0);
  const outstanding=Math.max(0,totalEarned-totalRedeemed);
  const velocity=totalEarned>0?Math.round(totalRedeemed/totalEarned*100):0;
  const apexUsers=axcEarnEvts.length;

  // ── Helpers ──
  function ago(t){const s=Math.round((Date.now()-t)/1000);return s<60?s+'s':s<3600?Math.round(s/60)+'m':s<86400?Math.round(s/3600)+'h':(Math.round(s/86400))+'d';}
  function bar(pct,color,h){return '<div style="height:'+h+'px;background:var(--surface-c);border-radius:3px"><div style="height:'+h+'px;background:'+color+';border-radius:3px;width:'+Math.min(100,pct)+'%;transition:width .5s ease"></div></div>';}
  function kpi(label,value,color,sub){return '<div class="stat-card"><div class="section-label" style="margin-bottom:8px">'+label+'</div><div style="font-size:26px;font-weight:800;color:'+color+'">'+value+'</div>'+(sub?'<div style="font-size:11px;color:var(--fg-ghost);margin-top:4px">'+sub+'</div>':'')+'</div>';}
  const evtColor={booking_confirmed:'#22c55e',apex_earned:'#C8A97E',apex_redeemed:'#ef4444',trip_completed:'#a855f7',user_login:'#3b82f6',driver_login:'#3b82f6',vehicle_selected:'#f59e0b',job_accepted:'#22c55e',job_declined:'#ef4444',booking_started:'#64748b',checkout_started:'#8b5cf6',driver_online:'#22c55e',driver_offline:'#6b7280'};

  const noData=raw.length===0;
  let html='<div class="screen">';
  html+='<div class="section-header"><div><div class="section-title">Business Intelligence</div><div style="color:var(--fg-dim);font-size:13px;margin-top:2px">'+((FIREBASE_ENABLED&&CLOUD_EVENTS&&CLOUD_EVENTS.length)?'Live from all apps — client, driver, admin & concierge (cloud)':'This device only — connect Firebase to collect every app')+'</div></div>';
  html+='<div style="display:flex;gap:8px"><button class="btn btn-glass btn-sm" onclick="render()">↺ Refresh</button><button class="btn btn-glass btn-sm" onclick="if(confirm(\'Clear all data?\'))localStorage.removeItem(\'apexvip_events\'),render()">Clear</button></div></div>';

  if(noData){
    html+='<div class="card" style="text-align:center;padding:60px 24px">';
    html+='<div style="font-size:52px;margin-bottom:16px">📊</div>';
    html+='<div style="font-size:20px;font-weight:700;margin-bottom:10px">No data yet</div>';
    html+='<div style="font-size:13px;color:var(--fg-subtle);line-height:1.7">Open the client or driver app and complete some actions.<br/>All interactions are tracked automatically and shown here in real time.</div></div>';
  } else {
    // ── Across the apps ──
    const bySrc={};raw.forEach(e=>{const k=e.src||'client';bySrc[k]=(bySrc[k]||0)+1;});
    const SRC_META={client:['📱','Client app'],driver:['🚗','Driver app'],admin:['🖥','Admin console'],concierge:['🛎','Concierge']};
    html+='<div class="section-label" style="margin:6px 0 12px">Across the apps</div><div class="stagger" style="display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap">';
    Object.keys(SRC_META).forEach(k=>{const[ic,label]=SRC_META[k];html+=kpi(ic+' '+label,(bySrc[k]||0).toLocaleString(),'var(--fg)','events collected');});
    html+='</div>';
    // ── Concierge programme ──
    const vReqs=raw.filter(e=>e.e==='concierge_request_created');
    const vConf=raw.filter(e=>e.e==='concierge_option_confirmed');
    const vTrials=raw.filter(e=>e.e==='membership_trial_started');
    const vRev=vConf.reduce((s,e)=>s+(e.price||0),0);
    if(vReqs.length||vConf.length||vTrials.length){
      html+='<div class="section-label" style="margin:6px 0 12px">Concierge programme</div><div class="stagger" style="display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap">';
      html+=kpi('Memberships started',vTrials.length,'var(--gold)','7-day trials');
      html+=kpi('Requests',vReqs.length,'var(--fg)','across 8 desks');
      html+=kpi('Options confirmed',vConf.length,'var(--fg)',vReqs.length?Math.round(vConf.length/vReqs.length*100)+'% of requests':'');
      html+=kpi('Concierge revenue','£'+vRev.toLocaleString(),'var(--gold)','confirmed options');
      html+='</div>';
    }

  // ── 1. Revenue Intelligence ──────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">Revenue Intelligence</div>';
  html+='<div style="display:flex;gap:14px;margin-bottom:20px;flex-wrap:wrap">';
  html+=kpi('Gross Revenue','£'+totalRev.toLocaleString(),'#C8A97E','from '+bookings.length+' bookings');
  html+=kpi('Platform Commission','£'+platformCommission.toLocaleString(),'#22c55e','20% of gross');
  html+=kpi('Driver Payouts','£'+driverPayouts.toLocaleString(),'#3b82f6','80% of gross');
  html+=kpi('Avg Booking Value','£'+avgVal,'#a855f7','per transaction');
  html+='</div>';

  html+='<div style="display:flex;gap:20px;margin-bottom:24px;flex-wrap:wrap">';
  // Service revenue breakdown

  html+='</div>';

  // ── 6. Live Event Feed ────────────────────────────────────────────────────
  html+='<div class="section-label" style="margin:0 0 12px">Live Event Feed</div>';
  html+='<div class="card"><div style="font-size:14px;font-weight:600;margin-bottom:16px">Recent Events <span style="font-size:12px;color:var(--fg-ghost);font-weight:400;margin-left:8px">'+raw.length+' total</span></div>';

    const col=evtColor[e.e]||'var(--fg-dim)';
    const detail=e.price?'£'+e.price:e.amount?(e.amount+' APEX'):e.screen?e.screen:e.service?e.service:e.pay?('£'+e.pay):e.vehicle||'';
    html+='<tr><td><span style="color:'+col+';font-weight:600;font-size:12px">'+e.e+'</span></td>';
    html+='<td><span class="tag tag-gray" style="font-size:10px">'+(e.src||'—')+'</span></td>';

  } // end if !noData

},

documents:()=>{
  const DLABELS={licence:'Driving Licence',pco:'PCO Licence',insurance:'Motor Insurance',dbs:'DBS Certificate',v5c:'V5C Logbook',badge:'PHV Driver Badge'};
  const filt=S._docFilter||'all';
  let tot=0,pend=0,appr=0,rej=0;
  DRIVERS.forEach(d=>{Object.values(d.documents||{}).forEach(doc=>{tot++;if(doc.status==='pending')pend++;else if(doc.status==='approved')appr++;else if(doc.status==='rejected')rej++;});});
  const withDocs=DRIVERS.filter(d=>Object.keys(d.documents||{}).length>0);
  return`<div class="screen">
  <div class="section-header"><div class="section-title">Driver Documents</div></div>
  <div class="stagger" style="display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap">
    ${[['Total',tot,'var(--fg)','📄'],['Pending',pend,'#f59e0b','⏳'],['Approved',appr,'#22c55e','✓'],['Rejected',rej,'#ef4444','✗']].map(([l,v,c,ic])=>`<div class="stat-card"><div class="stat-watermark">${ic}</div><div class="section-label" style="margin-bottom:10px">${l}</div><div style="font-size:30px;font-weight:800;color:${c}">${v}</div></div>`).join('')}
  </div>
  <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
    ${[['all','All'],['pending','⏳ Pending'],['approved','✓ Approved'],['rejected','✗ Rejected']].map(([val,lbl])=>`<button class="btn btn-sm ${filt===val?'btn-gold':'btn-glass'}" onclick="S._docFilter='${val}';render()">${lbl}</button>`).join('')}
  </div>
  ${withDocs.length===0?`<div class="card" style="text-align:center;padding:60px 24px">
    <div style="font-size:52px;margin-bottom:16px">📄</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px">No documents yet</div>
    <div style="font-size:13px;color:var(--fg-subtle)">Documents uploaded by drivers will appear here for review.</div>
  </div>`
  :withDocs.map(d=>{
    const docs=Object.entries(d.documents||{});
    const filtered=filt==='all'?docs:docs.filter(([,doc])=>doc.status===filt);
    if(!filtered.length)return'';
    return`<div class="card" style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        ${av(d.initials,d.color,40)}
        <div style="flex:1"><div style="font-size:15px;font-weight:700">${d.name}</div><div style="font-size:12px;color:var(--fg-subtle);margin-top:2px">${d.vehicle}</div></div>
        ${badge(d.status)}
      </div>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${filtered.map(([type,doc])=>{
          const lbl=DLABELS[type]||type;
          const dt=doc.uploadedAt?(new Date(doc.uploadedAt.seconds?doc.uploadedAt.seconds*1000:doc.uploadedAt)).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'—';
          const sc=doc.status==='approved'?'tag-green':doc.status==='rejected'?'tag-red':'tag-amber';
          const sl=doc.status==='approved'?'✓ Approved':doc.status==='rejected'?'✗ Rejected':'⏳ Pending';
          return`<div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface-b);border-radius:12px;border:1px solid var(--border);flex-wrap:wrap">
            <div style="flex:1;min-width:140px">
              <div style="font-size:13px;font-weight:700;margin-bottom:3px">${lbl}</div>
              <div style="font-size:11px;color:var(--fg-dim)">${doc.fileName||'File'} · ${dt}</div>
              ${doc.rejectNote?`<div style="font-size:11px;color:#ef4444;margin-top:3px">Note: ${doc.rejectNote}</div>`:''}
            </div>
            <span class="tag ${sc}">${sl}</span>
            <div style="display:flex;gap:6px;flex-shrink:0">
              ${doc.url?`<a href="${doc.url}" target="_blank" rel="noopener" style="padding:6px 12px;background:var(--surface-c);border:1px solid var(--border);border-radius:8px;color:var(--fg);font-size:12px;font-weight:600;text-decoration:none">View</a>`:''}
              ${doc.status!=='approved'?`<button onclick="approveDoc('${d.id}','${type}')" style="padding:6px 12px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);border-radius:8px;color:#22c55e;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Approve</button>`:''}
              ${doc.status!=='rejected'?`<button onclick="rejectDoc('${d.id}','${type}')" style="padding:6px 12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);border-radius:8px;color:#ef4444;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Reject</button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')}
</div>`;
},

function showBooking(id){const b=BOOKINGS.find(x=>x.id===id);if(!b)return;

    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${!b.driverId?`<button class="btn btn-gold btn-sm" onclick="closeModal();openDispatch('${b.id}')">Assign Driver</button>`:''}
      <button class="btn btn-glass btn-sm" onclick="closeModal()">Close</button>
      ${b.status!=='cancelled'&&b.status!=='completed'?`<button class="btn btn-danger btn-sm" onclick="adminCancelBooking('${b.docId}','${b.id}')">Cancel Booking</button>`:''}
    </div>
  </div>`);}

function adminCancelBooking(docId,id){
  if(!confirm('Cancel this booking?'))return;
  closeModal();
  const bk=BOOKINGS.find(x=>x.id===id||x.docId===docId);
  if(bk)bk.status='cancelled';
  render();
  if(FIREBASE_ENABLED&&docId){
    db.collection('bookings').doc(docId).update({status:'cancelled',cancelledAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(reportError);
    db.collection('open_jobs').where('bookingDocId','==',docId).get().then(s=>s.docs.forEach(d=>d.ref.update({status:'cancelled'}).catch(reportError))).catch(reportError);
  }
}

  {key:'dbs',      label:'DBS Check',               expiry:true},

// Compute live compliance from the admin verdict + expiry (expired docs flip the
// driver back to not-compliant automatically, no admin action needed).
function computeCompliance(d){
  const verdict=(d&&d.compliance&&d.compliance.docs)||{};
  const today=new Date().toISOString().slice(0,10);
  const soon=new Date(Date.now()+30*864e5).toISOString().slice(0,10);
  const missing=[],expired=[],expiring=[];
  COMPLIANCE_DOCS.forEach(t=>{
    const a=verdict[t.key]||{};
    if(!a.approved){missing.push(t.label);return;}
    if(t.expiry){
      if(!a.expiresAt||a.expiresAt<today)expired.push(t.label);
      else if(a.expiresAt<=soon)expiring.push(t.label);
    }
  });
  // Vehicle: needs ≥1 active vehicle with MOT + road tax both in date.
  const vs=driverVehicles(d&&(d.id||d.uid));
  let vehicleOk=false;
  if(!vs.length){ missing.push('No vehicle on file'); }
  vs.forEach(v=>{
    if(v.active===false)return;
    const mot=v.motExpiry,tax=v.taxExpiry,reg=v.reg||'Vehicle';
    if(mot&&mot>=today&&tax&&tax>=today)vehicleOk=true;
    if(mot&&mot<today)expired.push(reg+' MOT'); else if(mot&&mot<=soon)expiring.push(reg+' MOT'); else if(!mot)missing.push(reg+' MOT date');
    if(tax&&tax<today)expired.push(reg+' road tax'); else if(tax&&tax<=soon)expiring.push(reg+' road tax'); else if(!tax)missing.push(reg+' road tax date');
  });
  const ok=missing.length===0&&expired.length===0&&vehicleOk;
  return {ok,missing,expired,expiring};
}
function complianceChip(d){
  const c=computeCompliance(d);
  if(c.ok&&!c.expiring.length)return '<span class="tag tag-green">✅ Compliant</span>';
  if(c.ok&&c.expiring.length)return '<span class="tag tag-amber">⚠️ Expiring soon</span>';
  if(c.expired.length)return '<span class="tag tag-red">⛔ Expired</span>';
  return '<span class="tag tag-amber">⛔ Action needed</span>';
}
// Persist the whole verdict from the review form in one write (avoids races) and
// recompute the compliant flag.
async function saveCompliance(id){
  const d=DRIVERS.find(x=>x.id===id);if(!d){closeModal();return;}
  const docs={};
  COMPLIANCE_DOCS.forEach(t=>{
    const approved=document.getElementById('cmp_ok_'+t.key)?.checked||false;
    const entry={approved};
    if(t.expiry){const e=document.getElementById('cmp_exp_'+t.key)?.value||'';if(e)entry.expiresAt=e;}
    const note=document.getElementById('cmp_note_'+t.key)?.value||'';
    if(!approved&&note)entry.note=note;
    docs[t.key]=entry;
  });
  // Compute with the driver's id so vehicle MOT/road-tax is factored in too.
  const compliant=computeCompliance({id,compliance:{docs}}).ok;
  if(!FIREBASE_ENABLED){closeModal();return;}
  try{
    await db.collection('drivers').doc(id).set({compliance:{
      docs,compliant,
      reviewedBy:(auth.currentUser&&auth.currentUser.uid)||'admin',
      reviewedAt:firebase.firestore.FieldValue.serverTimestamp()
    }},{merge:true});
    logAudit('compliance_update', d.name||id, compliant?'marked compliant':'not compliant');
    closeModal();
  }catch(e){alert('Could not save compliance: '+(e.message||e.code));}
}

// Offer a booking to every online driver — first to accept claims it.
// Writes open_jobs/{bookingDocId} (stable id, so it can't double-broadcast and
// it matches the onBookingCreated dispatch function) and stamps `market` so the
// job shows up in the driver app's open_jobs.where('market','==',…) query.
function broadcastDispatch(){
  const booking=BOOKINGS.find(b=>b.id===S._dispatchRef||b.ref===S._dispatchRef);
  if(booking){booking.status='offered';booking.driver='📢 Broadcast…';}
  if(FIREBASE_ENABLED&&booking?.docId){
    db.collection('open_jobs').doc(booking.docId).set({
      bookingDocId:booking.docId,bookingRef:booking.ref||booking.id,
      market:booking.location||booking.market||'london',
      clientId:booking.clientId||'',clientName:booking.client||'',
      pickup:booking.pickup||'',
      dropoff:booking.dropoff||'',date:booking.date||'',time:booking.time||'',
      vehicle:booking.vehicle||'S-Class',
      pay:Math.round(parseInt((booking.price||'0').replace(/[^0-9]/g,''))*0.8),
      status:'open',driverId:'',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(reportError);
    db.collection('bookings').doc(booking.docId).update({status:'offered'}).catch(reportError);
    logAudit('dispatch_broadcast', booking.ref||booking.id, (booking.pickup||'')+' · driver pay £'+Math.round(parseInt((booking.price||'0').replace(/[^0-9]/g,''))*0.8));
  }
  S._dispatchOpen=false;
  render();
}

function confirmDispatch(driverIdOrName){
  const driver=DRIVERS.find(d=>d.id===driverIdOrName||d.name===driverIdOrName);
  if(!driver){S._dispatchOpen=false;render();return;}
  // Compliance gate — never assign a job to a driver whose documents aren't
  // approved & in-date.
  if(FIREBASE_ENABLED){
    const c=computeCompliance(driver);
    if(!c.ok){
      const why=[...c.missing.map(m=>'missing '+m),...c.expired.map(m=>'expired '+m)].join(', ');
      alert(`${driver.name} is not compliant — ${why}. Approve their documents (open the driver) before assigning.`);
      return;
    }
  }
  // Update booking in local state
  const booking=BOOKINGS.find(b=>b.id===S._dispatchRef||b.ref===S._dispatchRef);
  if(booking){
    booking.driverId=driver.id||driver.name;
    booking.driver=driver.name;
    booking.driverName=driver.name;
    booking.status='accepted';
    driver.status='ontrip';
  }
  // Update Firestore
  if(FIREBASE_ENABLED&&booking?.docId){
    // Manual assignment supersedes any live broadcast offer
    db.collection('open_jobs').where('bookingDocId','==',booking.docId).where('status','==','open').get()
      .then(snap=>snap.docs.forEach(d=>d.ref.update({status:'cancelled'}).catch(reportError))).catch(reportError);
    db.collection('bookings').doc(booking.docId).update({
      driverId:driver.uid||driver.id||driver.name,
      driverName:driver.name,
      driverPlate:driver.reg||driver.plate||'',
      status:'accepted',
      assignedAt:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(reportError);
    logAudit('dispatch_assign', booking.ref||booking.id, 'to '+driver.name);
    if(driver.uid){
      db.collection('jobs').add({
        driverId:driver.uid,bookingRef:booking.ref||booking.id,
        bookingDocId:booking.docId||'',
        clientId:booking.clientId||'',clientName:booking.client||booking.clientName||'',
        serviceLabel:booking.serviceLabel||booking.vehicleLabel||'Airport Transfer',
        type:booking.serviceType||'airport',
        pickup:booking.pickup||'',dropoff:booking.dropoff||'',
        date:booking.date||'',time:booking.time||'',
        flight:booking.flight||'',notes:booking.notes||booking.specialRequests||'',
        vehicle:driver.model||driver.vehicle||'',
        market:booking.location||booking.market||'london',
        pay:Math.round(parseInt((booking.price||'0').replace(/[^0-9]/g,''))*0.8),
        status:'pending',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      }).catch(reportError);
    }
  }
  S._dispatchOpen=false;
  render();
}

    ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {maxZoom:19}).addTo(_adminMap);

  // Subscribe to all driver locations
  if (FIREBASE_ENABLED) {
    db.collection('drivers').onSnapshot(snap => {
      snap.docs.forEach(doc => {
        const d = doc.data();
        const id = doc.id;
        if (!d.lat || !d.lng) return;
        const pos = [d.lat, d.lng];
        const isActive = d.status === 'online' || d.status === 'ontrip';
        if (_adminMarkers[id]) {
          _adminMarkers[id].setLatLng(pos);
        } else {
          _adminMarkers[id] = L.circleMarker(pos, {
            radius: 10,
            fillColor: d.status === 'ontrip' ? '#D4A843' : (isActive ? '#22c55e' : '#666'),
            color: '#fff', weight: 2, opacity: 1, fillOpacity: 0.9
          }).addTo(_adminMap)
            .bindPopup(`<b style="font-family:sans-serif;font-size:13px">${d.name||'Driver'}</b><br/><span style="font-size:11px;color:#888">${d.status||'offline'} · ${d.vehicle||''}</span>`);
        }
      });
    }, () => {});
  } else {
    // Demo: place markers for each DRIVER with a fake London position
    const londonArea = [[51.507,-0.127],[51.514,-0.142],[51.496,-0.108],[51.522,-0.098],[51.489,-0.154]];
    DRIVERS.forEach((d,i) => {
      const pos = londonArea[i % londonArea.length];
      L.circleMarker(pos, {
        radius:10, fillColor: d.status==='ontrip'?'#D4A843': d.status==='online'?'#22c55e':'#666',
        color:'#fff', weight:2, opacity:1, fillOpacity:0.9
      }).addTo(_adminMap)
        .bindPopup(`<b style="font-family:sans-serif;font-size:13px">${d.name}</b><br/><span style="font-size:11px;color:#888">${d.status}</span>`);
    });
  }
}

// Append-only audit trail of staff actions.
function logAudit(action, target, detail){
  if(!FIREBASE_ENABLED) return;
  try{
    db.collection('audit_log').add({
      ts: firebase.firestore.FieldValue.serverTimestamp(),
      actorUid: (auth.currentUser&&auth.currentUser.uid)||'admin',
      actorName: (auth.currentUser&&(auth.currentUser.displayName||auth.currentUser.email))||'Admin',
      action, target: String(target||''), detail: String(detail||'')
    });
  }catch(e){ console.warn('audit',e.code); }
}
const AUDIT_LABEL={business_model_update:'✦ Biz model',booking_create:'⚡ Booking',dispatch_broadcast:'📢 Broadcast',dispatch_assign:'🚗 Assigned',compliance_update:'🛡 Compliance',vehicle_add:'➕ Vehicle',vehicle_update:'🔧 Vehicle',vehicle_remove:'🗑 Vehicle',payout:'💸 Payout',payout_approve:'✅ Payout req',payout_reject:'❌ Payout req',pricing_update:'£ Pricing'};
function loadAudit(){
  const el=document.getElementById('audit-list');
  if(!el) return;
  if(!FIREBASE_ENABLED){ el.innerHTML='<div style="text-align:center;padding:40px;color:var(--fg-4);font-size:13px">No audit entries (demo mode)</div>'; return; }
  let q=db.collection('audit_log');
  // Range filter + orderBy on the same field (ts) — no composite index needed.
  if(S._auditFrom) q=q.where('ts','>=',new Date(S._auditFrom+'T00:00:00'));
  if(S._auditTo)   q=q.where('ts','<=',new Date(S._auditTo+'T23:59:59'));
  q.orderBy('ts','desc').limit(S._auditFrom||S._auditTo?500:100).get().then(snap=>{
    S._auditRows=snap.docs.map(d=>d.data());
    if(snap.empty){ el.innerHTML='<div style="text-align:center;padding:40px;color:var(--fg-4);font-size:13px">No actions recorded'+(S._auditFrom||S._auditTo?' in this range':' yet')+'</div>'; return; }
    el.innerHTML=snap.docs.map(d=>{
      const r=d.data(); const when=r.ts&&r.ts.toDate?r.ts.toDate().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—';
      return `<div class="card" style="padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${AUDIT_LABEL[r.action]||esc(r.action)} ${r.target?`· <span style="color:var(--gold)">${esc(r.target)}</span>`:''}</div>
          <div style="font-size:12px;color:var(--fg-3)">${esc(r.detail||'')}</div>
        </div>
        <div style="text-align:right;flex-shrink:0"><div style="font-size:12px;color:var(--fg-dim)">${esc(r.actorName||'—')}</div><div style="font-size:11px;color:var(--fg-4)">${when}</div></div>
      </div>`;
    }).join('');
  }).catch(()=>{ el.innerHTML='<div style="color:#ef4444;padding:20px">Could not load audit log</div>'; });
}

// ── Business model (commission vs subscription) ──────────────────────────
function setBusinessModel(model){
  S._business={...(S._business||{commissionPct:20,clientMonthlyFee:49,driverMonthlyFee:99,trialDays:30}),model};
  if(FIREBASE_ENABLED){
    db.collection('settings').doc('business').set({model,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true})
      .then(()=>logAudit('business_model_update','settings/business','switched to '+model)).catch(reportError);
  }
  render();
}
function saveBusinessModel(){
  const num=(id,def)=>{const v=parseFloat(document.getElementById(id)?.value);return Number.isFinite(v)&&v>=0?v:def;};
  const data={
    model:'subscription',
    clientMonthlyFee:num('biz_client_fee',49),
    driverMonthlyFee:num('biz_driver_fee',99),
    trialDays:Math.round(num('biz_trial',30)),
    commissionPct:Math.min(50,Math.round(num('biz_commission',20))),
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  S._business={...(S._business||{}),...data};
  if(!FIREBASE_ENABLED){alert('Demo mode — not saved');render();return;}
  db.collection('settings').doc('business').set(data,{merge:true}).then(()=>{
    logAudit('business_model_update','settings/business',`commission ${data.commissionPct}% · client £${data.clientMonthlyFee}/mo · driver £${data.driverMonthlyFee}/mo · trial ${data.trialDays}d`);
    alert('Subscription settings saved.');render();
  }).catch(e=>alert('Save failed: '+(e.message||e.code)));
}

// ── Error telemetry viewer ─────────────────────────────────────────────────
function loadErrors(){
  const el=document.getElementById('errors-list');
  if(!el) return;
  if(!FIREBASE_ENABLED){ el.innerHTML='<div style="text-align:center;padding:40px;color:var(--fg-4);font-size:13px">No error reports (demo mode)</div>'; return; }
  db.collection('errors').limit(300).get().then(snap=>{
    const when=r=>r.at&&r.at.toDate?r.at.toDate():(r.ts?new Date(r.ts):null);
    let rows=snap.docs.map(d=>({_id:d.id,...d.data()}));
    const appF=S._errApp||'all';
    if(appF!=='all') rows=rows.filter(r=>(r.app||'client')===appF);
    rows.sort((a,b)=>(when(b)?.getTime()||0)-(when(a)?.getTime()||0));
    // Group by fingerprint (fall back to the message for legacy rows)
    const groups={};
    rows.forEach(r=>{
      const k=r.fingerprint||r.message||r.detail||'unknown';
      if(!groups[k])groups[k]={n:0,latest:r,ids:[]};
      groups[k].n++; groups[k].ids.push(r._id);
    });
    const list=Object.values(groups);
    S._errIds=rows.map(r=>r._id);
    if(!list.length){ el.innerHTML='<div style="text-align:center;padding:40px;color:var(--fg-4);font-size:13px">🎉 No errors reported'+(appF!=='all'?' from the '+appF+' app':'')+'</div>'; return; }
    el.innerHTML=list.map(g=>{
      const r=g.latest; const t=when(r);
      const app=r.app||'client';
      const appColor={client:'#3b82f6',driver:'#22c55e',admin:'#a855f7'}[app]||'var(--fg-dim)';
      return `<div class="card" style="padding:14px 16px;margin-bottom:8px">
        <div style="display:flex;align-items:flex-start;gap:12px">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap">
              <span style="font-size:10px;font-weight:800;letter-spacing:1px;color:${appColor};border:1px solid ${appColor}44;border-radius:6px;padding:2px 7px;text-transform:uppercase">${app}</span>
              ${r.screen?`<span style="font-size:11px;color:var(--fg-subtle)">${esc(r.screen)}</span>`:''}
              ${g.n>1?`<span style="font-size:10px;font-weight:800;color:#e3b341;background:rgba(227,179,65,.1);border-radius:6px;padding:2px 7px">×${g.n}</span>`:''}
            </div>
            <div style="font-size:13px;font-weight:600;word-break:break-word">${esc(r.message||r.detail||'—')}</div>
            ${r.stack?`<details style="margin-top:6px"><summary style="font-size:11px;color:var(--fg-subtle);cursor:pointer">stack</summary><pre style="font-size:10px;color:var(--fg-dim);white-space:pre-wrap;word-break:break-all;margin:6px 0 0;max-height:140px;overflow:auto">${esc(r.stack)}</pre></details>`:''}
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:var(--fg-4)">${t?t.toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</div>
            <button onclick="dismissError(${JSON.stringify(g.ids).replace(/"/g,'&quot;')})" style="margin-top:8px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Dismiss</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }).catch(e=>{ el.innerHTML='<div style="color:#ef4444;padding:20px">Could not load error reports</div>'; reportError(e,'errors'); });
}
function dismissError(ids){
  if(!FIREBASE_ENABLED) return;
  const batch=db.batch();
  (ids||[]).slice(0,400).forEach(id=>batch.delete(db.collection('errors').doc(id)));
  batch.commit().then(loadErrors).catch(reportError);
}
function clearErrors(){
  if(!FIREBASE_ENABLED||!S._errIds||!S._errIds.length){loadErrors();return;}
  if(!confirm('Delete all '+S._errIds.length+' loaded error reports?'))return;
  const batch=db.batch();
  S._errIds.slice(0,400).forEach(id=>batch.delete(db.collection('errors').doc(id)));
  batch.commit().then(loadErrors).catch(reportError);
}

// Export the currently loaded audit rows as CSV (for inspections/records).
function exportAuditCsv(){
  const rows=S._auditRows||[];
  if(!rows.length){ alert('Nothing to export — load some entries first.'); return; }
  const esc=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const csv=['timestamp,actor,action,target,detail']
    .concat(rows.map(r=>[
      r.ts&&r.ts.toDate?r.ts.toDate().toISOString():'',
      r.actorName||r.actorUid||'', r.action||'', r.target||'', r.detail||''
    ].map(esc).join(','))).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='apexvip-audit-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
}

// Driver earnings owed (driver_payouts ledger) — grouped per driver, settled via
// the payoutDriver Cloud Function (Stripe Connect transfer).
function loadDriverBalances() {
  const el = document.getElementById('driver-balances');
  if (!el || !FIREBASE_ENABLED) return;
  db.collection('driver_payouts').where('status','==','owed').limit(500).get().then(snap => {
    // Owed-balance aggregation — shared, unit-tested engine.
    const balances = ApexEngine.aggregateOwedBalances(snap.docs.map(d => d.data()));
    const by = {}; balances.forEach(b => { by[b.driverId] = b; });
    const ids = balances.map(b => b.driverId);
    if (!ids.length) { el.innerHTML = '<div style="text-align:center;padding:24px;color:var(--fg-4);font-size:13px">No balances owed</div>'; return; }
    el.innerHTML = ids.map(id => {
      const b = by[id]; const drv = DRIVERS.find(d=>d.id===id); const nm = drv?drv.name:id.slice(0,8);
      const ready = drv && drv.payout && drv.payout.payoutsEnabled;
      return `<div class="card" style="padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px">
        <div style="flex:1"><div style="font-size:14px;font-weight:700">${nm}</div>
          <div style="font-size:12px;color:var(--fg-3)">${b.count} trip${b.count===1?'':'s'} · ${ready?'payouts active':'<span style="color:#e3b341">onboarding incomplete</span>'}</div></div>
        <div style="font-weight:800;color:var(--gold);font-size:16px">£${b.amount}</div>
        <button onclick="payoutDriverNow('${id}')" style="background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Pay out</button>
      </div>`;
    }).join('');
  }).catch(()=>{ el.innerHTML = '<div style="color:#ef4444;padding:16px">Could not load balances</div>'; });
}
async function payoutDriverNow(driverId) {
  if (!fns) { alert('Functions unavailable'); return; }
  if (!confirm('Pay out this driver\'s full owed balance now?')) return;
  try {
    const r = await fns.httpsCallable('payoutDriver')({ driverId });
    logAudit('payout', driverId, `${r.data.currency||'GBP'} ${r.data.paid||0} · ${r.data.count||0} trip(s)${r.data.mock?' (mock)':''}`);
    alert(ApexEngine.formatSettlement(r.data));
    loadDriverBalances();
  } catch (e) { alert('Payout failed: ' + (e.message || e.code)); }
}

function loadPayouts() {
  const el = document.getElementById('payouts-list');
  if (!el) return;
  loadDriverBalances();
  if (!FIREBASE_ENABLED) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--fg-4);font-size:13px">No payout requests (demo mode)</div>';
    return;
  }
  db.collection('payout_requests').orderBy('createdAt','desc').limit(50).get().then(snap => {
    if (snap.empty) { el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--fg-4);font-size:13px">No pending requests</div>'; return; }
    el.innerHTML = snap.docs.map(doc => {
      const r = doc.data(); const id = doc.id;
      return `<div class="card" style="padding:18px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px">
        <div style="flex:1">
          <div style="font-size:14px;font-weight:700;margin-bottom:3px">${esc(r.driverName||'Driver')}</div>
          <div style="font-size:12px;color:var(--fg-3)">£${Number(r.amount)||0} · ${esc(r.bankName||'')} ${esc(r.accountNumber||'')}</div>
          <div style="font-size:11px;color:var(--fg-4);margin-top:2px">${esc(r.sortCode||'')}</div>
        </div>
        ${r.status==='pending'?`
        <div style="display:flex;gap:8px">
          <button onclick="approvePayoutReq('${id}')" style="background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#22c55e;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Approve</button>
          <button onclick="rejectPayoutReq('${id}')" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Reject</button>
        </div>` : `<span class="tag ${r.status==='approved'?'tag-green':'tag-red'}">${r.status}</span>`}
      </div>`;
    }).join('');
  }).catch(() => { el.innerHTML = '<div style="color:#ef4444;padding:20px">Could not load requests</div>'; });
}

function approvePayoutReq(id) {
  db.collection('payout_requests').doc(id).update({status:'approved',approvedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(()=>{logAudit('payout_approve',id,'');loadPayouts();}).catch(reportError);
}
function rejectPayoutReq(id) {
  db.collection('payout_requests').doc(id).update({status:'rejected',rejectedAt:firebase.firestore.FieldValue.serverTimestamp()}).then(()=>{logAudit('payout_reject',id,'');loadPayouts();}).catch(reportError);
}

    await db.collection('drivers').doc(driverId).set(
      {documents:{[type]:{status:'approved',reviewedAt:firebase.firestore.FieldValue.serverTimestamp()}}},
      {merge:true}
    );

function rejectDoc(driverId, type) {
  openModal(`<div>
    <div style="font-size:16px;font-weight:700;margin-bottom:16px">Reject Document</div>
    <p style="font-size:13px;color:var(--fg-dim);margin-bottom:16px">Optionally provide a reason so the driver knows what to resubmit.</p>
    <div style="margin-bottom:18px">
      <label style="font-size:11px;color:var(--fg-subtle);display:block;margin-bottom:6px;letter-spacing:.5px">REASON (OPTIONAL)</label>

      <button class="btn btn-danger" style="flex:1" onclick="confirmRejectDoc('${driverId}','${type}')">Reject Document</button>

async function confirmRejectDoc(driverId, type) {
  const note = document.getElementById('reject-note')?.value||'';
  closeModal();
  if(!FIREBASE_ENABLED){alert('Demo mode — cannot update document status');return;}
  try{
    await db.collection('drivers').doc(driverId).set(
      {documents:{[type]:{status:'rejected',reviewedAt:firebase.firestore.FieldValue.serverTimestamp(),rejectNote:note}}},
      {merge:true}
    );
  }catch(e){alert('Error: '+e.message);}
}

// render() coalesces bursts of state changes into one repaint per animation
// frame. Use renderNow() when you must read the freshly-rendered DOM immediately.
let _renderQueued=false;
function render(){
  if(_renderQueued) return;
  _renderQueued=true;
  requestAnimationFrame(()=>{ _renderQueued=false; renderNow(); });
}
function renderNow(){
  renderSidebar();
  const fn=pages[S.screen]||pages.dashboard;
  document.getElementById('main').innerHTML=fn();
  if(S.screen==='map') setTimeout(initAdminMap, 50);
  if(S.screen==='payouts') setTimeout(loadPayouts, 50);
  if(S.screen==='audit') setTimeout(loadAudit, 50);
  if(S.screen==='errors') setTimeout(loadErrors, 50);
}

renderNow();
(function(){ if(window.navigator.standalone===true) document.body.classList.add('ios-pwa'); })();
</script>
