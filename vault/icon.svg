<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Vault: a bank-vault door — locking ring, four bolts, a solid core -->
  <defs>
    <radialGradient id="bg" cx="60%" cy="20%" r="90%">
      <stop offset="0" stop-color="#1e2342"/>
      <stop offset="1" stop-color="#0a0c14"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b7cf7"/>
      <stop offset="1" stop-color="#3ce6b0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="26"/>
  <g stroke="url(#ring)" stroke-width="22" stroke-linecap="round">
    <line x1="256" y1="66" x2="256" y2="118"/>
    <line x1="256" y1="394" x2="256" y2="446"/>
    <line x1="66" y1="256" x2="118" y2="256"/>
    <line x1="394" y1="256" x2="446" y2="256"/>
  </g>
  <circle cx="256" cy="256" r="86" fill="#121631" stroke="url(#ring)" stroke-width="10"/>
  <g stroke="#f5c04a" stroke-width="18" stroke-linecap="round">
    <line x1="256" y1="216" x2="256" y2="296"/>
    <line x1="216" y1="256" x2="296" y2="256"/>
  </g>
</svg>
