<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>ApexVIP Driver</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;
  --bg:#080808;--fg:#f0ece4;--fg-muted:#c8bfb0;--fg-dim:#8a8278;--fg-subtle:#5a5550;--fg-ghost:#3a3632;--fg-faint:#28251f;
  --surface:rgba(255,255,255,.045);--surface-b:rgba(255,255,255,.03);--surface-c:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border-b:rgba(255,255,255,.05);--divider:rgba(255,255,255,.04);
  --gold:#D4A843;--gold-dim:rgba(212,168,67,.18);--gold-glow:rgba(212,168,67,.28)}
body.light{
  --bg:#f5f0e8;--fg:#1a1612;--fg-muted:#3d3730;--fg-dim:#6b6258;--fg-subtle:#9a9088;--fg-ghost:#c8bfb0;--fg-faint:#e0d8cc;
  --surface:rgba(0,0,0,.04);--surface-b:rgba(0,0,0,.025);--surface-c:rgba(0,0,0,.065);
  --border:rgba(0,0,0,.08);--border-b:rgba(0,0,0,.05);--divider:rgba(0,0,0,.04)}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}

/* ── Keyframes ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoReveal{0%{opacity:0;letter-spacing:18px}60%{opacity:1}100%{opacity:1;letter-spacing:10px}}
@keyframes subtitleReveal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 20px rgba(34,197,94,0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* ── Splash orbs (home bg) ── */
.orb-bg{position:absolute;inset:0;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(72px);opacity:.22}
.orb-1{width:320px;height:320px;background:radial-gradient(circle,#D4A843,transparent 70%);top:-80px;left:-60px}
.orb-2{width:260px;height:260px;background:radial-gradient(circle,#8a6020,transparent 70%);bottom:80px;right:-80px}

/* ── Components ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px}
.btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s}
.btn:active{opacity:.8;transform:scale(.98)}
.btn-gold{background:var(--gold);color:#000}
.btn-green{background:#22c55e;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-glass{background:var(--surface-c);border:1px solid var(--border);color:var(--fg);backdrop-filter:blur(12px)}
input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-size:16px;outline:none;font-family:inherit;transition:border-color .2s}
input:focus{border-color:var(--gold)}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:10px 0 30px;z-index:100;backdrop-filter:blur(20px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--fg-ghost);font-size:10px;padding:4px 0;position:relative;transition:color .2s}
.nav-item.on{color:var(--gold)}
.nav-pip{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .2s}
.nav-item.on .nav-pip{opacity:1}

/* ── Tags ── */
.tag{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.tag-gold{background:rgba(212,168,67,.14);color:var(--gold)}
.tag-green{background:rgba(34,197,94,.14);color:#22c55e}
.tag-gray{background:rgba(120,120,120,.14);color:var(--fg-dim)}
.tag-red{background:rgba(239,68,68,.14);color:#ef4444}
.tag-blue{background:rgba(59,130,246,.14);color:#3b82f6}
.tag-purple{background:rgba(168,85,247,.14);color:#a855f7}

/* ── Misc ── */
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fg-subtle)}
.back-row{display:flex;align-items:center;padding:20px 0 10px}
.back-btn{background:none;border:none;color:var(--gold);font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;font-weight:600}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:22px 0 10px}
.menu-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--divider);cursor:pointer}
.menu-row:last-child{border-bottom:none}
.stepper{display:flex;align-items:center;margin-bottom:20px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-line{flex:1;height:2px;background:var(--border);margin-top:-14px}
.bar-row{display:flex;align-items:flex-end;gap:6px;height:80px;margin:12px 0}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-fill{border-radius:4px 4px 0 0;background:var(--gold);width:100%}
.screen{padding:0 22px 100px;min-height:100vh;animation:fadeIn .25s ease}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase init ──────────────────────────────────────────────────────
let auth, db, FIREBASE_ENABLED = false, _driverId = null;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth();
    db = firebase.firestore();
    FIREBASE_ENABLED = true;
  }
} catch(e) { console.warn('Firebase init:', e.message); }

let JOBS=[
  {id:'J1',type:'airport',client:'Sarah M.',initials:'SM',service:'Airport Transfer',pickup:'Mayfair W1K',dropoff:'Heathrow Terminal 5',time:'In 45 min',pay:95,flight:'BA0247',notes:'1 passenger, 2 bags',vehicle:'S-Class'},
  {id:'J2',type:'hourly',client:'Robert C.',initials:'RC',service:'By the Hour (4hrs)',pickup:'Canary Wharf E14',dropoff:'Various',time:'Tomorrow 10:00',pay:260,notes:'Business meetings, multiple stops',vehicle:'S-Class'},
  {id:'J3',type:'airport',client:'Emma W.',initials:'EW',service:'Airport Transfer',pickup:'Knightsbridge SW1',dropoff:'Gatwick North Terminal',time:'Today 16:30',pay:195,flight:'EZY1234',notes:'2 passengers, 4 bags',vehicle:'S-Class'},
];
const HISTORY=[
  {id:'H1',service:'Airport Transfer',pickup:'Heathrow T5',dropoff:'Mayfair',date:'Today',duration:'55 min',pay:95,rating:5},
  {id:'H2',service:'By the Hour (2hr)',pickup:'Mayfair',dropoff:'Mayfair',date:'Today',duration:'2hr',pay:130,rating:5},
  {id:'H3',service:'Airport Transfer',pickup:'Knightsbridge',dropoff:'Heathrow T3',date:'Yesterday',duration:'50 min',pay:185,rating:4},
  {id:'H4',service:'Airport Transfer',pickup:'Chelsea',dropoff:'Stansted',date:'Yesterday',duration:'65 min',pay:195,rating:5},
  {id:'H5',service:'Airport Transfer',pickup:'Belgravia',dropoff:'City Airport',date:'Monday',duration:'40 min',pay:125,rating:5},
];
const WEEK_DATA=[180,240,0,310,420,380,190];
const WEEK_LABELS=['Mon','Tue','Wed','Thu','Fri','Sat','Today'];

let S={
  screen:'login',
  theme: localStorage.getItem('apexvip_driver_theme')||'dark',
  apexcoin: 142.00,
  _axcHistory:[
    {desc:'Airport Transfer · Heathrow',type:'earn',amount:1.90,date:'Today'},
    {desc:'By the Hour · 4hrs',type:'earn',amount:5.20,date:'Yesterday'},
    {desc:'Milestone bonus — 200 trips',type:'earn',amount:50.00,date:'Last week'},
    {desc:'Airport Transfer · Gatwick',type:'earn',amount:3.90,date:'Last week'},
  ],
  online:false,
  jobOverlay:false,
  countdown:30,
  activeJob:null,
  tripStep:1,
  tripTimer:0,
  _timer:null,
  _cdTimer:null,
  _tripTimerInterval:null,
  histTab:'week',
  earnTab:'today',
  jobsTab:'available',
};

// Apply saved theme immediately
if(S.theme==='light') document.body.classList.add('light');

function toggleTheme(){
  S.theme=S.theme==='light'?'dark':'light';
  localStorage.setItem('apexvip_driver_theme',S.theme);
  document.body.classList.toggle('light',S.theme==='light');
  render();
}

function go(s){S.screen=s;render();window.scrollTo(0,0);}

async function driverLogin(){
  if(!FIREBASE_ENABLED){go('home');return;}
  const email=document.querySelector('input[type=email]')?.value||'';
  const pass=document.querySelector('input[type=password]')?.value||'';
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pass);
    const doc=await db.collection('users').doc(cred.user.uid).get();
    if(doc.exists&&doc.data().role==='driver'){
      _driverId=cred.user.uid;
      setupDriverListeners(cred.user.uid);
      go('home');
    }else{auth.signOut();alert('Access denied. Driver accounts only.');}
  }catch(err){alert('Invalid credentials');}
}

function setupDriverListeners(uid){
  db.collection('jobs').where('driverId','==',uid).where('status','in',['pending'])
    .onSnapshot(snap=>{
      if(!snap.empty&&!S.jobOverlay&&!S.activeJob){
        const doc=snap.docs[0];
        const j={id:doc.id,...doc.data()};
        JOBS[0]={id:j.id,type:j.type||'airport',client:j.clientName||'Client',
          initials:(j.clientName||'CL').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2),
          service:j.serviceLabel||'Airport Transfer',pickup:j.pickup||'',
          dropoff:j.dropoff||j.airport||'',time:j.time||'Now',
          pay:j.pay||j.price||95,flight:j.flight||'',notes:j.notes||'',vehicle:j.vehicle||'S-Class'};
        S.jobOverlay=true;S.countdown=30;startCountdown();render();
      }
    },()=>{});
}

function nav(){
  const items=[
    {id:'home',label:'Home',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>'},
    {id:'jobs',label:'Jobs',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>'},
    {id:'earnings',label:'Earnings',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'},
    {id:'history',label:'History',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'},
    {id:'profile',label:'Profile',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'}
  ];
  return`<nav class="nav">${items.map(i=>`<div class="nav-item${S.screen===i.id?' on':''}" onclick="go('${i.id}')">
    ${i.svg}<span>${i.label}</span><div class="nav-pip"></div>
  </div>`).join('')}</nav>`;
}

function goOnline(){
  S.online=!S.online;
  if(FIREBASE_ENABLED&&_driverId){
    db.collection('drivers').doc(_driverId).set({status:S.online?'online':'offline'},{merge:true}).catch(()=>{});
  }
  if(S.online){
    clearTimeout(S._timer);
    S._timer=setTimeout(()=>{S.jobOverlay=true;S.countdown=30;startCountdown();render();},3000);
  } else {
    clearTimeout(S._timer);
    clearInterval(S._cdTimer);
  }
  render();
}

function startCountdown(){
  clearInterval(S._cdTimer);
  S._cdTimer=setInterval(()=>{
    S.countdown--;
    const el=document.getElementById('cd-num');
    if(el)el.textContent=S.countdown;
    const ring=document.getElementById('cd-ring');
    if(ring){const pct=S.countdown/30;const circ=2*Math.PI*40;ring.style.strokeDashoffset=circ*(1-pct);}
    if(S.countdown<=0){declineJob();}
  },1000);
}

function acceptJob(){
  clearInterval(S._cdTimer);
  S.jobOverlay=false;
  S.activeJob=JOBS[0];
  S.tripStep=2;
  S.tripTimer=0;
  if(FIREBASE_ENABLED&&S.activeJob?.id){
    db.collection('jobs').doc(S.activeJob.id).update({status:'accepted'}).catch(()=>{});
    if(_driverId) db.collection('drivers').doc(_driverId).set({status:'ontrip'},{merge:true}).catch(()=>{});
  }
  go('active');
}

function declineJob(){
  clearInterval(S._cdTimer);
  S.jobOverlay=false;
  render();
}

function nextStep(){
  if(S.tripStep<5){S.tripStep++;}
  const stepNames={2:'en_route',3:'arrived',4:'onboard',5:'completed'};
  if(FIREBASE_ENABLED&&S.activeJob?.id){
    db.collection('jobs').doc(S.activeJob.id).update({tripStep:S.tripStep,status:stepNames[S.tripStep]||'active'}).catch(()=>{});
  }
  if(S.tripStep===4){
    clearInterval(S._tripTimerInterval);
    S._tripTimerInterval=setInterval(()=>{S.tripTimer++;const el=document.getElementById('trip-timer');if(el){const m=Math.floor(S.tripTimer/60);const s=S.tripTimer%60;el.textContent=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);}},1000);
  }
  if(S.tripStep===5){
    clearInterval(S._tripTimerInterval);
    if(FIREBASE_ENABLED&&_driverId) db.collection('drivers').doc(_driverId).set({status:'online'},{merge:true}).catch(()=>{});
    // Award 2% of job value as ApexCoin
    const jobPay=S.activeJob?.pay||0;
    const axcEarned=parseFloat((jobPay*0.02).toFixed(2));
    if(axcEarned>0){S.apexcoin=parseFloat((S.apexcoin+axcEarned).toFixed(2));S._axcHistory.unshift({desc:S.activeJob?.service||'Trip',type:'earn',amount:axcEarned,date:'Just now'});}
    S.activeJob=null;go('home');
  }
  else render();
}

function jobTag(type){
  const m={airport:'tag-blue ✈ Airport',hourly:'tag-gold ⏱ Hourly',day:'tag-purple ◈ Full Day'};
  const v=m[type]||'tag-gold Hourly';const[c,...r]=v.split(' ');
  return`<span class="tag ${c}">${r.join(' ')}</span>`;
}
function stars(r){return'★'.repeat(r)+'☆'.repeat(5-r);}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return(m<10?'0'+m:m)+':'+(sec<10?'0'+sec:sec);}

const pages={
login:()=>`<div style="min-height:100vh;background:#050505;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px 60px">
  <div style="text-align:center;margin-bottom:52px">
    <div style="font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:700;color:#D4A843;letter-spacing:10px;animation:logoReveal 1.4s cubic-bezier(.16,1,.3,1) .3s both">ApexVIP</div>
    <div style="font-size:11px;color:#555;letter-spacing:4px;margin-top:6px;animation:subtitleReveal 1.2s ease 1s both">DRIVER PORTAL</div>
  </div>
  <div style="width:100%;max-width:340px;animation:slideUp .6s cubic-bezier(.16,1,.3,1) 1.8s both">
    <div style="margin-bottom:14px"><label style="font-size:11px;color:#666;display:block;margin-bottom:6px;letter-spacing:1px">EMAIL</label><input type="email" value="driver@apexvip.com" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#f0ece4"/></div>
    <div style="margin-bottom:28px"><label style="font-size:11px;color:#666;display:block;margin-bottom:6px;letter-spacing:1px">PASSWORD</label><input type="password" value="driver123" style="background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1);color:#f0ece4"/></div>
    <button class="btn btn-gold" onclick="driverLogin()">Driver Sign In</button>
    <div style="margin-top:20px;background:rgba(255,255,255,.04);border-radius:10px;padding:12px 14px;font-size:12px;color:#444;text-align:center">driver@apexvip.com / driver123</div>
  </div>
</div>`,

home:()=>{
  const overlay=S.jobOverlay?`<div class="overlay">
    <div style="width:100%;max-width:360px;background:rgba(14,12,10,.96);border:1px solid var(--border);border-radius:24px;padding:28px;text-align:center;animation:scaleIn .3s ease;backdrop-filter:blur(20px)">
      <div class="section-label" style="margin-bottom:10px">New Job Request</div>
      <div style="position:relative;width:100px;height:100px;margin:0 auto 20px">
        <svg width="100" height="100" style="transform:rotate(-90deg)">
          <circle cx="50" cy="50" r="40" fill="none" stroke="var(--fg-faint)" stroke-width="5"/>
          <circle id="cd-ring" cx="50" cy="50" r="40" fill="none" stroke="#D4A843" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="${2*Math.PI*40}" stroke-dashoffset="${2*Math.PI*40*(1-S.countdown/30)}"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
          <div id="cd-num" style="font-size:28px;font-weight:800;color:#D4A843">${S.countdown}</div>
          <div style="font-size:10px;color:var(--fg-subtle)">sec</div>
        </div>
      </div>
      <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#D4A843,#8B6020);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;margin:0 auto 8px">SM</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">Sarah Mitchell</div>
      <div style="font-size:11px;color:var(--fg-dim);margin-bottom:16px">✈ Airport Transfer</div>
      ${[['Pickup','Mayfair W1K'],['Drop-off','Heathrow T5'],['In','45 minutes']].map(([l,v])=>`<div style="display:flex;justify-content:space-between;margin-bottom:7px;font-size:13px"><span style="color:var(--fg-dim)">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
      <div style="font-size:30px;font-weight:800;color:#D4A843;margin:16px 0 18px">£95.00</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-glass" style="flex:1;padding:13px" onclick="declineJob()">Decline</button>
        <button class="btn btn-green" style="flex:1;padding:13px" onclick="acceptJob()">Accept</button>
      </div>
    </div>
  </div>`:' ';

  return`<div style="min-height:100vh;position:relative">
    ${overlay}
    <div class="orb-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
    <div style="position:relative;z-index:1">
      <div class="screen">
        <div class="top-bar">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#D4A843,#8B6020);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#000">JH</div>
            <div>
              <div style="font-size:15px;font-weight:700">James Harrison</div>
              <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:${S.online?'#22c55e':'var(--fg-subtle)'}">
                <div style="width:6px;height:6px;border-radius:50%;background:${S.online?'#22c55e':'var(--fg-ghost)'}"></div>
                ${S.online?'Online · Looking for jobs':'Offline'}
              </div>
            </div>
          </div>

    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--divider)">
      <div style="min-width:52px;background:rgba(212,168,67,.08);border:1px solid rgba(212,168,67,.15);border-radius:8px;padding:4px 8px;text-align:center;font-size:12px;font-weight:800;color:#D4A843">${v}</div>
      <div style="font-size:13px;color:var(--fg-muted)">${d}</div>
    </div>`).join('')}
  </div>
  <div class="section-label" style="margin-bottom:12px">Recent</div>
  ${(S._axcHistory||[]).map(h=>`
  <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--divider)">
    <div style="width:36px;height:36px;border-radius:10px;background:${h.type==='earn'?'rgba(34,197,94,.07)':'rgba(212,168,67,.07)'};display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">${h.type==='earn'?'↑':'↓'}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:500">${h.desc}</div><div style="font-size:11px;color:var(--fg-subtle);margin-top:1px">${h.date}</div></div>
    <div style="font-size:14px;font-weight:700;color:${h.type==='earn'?'#22c55e':'var(--fg-dim)'}">+${h.amount.toFixed(2)} AXC</div>
  </div>`).join('')}
  <button class="btn btn-gold" style="margin-top:20px">Redeem as Cash</button>
  <div style="height:20px"></div>
</div>`,

documents:()=>`<div class="screen">
  <div class="back-row"><button class="back-btn" onclick="go('profile')">‹ Back</button></div>
  <div style="font-size:22px;font-weight:700;margin-bottom:20px">Documents</div>
  ${[
    ['Driver\'s Licence','Expires 14 Mar 2027'],
    ['Private Hire Licence','Expires 30 Jun 2025'],
    ['Insurance Certificate','Expires 31 Dec 2025'],
    ['DBS Check','Expires 15 Aug 2026'],
    ['Vehicle Registration','Expires 22 Nov 2025'],
    ['PCO Badge','Expires 30 Jun 2025'],
  ].map(([name,exp])=>`<div class="card" style="display:flex;align-items:center;gap:14px">
    <div style="width:40px;height:40px;border-radius:50%;background:rgba(34,197,94,.1);border:1.5px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#22c55e;font-size:16px;font-weight:700">✓</div>
    <div style="flex:1">
      <div style="font-size:14px;font-weight:600">${name}</div>
      <div style="font-size:12px;color:#22c55e;margin-top:3px">Verified · ${exp}</div>
    </div>
    <button style="background:var(--surface-c);border:1px solid var(--border);color:var(--fg-dim);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer">Upload</button>
  </div>`).join('')}
</div>`,
};

function render(){
  if(S.screen==='axc-wallet'){document.getElementById('app').innerHTML=pages.axcWallet();return;}
  const fn=pages[S.screen]||pages.login;
  document.getElementById('app').innerHTML=fn();
}

render();
</script>
</body>
</html>
