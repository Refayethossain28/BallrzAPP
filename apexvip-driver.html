<style>

@keyframes orbDrift1{from{transform:translate(0,0) scale(1)}to{transform:translate(60px,40px) scale(1.14)}}
@keyframes orbDrift2{from{transform:translate(0,0) scale(1.06)}to{transform:translate(-70px,-50px) scale(.9)}}
@keyframes orbDrift3{from{transform:translate(0,0) scale(1)}to{transform:translate(50px,-60px) scale(1.1)}}
@keyframes logoReveal{

  40%{opacity:.25;filter:blur(3px)}

}
@keyframes subtitleReveal{0%{opacity:0;letter-spacing:10px}100%{opacity:1;letter-spacing:6px}}

@keyframes diamondShimmer{0%{background-position:250% center}100%{background-position:-250% center}}

<script>
// ── UI utilities ───────────────────────────────────────────────────────
function showToast(msg,type='info',dur=3200){
  let c=document.getElementById('toast-container');
  if(!c){c=document.createElement('div');c.id='toast-container';document.body.appendChild(c);}
  const icons={success:'✓',error:'✕',info:'✦'};
  const t=document.createElement('div');
  t.className=`toast ${type}`;
  t.innerHTML=`<span style="font-size:14px">${icons[type]||'✦'}</span>${msg}`;
  c.appendChild(t);
  const dismiss=()=>{if(!t.parentNode)return;t.classList.add('out');t.addEventListener('animationend',()=>t.remove(),{once:true});};
  t._timer=setTimeout(dismiss,dur);
  t.addEventListener('click',()=>{clearTimeout(t._timer);dismiss();});
}
function haptic(style){
  if(navigator.vibrate){const p={light:[8],medium:[20],heavy:[35],success:[10,40,20],error:[30,50,30]};navigator.vibrate(p[style]||p.light);}
}
function addRipple(btn,e){
  btn.classList.add('ripple-host');
  const r=document.createElement('span');r.className='ripple-el';
  const rect=btn.getBoundingClientRect();
  r.style.left=(e.clientX-rect.left)+'px';r.style.top=(e.clientY-rect.top)+'px';
  btn.appendChild(r);r.addEventListener('animationend',()=>r.remove(),{once:true});
}

// ── Firebase init ──────────────────────────────────────────────────────
let auth, db, fns, storage, FIREBASE_ENABLED = false, _driverId = null;
let _gpsInterval = null;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    const _fbApp = firebase.apps.length ? firebase.app() : firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth(_fbApp);
    db = firebase.firestore(_fbApp);
    fns = firebase.functions(_fbApp);
    storage = firebase.storage(_fbApp);
    FIREBASE_ENABLED = true;
    // Auto-restore session if driver was previously logged in
    auth.onAuthStateChanged(async user => {
      if(user && S.screen === 'login'){
        const doc = await db.collection('users').doc(user.uid).get().catch(()=>null);
        const isDriver = !doc || !doc.exists || doc.data().role === 'driver';
        if(isDriver){
          _driverId = user.uid;
          setupDriverListeners(user.uid);
          go('home');
        }
      }
    });
  }
} catch(e) { console.warn('Firebase init:', e.message); }

function track(event, props){
  try{
    const ev={event,ts:Date.now(),...props};
    const key='apexvip_events';
    const arr=JSON.parse(localStorage.getItem(key)||'[]');
    arr.push(ev);
    if(arr.length>2000) arr.splice(0,arr.length-2000);
    localStorage.setItem(key,JSON.stringify(arr));
    if(FIREBASE_ENABLED) db.collection('analytics').add(ev).catch(()=>{});
  }catch(e){}
}

function getClientPreferences(clientId, structuredPrefs) {
  // Prefer structured prefs from the booking document (set by client in Preferences screen)
  if (structuredPrefs && typeof structuredPrefs === 'object') {
    const lines = [];
    const tempMap = { cool: 'Prefers cool cabin — set A/C to 18°C', neutral: 'Neutral cabin temperature preferred', warm: 'Prefers warm cabin — set A/C to 22°C' };
    const musicMap = { jazz: 'Jazz music preferred — keep low volume', classical: 'Classical music preferred — keep low volume', pop: 'Pop/contemporary music preferred', 'hip-hop': 'Hip-hop preferred', silence: 'Silence preferred — no music please' };
    const convoMap = { friendly: 'Client enjoys friendly conversation', professional: 'Professional manner only — no small talk', silent: 'Silent journey — do not initiate conversation' };
    const paperMap = { ft: 'FT (Financial Times) preferred', times: 'The Times preferred', telegraph: 'The Telegraph preferred', none: 'No newspaper required' };
    if (tempMap[structuredPrefs.temperature]) lines.push(tempMap[structuredPrefs.temperature]);
    if (musicMap[structuredPrefs.music]) lines.push(musicMap[structuredPrefs.music]);
    if (convoMap[structuredPrefs.convo]) lines.push(convoMap[structuredPrefs.convo]);
    if (paperMap[structuredPrefs.newspaper]) lines.push(paperMap[structuredPrefs.newspaper]);
    if (structuredPrefs.discrete) lines.push('⚡ Discrete mode — confirm pickup location only at collection point');
    if (lines.length > 0) return lines;
  }
  // Fallback: check legacy stored prefs
  const stored = JSON.parse(localStorage.getItem('apexvip_client_prefs_' + (clientId||'demo')) || 'null');
  if (stored) return stored;
  // Default luxury preferences
  return [
    'Prefers still water — have ready before pickup',
    'Silence preferred — no music unless requested',
    'Non-stop route — no radio, no calls in car',
    'Assist with luggage on arrival',
    'Regular client — 12 previous journeys',
  ];
}

function setupDriverListeners(uid){
  // Live driver document statuses
  db.collection('drivers').doc(uid).onSnapshot(snap=>{
    if(snap.exists) S._driverDocs = snap.data().documents || {};
    const el = document.getElementById('docs-list');
    if(el) renderDocsList();
  });
  // Load driver profile into state and publish to dispatch list
  db.collection('users').doc(uid).get().then(u=>{
    const p=u.exists?u.data():{};
    const name=p.name||p.displayName||'Driver';
    const initials=name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)||'DR';
    S.profile={
      name,initials,
      vehicle:p.vehicle||'',
      model:p.vehicleModel||p.vehicle||'',
      reg:p.reg||'',
      rating:p.rating||4.9,
      trips:p.trips||0,
      market:p.market||'london'
    };
    db.collection('drivers').doc(uid).set({
      name,vehicle:S.profile.model||S.profile.vehicle,
      model:S.profile.model||S.profile.vehicle,
      reg:S.profile.reg,rating:S.profile.rating,role:'driver'
    },{merge:true}).catch(()=>{});
    render();
  }).catch(()=>{});
  db.collection('jobs').where('driverId','==',uid).where('status','in',['pending','accepted','en_route','arrived','onboard'])
    .onSnapshot(snap=>{
      // Live jobs from Firestore replace the demo list entirely
      JOBS.length=0;
      snap.docs.forEach(d=>JOBS.push(mapJob(d)));
      // New pending job and driver is idle → ring the job offer overlay
      const pending=JOBS.find(j=>j.status==='pending');
      if(pending&&!S.jobOverlay&&!S.activeJob){
        S._offeredJob=pending;
        S.jobOverlay=true;S.countdown=30;startCountdown();
      }
      // Resume an in-progress job after app reload
      if(!S.activeJob){
        const inProgress=JOBS.find(j=>['accepted','en_route','arrived','onboard'].includes(j.status));
        if(inProgress){S.activeJob=inProgress;S.tripStep={accepted:2,en_route:2,arrived:3,onboard:4}[inProgress.status]||2;}
      }
      render();
    },()=>{});

  // Broadcast dispatch: open jobs are offered to every online driver at once.
  // First driver to accept claims it via a transaction.
  const market = S.driverProfile?.market || S.profile?.market || 'london';
  db.collection('open_jobs').where('status','==','open').where('market','==',market)
    .onSnapshot(snap=>{
      const open=snap.docs.map(d=>({_openId:d.id,_broadcast:true,bookingDocId:d.data().bookingDocId||'',bookingRef:d.data().bookingRef||'',
        type:d.data().type||'airport',client:d.data().clientName||'Client',
        initials:(d.data().clientName||'CL').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2),
        service:d.data().serviceLabel||'Airport Transfer',pickup:d.data().pickup||'',
        dropoff:d.data().dropoff||'',time:d.data().time||'Now',
        pay:d.data().pay||95,flight:d.data().flight||'',notes:d.data().notes||'',
        vehicle:d.data().vehicle||'S-Class',status:'pending'}));
      S._openJobs=open;
      // If the job we're ringing got claimed by another driver, stand down
      if(S.jobOverlay&&S._offeredJob?._broadcast&&!open.find(j=>j._openId===S._offeredJob._openId)){
        clearInterval(S._cdTimer);S.jobOverlay=false;S._offeredJob=null;
        showToast('That job was taken by another driver','error');haptic('error');
        render();return;
      }
      // Ring the offer for online, idle drivers
      if(open.length&&S.online&&!S.jobOverlay&&!S.activeJob){
        S._offeredJob=open[0];
        S.jobOverlay=true;S.countdown=30;startCountdown();render();
      }
    },()=>{});
}

// First-to-accept claim — the transaction guarantees only one driver wins
async function claimBroadcastJob(job){
  try{
    await db.runTransaction(async tx=>{
      const ref=db.collection('open_jobs').doc(job._openId);
      const doc=await tx.get(ref);
      if(!doc.exists||doc.data().status!=='open')throw new Error('taken');
      tx.update(ref,{status:'claimed',driverId:_driverId,claimedAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    // Won the race — take ownership of the booking and create our job doc
    const me=await db.collection('drivers').doc(_driverId).get();
    const p=me.exists?me.data():{};
    if(job.bookingDocId){
      db.collection('bookings').doc(job.bookingDocId).update({
        driverId:_driverId,driverName:p.name||'Driver',
        driverPlate:p.reg||'',status:'accepted',
        assignedAt:firebase.firestore.FieldValue.serverTimestamp()
      }).catch(()=>{});
    }
    const jobDoc=await db.collection('jobs').add({
      driverId:_driverId,bookingRef:job.bookingRef,bookingDocId:job.bookingDocId,
      clientId:job.clientId||'',clientName:job.client||'',
      type:job.type||'airport',serviceLabel:job.service||'Airport Transfer',
      pickup:job.pickup,dropoff:job.dropoff,
      date:job.date||'',time:job.time||'',vehicle:job.vehicle,pay:job.pay,
      flight:job.flight||'',notes:job.notes||'',market:job.market||'london',
      status:'accepted',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    return {...job,id:jobDoc.id};
  }catch(e){
    return null; // lost the race
  }
}

// Mirror trip status onto the linked booking so the client app sees it live.
// Prefer the direct doc ID — a where('ref'…) query without a driverId filter
// is rejected by Firestore security rules.
function syncBookingStatus(job,status,extra){
  if(!FIREBASE_ENABLED)return;
  const patch={status,...(extra||{})};
  if(job?.bookingDocId){
    db.collection('bookings').doc(job.bookingDocId).update(patch).catch(()=>{});
  }else if(job?.bookingRef&&_driverId){
    db.collection('bookings').where('ref','==',job.bookingRef).where('driverId','==',_driverId).limit(1).get()
      .then(snap=>{if(!snap.empty)snap.docs[0].ref.update(patch).catch(()=>{});})
      .catch(()=>{});
  }
}

async function doUploadDoc(type, input){
  const file = input.files[0];
  if(!file||!_driverId||!FIREBASE_ENABLED) return;
  if(file.size > 10*1024*1024){ alert('File too large — max 10 MB'); return; }
  if(!S._docProgress) S._docProgress = {};
  S._docProgress[type] = 0;
  renderDocsList();
  try{
    const path = `driver-docs/${_driverId}/${type}/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'')}`;
    const ref = storage.ref(path);
    const task = ref.put(file);
    task.on('state_changed', snap=>{
      S._docProgress[type] = Math.round(snap.bytesTransferred/snap.totalBytes*100);
      renderDocsList();
    });
    await task;
    const url = await ref.getDownloadURL();
    await db.collection('drivers').doc(_driverId).set({
      documents: { [type]: { url, status:'pending', uploadedAt: new Date().toISOString().slice(0,10), fileName: file.name } }
    },{merge:true});
    S._docProgress[type] = null;
    renderDocsList();
  }catch(e){
    S._docProgress[type] = null;
    renderDocsList();
    alert('Upload failed: ' + (e.message||e.code||JSON.stringify(e)));
    console.warn('Doc upload failed:', e);
  }
  input.value='';
}

async function registerDriverFCM(){
  if(!FIREBASE_ENABLED||!_driverId) return;
  try{
    if(!('Notification' in window)) return;
    const perm = await Notification.requestPermission();
    if(perm !== 'granted') return;
    if('serviceWorker' in navigator){
      const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
      const messaging = firebase.messaging();
      const token = await messaging.getToken({
        vapidKey: (typeof APEXVIP_VAPID_KEY !== 'undefined' && APEXVIP_VAPID_KEY ? APEXVIP_VAPID_KEY : ''),
        serviceWorkerRegistration: reg
      });
      if(token){
        await db.collection('fcm_tokens').doc(_driverId).set({
          token, role:'driver', updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        });
      }
    }
  }catch(e){ console.warn('Driver FCM registration failed:', e.message); }
}

function goOnline(){
  S.online=!S.online;
  haptic(S.online?'success':'medium');
  showToast(S.online?'You are now online — accepting jobs':'You are now offline','info');
  const _onTs=Date.now(); track(S.online?'driver_online':'driver_offline',{ts:_onTs,src:'driver'});
  if(FIREBASE_ENABLED&&_driverId){
    db.collection('drivers').doc(_driverId).set({status:S.online?'online':'offline'},{merge:true}).catch(()=>{});
    if(S.online){ startGPSStream(); registerDriverFCM(); }
    else stopGPSStream();
  }
  if(!S.online){clearTimeout(S._timer);render();return;}
  // Coming online — first check the in-memory list from the listener
  if(FIREBASE_ENABLED&&S._openJobs?.length&&!S.jobOverlay&&!S.activeJob){
    S._offeredJob=S._openJobs[0];
    S.jobOverlay=true;S.countdown=30;startCountdown();render();return;
  }
  if(FIREBASE_ENABLED){
    // Listener may not have fired yet — do a one-shot query so we never miss a job
    db.collection('open_jobs').where('status','==','open').get().then(snap=>{
      if(!S.online||S.jobOverlay||S.activeJob)return;
      const open=snap.docs.map(d=>({_openId:d.id,_broadcast:true,
        bookingDocId:d.data().bookingDocId||'',bookingRef:d.data().bookingRef||'',
        type:d.data().type||'airport',client:d.data().clientName||'Client',
        initials:(d.data().clientName||'CL').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2),
        service:d.data().serviceLabel||'Airport Transfer',pickup:d.data().pickup||'',
        dropoff:d.data().dropoff||'',time:d.data().time||'Now',
        pay:d.data().pay||95,flight:d.data().flight||'',notes:d.data().notes||'',
        vehicle:d.data().vehicle||'S-Class',status:'pending'}));
      if(open.length){S._openJobs=open;S._offeredJob=open[0];S.jobOverlay=true;S.countdown=30;startCountdown();render();}
    }).catch(()=>{});
    render();
  } else {
    // Demo mode — simulate a job offer after 3 s
    S._timer=setTimeout(()=>{S._offeredJob=JOBS[0];S.jobOverlay=true;S.countdown=30;startCountdown();render();},3000);
    render();
  }
}

function startCountdown(){
  clearInterval(S._cdTimer);
  S._cdTimer=setInterval(()=>{
    S.countdown--;
    const el=document.getElementById('cd-num');
    if(el)el.textContent=S.countdown;
    const ring=document.getElementById('cd-ring');
    if(ring){const pct=S.countdown/30;const circ=2*Math.PI*40;ring.style.strokeDashoffset=circ*(1-pct);}
    if(S.countdown<=0){declineJob();}
  },1000);
}

async function acceptJob(){
  haptic('success');
  clearInterval(S._cdTimer);
  const offered=S._offeredJob||JOBS[0];
  // Broadcast job: race against other drivers — transaction decides the winner
  if(FIREBASE_ENABLED&&offered?._broadcast){
    const won=await claimBroadcastJob(offered);
    S.jobOverlay=false;S._offeredJob=null;
    if(!won){
      showToast('That job was taken by another driver','error');haptic('error');
      render();return;
    }
    S.activeJob=won;S.tripStep=2;S.tripTimer=0;
    if(_driverId) db.collection('drivers').doc(_driverId).set({status:'ontrip'},{merge:true}).catch(()=>{});
    startGPSStream();
    go('active');return;
  }
  S.jobOverlay=false;
  S.activeJob=offered;
  S._offeredJob=null;
  S.tripStep=2;
  S.tripTimer=0;
  if(FIREBASE_ENABLED&&S.activeJob?.id){
    db.collection('jobs').doc(S.activeJob.id).update({status:'accepted'}).catch(()=>{});
    syncBookingStatus(S.activeJob,'accepted');
    if(_driverId) db.collection('drivers').doc(_driverId).set({status:'ontrip'},{merge:true}).catch(()=>{});
  }
  startGPSStream();
  go('active');
}

function declineJob(){
  clearInterval(S._cdTimer);
  S.jobOverlay=false;
  track('job_declined',{src:'driver'});
  render();
}

function refreshJobs(){
  if(!FIREBASE_ENABLED)return;
  showToast('Checking for new jobs…','info',2000);
  db.collection('open_jobs').where('status','==','open').get().then(snap=>{
    const open=snap.docs.map(d=>({_openId:d.id,_broadcast:true,bookingDocId:d.data().bookingDocId||'',bookingRef:d.data().bookingRef||'',
      type:d.data().type||'airport',client:d.data().clientName||'Client',
      initials:(d.data().clientName||'CL').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2),
      service:d.data().serviceLabel||'Airport Transfer',pickup:d.data().pickup||'',
      dropoff:d.data().dropoff||'',time:d.data().time||'Now',
      pay:d.data().pay||95,flight:d.data().flight||'',notes:d.data().notes||'',
      vehicle:d.data().vehicle||'S-Class',status:'pending'}));
    S._openJobs=open;
    showToast(open.length?`${open.length} job${open.length!==1?'s':''} available`:'No open jobs right now',open.length?'success':'info');
    if(open.length&&S.online&&!S.jobOverlay&&!S.activeJob){
      S._offeredJob=open[0];S.jobOverlay=true;S.countdown=30;startCountdown();
    }
    render();
  }).catch(e=>{showToast('Could not reach server','error');render();});
}

async function claimAndActivate(openJobId){
  const job=S._openJobs?.find(j=>j._openId===openJobId);
  if(!job)return;
  S._offeredJob=job;
  const won=await claimBroadcastJob(job);
  if(!won){showToast('Job already taken','error');haptic('error');render();return;}
  S.activeJob=won;S.jobOverlay=false;S._offeredJob=null;S.tripStep=2;S.tripTimer=0;
  if(FIREBASE_ENABLED&&won.id){
    db.collection('jobs').doc(won.id).update({status:'accepted'}).catch(()=>{});
    syncBookingStatus(won,'accepted');
    if(_driverId) db.collection('drivers').doc(_driverId).set({status:'ontrip'},{merge:true}).catch(()=>{});
  }
  startGPSStream();go('active');
}

let _interiorObjectURL=null;
let _interiorUploadURL=null;

function handleInteriorPhoto(input){
  const file=input.files[0];
  if(!file)return;
  if(_interiorObjectURL)URL.revokeObjectURL(_interiorObjectURL);
  _interiorObjectURL=URL.createObjectURL(file);
  _interiorUploadURL=null;
  const preview=document.getElementById('interior-preview');
  const img=document.getElementById('interior-img');
  const status=document.getElementById('interior-upload-status');
  const cameraBtn=document.getElementById('interior-camera-btn');
  const confirmBtn=document.getElementById('interior-confirm-btn');
  if(preview)preview.style.display='block';
  if(img)img.src=_interiorObjectURL;
  if(cameraBtn)cameraBtn.textContent='📷  Retake Photo';
  if(confirmBtn)confirmBtn.style.display='block';
  if(status)status.innerHTML='<span style="animation:pulse 1s infinite;color:var(--gold)">⬆</span> Uploading…';

  // Upload to Firebase Storage
  if(FIREBASE_ENABLED&&_driverId){
    const jobId=S.activeJob?.id||'nojob';
    const path=`driver-docs/${_driverId}/interior/${jobId}-${Date.now()}.jpg`;
    const ref=firebase.storage().ref(path);
    ref.put(file).then(snap=>snap.ref.getDownloadURL()).then(url=>{
      _interiorUploadURL=url;
      if(status)status.innerHTML='<span style="color:#22c55e">✓</span> Photo saved securely';
      // Store URL on the job document immediately
      if(S.activeJob?.id){
        db.collection('jobs').doc(S.activeJob.id).update({interiorPhotoUrl:url,interiorPhotoAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
      }
    }).catch(e=>{
      if(status)status.innerHTML='<span style="color:#f87171">⚠ Upload failed — photo saved locally</span>';
      console.warn('Interior photo upload:',e.message);
    });
  }else{
    if(status)status.innerHTML='<span style="color:var(--fg-dim)">Demo mode — photo not uploaded</span>';
  }
}

function confirmInteriorPhoto(){
  _closeInteriorOverlay();
  _advanceStep();
}

function skipInteriorPhoto(){
  if(!confirm('Skip the interior photo? This is not recommended — it protects you in case of a complaint.'))return;
  _closeInteriorOverlay();
  _advanceStep();
}

function _closeInteriorOverlay(){
  const el=document.getElementById('interior-overlay');
  if(el)el.remove();
}

function _advanceStep(){
  if(S.tripStep<5){S.tripStep++;}
  const stepNames={2:'en_route',3:'arrived',4:'onboard',5:'completed'};
  if(FIREBASE_ENABLED&&S.activeJob?.id){
    db.collection('jobs').doc(S.activeJob.id).update({tripStep:S.tripStep,status:stepNames[S.tripStep]||'active'}).catch(()=>{});
    if(S.tripStep<5) syncBookingStatus(S.activeJob,stepNames[S.tripStep]||'active');
  }
  if(S.tripStep===4){
    clearInterval(S._tripTimerInterval);
    S._tripTimerInterval=setInterval(()=>{S.tripTimer++;const el=document.getElementById('trip-timer');if(el){const m=Math.floor(S.tripTimer/60);const s=S.tripTimer%60;el.textContent=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);}},1000);
  }
  if(S.tripStep===5){
    stopGPSStream();
    clearInterval(S._tripTimerInterval);
    if(FIREBASE_ENABLED&&_driverId) db.collection('drivers').doc(_driverId).set({status:'online'},{merge:true}).catch(()=>{});
    if(FIREBASE_ENABLED&&S.activeJob?.id){
      db.collection('jobs').doc(S.activeJob.id).update({status:'completed',completedAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
      syncBookingStatus(S.activeJob,'completed',{completedAt:firebase.firestore.FieldValue.serverTimestamp()});
    }
    // Award 2% of job value as ApexCoin
    const jobPay=S.activeJob?.pay||0;
    const axcEarned=parseFloat((jobPay*0.02).toFixed(2));
    if(axcEarned>0){S.apexcoin=parseFloat((S.apexcoin+axcEarned).toFixed(2));S._axcHistory.unshift({desc:S.activeJob?.service||'Trip',type:'earn',amount:axcEarned,date:'Just now'});}
    track('trip_completed',{pay:jobPay,axc:axcEarned,duration:S.tripTimer,src:'driver'});
    S._lastCompletedJob=S.activeJob;
    S.activeJob=null;go('trip-complete');
  }
  else render();
}

function toggleErrand(jobId,idx){
  S.errandsDone=S.errandsDone||{};
  const k=jobId+':'+idx;
  S.errandsDone[k]=!S.errandsDone[k];

async function submitPayoutRequest() {
  const amount = parseFloat(document.getElementById('payout-amount')?.value || 0);
  const bankName = document.getElementById('payout-bank')?.value?.trim() || '';
  const accountNumber = document.getElementById('payout-acc')?.value?.trim() || '';
  const sortCode = document.getElementById('payout-sort')?.value?.trim() || '';
  if (!amount || !bankName || !accountNumber || !sortCode) {
    alert('Please fill in all fields'); return;
  }
  if (FIREBASE_ENABLED && _driverId) {
    try {
      const me = await db.collection('drivers').doc(_driverId).get();
      const driverName = me.exists ? (me.data().name || 'Driver') : 'Driver';
      await db.collection('payout_requests').add({
        driverId: _driverId, driverName, amount, bankName, accountNumber, sortCode,
        status: 'pending',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch(e) { alert('Could not submit: ' + e.message); return; }
  }
  S._payoutSent = true;
  render();
}

// ── ApexAI Driver Assistant ───────────────────────────────────────────────
function driverAIQuick(text){
  const inp=document.getElementById('ai-inp');
  if(inp){inp.value=text;}
  sendDriverAI();
}

function _driverAILocal(msg){
  const m=msg.toLowerCase();
  // Route / traffic
  if(/heathrow|m4|m25|a316|a30/i.test(m))
    return "For Heathrow from central London I'd recommend the A4/M4 via Chiswick. Check Waze before you leave — the M25 J15 slip can queue during peak hours. Allow 55 min from Mayfair in normal conditions, 75 min during rush hour.";
  if(/gatwick|m23|a23/i.test(m))
    return "For Gatwick, take the A23/M23 via Streatham. From Mayfair allow 70–80 min in normal traffic, up to 100 min peak. Drop-off at the South Terminal forecourt or North Terminal set-down lanes. Avoid Vauxhall Bridge during rush hour.";
  if(/stansted/i.test(m))
    return "Stansted is best via the M11. From central London allow 70 min off-peak, 90+ during rush hour. Use the M11 J8a for the terminal — drop-off is directly in front of departures.";
  if(/city airport|london city/i.test(m))
    return "London City Airport is quick — 30–40 min from the City via the A13. Best drop-off is the main entrance on Hartmann Road. Watch for bus lane cameras on the Commercial Road.";
  // Parking / waiting
  if(/wait|park|ritz/i.test(m)&&/ritz|piccadilly/i.test(m))
    return "For The Ritz, the best legal wait spot is Arlington Street (off St James's Street) — free for 20 min. Alternatively use the NCP on Brick Street off Park Lane. The Ritz concierge will send the client to you.";
  if(/annabel|berkeley/i.test(m))
    return "For Annabel's in Berkeley Square, pull up on the east side of Berkeley Square (permitted set-down). If waiting, use the pay-and-display on Davies Street or Park Street. The square itself is no-stopping.";
  if(/nobu|park lane/i.test(m))
    return "Nobu at 15 Berkeley Street — set-down on Berkeley Street itself (short stay permitted). For waiting, Hyde Park Corner underground car park is 5 min walk, or pull into Waverton Street off Berkeley Square.";
  if(/savoy/i.test(m))
    return "The Savoy has its own forecourt on Savoy Court (one-way, off the Strand). Pull in confidently — there's a concierge. If waiting, Victoria Embankment has permit bays on the eastern end.";
  // Client situations
  if(/cancel|last.?minute/i.test(m))
    return "For last-minute cancellations: remain professional and polite. If the job was dispatched and you're already en route, you're entitled to a cancellation fee per the terms. Log it in the app under the job details and notify ApexVIP dispatch.";
  if(/change.*destination|mid.?trip|change.*drop/i.test(m))
    return "If a client wants to change the destination mid-trip: confirm the new address, update the route on Waze, and notify dispatch via the job notes. If the new destination is significantly further, the fare will adjust automatically. Simply say 'Of course — I'll update the route now.'";
  if(/difficult|complaint|rude|unhappy/i.test(m))
    return "Stay calm and professional. Acknowledge their concern: 'I understand, and I apologise for any inconvenience.' Never argue. If the situation escalates, pull over safely and call ApexVIP dispatch on the priority line. Document everything in the job notes afterward.";
  if(/tip|gratuity/i.test(m))
    return "Never ask for or hint at a tip — it's against ApexVIP standards. If a client offers cash, you may accept graciously. In-app tipping is built into the payment flow and the client will be prompted automatically.";
  // Flight delay
  if(/delay|delayed|flight/i.test(m))
    return "For flight delays, the app tracks the flight automatically and adjusts your pickup window. If you receive a delay notification: stay at the designated meeting point, update the client via the in-app message, and wait up to 60 min from actual landing at no extra charge. After 60 min, standard waiting rates apply.";
  // Earnings
  if(/earn|money|pay|income|week|today/i.test(m)){
    const hist=HISTORY||[];
    const today=hist.filter(h=>h.date==='Today');
    const todayTotal=today.reduce((a,h)=>a+(h.pay||0),0);
    return todayTotal>0
      ? `Today you've completed ${today.length} trip${today.length!==1?'s':''} totalling £${todayTotal}. Check the Earnings tab for a full breakdown by week and month. Your current ApexCoin balance is ${S.apexcoin.toFixed(2)} AXC.`
      : "Open the Earnings tab for a full breakdown. Your ApexCoin balance is "+S.apexcoin.toFixed(2)+" AXC. Coins are earned at 2% of each fare and can be redeemed for fuel vouchers and vehicle servicing.";
  }
  // London knowledge
  if(/drop.?off|best.*entrance|entrance/i.test(m))
    return "Here are the best drop-off points for top London venues:\n• Claridge's — Brook Street entrance (concierge will greet)\n• The Shard — St Thomas Street set-down\n• Royal Opera House — Bow Street (avoid Floral Street)\n• Harrods — Hans Crescent side entrance for VIPs\n• Sketch — Conduit Street front door";
  // App help
  if(/status|online|offline|go online/i.test(m))
    return "Tap the toggle on your Home screen to switch between Online and Offline. When Online, you'll receive job offers via the dispatch overlay. Your GPS location is broadcast to the dispatch system when Online — make sure location permissions are enabled.";
  if(/document|upload|licence|insurance/i.test(m))
    return "Go to Profile → Documents to upload or update your PCO licence, DBS check, insurance certificate and vehicle registration. Documents are reviewed by the ApexVIP team within 24 hours. You must have all documents approved before going live.";
  // Default
  return "I'm your ApexVIP driver assistant — I can help with London routes and parking, client handling, earnings queries, and app guidance. What would you like to know?";
}

async function sendDriverAI(){
  const inp=document.getElementById('ai-inp');
  const text=(inp?.value||'').trim();
  if(!text||S._aiLoading)return;
  inp.value='';
  if(inp)inp.style.height='auto';
  S._aiMsgs.push({role:'user',content:text});
  S._aiLoading=true;
  render();
  document.getElementById('ai-bottom')?.scrollIntoView({behavior:'smooth'});

  let reply='';
  if(FIREBASE_ENABLED&&fns){
    try{
      const fn=fns.httpsCallable('parseBookingIntent');
      const res=await fn({message:text,mode:'driver',context:{
        driverName:S.profile?.name||'Driver',
        vehicle:S.profile?.vehicle||'S-Class',
        apexcoin:S.apexcoin,
        online:S.online,
      }});
      reply=res.data?.reply||res.data?.message||_driverAILocal(text);
    }catch(e){reply=_driverAILocal(text);}
  }else{
    await new Promise(r=>setTimeout(r,600));
    reply=_driverAILocal(text);
  }

  S._aiLoading=false;
  S._aiMsgs.push({role:'assistant',content:reply});
  render();
  setTimeout(()=>document.getElementById('ai-bottom')?.scrollIntoView({behavior:'smooth'}),60);
}

function render(){
  document.body.setAttribute('data-screen',S.screen);
  if(S.screen==='axc-wallet'){document.getElementById('app').innerHTML=pages.axcWallet();return;}
  const fn=pages[S.screen]||pages.login;
  document.getElementById('app').innerHTML=fn();
}

render();
