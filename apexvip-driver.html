<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>ApexVIP Driver</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.screen{padding:0 20px 100px;min-height:100vh;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 20px rgba(34,197,94,0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
.card{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px;margin-bottom:12px}
.btn{width:100%;padding:15px;border-radius:10px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-gold{background:#C9A84C;color:#000}
.btn-green{background:#22c55e;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-outline{background:transparent;border:1.5px solid #C9A84C;color:#C9A84C}
.btn-dark{background:#1a1a1a;border:1px solid rgba(255,255,255,.12);color:#ccc}
input{width:100%;padding:14px 16px;background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:16px;outline:none;font-family:inherit}
input:focus{border-color:#C9A84C}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#111;border-top:1px solid rgba(255,255,255,.08);display:flex;padding:8px 0 28px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:#444;font-size:10px;padding:6px 0}
.nav-item.active{color:#C9A84C}
.tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:14px;color:#555;border-bottom:2px solid transparent}
.tab.active{color:#C9A84C;border-bottom-color:#C9A84C}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:22px 0 10px}
.back-btn{background:none;border:none;color:#C9A84C;font-size:15px;cursor:pointer;padding:20px 0 10px;display:flex;align-items:center;gap:6px;font-family:inherit;font-weight:500}
.badge{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.b-airport{background:rgba(59,130,246,.15);color:#3b82f6}
.b-hourly{background:rgba(201,168,76,.15);color:#C9A84C}
.b-day{background:rgba(168,85,247,.15);color:#a855f7}
.b-confirmed{background:rgba(34,197,94,.15);color:#22c55e}
.menu-row{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}
.menu-row:last-child{border-bottom:none}
.divider{height:1px;background:rgba(255,255,255,.06);margin:12px 0}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.stepper{display:flex;align-items:center;margin-bottom:20px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-line-h{flex:1;height:2px;background:rgba(255,255,255,.1);margin-top:-14px}
.bar-row{display:flex;align-items:flex-end;gap:6px;height:80px;margin:12px 0}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-fill{border-radius:4px 4px 0 0;background:#C9A84C;width:100%;opacity:.8}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase init ──────────────────────────────────────────────────────
let auth, db, FIREBASE_ENABLED = false, _driverId = null;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth();
    db = firebase.firestore();
    FIREBASE_ENABLED = true;
  }
} catch(e) { console.warn('Firebase init:', e.message); }

let JOBS=[
  {id:'J1',type:'airport',client:'Sarah M.',initials:'SM',service:'Airport Transfer',pickup:'Mayfair W1K',dropoff:'Heathrow Terminal 5',time:'In 45 min',pay:95,flight:'BA0247',notes:'1 passenger, 2 bags',vehicle:'S-Class'},
  {id:'J2',type:'hourly',client:'Robert C.',initials:'RC',service:'By the Hour (4hrs)',pickup:'Canary Wharf E14',dropoff:'Various',time:'Tomorrow 10:00',pay:260,notes:'Business meetings, multiple stops',vehicle:'S-Class'},
  {id:'J3',type:'airport',client:'Emma W.',initials:'EW',service:'Airport Transfer',pickup:'Knightsbridge SW1',dropoff:'Gatwick North Terminal',time:'Today 16:30',pay:195,flight:'EZY1234',notes:'2 passengers, 4 bags',vehicle:'S-Class'},
];
const HISTORY=[
  {id:'H1',service:'Airport Transfer',pickup:'Heathrow T5',dropoff:'Mayfair',date:'Today',duration:'55 min',pay:95,rating:5},
  {id:'H2',service:'By the Hour (2hr)',pickup:'Mayfair',dropoff:'Mayfair',date:'Today',duration:'2hr',pay:130,rating:5},
  {id:'H3',service:'Airport Transfer',pickup:'Knightsbridge',dropoff:'Heathrow T3',date:'Yesterday',duration:'50 min',pay:185,rating:4},
  {id:'H4',service:'Airport Transfer',pickup:'Chelsea',dropoff:'Stansted',date:'Yesterday',duration:'65 min',pay:195,rating:5},
  {id:'H5',service:'Airport Transfer',pickup:'Belgravia',dropoff:'City Airport',date:'Monday',duration:'40 min',pay:125,rating:5},
];
const WEEK_DATA=[180,240,0,310,420,380,190];
const WEEK_LABELS=['Mon','Tue','Wed','Thu','Fri','Sat','Today'];

let S={
  screen:'login',
  online:false,
  jobOverlay:false,
  countdown:30,
  activeJob:null,
  tripStep:1,
  tripTimer:0,
  _timer:null,
  _cdTimer:null,
  _tripTimerInterval:null,
  histTab:'week',
  earnTab:'today',
  jobsTab:'available',
};

function go(s){S.screen=s;render();window.scrollTo(0,0);}

async function driverLogin(){
  if(!FIREBASE_ENABLED){go('home');return;}
  const email=document.querySelector('input[type=email]')?.value||'';
  const pass=document.querySelector('input[type=password]')?.value||'';
  try{
    const cred=await auth.signInWithEmailAndPassword(email,pass);
    const doc=await db.collection('users').doc(cred.user.uid).get();
    if(doc.exists&&doc.data().role==='driver'){
      _driverId=cred.user.uid;
      setupDriverListeners(cred.user.uid);
      go('home');
    }else{auth.signOut();alert('Access denied. Driver accounts only.');}
  }catch(err){alert('Invalid credentials');}
}

function setupDriverListeners(uid){
  db.collection('jobs').where('driverId','==',uid).where('status','in',['pending'])
    .onSnapshot(snap=>{
      if(!snap.empty&&!S.jobOverlay&&!S.activeJob){
        const doc=snap.docs[0];
        const j={id:doc.id,...doc.data()};
        JOBS[0]={id:j.id,type:j.type||'airport',client:j.clientName||'Client',
          initials:(j.clientName||'CL').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2),
          service:j.serviceLabel||'Airport Transfer',pickup:j.pickup||'',
          dropoff:j.dropoff||j.airport||'',time:j.time||'Now',
          pay:j.pay||j.price||95,flight:j.flight||'',notes:j.notes||'',vehicle:j.vehicle||'S-Class'};
        S.jobOverlay=true;S.countdown=30;startCountdown();render();
      }
    },()=>{});
}

function nav(){
  const items=[
    {id:'home',label:'Home',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>'},
    {id:'jobs',label:'Jobs',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>'},
    {id:'earnings',label:'Earnings',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'},
    {id:'history',label:'History',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'},
    {id:'profile',label:'Profile',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'}
  ];
  return`<nav class="nav">${items.map(i=>`<div class="nav-item${S.screen===i.id?' active':''}" onclick="go('${i.id}')">${i.svg}<span>${i.label}</span></div>`).join('')}</nav>`;
}

function goOnline(){
  S.online=!S.online;
  if(FIREBASE_ENABLED&&_driverId){
    db.collection('drivers').doc(_driverId).set({status:S.online?'online':'offline'},{merge:true}).catch(()=>{});
  }
  if(S.online){
    clearTimeout(S._timer);
    S._timer=setTimeout(()=>{S.jobOverlay=true;S.countdown=30;startCountdown();render();},3000);
  } else {
    clearTimeout(S._timer);
    clearInterval(S._cdTimer);
  }
  render();
}

function startCountdown(){
  clearInterval(S._cdTimer);
  S._cdTimer=setInterval(()=>{
    S.countdown--;
    const el=document.getElementById('cd-num');
    if(el)el.textContent=S.countdown;
    const ring=document.getElementById('cd-ring');
    if(ring){const pct=S.countdown/30;const circ=2*Math.PI*40;ring.style.strokeDashoffset=circ*(1-pct);}
    if(S.countdown<=0){declineJob();}
  },1000);
}

function acceptJob(){
  clearInterval(S._cdTimer);
  S.jobOverlay=false;
  S.activeJob=JOBS[0];
  S.tripStep=2;
  S.tripTimer=0;
  if(FIREBASE_ENABLED&&S.activeJob?.id){
    db.collection('jobs').doc(S.activeJob.id).update({status:'accepted'}).catch(()=>{});
    if(_driverId) db.collection('drivers').doc(_driverId).set({status:'ontrip'},{merge:true}).catch(()=>{});
  }
  go('active');
}

function declineJob(){
  clearInterval(S._cdTimer);
  S.jobOverlay=false;
  render();
}

function nextStep(){
  if(S.tripStep<5){S.tripStep++;}
  const stepNames={2:'en_route',3:'arrived',4:'onboard',5:'completed'};
  if(FIREBASE_ENABLED&&S.activeJob?.id){
    db.collection('jobs').doc(S.activeJob.id).update({tripStep:S.tripStep,status:stepNames[S.tripStep]||'active'}).catch(()=>{});
  }
  if(S.tripStep===4){
    clearInterval(S._tripTimerInterval);
    S._tripTimerInterval=setInterval(()=>{S.tripTimer++;const el=document.getElementById('trip-timer');if(el){const m=Math.floor(S.tripTimer/60);const s=S.tripTimer%60;el.textContent=(m<10?'0'+m:m)+':'+(s<10?'0'+s:s);}},1000);
  }
  if(S.tripStep===5){
    clearInterval(S._tripTimerInterval);
    if(FIREBASE_ENABLED&&_driverId) db.collection('drivers').doc(_driverId).set({status:'online'},{merge:true}).catch(()=>{});
    S.activeJob=null;go('home');
  }
  else render();
}

function jobBadge(type){const m={airport:'b-airport Airport',hourly:'b-hourly Hourly',day:'b-day Full Day'};const v=m[type]||'b-hourly';const[c,...r]=v.split(' ');return`<span class="badge ${c}">${r.join(' ')}</span>`;}
function stars(r){return'★'.repeat(r)+'☆'.repeat(5-r);}
function fmtTime(s){const m=Math.floor(s/60);const sec=s%60;return(m<10?'0'+m:m)+':'+(sec<10?'0'+sec:sec);}

const pages={
login:()=>`<div style="min-height:100vh;display:flex;flex-direction:column;padding:64px 24px 40px">
  <div style="text-align:center;margin-bottom:48px">

      <svg width="30" height="30" fill="none" viewBox="0 0 24 24" stroke="#C9A84C" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/></svg>
    </div>

</div>`,

      <div style="font-size:12px;color:#888;letter-spacing:2px;margin-bottom:8px">NEW JOB REQUEST</div>

        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column">
          <div id="cd-num" style="font-size:28px;font-weight:800;color:#C9A84C">${S.countdown}</div>
          <div style="font-size:10px;color:#555">sec</div>
        </div>
      </div>
      <div style="width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#8B6914);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#000;margin:0 auto 12px">SM</div>
      <div style="font-size:11px;color:#888;margin-bottom:12px">Sarah Mitchell</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px">
        <span style="color:#888">Service</span><span style="font-weight:600">✈ Airport Transfer</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px">
        <span style="color:#888">Pickup</span><span style="font-weight:600">Mayfair W1K</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px">
        <span style="color:#888">Drop-off</span><span style="font-weight:600">Heathrow T5</span>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:20px;font-size:13px">

      </div>

  return`<div style="min-height:100vh">

          <div><div style="font-size:16px;font-weight:700">James Harrison</div>

active:()=>{
  const j=S.activeJob||JOBS[0];
  const steps=[{l:'Confirmed'},{l:'En Route'},{l:'Arrived'},{l:'Onboard'},{l:'Complete'}];
  const btnLabels={2:'I Have Arrived',3:'Passenger Onboard',4:'Complete Trip',5:'Done'};
  return`<div class="screen">

    <div style="font-size:18px;font-weight:700;margin-bottom:16px">Active Trip</div>
    <div class="stepper">
      ${steps.map((s,i)=>`${i>0?`<div class="step-line-h" style="background:${i<S.tripStep?'#C9A84C':'rgba(255,255,255,.1)'}"></div>`:''}
        <div class="step">
          <div class="step-circle" style="background:${i+1<=S.tripStep?'#C9A84C':'#222'};color:${i+1<=S.tripStep?'#000':'#555'}">
            ${i+1<S.tripStep?'✓':i+1}
          </div>
          <div style="font-size:9px;color:${i+1<=S.tripStep?'#C9A84C':'#444'};text-align:center">${s.l}</div>
        </div>`).join('')}
    </div>
    <div class="card" style="display:flex;align-items:center;gap:14px;margin-bottom:12px">
      <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#8B6914);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#000;flex-shrink:0">${j.initials}</div>
      <div><div style="font-size:16px;font-weight:700">${j.client}</div><div style="display:flex;gap:2px;margin-top:4px;color:#C9A84C">★★★★★</div></div>
      ${S.tripStep===4?`<div style="margin-left:auto;text-align:right"><div style="font-size:10px;color:#888">TRIP TIME</div><div id="trip-timer" style="font-size:20px;font-weight:800;color:#22c55e;font-variant-numeric:tabular-nums">${fmtTime(S.tripTimer)}</div></div>`:''}
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:11px;color:#C9A84C;font-weight:700;letter-spacing:1px;margin-bottom:12px">ROUTE</div>
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px">
        <div style="width:8px;height:8px;border-radius:50%;background:#C9A84C;flex-shrink:0;margin-top:4px"></div>
        <div><div style="font-size:14px;font-weight:600">Pickup</div><div style="font-size:14px;color:#888;margin-top:2px">${j.pickup}</div></div>
      </div>
      <div style="width:1px;height:20px;background:rgba(255,255,255,.1);margin-left:3px;margin-bottom:8px"></div>
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="width:8px;height:8px;border-radius:2px;background:#888;flex-shrink:0;margin-top:4px"></div>
        <div><div style="font-size:14px;font-weight:600">Drop-off</div><div style="font-size:14px;color:#888;margin-top:2px">${j.dropoff}</div></div>
      </div>
      ${j.flight?`<div style="margin-top:10px;font-size:13px;color:#888">✈ Flight ${j.flight}</div>`:''}
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-size:13px;color:#888;line-height:1.6">${j.notes}</div>
    </div>
    <div style="height:140px;background:linear-gradient(135deg,#111,#1a1a1a);border-radius:14px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.06);margin-bottom:16px">
      <div style="text-align:center;color:#444">
        <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
        <div style="font-size:12px;margin-top:6px">Navigation</div>
      </div>
    </div>
    ${S.tripStep<5?`<button class="btn btn-green" onclick="nextStep()">${btnLabels[S.tripStep]||'Next'}</button>`:''}
    <div style="height:20px"></div>
  </div>`;
},

      ${['today','week','month'].map(s=>`<div class="tab${t===s?' active':''}" onclick="S.earnTab='${s}';render()">${s.charAt(0).toUpperCase()+s.slice(1)}</div>`).join('')}

    <div style="text-align:center;padding:20px 0 24px">

    </div>

      ${d.breakdown.map(([l,v])=>`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:14px"><span style="color:#888">${l}</span><span style="font-weight:600">${v}</span></div>`).join('')}
    </div>
    ${t==='week'?`<div class="card" style="margin-bottom:12px">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">Daily Breakdown</div>
      <div class="bar-row">
        ${WEEK_DATA.map((v,i)=>`<div class="bar-col">
          <div class="bar-fill" style="height:${v===0?4:Math.round((v/420)*60)+8}px;opacity:${v===0?.2:.8}"></div>
          <div style="font-size:9px;color:#555">${WEEK_LABELS[i]}</div>
        </div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px">${WEEK_DATA.map(v=>`<div style="flex:1;text-align:center;font-size:9px;color:#444">${v?'£'+v:''}</div>`).join('')}</div>
    </div>`:''}
    <div class="card">
      <div style="font-size:14px;font-weight:600;margin-bottom:12px">Payout Details</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px"><span style="color:#888">Payment Schedule</span><span>Weekly — Mondays</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px"><span style="color:#888">Next Payout</span><span style="color:#C9A84C;font-weight:600">Monday 2 June</span></div>
      <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#888">Bank Account</span><span>Lloyds ••••1234</span></div>
    </div>
    ${nav()}
  </div>`;
},
