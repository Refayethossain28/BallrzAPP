<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ApexVIP Driver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #fff; font-family: system-ui,-apple-system,sans-serif; -webkit-font-smoothing: antialiased; }
  #root { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; }
  .screen { padding: 0 20px 100px; min-height: 100vh; }
  .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: #111; border-top: 1px solid rgba(255,255,255,0.08); display: flex; padding: 8px 0 28px; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; color: #666; font-size: 10px; padding: 8px 0; transition: color 0.2s; }
  .nav-item.active { color: #C9A84C; }
  .card { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .btn-gold { background: #C9A84C; color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
  .btn-green { background: #22c55e; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 20px 12px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }

  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.4), 0 0 30px rgba(34,197,94,0.4); }
    70% { box-shadow: 0 0 0 20px rgba(34,197,94,0), 0 0 30px rgba(34,197,94,0.4); }
    100% { box-shadow: 0 0 0 0 rgba(34,197,94,0), 0 0 30px rgba(34,197,94,0.4); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .pulse-green { animation: pulse-ring 2s ease-out infinite; }

  .tab-bar { display: flex; background: #1a1a1a; border-radius: 8px; padding: 4px; margin-bottom: 16px; }
  .tab-btn { flex: 1; padding: 8px; border: none; background: transparent; color: #666; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { background: #C9A84C; color: #000; }

  .stepper { display: flex; align-items: center; margin-bottom: 20px; overflow-x: auto; padding-bottom: 8px; }
  .step { display: flex; flex-direction: column; align-items: center; flex: 1; min-width: 50px; }
  .step-circle { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .step-line { flex: 1; height: 2px; margin: 0; }
  .step-label { font-size: 9px; margin-top: 4px; text-align: center; max-width: 60px; line-height: 1.2; }

  .route-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .route-icon { font-size: 16px; margin-top: 2px; flex-shrink: 0; }
  .route-text { font-size: 13px; color: #ccc; }
  .route-label { font-size: 11px; color: #666; }

  .stat-row { display: flex; gap: 12px; margin-bottom: 12px; }
  .stat-card { flex: 1; background: #1a1a1a; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-val { font-size: 20px; font-weight: 700; color: #C9A84C; }
  .stat-lbl { font-size: 11px; color: #666; margin-top: 2px; }

  .earnings-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .earnings-row:last-child { border-bottom: none; }

  .bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding: 0 4px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar-fill { width: 100%; background: #C9A84C; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.3s; }
  .bar-label { font-size: 9px; color: #666; }
  .bar-val { font-size: 9px; color: #C9A84C; }

  .history-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .history-row:last-child { border-bottom: none; }

  .profile-section { margin-bottom: 8px; }
  .profile-group { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .profile-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); cursor: pointer; }
  .profile-row:last-child { border-bottom: none; }
  .profile-row-left { display: flex; align-items: center; gap: 12px; }

  .doc-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .doc-row:last-child { border-bottom: none; }

  .badge-verified { background: rgba(34,197,94,0.15); color: #22c55e; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 20px; display: flex; align-items: center; gap: 4px; }

  .job-card { background: #111; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .job-type { font-size: 11px; font-weight: 600; color: #C9A84C; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .job-route { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .job-detail { font-size: 12px; color: #888; margin-bottom: 8px; }
  .job-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }

  .btn-accept { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-outline { background: transparent; color: #888; border: 1px solid rgba(255,255,255,0.15); padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-red { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); padding: 14px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; }

  .map-placeholder { background: #1a1a1a; border: 2px dashed rgba(255,255,255,0.1); border-radius: 12px; height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; margin-bottom: 16px; color: #444; font-size: 13px; }

  .input-field { width: 100%; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 14px 16px; color: #fff; font-size: 15px; outline: none; margin-bottom: 12px; }
  .input-field:focus { border-color: #C9A84C; }
  .input-label { font-size: 12px; color: #888; margin-bottom: 6px; }

  .login-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; }

  .countdown-container { position: relative; width: 120px; height: 120px; margin: 0 auto 20px; }
  .countdown-number { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 700; color: #C9A84C; }

  .confirmed-badge { background: rgba(34,197,94,0.15); color: #22c55e; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>

// ── Login Screen ───────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = () => {
    if (email === 'driver@apexvip.com' && password === 'driver123') {
      setLoading(true);
      setTimeout(() => { setLoading(false); onLogin(); }, 800);
    } else {
      setError('Invalid credentials. Please try again.');
    }
  };

  return (
    <div className="login-screen">
      <div style={{ textAlign: 'center', marginBottom: 40 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10, marginBottom: 8 }}>
          <div style={{ width: 40, height: 40, background: '#C9A84C', borderRadius: 8, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#000">
              <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-3M7.5 20a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5zM17.5 20a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
            </svg>
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: 2, color: '#C9A84C' }}>APEX VIP DRIVER</div>
        </div>
        <div style={{ fontSize: 13, color: '#666', letterSpacing: 1 }}>Driver Portal</div>
      </div>

      <div style={{ width: '100%', maxWidth: 360 }}>
        <div className="input-label">Email Address</div>
        <input
          className="input-field"
          type="email"
          placeholder="driver@apexvip.com"
          value={email}
          onChange={e => { setEmail(e.target.value); setError(''); }}
          autoCapitalize="none"
          autoCorrect="off"
        />
        <div className="input-label">Password</div>
        <input
          className="input-field"
          type="password"
          placeholder="••••••••"
          value={password}
          onChange={e => { setPassword(e.target.value); setError(''); }}
        />
        {error && <div style={{ color: '#ef4444', fontSize: 13, marginBottom: 12, textAlign: 'center' }}>{error}</div>}
        <button className="btn-gold" onClick={handleLogin} disabled={loading} style={{ opacity: loading ? 0.7 : 1 }}>
          {loading ? 'Signing in...' : 'SIGN IN'}
        </button>
        <div style={{ textAlign: 'center', marginTop: 20, color: '#444', fontSize: 12 }}>
          Approved drivers only · ApexVIP Chauffeur Ltd
        </div>
      </div>
    </div>
  );
}

// ── Job Request Overlay ────────────────────────────────────────────────────
function JobRequestOverlay({ onAccept, onDecline }) {
  const [seconds, setSeconds] = useState(30);
  const RADIUS = 54;
  const CIRCUM = 2 * Math.PI * RADIUS;

  useEffect(() => {
    if (seconds <= 0) { onDecline(); return; }
    const t = setTimeout(() => setSeconds(s => s - 1), 1000);
    return () => clearTimeout(t);
  }, [seconds, onDecline]);

  const progress = seconds / 30;
  const dashOffset = CIRCUM * (1 - progress);

  return (
    <div className="overlay">
      <div style={{ width: '100%', maxWidth: 400 }}>
        <div style={{ textAlign: 'center', marginBottom: 24 }}>
          <div style={{ fontSize: 11, letterSpacing: 2, color: '#C9A84C', marginBottom: 8, fontWeight: 700 }}>NEW JOB REQUEST</div>
          <div style={{ height: 1, background: 'rgba(255,255,255,0.1)', margin: '0 0 20px' }}/>

          <div className="countdown-container">
            <svg width="120" height="120" style={{ transform: 'rotate(-90deg)' }}>
              <circle cx="60" cy="60" r={RADIUS} fill="none" stroke="#1a1a1a" strokeWidth="6"/>
              <circle
                cx="60" cy="60" r={RADIUS}
                fill="none"
                stroke={seconds > 10 ? '#C9A84C' : '#ef4444'}
                strokeWidth="6"
                strokeDasharray={CIRCUM}
                strokeDashoffset={dashOffset}
                strokeLinecap="round"
                style={{ transition: 'stroke-dashoffset 1s linear, stroke 0.3s' }}
              />
            </svg>
            <div className="countdown-number">{seconds}</div>
          </div>
        </div>

        <div className="card" style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14 }}>
            <div style={{ width: 44, height: 44, borderRadius: '50%', background: '#1a1a1a', border: '2px solid #C9A84C', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, color: '#C9A84C', fontSize: 16 }}>SM</div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 16 }}>S.M.</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><IconPlane /><span style={{ fontSize: 12, color: '#C9A84C', fontWeight: 600 }}> Airport Transfer</span></div>
            </div>
          </div>

          <div style={{ height: 1, background: 'rgba(255,255,255,0.06)', marginBottom: 14 }}/>

          {[
            ['📍 Pickup', 'Mayfair, London W1K'],
            ['🏁 Drop-off', 'Heathrow Terminal 5'],
            ['🕐 Time', 'In 45 minutes'],
          ].map(([label, val]) => (
            <div key={label} style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
              <span style={{ color: '#666', fontSize: 13 }}>{label}</span>
              <span style={{ fontSize: 13, fontWeight: 600, textAlign: 'right', maxWidth: '55%' }}>{val}</span>
            </div>
          ))}

          <div style={{ height: 1, background: 'rgba(255,255,255,0.06)', marginBottom: 14 }}/>

          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ color: '#888', fontSize: 13 }}>Pay</span>
            <span style={{ fontSize: 24, fontWeight: 800, color: '#C9A84C' }}>£95.00</span>
          </div>
        </div>

        <div style={{ display: 'flex', gap: 12 }}>
          <button className="btn-green" style={{ flex: 1 }} onClick={onAccept}>ACCEPT</button>
          <button className="btn-outline" style={{ flex: 1 }} onClick={onDecline}>DECLINE</button>
        </div>
      </div>
    </div>
  );
}

// ── Home Screen ────────────────────────────────────────────────────────────
function HomeScreen({ onJobAccepted }) {
  const [online, setOnline] = useState(false);
  const [showJobRequest, setShowJobRequest] = useState(false);
  const [declined, setDeclined] = useState(false);

  useEffect(() => {
    if (!online) { setShowJobRequest(false); setDeclined(false); return; }
    if (declined) return;
    const t = setTimeout(() => setShowJobRequest(true), 3000);
    return () => clearTimeout(t);
  }, [online, declined]);

  const handleDecline = useCallback(() => {
    setShowJobRequest(false);
    setDeclined(true);
  }, []);

  const handleAccept = useCallback(() => {
    setShowJobRequest(false);
    onJobAccepted();
  }, [onJobAccepted]);

  return (
    <div>
      {showJobRequest && <JobRequestOverlay onAccept={handleAccept} onDecline={handleDecline} />}

      <div className="top-bar">
        <div>
          <div style={{ fontSize: 18, fontWeight: 700 }}>James Harrison</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 3 }}>

function ActiveTripScreen({ onComplete }) {

  const steps = ['Confirmed', 'En Route', 'Arrived', 'Onboard', 'Complete'];

  const actionLabel = ['', '', 'I Have Arrived', 'Passenger Onboard', 'Complete Trip'][step];

  const handleAction = () => {
    if (step < 4) { setStep(s => s + 1); }
    else { onComplete(); }
  };

  return (
    <div>
      <div className="top-bar" style={{ borderBottom: '1px solid rgba(255,255,255,0.06)', paddingBottom: 16 }}>
        <div>
          <div style={{ fontSize: 11, color: '#C9A84C', fontWeight: 700, letterSpacing: 1, marginBottom: 2 }}>ACTIVE TRIP</div>

        <div className="confirmed-badge">In Progress</div>
      </div>

      <div className="screen" style={{ paddingTop: 16 }}>
        {/* Stepper */}
        <div style={{ display: 'flex', alignItems: 'flex-start', marginBottom: 24 }}>

            <React.Fragment key={i}>
              <div className="step" style={{ flex: 'none', width: 52 }}>

                  background: i < step ? '#22c55e' : i === step ? '#C9A84C' : '#1a1a1a',
                  border: `2px solid ${i < step ? '#22c55e' : i === step ? '#C9A84C' : '#333'}`,
                  color: i < step ? '#fff' : i === step ? '#000' : '#444',
                }}>
                  {i < step ? <IconCheck /> : <span>{i + 1}</span>}
                </div>
                <div className="step-label" style={{ color: i < step ? '#22c55e' : i === step ? '#C9A84C' : '#555' }}>{label}</div>
              </div>
              {i < steps.length - 1 && (

          <IconNavArrow />
          <span>Navigation</span>
        </div>

          <div className="route-row">
            <span className="route-icon">📍</span>
            <div>
              <div className="route-label">Pickup</div>
              <div className="route-text">14 Park Lane, Mayfair W1K 1AA</div>
            </div>
          </div>
          <div style={{ marginLeft: 26, marginBottom: 8, height: 20, borderLeft: '2px dashed rgba(255,255,255,0.15)' }}/>

            <span className="route-icon">🏁</span>
            <div>

        </div>
      ))}
    </nav>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────
function App() {
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState('home');
  const [hasActiveTrip, setHasActiveTrip] = useState(false);

  const handleJobAccepted = useCallback(() => {
    setHasActiveTrip(true);
    setTab('home');
  }, []);

  const handleTripComplete = useCallback(() => {
    setHasActiveTrip(false);
  }, []);

  const handleSignOut = useCallback(() => {
    setAuthed(false);
    setTab('home');
    setHasActiveTrip(false);
  }, []);

  if (!authed) {
    return <LoginScreen onLogin={() => setAuthed(true)} />;
  }

  const renderScreen = () => {
    if (tab === 'home') {
      if (hasActiveTrip) {
        return <ActiveTripScreen onComplete={handleTripComplete} />;
      }
      return <HomeScreen onJobAccepted={handleJobAccepted} />;
    }
    if (tab === 'jobs') return <JobsScreen />;
    if (tab === 'earnings') return <EarningsScreen />;
    if (tab === 'history') return <HistoryScreen />;
    if (tab === 'profile') return <ProfileScreen onSignOut={handleSignOut} />;
  };

  return (
    <div>
      {renderScreen()}
      <BottomNav active={tab} onChange={setTab} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
