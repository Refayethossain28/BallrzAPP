<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ApexVIP — Scan to Join</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#050505;color:#f4f0ea;font-family:'Inter',sans-serif;padding:24px;
  }
  .card{
    width:100%;max-width:420px;text-align:center;
    background:linear-gradient(170deg,#0e0d0b 0%,#070605 100%);
    border:1px solid rgba(200,169,126,.25);border-radius:28px;
    padding:52px 40px 44px;
  }
  .wordmark{
    font-family:'Cormorant Garamond',serif;font-weight:300;
    font-size:46px;letter-spacing:.04em;color:#f4f0ea;
  }
  .wordmark b{font-weight:500;color:#C8A97E}
  .rule{
    width:48px;height:1px;background:rgba(200,169,126,.5);margin:20px auto 18px;
  }
  .tag{
    font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#C8A97E;margin-bottom:34px;
  }
  .qr{
    display:block;width:240px;height:240px;margin:0 auto;
    border-radius:18px;border:6px solid #f4f0ea;background:#f4f0ea;
  }
  .scan{
    margin-top:30px;font-size:15px;font-weight:600;letter-spacing:.02em;
  }
  .sub{
    margin-top:8px;font-size:12.5px;color:rgba(244,240,234,.55);line-height:1.7;
  }
  .foot{
    margin-top:34px;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;
    color:rgba(244,240,234,.3);
  }
  @media print{
    body{background:#fff;padding:0}
    .card{border-color:#C8A97E;break-inside:avoid}
  }
</style>
</head>
<body>
  <div class="card">
    <div class="wordmark">Apex<b>VIP</b></div>
    <div class="rule"></div>
    <div class="tag">By invitation only</div>
    <img class="qr" src="qr-join.png" alt="Scan to join ApexVIP"/>
    <div class="scan">Scan to join</div>
    <div class="sub">Point your camera at the code.<br/>Create your account and add ApexVIP to your home screen.</div>
    <div class="foot">London &nbsp;·&nbsp; Dubai</div>
  </div>
</body>
</html>
