name: ApexVIP
options:
  bundleIdPrefix: com.apexvip
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_LANGUAGE: en
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only

targets:
  ApexVIP:
    type: application
    platform: iOS
    sources:
      - path: ApexVIP
    info:
      path: ApexVIP/Info.plist
      properties:
        CFBundleDisplayName: ApexVIP
        CFBundleShortVersionString: "1.0.0"
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSLocationWhenInUseUsageDescription: "ApexVIP uses your location to set your pickup point and show your chauffeur on the map."
        NSLocationAlwaysAndWhenInUseUsageDescription: "ApexVIP uses your location to track your journey in real time."
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.apexvip.client
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
