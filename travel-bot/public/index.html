<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Bot — Flights, Hotels & Deals</title>
  <style>
    :root {
      --primary: #1a73e8;
      --primary-dark: #1557b0;
      --accent: #f59e0b;
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --radius: 12px;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1a73e8 0%, #0f4c9e 100%);
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { opacity: .85; margin-top: .4rem; font-size: 1rem; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: .5rem;
      background: rgba(0,0,0,.15);
      padding: .75rem 1.5rem;
    }
    .tab {
      padding: .55rem 1.4rem;
      border-radius: 2rem;
      border: none;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: all .2s;
      background: transparent;
      color: rgba(255,255,255,.8);
    }
    .tab.active { background: #fff; color: var(--primary); }
    .tab:hover:not(.active) { background: rgba(255,255,255,.15); color: #fff; }

    /* ── Main layout ── */
    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* ── Search card ── */
    .search-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.75rem;
      box-shadow: var(--shadow);
      margin-bottom: 1.5rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: .85rem;
    }

    .form-group { display: flex; flex-direction: column; gap: .35rem; }
    .form-group label { font-size: .78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }

    .autocomplete-wrap { position: relative; }
    .autocomplete-wrap input,
    .form-group input,
    .form-group select {
      padding: .65rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      background: #fff;
      transition: border-color .2s;
      width: 100%;
    }
    .autocomplete-wrap input:focus,
    .form-group input:focus,
    .form-group select:focus { outline: none; border-color: var(--primary); }

    .suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .suggestion-item {
      padding: .6rem .85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .9rem;
    }
    .suggestion-item:hover { background: #f1f5f9; }
    .suggestion-item .iata { font-weight: 700; color: var(--primary); min-width: 3ch; }
    .suggestion-item .meta { font-size: .78rem; color: var(--muted); }

    .search-btn {
      margin-top: 1.1rem;
      width: 100%;
      padding: .8rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
    }
    .search-btn:hover { background: var(--primary-dark); }
    .search-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── Results ── */
    #results { margin-top: .5rem; }

    .results-header {
      font-size: .85rem;
      color: var(--muted);
      margin-bottom: .75rem;
      font-weight: 600;
    }

    .result-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 1.25rem 1.4rem;
      box-shadow: var(--shadow);
      margin-bottom: .85rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      border-left: 4px solid transparent;
      transition: border-color .2s, transform .15s;
    }
    .result-card:hover { transform: translateY(-2px); border-left-color: var(--primary); }
    .result-card.best { border-left-color: var(--accent); }

    .best-badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: .15rem .5rem;
      border-radius: 2rem;
      margin-bottom: .3rem;
    }

    .card-main { flex: 1; min-width: 180px; }
    .card-main h3 { font-size: 1rem; font-weight: 700; margin-bottom: .2rem; }
    .card-main .detail { font-size: .85rem; color: var(--muted); }
    .card-main .stops-badge {
      display: inline-block;
      font-size: .72rem;
      padding: .1rem .45rem;
      border-radius: 2rem;
      font-weight: 600;
      margin-top: .3rem;
    }
    .stops-badge.direct { background: #d1fae5; color: #065f46; }
    .stops-badge.stops  { background: #fef3c7; color: #92400e; }

    .card-route {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: .9rem;
      flex-wrap: wrap;
    }
    .card-route .airport { font-weight: 700; font-size: 1.05rem; }
    .card-route .arrow { color: var(--muted); }
    .card-route .time  { color: var(--muted); font-size: .82rem; }

    .card-price {
      text-align: right;
      min-width: 100px;
    }
    .card-price .price {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }
    .card-price .per { font-size: .75rem; color: var(--muted); margin-top: .15rem; }

    .book-btn {
      display: inline-block;
      margin-top: .6rem;
      padding: .5rem 1.1rem;
      background: var(--primary);
      color: #fff;
      border-radius: 6px;
      font-size: .82rem;
      font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    .book-btn:hover { background: var(--primary-dark); }

    /* hotel card specifics */
    .hotel-stars { color: var(--accent); font-size: .9rem; }
    .hotel-amenity { font-size: .78rem; color: var(--muted); }

    /* package card */
    .pkg-sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      flex: 1;
      min-width: 280px;
    }
    .pkg-section { background: #f8fafc; border-radius: 8px; padding: .65rem .85rem; }
    .pkg-section h4 { font-size: .75rem; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: .25rem; }
    .pkg-section p  { font-size: .88rem; color: var(--text); }

    /* ── Spinner / states ── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem;
      gap: 1rem;
      color: var(--muted);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: .75rem; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: .4rem; color: var(--text); }

    .error-banner {
      background: #fee2e2;
      color: #991b1b;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: .9rem;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.5rem; }
      .pkg-sections { grid-template-columns: 1fr; }
      .card-price .price { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>✈️ Travel Bot</h1>
  <p>Find the best flights, hotels &amp; holiday deals — powered by Amadeus</p>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('flights')">✈️ Flights</button>
  <button class="tab" onclick="switchTab('hotels')">🏨 Hotels</button>
  <button class="tab" onclick="switchTab('packages')">🌴 Packages</button>
</div>

<main>
  <!-- FLIGHTS -->
  <div id="tab-flights">
    <div class="search-card">
      <div class="form-grid">
        <div class="form-group">
          <label>From</label>
          <div class="autocomplete-wrap">
            <input id="fl-origin" type="text" placeholder="e.g. London LHR" autocomplete="off"
                   oninput="autocomplete(this,'fl-origin-sug','fl-origin-code')" />
            <input type="hidden" id="fl-origin-code" />
            <div class="suggestions" id="fl-origin-sug" style="display:none"></div>
          </div>
        </div>
        <div class="form-group">
          <label>To</label>
          <div class="autocomplete-wrap">
            <input id="fl-dest" type="text" placeholder="e.g. New York JFK" autocomplete="off"
                   oninput="autocomplete(this,'fl-dest-sug','fl-dest-code')" />
            <input type="hidden" id="fl-dest-code" />
            <div class="suggestions" id="fl-dest-sug" style="display:none"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Departure</label>
          <input id="fl-depart" type="date" />
        </div>
        <div class="form-group">
          <label>Return (optional)</label>
          <input id="fl-return" type="date" />
        </div>
        <div class="form-group">
          <label>Passengers</label>
          <select id="fl-adults">
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
          </select>
        </div>
      </div>
      <button class="search-btn" onclick="searchFlights()">
        <span>🔍</span> Search Flights
      </button>
    </div>
    <div id="fl-results"></div>
  </div>

  <!-- HOTELS -->
  <div id="tab-hotels" style="display:none">
    <div class="search-card">
      <div class="form-grid">
        <div class="form-group">
          <label>City Code</label>
          <div class="autocomplete-wrap">
            <input id="ht-city" type="text" placeholder="e.g. Paris CDG" autocomplete="off"
                   oninput="autocomplete(this,'ht-city-sug','ht-city-code')" />
            <input type="hidden" id="ht-city-code" />
            <div class="suggestions" id="ht-city-sug" style="display:none"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Check-in</label>
          <input id="ht-checkin" type="date" />
        </div>
        <div class="form-group">
          <label>Check-out</label>
          <input id="ht-checkout" type="date" />
        </div>
        <div class="form-group">
          <label>Guests</label>
          <select id="ht-adults">
            <option>1</option><option>2</option><option>3</option><option>4</option>
          </select>
        </div>
        <div class="form-group">
          <label>Rooms</label>
          <select id="ht-rooms">
            <option>1</option><option>2</option><option>3</option>
          </select>
        </div>
      </div>
      <button class="search-btn" onclick="searchHotels()">
        <span>🔍</span> Search Hotels
      </button>
    </div>
    <div id="ht-results"></div>
  </div>

  <!-- PACKAGES -->
  <div id="tab-packages" style="display:none">
    <div class="search-card">
      <div class="form-grid">
        <div class="form-group">
          <label>From</label>
          <div class="autocomplete-wrap">
            <input id="pk-origin" type="text" placeholder="e.g. London LHR" autocomplete="off"
                   oninput="autocomplete(this,'pk-origin-sug','pk-origin-code')" />
            <input type="hidden" id="pk-origin-code" />
            <div class="suggestions" id="pk-origin-sug" style="display:none"></div>
          </div>
        </div>
        <div class="form-group">
          <label>To</label>
          <div class="autocomplete-wrap">
            <input id="pk-dest" type="text" placeholder="e.g. Barcelona BCN" autocomplete="off"
                   oninput="autocomplete(this,'pk-dest-sug','pk-dest-code')" />
            <input type="hidden" id="pk-dest-code" />
            <div class="suggestions" id="pk-dest-sug" style="display:none"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Departure</label>
          <input id="pk-depart" type="date" />
        </div>
        <div class="form-group">
          <label>Return</label>
          <input id="pk-return" type="date" />
        </div>
        <div class="form-group">
          <label>Travellers</label>
          <select id="pk-adults">
            <option>1</option><option>2</option><option>3</option><option>4</option>
          </select>
        </div>
      </div>
      <button class="search-btn" onclick="searchPackages()">
        <span>🔍</span> Search Holiday Packages
      </button>
    </div>
    <div id="pk-results"></div>
  </div>
</main>

<script>
  // ── Tab switching ────────────────────────────────────────────────────────
  const tabs = ['flights','hotels','packages'];
  function switchTab(name) {
    tabs.forEach(t => {
      document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
      document.querySelectorAll('.tab')[tabs.indexOf(t)].classList.toggle('active', t === name);
    });
  }

  // ── Set default dates ────────────────────────────────────────────────────
  (function setDefaultDates() {
    const today = new Date();
    const pad = n => String(n).padStart(2,'0');
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const next7  = new Date(today); next7.setDate(today.getDate() + 7);
    const next14 = new Date(today); next14.setDate(today.getDate() + 14);
    ['fl-depart','pk-depart'].forEach(id => { const el = document.getElementById(id); if(el) el.value = fmt(next7); });
    ['fl-return','pk-return'].forEach(id => { const el = document.getElementById(id); if(el) el.value = fmt(next14); });
    ['ht-checkin','pk-depart'].forEach(id => { const el = document.getElementById(id); if(el) el.value = fmt(next7); });
    ['ht-checkout'].forEach(id => { const el = document.getElementById(id); if(el) el.value = fmt(next14); });
  })();

  // ── Autocomplete ─────────────────────────────────────────────────────────
  const debounceTimers = {};
  async function autocomplete(inputEl, sugId, codeId) {
    const sugEl = document.getElementById(sugId);
    clearTimeout(debounceTimers[sugId]);
    if (inputEl.value.length < 2) { sugEl.style.display = 'none'; return; }
    debounceTimers[sugId] = setTimeout(async () => {
      try {
        const r = await fetch(`/api/locations?keyword=${encodeURIComponent(inputEl.value)}`);
        const data = await r.json();
        if (!data.results?.length) { sugEl.style.display = 'none'; return; }
        sugEl.innerHTML = data.results.map(l => `
          <div class="suggestion-item" onclick="selectLocation('${l.iataCode}','${(l.cityName||l.name).replace(/'/g,"\\'")}','${inputEl.id}','${sugId}','${codeId}')">
            <span class="iata">${l.iataCode}</span>
            <div>
              <div>${l.cityName || l.name}</div>
              <div class="meta">${l.name} · ${l.countryName}</div>
            </div>
          </div>`).join('');
        sugEl.style.display = 'block';
      } catch(e) { sugEl.style.display = 'none'; }
    }, 280);
  }

  function selectLocation(code, name, inputId, sugId, codeId) {
    document.getElementById(inputId).value = `${name} (${code})`;
    document.getElementById(codeId).value = code;
    document.getElementById(sugId).style.display = 'none';
  }

  document.addEventListener('click', () => {
    document.querySelectorAll('.suggestions').forEach(el => el.style.display = 'none');
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setLoading(containerId, text = 'Searching for the best deals…') {
    document.getElementById(containerId).innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <span>${text}</span>
      </div>`;
  }

  function setError(containerId, msg) {
    document.getElementById(containerId).innerHTML = `
      <div class="error-banner">⚠️ ${msg}</div>
      <div class="empty-state">
        <div class="icon">✈️</div>
        <h3>No results found</h3>
        <p>Try different dates or destinations.</p>
      </div>`;
  }

  function fmtDateTime(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  function fmtDuration(iso) {
    if (!iso) return '';
    const m = iso.match(/PT(?:(\d+)H)?(?:(\d+)M)?/);
    if (!m) return iso;
    return (m[1] ? m[1]+'h ' : '') + (m[2] ? m[2]+'m' : '');
  }

  function stars(n) {
    return '★'.repeat(parseInt(n)||0) + '☆'.repeat(Math.max(0,5-(parseInt(n)||0)));
  }

  // ── Flight search ─────────────────────────────────────────────────────────
  async function searchFlights() {
    const origin = document.getElementById('fl-origin-code').value || document.getElementById('fl-origin').value.slice(-4,- 1);
    const dest   = document.getElementById('fl-dest-code').value   || document.getElementById('fl-dest').value.slice(-4,-1);
    const depart = document.getElementById('fl-depart').value;
    const ret    = document.getElementById('fl-return').value;
    const adults = document.getElementById('fl-adults').value;

    if (!origin || !dest || !depart) { alert('Please select valid origin and destination airports, and a departure date.'); return; }

    setLoading('fl-results');
    try {
      const params = new URLSearchParams({ origin, destination: dest, departureDate: depart, adults, max: 15 });
      if (ret) params.append('returnDate', ret);
      const r = await fetch('/api/flights?' + params);
      const data = await r.json();
      renderFlights(data.results || [], 'fl-results', adults);
    } catch(e) { setError('fl-results', 'Could not fetch flights. Check the server is running.'); }
  }

  function renderFlights(results, containerId, adults) {
    const el = document.getElementById(containerId);
    if (!results.length) { setError(containerId, 'No flights found for these dates.'); return; }

    el.innerHTML = `<div class="results-header">${results.length} flights found — sorted by price</div>` +
      results.map((f, i) => `
        <div class="result-card ${i===0?'best':''}">
          <div class="card-main">
            ${i===0 ? '<span class="best-badge">Best Deal</span>' : ''}
            <h3>${f.airline} ${f.flightNumber}</h3>
            <div class="detail">${fmtDuration(f.duration)}</div>
            <span class="stops-badge ${f.stops===0?'direct':'stops'}">${f.stops===0?'Direct':f.stops+' stop'+(f.stops>1?'s':'')}</span>
          </div>
          <div class="card-route">
            <div><div class="airport">${f.origin}</div><div class="time">${fmtDateTime(f.departure)}</div></div>
            <div class="arrow">→</div>
            <div><div class="airport">${f.destination}</div><div class="time">${fmtDateTime(f.arrival)}</div></div>
          </div>
          <div class="card-price">
            <div class="price">£${parseFloat(f.price).toFixed(0)}</div>
            <div class="per">per person · ${f.seatsAvailable} seats left</div>
            <a class="book-btn" href="${f.deepLink}" target="_blank" rel="noopener">Book Now</a>
          </div>
        </div>`).join('');
  }

  // ── Hotel search ──────────────────────────────────────────────────────────
  async function searchHotels() {
    const cityCode = document.getElementById('ht-city-code').value || document.getElementById('ht-city').value.slice(-4,-1);
    const checkIn  = document.getElementById('ht-checkin').value;
    const checkOut = document.getElementById('ht-checkout').value;
    const adults   = document.getElementById('ht-adults').value;
    const rooms    = document.getElementById('ht-rooms').value;

    if (!cityCode || !checkIn || !checkOut) { alert('Please select a city and check-in/out dates.'); return; }

    setLoading('ht-results');
    try {
      const params = new URLSearchParams({ cityCode, checkIn, checkOut, adults, rooms });
      const r = await fetch('/api/hotels?' + params);
      const data = await r.json();
      renderHotels(data.results || [], 'ht-results');
    } catch(e) { setError('ht-results', 'Could not fetch hotels. Check the server is running.'); }
  }

  function renderHotels(results, containerId) {
    const el = document.getElementById(containerId);
    if (!results.length) { setError(containerId, 'No hotels found for these dates.'); return; }

    el.innerHTML = `<div class="results-header">${results.length} hotels found — sorted by price</div>` +
      results.map((h, i) => `
        <div class="result-card ${i===0?'best':''}">
          <div class="card-main">
            ${i===0 ? '<span class="best-badge">Best Price</span>' : ''}
            <h3>${h.name}</h3>
            <div class="hotel-stars">${stars(h.rating)}</div>
            <div class="hotel-amenity">${[h.roomType, h.bedType].filter(Boolean).join(' · ') || 'Standard room'}</div>
          </div>
          <div class="card-main">
            <div class="detail">📅 ${h.checkIn} → ${h.checkOut}</div>
            <div class="detail">📍 ${h.cityCode}</div>
          </div>
          <div class="card-price">
            <div class="price">£${parseFloat(h.price).toFixed(0)}</div>
            <div class="per">total stay</div>
            <a class="book-btn" href="${h.deepLink}" target="_blank" rel="noopener">Book Now</a>
          </div>
        </div>`).join('');
  }

  // ── Package search ────────────────────────────────────────────────────────
  async function searchPackages() {
    const origin = document.getElementById('pk-origin-code').value || document.getElementById('pk-origin').value.slice(-4,-1);
    const dest   = document.getElementById('pk-dest-code').value   || document.getElementById('pk-dest').value.slice(-4,-1);
    const depart = document.getElementById('pk-depart').value;
    const ret    = document.getElementById('pk-return').value;
    const adults = document.getElementById('pk-adults').value;

    if (!origin || !dest || !depart || !ret) { alert('Please fill in all fields for a package search.'); return; }

    setLoading('pk-results', 'Building your holiday packages…');
    try {
      const params = new URLSearchParams({ origin, destination: dest, departureDate: depart, returnDate: ret, adults });
      const r = await fetch('/api/packages?' + params);
      const data = await r.json();
      renderPackages(data.results || [], 'pk-results');
    } catch(e) { setError('pk-results', 'Could not fetch packages. Check the server is running.'); }
  }

  function renderPackages(results, containerId) {
    const el = document.getElementById(containerId);
    if (!results.length) { setError(containerId, 'No packages found. Try different dates.'); return; }

    el.innerHTML = `<div class="results-header">${results.length} holiday packages found — flight + hotel combined</div>` +
      results.map((p, i) => `
        <div class="result-card ${i===0?'best':''}">
          ${i===0 ? '<span class="best-badge" style="display:block;margin-bottom:.5rem">Best Package</span>' : ''}
          <div class="pkg-sections">
            <div class="pkg-section">
              <h4>✈️ Flight</h4>
              <p>${p.flight.airline} ${p.flight.flightNumber}</p>
              <p>${p.flight.origin} → ${p.flight.destination}</p>
              <p style="font-size:.78rem;color:#64748b">${fmtDuration(p.flight.duration)} · ${p.flight.stops===0?'Direct':p.flight.stops+' stop'}</p>
            </div>
            <div class="pkg-section">
              <h4>🏨 Hotel</h4>
              <p>${p.hotel.name}</p>
              <p>${stars(p.hotel.rating)}</p>
              <p style="font-size:.78rem;color:#64748b">${p.hotel.checkIn} → ${p.hotel.checkOut}</p>
            </div>
          </div>
          <div class="card-price">
            <div class="price">£${parseFloat(p.totalPrice).toFixed(0)}</div>
            <div class="per">flight + hotel</div>
            <a class="book-btn" href="${p.flight.deepLink}" target="_blank" rel="noopener">Book Now</a>
          </div>
        </div>`).join('');
  }
</script>
</body>
</html>
