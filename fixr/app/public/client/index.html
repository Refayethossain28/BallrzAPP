<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0d12" />
<link rel="manifest" href="./manifest.json" />
<title>Fixr</title>
<style>
  :root{--bg:#0b0d12;--panel:#13161d;--panel2:#181c25;--line:#262c39;--ink:#e8ecf4;
    --muted:#8a93a6;--gold:#c8a35b;--gold2:#e3c585;--green:#3ecf8e;--amber:#e3b341;--blue:#5b8def;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    max-width:520px;margin:0 auto;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
  header{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  .logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#7a5e26);display:grid;place-items:center;font-weight:800;color:#0b0d12}
  h1{font-size:17px;margin:0;letter-spacing:.5px} header small{display:block;color:var(--muted);font-size:11px}
  main{padding:16px}
  label{display:block;font-size:12px;color:var(--muted);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.4px}
  input,select{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:13px;font:inherit}
  input:focus,select:focus{outline:none;border-color:var(--gold)}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  button{font:inherit;font-weight:700;border:none;border-radius:12px;padding:15px;width:100%;cursor:pointer;margin-top:18px}
  .btn{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#0b0d12}
  .btn-ghost{background:var(--panel2);border:1px solid var(--line);color:var(--ink)}
  .quote{margin-top:16px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;display:none}
  .quote .row{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;padding:3px 0}
  .quote .total{display:flex;justify-content:space-between;font-size:22px;font-weight:800;border-top:1px solid var(--line);margin-top:8px;padding-top:10px}
  /* tracking */
  .track{display:none}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:14px}
  .status{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .statusbig{font-size:22px;font-weight:800;margin:4px 0 14px}
  .steps{display:flex;gap:6px;margin-bottom:16px}
  .step{flex:1;height:5px;border-radius:3px;background:var(--panel2)} .step.on{background:var(--green)}
  .line2{display:flex;gap:10px;padding:5px 0;font-size:14px}.line2 span{color:var(--muted);min-width:70px}
  .driver{display:flex;align-items:center;gap:12px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .av{width:42px;height:42px;border-radius:50%;background:var(--panel2);display:grid;place-items:center;font-weight:700;color:var(--gold2)}
  .pay{color:var(--gold2);font-weight:800}
  .trips{margin-top:20px} .trips h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .trip{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between}
  .err{color:var(--amber);font-size:13px;margin-top:10px}
</style>
</head>
<body>
<header><div class="logo">F</div><div><h1>FIXR</h1><small>Private car, on call</small></div></header>
<main>
  <div id="book">
    <label>Pickup</label><input id="pickup" placeholder="The Peninsula, 700 5th Ave" />
    <label>Drop-off</label><input id="dropoff" placeholder="JFK Airport — Terminal 4" />
    <div class="two">
      <div><label>When</label><input id="when" placeholder="Thu 6:00 AM" /></div>
      <div><label>Passengers</label><input id="pax" type="number" min="1" value="1" /></div>
    </div>
    <div class="two">
      <div><label>Vehicle</label><select id="vehicle">
        <option>Any</option><option>Sedan</option><option>Mercedes S-Class</option>
        <option>SUV</option><option>Cadillac Escalade</option><option>Sprinter Executive</option>
      </select></div>
      <div><label>Flight (optional)</label><input id="flight" placeholder="DL472" /></div>
    </div>
    <label>Your name</label><input id="name" placeholder="Mr. Alvarez" />
    <button class="btn" id="quote-btn">Get quote</button>
    <div class="quote" id="quote"></div>
    <button class="btn" id="book-btn" style="display:none">Confirm booking</button>
    <div class="err" id="err"></div>
    <div class="trips" id="trips"></div>
  </div>

  <div class="track" id="track">
    <div class="card">
      <div class="status">Your ride</div>
      <div class="statusbig" id="t-status">—</div>
      <div class="steps" id="t-steps"></div>
      <div class="line2"><span>From</span><b id="t-from"></b></div>
      <div class="line2"><span>To</span><b id="t-to"></b></div>
      <div class="line2"><span>When</span><b id="t-when"></b></div>
      <div class="line2"><span>Vehicle</span><b id="t-vehicle"></b></div>
      <div class="line2"><span>Fare</span><b class="pay" id="t-fare"></b></div>
      <div class="driver" id="t-driver" style="display:none"></div>
    </div>
    <button class="btn-ghost" id="back-btn">← Book another</button>
  </div>
</main>
<script src="./client.js"></script>
</body>
</html>
