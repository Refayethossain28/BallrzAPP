<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>ApexVIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes logoReveal{0%{opacity:0;transform:scale(.97) translateY(6px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes subtitleReveal{0%{opacity:0;letter-spacing:8px}100%{opacity:1;letter-spacing:5px}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes pinPulse{0%,100%{box-shadow:0 0 0 4px rgba(212,168,67,.3),0 0 0 10px rgba(212,168,67,.1)}50%{box-shadow:0 0 0 7px rgba(212,168,67,.2),0 0 0 18px rgba(212,168,67,.04)}}
@keyframes orb1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-28px) scale(1.12)}}
@keyframes orb2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-28px,36px) scale(.92)}}
@keyframes orb3{0%{transform:translate(0,0)}100%{transform:translate(22px,-18px)}}
@keyframes ringExpand{0%{transform:translate(-50%,-50%) scale(.8);opacity:.6}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}

/* Map */
.map-bg{position:absolute;inset:0;background:#030303;overflow:hidden}
.map-orb{position:absolute;border-radius:50%;filter:blur(70px)}
.map-orb-1{width:480px;height:480px;top:0%;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(212,168,67,.07) 0%,transparent 70%);animation:orb1 10s ease-in-out infinite alternate}
.map-orb-2{width:320px;height:320px;bottom:28%;right:-70px;background:radial-gradient(circle,rgba(80,100,200,.05) 0%,transparent 70%);animation:orb2 14s ease-in-out infinite alternate}
.map-orb-3{width:220px;height:220px;top:12%;left:-50px;background:radial-gradient(circle,rgba(170,130,70,.04) 0%,transparent 70%);animation:orb3 8s ease-in-out infinite alternate}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.018) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.018) 1px,transparent 1px);background-size:52px 52px}
.map-pin{position:absolute;top:36%;left:50%;transform:translate(-50%,-50%);z-index:2}
.map-pin-ring{position:absolute;width:36px;height:36px;border-radius:50%;border:1px solid rgba(212,168,67,.25);top:50%;left:50%;transform:translate(-50%,-50%);animation:pinPulse 2.8s ease-in-out infinite}
.map-pin-ring2{position:absolute;width:36px;height:36px;border-radius:50%;border:1px solid rgba(212,168,67,.18);top:50%;left:50%;animation:ringExpand 3s ease-out infinite}
.map-pin-dot{width:13px;height:13px;border-radius:50%;background:#D4A843;position:relative;z-index:1}
.map-pin-shadow{width:5px;height:3px;background:rgba(0,0,0,.5);border-radius:50%;margin:5px auto 0;filter:blur(2px)}

/* Glass sheet */
.sheet{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(6,6,6,.86) 0%,rgba(0,0,0,.97) 50%);backdrop-filter:blur(50px) saturate(160%);-webkit-backdrop-filter:blur(50px) saturate(160%);border-radius:28px 28px 0 0;border-top:1px solid rgba(255,255,255,.08);animation:slideUpSheet .45s cubic-bezier(.16,1,.3,1);z-index:10}
.sheet-handle{width:30px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;margin:14px auto 0}

/* Top bar */
.top-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:56px 22px 16px;z-index:5}

/* Inputs */
input,textarea,select{width:100%;background:transparent;border:none;color:#fff;font-size:16px;outline:none;font-family:inherit;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.2)}
.field{background:rgba(255,255,255,.05);border-radius:16px;padding:15px 18px;border:1px solid rgba(255,255,255,.07);transition:border-color .2s}
.field:focus-within{border-color:rgba(212,168,67,.35)}
.inp-card{background:rgba(255,255,255,.04);border-radius:18px;padding:2px 16px;border:1px solid rgba(255,255,255,.07);transition:border-color .2s}
.inp-card:focus-within{border-color:rgba(212,168,67,.3)}
.inp-row{display:flex;align-items:center;gap:12px;padding:13px 0}
.inp-row+.inp-row{border-top:1px solid rgba(255,255,255,.05)}

/* Buttons */
.btn{width:100%;padding:18px;border-radius:18px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:transform .12s,opacity .15s}
.btn:active{transform:scale(.975);opacity:.88}
.btn-white{background:#fff;color:#000}
.btn-gold{background:linear-gradient(135deg,#D4A843 0%,#B8902E 100%);color:#000}
.btn-glass{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.1)}
.btn-ghost{background:transparent;color:rgba(212,168,67,.9);font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:inherit;padding:14px}
.btn-danger-outline{width:100%;padding:16px;background:transparent;border:1px solid rgba(239,68,68,.2);border-radius:16px;color:#f87171;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

/* Route */
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rdot-gold{background:#D4A843;box-shadow:0 0 0 3px rgba(212,168,67,.18)}
.rdot-outline{background:transparent;border:1.5px solid rgba(255,255,255,.3)}
.rline{width:1px;height:20px;background:rgba(255,255,255,.1);margin-left:4px}

/* Vehicle card */
.vcard{background:#0c0c0c;border-radius:22px;overflow:hidden;border:1.5px solid rgba(255,255,255,.07);cursor:pointer;transition:border-color .2s,transform .15s}
.vcard:active{transform:scale(.99)}
.vcard.sel{border-color:#D4A843}
.vcard-media{height:140px;position:relative;background:linear-gradient(145deg,#0a0a0a 0%,#151515 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
.vcard-badge{position:absolute;top:14px;left:14px;background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.22);color:#D4A843;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.2px}

/* Trip card */
.tcard{padding:18px 0;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
.tcard:last-child{border-bottom:none}

/* Nav */
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(4,4,4,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);padding:10px 0 34px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:rgba(255,255,255,.28);font-size:10px;font-weight:500;padding:6px 0;letter-spacing:.3px;transition:color .2s}
.nav-item.on{color:#fff}
.nav-pip{width:4px;height:4px;border-radius:50%;background:#D4A843;opacity:0;margin-top:-1px;transition:opacity .2s}
.nav-item.on .nav-pip{opacity:1}

/* Cards */
.card{background:rgba(255,255,255,.04);border-radius:20px;border:1px solid rgba(255,255,255,.07)}

/* Service grid */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.svc-card{background:rgba(255,255,255,.05);border-radius:16px;border:1px solid rgba(255,255,255,.07);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .15s}
.svc-card:active{background:rgba(255,255,255,.08);transform:scale(.96)}

/* Scroll */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.4px}
.tag-gold{background:rgba(212,168,67,.1);color:#D4A843}
.tag-gray{background:rgba(255,255,255,.07);color:rgba(255,255,255,.45)}
.tag-green{background:rgba(34,197,94,.1);color:#22c55e}
.tag-red{background:rgba(239,68,68,.1);color:#f87171}

/* Misc */
.back-row{display:flex;align-items:center;gap:12px;padding:56px 22px 20px}
.back-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.section-label{font-size:10px;font-weight:700;letter-spacing:2.5px;color:rgba(255,255,255,.25);text-transform:uppercase}
.err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);color:#f87171;padding:12px 16px;border-radius:14px;font-size:14px;margin-bottom:16px}
.divider{height:1px;background:rgba(255,255,255,.05);margin:4px 0}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase ──────────────────────────────────────────────────────────────
let auth, db, FIREBASE_ENABLED = false;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth(); db = firebase.firestore(); FIREBASE_ENABLED = true;
  }
} catch(e) { console.warn('Firebase init:', e.message); }

const $ = id => document.getElementById(id);
const app = document.getElementById('app');

let state = {
  screen: 'splash', user: null, booking: {}, selectedTrip: null,
  cards: [
    {id:1,brand:'Visa',last4:'4242',expiry:'09/27',color:'linear-gradient(135deg,#D4A843,#8B6914)',isDefault:true},
    {id:2,brand:'Mastercard',last4:'8888',expiry:'03/26',color:'linear-gradient(135deg,#1a1a2e,#16213e)',isDefault:false}
  ]
};

let TRIPS = [
  {id:'APX-4821',service:'Airport Transfer',pickup:'Heathrow Terminal 5',dropoff:'Mayfair, London W1',date:'29 May 2026',time:'14:30',vehicle:'Mercedes S-Class',status:'upcoming',price:'£185',driver:'James H.',rating:4.9,plate:'LX73 ABC',flight:'BA0247'},
  {id:'APX-4788',service:'Airport Transfer',pickup:'Mayfair, London W1',dropoff:'Gatwick North Terminal',date:'24 May 2026',time:'06:15',vehicle:'Mercedes V-Class',status:'completed',price:'£225',driver:'Michael T.',rating:4.8,plate:'LX72 DEF'},
  {id:'APX-4751',service:'By the Hour',pickup:'Knightsbridge',dropoff:'—',date:'18 May 2026',time:'10:00',vehicle:'Mercedes S-Class',status:'completed',price:'£260',driver:'David K.',rating:4.7,plate:'LX71 GHI'},
];

const NOTIFS = [
  {id:1,icon:'🚗',title:'Driver Assigned',body:"James Harrison will be your chauffeur for tomorrow's trip.",time:'2h ago',read:false},
  {id:2,icon:'✅',title:'Booking Confirmed',body:'Your Airport Transfer on 29 May is confirmed. Ref: APX-4821',time:'2h ago',read:false},
  {id:3,icon:'⭐',title:'Exclusive Offer',body:'Enjoy 20% off your next booking with code APEX20.',time:'1d ago',read:true},
];

const RECENT = ['Heathrow Terminal 5','Mayfair, London W1','Gatwick North Terminal','Canary Wharf E14'];

function go(screen, data) {
  if (data) state.selectedTrip = data;
  state.screen = screen;
  window.scrollTo(0,0);
  render();
}

function mapBg() {
  return `<div class="map-bg">
    <div class="map-orb map-orb-1"></div>
    <div class="map-orb map-orb-2"></div>
    <div class="map-orb map-orb-3"></div>
    <div class="map-grid"></div>
    <div class="map-pin">
      <div class="map-pin-ring2"></div>
      <div class="map-pin-ring"></div>
      <div class="map-pin-dot"></div>
      <div class="map-pin-shadow"></div>
    </div>
  </div>`;
}

function bottomNav(active) {
  const items = [
    {id:'home',label:'Home',svg:`<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>`},
    {id:'trips',label:'Trips',svg:`<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>`},
    {id:'profile',label:'Profile',svg:`<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`}
  ];
  return `<nav class="nav">${items.map(i=>`
    <div class="nav-item ${active===i.id?'on':''}" onclick="go('${i.id}')">
      ${i.svg}
      <span>${i.label}</span>
      <div class="nav-pip"></div>
    </div>`).join('')}</nav>`;
}

// ── Screens ────────────────────────────────────────────────────────────────
const screens = {

splash: () => `
<div style="min-height:100vh;display:flex;flex-direction:column;background:#000;overflow:hidden;position:relative">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 100%,rgba(212,168,67,.055),transparent);animation:fadeIn 2s 1s both ease"></div>
  <div style="position:absolute;width:700px;height:700px;top:-260px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(212,168,67,.032),transparent 62%);animation:orb1 14s ease-in-out infinite alternate"></div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;position:relative;z-index:1">
    <div style="text-align:center">
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:72px;font-weight:300;color:#fff;letter-spacing:2px;line-height:1;margin-bottom:18px;animation:logoReveal 1.4s .3s both cubic-bezier(.16,1,.3,1)">ApexVIP</div>
      <div style="font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;color:rgba(255,255,255,.38);text-transform:uppercase;animation:subtitleReveal 1.2s 1s both ease-out">Luxury Concierge Services</div>
    </div>
  </div>
  <div style="padding:0 28px 52px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;animation:slideUp .6s 1.8s both cubic-bezier(.16,1,.3,1)">
    <button class="btn btn-white" onclick="go('register')">Get started</button>
    <button class="btn btn-glass" onclick="go('login')">Sign in</button>
  </div>
</div>`,

login: () => {
  const err = state._loginErr ? `<div class="err">${state._loginErr}</div>` : '';
  return `
<div style="min-height:100vh;display:flex;flex-direction:column;background:#000;padding:0 24px;animation:fadeIn .3s ease">
  <div style="padding:52px 0 36px;position:relative">
    <div class="back-btn" onclick="go('splash')" style="position:absolute;left:0;top:52px">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </div>
    <div style="text-align:center;padding-top:4px">
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:40px;font-weight:300;color:#fff;letter-spacing:1px;line-height:1;margin-bottom:8px">ApexVIP</div>
      <div style="font-size:13px;color:rgba(255,255,255,.3);letter-spacing:.3px">Sign in to continue</div>
    </div>
  </div>
  <div style="flex:1">
    ${err}
    <div class="field" style="margin-bottom:10px"><input id="lemail" type="email" placeholder="Email address" value="client@apexvip.com"/></div>
    <div class="field" style="margin-bottom:8px"><input id="lpass" type="password" placeholder="Password" value="password"/></div>
    <div style="text-align:right;margin-bottom:28px">
      <button style="background:none;border:none;color:rgba(255,255,255,.3);font-size:13px;cursor:pointer;padding:8px 0;font-family:inherit">Forgot password?</button>
    </div>
    <button class="btn btn-white" onclick="doLogin()">Sign in</button>
    <div style="text-align:center;margin-top:22px;color:rgba(255,255,255,.3);font-size:14px">
      New here? <span style="color:#D4A843;cursor:pointer;font-weight:600" onclick="go('register')">Create account</span>
    </div>
  </div>
  <div style="margin-bottom:40px;padding:14px 18px;background:rgba(255,255,255,.03);border-radius:14px;border:1px solid rgba(255,255,255,.06);font-size:12px;color:rgba(255,255,255,.2);text-align:center;line-height:1.7">
    Demo account<br/>client@apexvip.com · password
  </div>
</div>`;
},

register: () => {
  const s = state._regStep || 1;
  const prog = `<div style="display:flex;gap:5px;margin-bottom:32px">${[1,2].map(i=>`<div style="flex:1;height:2px;border-radius:2px;background:${i<=s?'#fff':'rgba(255,255,255,.1)'}"></div>`).join('')}</div>`;
  if (s===3) return `
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;background:#000;text-align:center;animation:scaleIn .35s ease">
  <div style="width:82px;height:82px;border-radius:50%;background:rgba(34,197,94,.08);border:1.5px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;margin-bottom:28px">
    <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#22c55e" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  </div>
  <div style="font-size:28px;font-weight:700;margin-bottom:8px">All set</div>
  <div style="color:rgba(255,255,255,.35);font-size:15px;margin-bottom:48px;line-height:1.7">Your ApexVIP account is ready.</div>
  <button class="btn btn-white" onclick="state._regStep=1;go('home')">Open app</button>
</div>`;
  return `
<div style="min-height:100vh;display:flex;flex-direction:column;background:#000;padding:0 24px;animation:fadeIn .3s ease">
  <div class="back-row" style="padding-bottom:24px">
    <div class="back-btn" onclick="${s>1?'state._regStep=1;render()':'go(\'splash\')'}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </div>
    <div>
      <div style="font-size:24px;font-weight:700">Create account</div>
      <div style="font-size:14px;color:rgba(255,255,255,.3);margin-top:2px">Step ${s} of 2</div>
    </div>
  </div>
  ${prog}
  ${s===1?`
  <div class="field" style="margin-bottom:10px"><input id="rfn" placeholder="First name"/></div>
  <div class="field" style="margin-bottom:10px"><input id="rln" placeholder="Last name"/></div>
  <div class="field" style="margin-bottom:10px"><input id="rem" type="email" placeholder="Email address"/></div>
  <div class="field" style="margin-bottom:28px"><input id="rph" type="tel" placeholder="Phone number"/></div>
  <button class="btn btn-white" onclick="saveRegStep1()">Continue</button>
  `:`
  <div class="field" style="margin-bottom:10px"><input id="rpw" type="password" placeholder="Create password (min 8 chars)"/></div>
  <div class="field" style="margin-bottom:10px"><input id="rpc" type="password" placeholder="Confirm password"/></div>
  <div style="color:rgba(255,255,255,.25);font-size:12px;margin-bottom:28px;line-height:1.7">By creating an account you agree to our Terms and Privacy Policy.</div>
  <button class="btn btn-white" onclick="doRegister()">Create account</button>
  `}
</div>`;
},

home: () => {
  const name = state.user?.name?.split(' ')[0] || 'there';
  const hr = new Date().getHours();
  const greeting = hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening';
  const upcoming = TRIPS.filter(t=>t.status==='upcoming');
  const sheetH = upcoming.length ? 418 : 360;
  return `
<div style="position:relative;height:100vh;overflow:hidden;animation:fadeIn .3s ease">
  ${mapBg()}
  <div class="top-bar">
    <div>
      <div style="font-size:10px;color:rgba(255,255,255,.28);letter-spacing:3px;font-weight:600;text-transform:uppercase">ApexVIP</div>
      <div style="font-size:18px;font-weight:700;margin-top:3px">${greeting}, ${name}</div>
    </div>
    <div onclick="go('notifications')" style="position:relative;width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.09);display:flex;align-items:center;justify-content:center;cursor:pointer">

    <button onclick="signOut()" style="width:100%;padding:16px;background:transparent;border:1px solid rgba(255,255,255,.07);border-radius:16px;color:rgba(255,255,255,.35);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">Sign out</button>
    <div style="height:120px"></div>
  </div>
  ${bottomNav('profile')}
</div>`;
},

    <div class="back-btn" onclick="go('profile')">

// ── Actions ────────────────────────────────────────────────────────────────
async function doLogin(){
  const e=$('lemail')?.value||'',p=$('lpass')?.value||'';
  if(!FIREBASE_ENABLED){
    if(e==='client@apexvip.com'&&p==='password'){state.user={name:'Alexandra Stone',email:e};state._loginErr=null;go('home');}
    else{state._loginErr='Invalid email or password.';render();}
    return;
  }
  try{await auth.signInWithEmailAndPassword(e,p);}
  catch(err){state._loginErr='Invalid email or password.';render();}
}
function saveRegStep1(){
  state._regName=($('rfn')?.value||'')+' '+($('rln')?.value||'');
  state._regEmail=$('rem')?.value||'';
  state._regPhone=$('rph')?.value||'';
  state._regStep=2;render();
}
async function doRegister(){
  const pw=$('rpw')?.value||'',pc=$('rpc')?.value||'';
  if(pw.length<8){alert('Password must be at least 8 characters');return;}
  if(pw!==pc){alert('Passwords do not match');return;}
  if(!FIREBASE_ENABLED){state._regStep=3;render();return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(state._regEmail,pw);
    await cred.user.updateProfile({displayName:state._regName});
    await db.collection('users').doc(cred.user.uid).set({
      name:state._regName,email:state._regEmail,phone:state._regPhone||'',
      role:'client',tier:'standard',bookings:0,spent:0,
      joined:new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    state._regStep=3;render();
  }catch(err){alert(err.message);}
}
function saveRouteAndBook(){
  state.booking.pickup=$('ri_pu')?.value||'';
  state.booking.dropoff=$('ri_do')?.value||'';
  go('service-select');
}
function goBook(type){state.booking.serviceType=type;go('book-'+type);}
function saveAirport(){
  state.booking={...state.booking,
    pickup:$('ba_pu')?.value||state.booking.pickup||'',
    airport:$('ba_ap')?.value||'Heathrow T5',
    flight:$('ba_fl')?.value||'',
    date:$('ba_dt')?.value||'',
    time:$('ba_tm')?.value||''};
  go('vehicle-select');
}
function saveHourly(){
  state.booking={...state.booking,
    pickup:$('bh_pu')?.value||state.booking.pickup||'',
    date:$('bh_dt')?.value||'',
    time:$('bh_tm')?.value||'',
    duration:_dur.h,price:_dur.p};
  go('vehicle-select');
}
function saveDay(){
  state.booking={...state.booking,
    pickup:$('bd_pu')?.value||state.booking.pickup||'',
    date:$('bd_dt')?.value||'',
    notes:$('bd_notes')?.value||''};
  go('vehicle-select');
}
function selectVehicle(id,price,name){state.booking.vehicleId=id;state.booking.price=price;state.booking.vehicle=name;render();}
function goSummary(){if(state.booking.vehicleId)go('booking-summary');}
function applyPromo(){
  const v=$('promo_in')?.value||'';
  if(v.toUpperCase()==='APEX20'){state._promoApplied=true;render();}
  else alert('Invalid promo code');
}
function setPax(n,el){
  document.querySelectorAll('#ba_pax button').forEach(b=>{b.style.background='rgba(255,255,255,.06)';b.style.color='rgba(255,255,255,.5)';b.style.borderColor='rgba(255,255,255,.07)';});
  el.style.background='#D4A843';el.style.color='#000';el.style.borderColor='#D4A843';
  state.booking.passengers=n;
}
let _dur={h:3,p:195};
function setDur(h,p,el){
  _dur={h,p};
  document.querySelectorAll('#bh_dur button').forEach(b=>{b.style.background='rgba(255,255,255,.06)';b.style.color='rgba(255,255,255,.5)';b.style.borderColor='rgba(255,255,255,.07)';});
  el.style.background='#D4A843';el.style.color='#000';el.style.borderColor='#D4A843';
  const pr=$('bh_price');if(pr)pr.textContent='£'+p;
}
async function confirmBooking(){
  const ref='APX-'+(Math.floor(1000+Math.random()*9000));
  const base=state.booking.price||185;
  const disc=state._promoApplied?Math.round(base*.2):0;
  const vat=Math.round((base-disc)*.2);
  const total=base-disc+vat;
  const svcLabel={airport:'Airport Transfer',hourly:'By the Hour',day:'By the Day'}[state.booking.serviceType]||'Airport Transfer';
  if(FIREBASE_ENABLED&&auth.currentUser){
    try{
      await db.collection('bookings').add({
        ref,clientId:auth.currentUser.uid,clientName:state.user?.name||'',
        serviceType:state.booking.serviceType||'airport',serviceLabel:svcLabel,
        pickup:state.booking.pickup||'',dropoff:state.booking.dropoff||'',
        airport:state.booking.airport||'',flight:state.booking.flight||'',
        date:state.booking.date||'',time:state.booking.time||'',
        vehicle:state.booking.vehicle||'Mercedes S-Class',vehicleId:state.booking.vehicleId||'',
        price:total,baseFare:base,discount:disc,vat,
        promoApplied:state._promoApplied||false,status:'confirmed',
        driverName:'James Harrison',driverRating:4.9,driverPlate:'LX73 ABC',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(err){console.warn('Booking save:',err.message);}
  }
  state._confirmedRef=ref;state._promoApplied=false;go('booking-confirmed');
}
function goPayment(total){state._payTotal=total;state._payCardId=state.cards[0]?.id||null;state._addingCard=false;go('payment');}
function fmtCard(el){let v=el.value.replace(/\D/g,'').slice(0,16);el.value=v.replace(/(.{4})/g,'$1 ').trim();}
function fmtExpiry(el){let v=el.value.replace(/\D/g,'').slice(0,4);if(v.length>2)v=v.slice(0,2)+' / '+v.slice(2);el.value=v;}
function removeCard(id){state.cards=state.cards.filter(c=>c.id!==id);render();}
function signOut(){if(FIREBASE_ENABLED)auth.signOut();else{state.user=null;go('splash');}}

// ── Firebase auth ──────────────────────────────────────────────────────────
if(FIREBASE_ENABLED){
  let _unsub=null;
  auth.onAuthStateChanged(async user=>{
    if(user){
      try{
        const doc=await db.collection('users').doc(user.uid).get();
        const p=doc.exists?doc.data():{};
        state.user={uid:user.uid,name:p.name||user.displayName||user.email.split('@')[0],email:user.email};
      }catch(e){state.user={uid:user.uid,name:user.displayName||user.email.split('@')[0],email:user.email};}
      if(_unsub)_unsub();
      _unsub=db.collection('bookings').where('clientId','==',user.uid)
        .onSnapshot(snap=>{
          TRIPS.length=0;
          const docs=snap.docs.map(d=>({_docId:d.id,...d.data()}));
          docs.sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0));
          docs.forEach(d=>TRIPS.push({
            id:d.ref||d._docId,service:d.serviceLabel||'Airport Transfer',
            pickup:d.pickup||'',dropoff:d.airport||d.dropoff||'',
            date:d.date||'',time:d.time||'',vehicle:d.vehicle||'Mercedes S-Class',
            status:d.status||'confirmed',price:'£'+(d.price||0),
            driver:d.driverName||'TBA',rating:d.driverRating||4.9,
            plate:d.driverPlate||'',flight:d.flight||''
          }));
          if(['home','trips'].includes(state.screen))render();
        },()=>{});
      state._loginErr=null;
      if(['splash','login'].includes(state.screen))go('home');else render();
    }else{
      state.user=null;
      if(_unsub){_unsub();_unsub=null;}
      TRIPS.length=0;
      if(!['splash','login','register'].includes(state.screen))go('splash');
    }
  });
}

function render(){
  const fn=screens[state.screen];
  app.innerHTML=fn?fn():`<div style="padding:40px;text-align:center;color:rgba(255,255,255,.2)">Screen not found</div>`;
}

render();
</script>
