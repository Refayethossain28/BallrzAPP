<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>ApexVIP</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#000;color:#fff;font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}

/* ── Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Map area ── */
.map-bg{position:absolute;inset:0;background:#0a0a0a;overflow:hidden}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px}
.map-glow{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);width:300px;height:300px;background:radial-gradient(circle,rgba(201,168,76,.08) 0%,transparent 70%)}
.map-pin{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%)}
.map-pin-dot{width:14px;height:14px;border-radius:50%;background:#C9A84C;box-shadow:0 0 0 4px rgba(201,168,76,.25),0 0 0 8px rgba(201,168,76,.1)}
.map-pin-shadow{width:6px;height:3px;background:rgba(0,0,0,.3);border-radius:50%;margin:4px auto 0;filter:blur(2px)}

/* ── Bottom sheet ── */
.sheet{position:absolute;bottom:0;left:0;right:0;background:#111;border-radius:24px 24px 0 0;animation:slideUpSheet .35s cubic-bezier(.4,0,.2,1);z-index:10}
.sheet-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 0}

/* ── Top bar ── */
.top-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:54px 20px 16px;z-index:5}
.top-logo{font-size:13px;font-weight:800;letter-spacing:4px;color:#C9A84C}

/* ── Inputs ── */
input,textarea,select{width:100%;background:transparent;border:none;color:#fff;font-size:16px;outline:none;font-family:inherit;-webkit-appearance:none}
input::placeholder{color:#555}
.inp-wrap{background:#1a1a1a;border-radius:14px;padding:14px 16px;border:1px solid rgba(255,255,255,.06)}
.inp-wrap:focus-within{border-color:rgba(201,168,76,.4)}
.inp-line{display:flex;align-items:center;gap:12px;padding:11px 0}
.inp-line+.inp-line{border-top:1px solid rgba(255,255,255,.06)}

/* ── Buttons ── */
.btn{width:100%;padding:17px;border-radius:14px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;letter-spacing:.3px;transition:transform .1s,opacity .15s}
.btn:active{transform:scale(.98);opacity:.9}
.btn-white{background:#fff;color:#000}
.btn-gold{background:#C9A84C;color:#000}
.btn-dark{background:#1a1a1a;color:#fff;border:1px solid rgba(255,255,255,.08)}
.btn-ghost{background:transparent;color:#C9A84C;font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:inherit;padding:14px}

/* ── Route dots ── */
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rdot-gold{background:#C9A84C}
.rdot-outline{background:transparent;border:2px solid #555}
.rline{width:1px;height:18px;background:rgba(255,255,255,.12);margin-left:4px}

/* ── Vehicle card ── */
.vcard{background:#1a1a1a;border-radius:18px;overflow:hidden;border:1.5px solid rgba(255,255,255,.06);cursor:pointer;transition:border-color .2s}
.vcard.sel{border-color:#C9A84C}
.vcard-img{height:130px;background:linear-gradient(135deg,#111,#1c1c1c);display:flex;align-items:center;justify-content:center;position:relative}
.vcard-badge{position:absolute;top:12px;left:12px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:#C9A84C;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px}

/* ── Trip card ── */
.tcard{padding:16px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}
.tcard:last-child{border-bottom:none}

/* ── Nav ── */
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:#111;border-top:1px solid rgba(255,255,255,.06);padding:10px 0 32px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:#444;font-size:10px;font-weight:500;padding:6px 0;letter-spacing:.3px}
.nav-item.on{color:#fff}

/* ── Scrollable content ── */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* ── Tag ── */
.tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.tag-gold{background:rgba(201,168,76,.12);color:#C9A84C}
.tag-gray{background:rgba(255,255,255,.07);color:#888}
.tag-green{background:rgba(34,197,94,.12);color:#22c55e}
.tag-red{background:rgba(239,68,68,.12);color:#ef4444}

/* ── Misc ── */
.pill-row{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
.pill-row::-webkit-scrollbar{display:none}
.svc-pill{display:flex;align-items:center;gap:8px;padding:10px 16px;background:#1a1a1a;border-radius:12px;border:1px solid rgba(255,255,255,.06);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.svc-pill.on{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.4)}
.divider{height:1px;background:rgba(255,255,255,.06);margin:4px 0}
.back-row{display:flex;align-items:center;gap:10px;padding:54px 20px 16px}
.back-btn{width:38px;height:38px;border-radius:50%;background:#1a1a1a;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:12px 16px;border-radius:12px;font-size:14px;margin-bottom:16px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase init ──────────────────────────────────────────────────────────────────
let auth, db, FIREBASE_ENABLED = false;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth();
    db = firebase.firestore();
    FIREBASE_ENABLED = true;
  }
} catch(e) { console.warn('Firebase init:', e.message); }

const $ = id => document.getElementById(id);
const app = document.getElementById('app');

let state = {
  screen: 'splash',
  user: null,
  booking: {},
  selectedTrip: null,
  cards: [
    {id:1,brand:'Visa',last4:'4242',expiry:'09/27',color:'linear-gradient(135deg,#C9A84C,#8B6914)',isDefault:true},
    {id:2,brand:'Mastercard',last4:'8888',expiry:'03/26',color:'linear-gradient(135deg,#1a1a2e,#16213e)',isDefault:false}
  ]
};

let TRIPS = [
  {id:'APX-4821',service:'Airport Transfer',pickup:'Heathrow Terminal 5',dropoff:'Mayfair, London W1',date:'29 May 2026',time:'14:30',vehicle:'Mercedes S-Class',status:'upcoming',price:'£185',driver:'James H.',rating:4.9,plate:'LX73 ABC',flight:'BA0247'},
  {id:'APX-4788',service:'Airport Transfer',pickup:'Mayfair, London W1',dropoff:'Gatwick North Terminal',date:'24 May 2026',time:'06:15',vehicle:'Mercedes V-Class',status:'completed',price:'£225',driver:'Michael T.',rating:4.8,plate:'LX72 DEF'},
  {id:'APX-4751',service:'By the Hour',pickup:'Knightsbridge',dropoff:'—',date:'18 May 2026',time:'10:00',vehicle:'Mercedes S-Class',status:'completed',price:'£260',driver:'David K.',rating:4.7,plate:'LX71 GHI'},
];

const NOTIFS = [
  {id:1,icon:'🚗',title:'Driver Assigned',body:"James Harrison will be your chauffeur for tomorrow's trip.",time:'2h ago',read:false},
  {id:2,icon:'✅',title:'Booking Confirmed',body:'Your Airport Transfer on 29 May is confirmed. Ref: APX-4821',time:'2h ago',read:false},
  {id:3,icon:'⭐',title:'Exclusive Offer',body:'Enjoy 20% off your next booking with code APEX20.',time:'1d ago',read:true},
];

const RECENT = ['Heathrow Terminal 5','Mayfair, London W1','Gatwick North Terminal','Canary Wharf E14'];

function go(screen, data) {
  if (data) state.selectedTrip = data;
  state.screen = screen;
  window.scrollTo(0,0);
  render();
}

// ── Map background (used on home) ──────────────────────────────────────────────────────────
function mapBg() {
  return `<div class="map-bg">
    <div class="map-grid"></div>
    <div class="map-glow"></div>
    <div class="map-pin">
      <div class="map-pin-dot"></div>
      <div class="map-pin-shadow"></div>
    </div>
  </div>`;
}

// ── Bottom nav ───────────────────────────────────────────────────────────────────
function bottomNav(active) {
  const items = [
    {id:'home',label:'Home',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>'},
    {id:'trips',label:'Trips',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>'},
    {id:'profile',label:'Profile',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'}
  ];
  return `<nav class="nav">${items.map(i=>`<div class="nav-item ${active===i.id?'on':''}" onclick="go('${i.id}')">${i.svg}<span>${i.label}</span></div>`).join('')}</nav>`;
}

// ── Screens ─────────────────────────────────────────────────────────────────────
const screens = {

// ── Splash ──────────────────────────────────────────────────────────────────────
splash: () => `
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;background:#000;animation:fadeIn .4s ease">
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
    <div style="width:72px;height:72px;border-radius:50%;border:1.5px solid rgba(201,168,76,.4);display:flex;align-items:center;justify-content:center;margin-bottom:32px">
      <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="#C9A84C" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/></svg>
    </div>
    <div style="font-size:48px;font-weight:800;letter-spacing:12px;color:#fff;line-height:1">APEX</div>
    <div style="font-size:20px;font-weight:300;letter-spacing:16px;color:rgba(255,255,255,.3);margin-top:6px">VIP</div>
    <div style="margin-top:20px;color:#333;font-size:12px;letter-spacing:3px;text-transform:uppercase">Premium Chauffeur</div>
  </div>
  <div style="width:100%;display:flex;flex-direction:column;gap:12px;padding-bottom:20px">
    <button class="btn btn-white" onclick="go('register')">Get started</button>
    <button class="btn btn-dark" onclick="go('login')">Sign in</button>
  </div>
</div>`,

// ── Login ────────────────────────────────────────────────────────────────────────
login: () => {
  const err = state._loginErr ? `<div class="error-box">${state._loginErr}</div>` : '';
  return `
<div style="min-height:100vh;display:flex;flex-direction:column;background:#000;padding:0 24px;animation:fadeIn .3s ease">
  <div style="padding:60px 0 32px;display:flex;align-items:center;gap:14px">
    <div class="back-btn" style="background:transparent;border-color:rgba(255,255,255,.1)" onclick="go('splash')">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </div>
    <div>
      <div style="font-size:22px;font-weight:700">Sign in</div>
      <div style="font-size:14px;color:#555;margin-top:2px">Welcome back</div>
    </div>
  </div>
  <div style="flex:1">
    ${err}
    <div class="inp-wrap" style="margin-bottom:10px">
      <input id="lemail" type="email" placeholder="Email address" value="client@apexvip.com"/>
    </div>
    <div class="inp-wrap" style="margin-bottom:6px">
      <input id="lpass" type="password" placeholder="Password" value="password"/>
    </div>
    <div style="text-align:right;margin-bottom:28px">
      <button style="background:none;border:none;color:#555;font-size:13px;cursor:pointer;padding:8px 0">Forgot password?</button>
    </div>
    <button class="btn btn-white" onclick="doLogin()">Sign in</button>
    <div style="text-align:center;margin-top:20px;color:#444;font-size:14px">
      New to ApexVIP? <span style="color:#C9A84C;cursor:pointer;font-weight:600" onclick="go('register')">Create account</span>
    </div>
  </div>
  <div style="padding:20px 0;background:#0d0d0d;border-radius:14px;padding:14px 16px;margin-bottom:32px;font-size:12px;color:#333;text-align:center">
    Demo · client@apexvip.com / password
  </div>
</div>`;
},

// ── Register ─────────────────────────────────────────────────────────────────────────
register: () => {
  const s = state._regStep || 1;
  const progress = `<div style="display:flex;gap:4px;margin-bottom:32px">${[1,2].map(i=>`<div style="flex:1;height:2px;border-radius:2px;background:${i<=s?'#fff':'rgba(255,255,255,.1)'}"></div>`).join('')}</div>`;
  if (s===3) return `
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;background:#000;text-align:center;animation:scaleIn .35s ease">
  <div style="width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,.1);border:1.5px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;margin-bottom:28px">
    <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#22c55e" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  </div>
  <div style="font-size:26px;font-weight:700;margin-bottom:8px">You're all set</div>
  <div style="color:#555;font-size:15px;margin-bottom:48px;line-height:1.6">Your ApexVIP account is ready.</div>
  <button class="btn btn-white" onclick="state._regStep=1;go('home')">Open app</button>
</div>`;
  return `
<div style="min-height:100vh;display:flex;flex-direction:column;background:#000;padding:0 24px;animation:fadeIn .3s ease">
  <div style="padding:60px 0 24px;display:flex;align-items:center;gap:14px">
    <div class="back-btn" style="background:transparent;border-color:rgba(255,255,255,.1)" onclick="${s>1?'state._regStep=1;render()':"go('splash')"}">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </div>
    <div>
      <div style="font-size:22px;font-weight:700">Create account</div>
      <div style="font-size:14px;color:#555;margin-top:2px">Step ${s} of 2</div>
    </div>
  </div>
  ${progress}
  ${s===1?`
  <div class="inp-wrap" style="margin-bottom:10px"><input id="rfn" placeholder="First name"/></div>
  <div class="inp-wrap" style="margin-bottom:10px"><input id="rln" placeholder="Last name"/></div>
  <div class="inp-wrap" style="margin-bottom:10px"><input id="rem" type="email" placeholder="Email address"/></div>
  <div class="inp-wrap" style="margin-bottom:28px"><input id="rph" type="tel" placeholder="Phone number"/></div>
  <button class="btn btn-white" onclick="saveRegStep1()">Continue</button>
  `:`
  <div class="inp-wrap" style="margin-bottom:10px"><input id="rpw" type="password" placeholder="Create password (min 8 chars)"/></div>
  <div class="inp-wrap" style="margin-bottom:8px"><input id="rpc" type="password" placeholder="Confirm password"/></div>
  <div style="color:#444;font-size:12px;margin-bottom:28px;line-height:1.6">By creating an account you agree to our Terms and Privacy Policy.</div>
  <button class="btn btn-white" onclick="doRegister()">Create account</button>
  `}
</div>`;
},

// ── Home ─────────────────────────────────────────────────────────────────────────
home: () => {
  const name = state.user?.name?.split(' ')[0] || 'there';
  const upcoming = TRIPS.filter(t=>t.status==='upcoming');
  const sheetH = upcoming.length ? 390 : 340;
  return `
<div style="position:relative;height:100vh;overflow:hidden;animation:fadeIn .3s ease">
  ${mapBg()}
  <div class="top-bar">
    <div>
      <div style="font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase">ApexVIP</div>
      <div style="font-size:17px;font-weight:600;margin-top:1px">Hi, ${name}</div>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <div onclick="go('notifications')" style="position:relative;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
        <div style="position:absolute;top:8px;right:8px;width:7px;height:7px;border-radius:50%;background:#C9A84C;border:1.5px solid #000"></div>
      </div>
    </div>
  </div>

  <div class="sheet" style="height:${sheetH}px">
    <div class="sheet-handle"></div>
    <div style="padding:20px 20px 0">
      <div onclick="go('route-input')" style="display:flex;align-items:center;gap:12px;background:#000;border-radius:14px;padding:16px 18px;margin-bottom:20px;cursor:pointer;border:1px solid rgba(255,255,255,.08)">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#555" stroke-width="2"><circle cx="11" cy="11" r="8"/><path stroke-linecap="round" d="M21 21l-4.35-4.35"/></svg>
        <span style="color:#555;font-size:16px;font-weight:500">Where to?</span>
        <div style="margin-left:auto;background:#C9A84C;border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:#000">BOOK</div>
      </div>

      <div style="font-size:11px;color:#444;letter-spacing:2px;font-weight:600;margin-bottom:12px">SERVICES</div>
      <div class="pill-row" style="margin-bottom:20px">
        ${
          [{t:'airport',icon:'✈',l:'Airport'},
          {t:'hourly',icon:'⏱',l:'By the Hour'},
          {t:'day',icon:'📅',l:'Full Day'},
        ].map(s=>`<div class="svc-pill" onclick="goBook('${s.t}')">
          <span style="font-size:16px">${s.icon}</span>
          <span style="font-size:13px;font-weight:600;color:#ccc">${s.l}</span>
        </div>`).join('')}
      </div>

      ${upcoming.length ? `
      <div style="font-size:11px;color:#444;letter-spacing:2px;font-weight:600;margin-bottom:12px">UPCOMING</div>
      ${upcoming.slice(0,1).map(t=>`
      <div onclick="go('trip-detail',TRIPS.find(x=>x.id==='${t.id}'))" style="display:flex;align-items:center;gap:14px;background:#1a1a1a;border-radius:14px;padding:14px;cursor:pointer">
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#C9A84C" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/></svg>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.pickup} → ${t.dropoff}</div>
          <div style="font-size:12px;color:#555;margin-top:2px">${t.date} · ${t.time}</div>
        </div>
        <div style="font-size:16px;font-weight:700;color:#C9A84C;flex-shrink:0">${t.price}</div>
      </div>`).join('')}` : ''}
    </div>
  </div>
  ${bottomNav('home')}
</div>`;
},

// ── Actions ──────────────────────────────────────────────────────────────────────────────
async function doLogin(){
  const e=$('lemail')?.value||'',p=$('lpass')?.value||'';
  if(!FIREBASE_ENABLED){
    if(e==='client@apexvip.com'&&p==='password'){state.user={name:'Alexandra Stone',email:e};state._loginErr=null;go('home');}
    else{state._loginErr='Invalid email or password.';render();}
    return;
  }
  try{await auth.signInWithEmailAndPassword(e,p);}
  catch(err){state._loginErr='Invalid email or password.';render();}
}
function saveRegStep1(){
  state._regName=($('rfn')?.value||'')+' '+($('rln')?.value||'');
  state._regEmail=$('rem')?.value||'';
  state._regPhone=$('rph')?.value||'';
  state._regStep=2;render();
}
async function doRegister(){
  const pw=$('rpw')?.value||'',pc=$('rpc')?.value||'';
  if(pw.length<8){alert('Password must be at least 8 characters');return;}
  if(pw!==pc){alert('Passwords do not match');return;}
  if(!FIREBASE_ENABLED){state._regStep=3;render();return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(state._regEmail,pw);
    await cred.user.updateProfile({displayName:state._regName});
    await db.collection('users').doc(cred.user.uid).set({
      name:state._regName,email:state._regEmail,phone:state._regPhone||'',
      role:'client',tier:'standard',bookings:0,spent:0,
      joined:new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    state._regStep=3;render();
  }catch(err){alert(err.message);}
}
function saveRouteAndBook(){
  state.booking.pickup=$('ri_pu')?.value||'';
  state.booking.dropoff=$('ri_do')?.value||'';
  go('service-select');
}
function goBook(type){state.booking.serviceType=type;go('book-'+type);}
function saveAirport(){
  state.booking={...state.booking,
    pickup:$('ba_pu')?.value||state.booking.pickup||'',
    airport:$('ba_ap')?.value||'Heathrow T5',
    flight:$('ba_fl')?.value||'',
    date:$('ba_dt')?.value||'',
    time:$('ba_tm')?.value||''};
  go('vehicle-select');
}
function saveHourly(){
  state.booking={...state.booking,
    pickup:$('bh_pu')?.value||state.booking.pickup||'',
    date:$('bh_dt')?.value||'',
    time:$('bh_tm')?.value||'',
    duration:_dur.h,price:_dur.p};
  go('vehicle-select');
}
function saveDay(){
  state.booking={...state.booking,
    pickup:$('bd_pu')?.value||state.booking.pickup||'',
    date:$('bd_dt')?.value||'',
    notes:$('bd_notes')?.value||''};
  go('vehicle-select');
}
function selectVehicle(id,price,name){
  state.booking.vehicleId=id;state.booking.price=price;state.booking.vehicle=name;render();
}
function goSummary(){if(state.booking.vehicleId)go('booking-summary');}
function applyPromo(){
  const v=$('promo_in')?.value||'';
  if(v.toUpperCase()==='APEX20'){state._promoApplied=true;render();}
  else alert('Invalid promo code');
}
function setPax(n,el){
  document.querySelectorAll('#ba_pax button').forEach(b=>{b.style.background='#1a1a1a';b.style.color='#666';b.style.borderColor='rgba(255,255,255,.06)';});
  el.style.background='#C9A84C';el.style.color='#000';el.style.borderColor='#C9A84C';
  state.booking.passengers=n;
}
let _dur={h:3,p:195};
function setDur(h,p,el){
  _dur={h,p};
  document.querySelectorAll('#bh_dur button').forEach(b=>{b.style.background='#1a1a1a';b.style.color='#666';b.style.borderColor='rgba(255,255,255,.06)';});
  el.style.background='#C9A84C';el.style.color='#000';el.style.borderColor='#C9A84C';
  const pr=$('bh_price');if(pr)pr.textContent='£'+p;
}
async function confirmBooking(){
  const ref='APX-'+(Math.floor(1000+Math.random()*9000));
  const base=state.booking.price||185;
  const disc=state._promoApplied?Math.round(base*.2):0;
  const vat=Math.round((base-disc)*.2);
  const total=base-disc+vat;
  const svcLabel={airport:'Airport Transfer',hourly:'By the Hour',day:'By the Day'}[state.booking.serviceType]||'Airport Transfer';
  if(FIREBASE_ENABLED&&auth.currentUser){
    try{
      await db.collection('bookings').add({
        ref,clientId:auth.currentUser.uid,clientName:state.user?.name||'',
        serviceType:state.booking.serviceType||'airport',serviceLabel:svcLabel,
        pickup:state.booking.pickup||'',dropoff:state.booking.dropoff||'',
        airport:state.booking.airport||'',flight:state.booking.flight||'',
        date:state.booking.date||'',time:state.booking.time||'',
        vehicle:state.booking.vehicle||'Mercedes S-Class',vehicleId:state.booking.vehicleId||'',
        price:total,baseFare:base,discount:disc,vat,
        promoApplied:state._promoApplied||false,status:'confirmed',
        driverName:'James Harrison',driverRating:4.9,driverPlate:'LX73 ABC',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(err){console.warn('Booking save:',err.message);}
  }
  state._confirmedRef=ref;state._promoApplied=false;go('booking-confirmed');
}
function removeCard(id){state.cards=state.cards.filter(c=>c.id!==id);render();}
function signOut(){if(FIREBASE_ENABLED)auth.signOut();else{state.user=null;go('splash');}}

// ── Firebase auth listener ───────────────────────────────────────────────────────────────────────
if(FIREBASE_ENABLED){
  let _unsub=null;
  auth.onAuthStateChanged(async user=>{
    if(user){
      try{
        const doc=await db.collection('users').doc(user.uid).get();
        const p=doc.exists?doc.data():{};
        state.user={uid:user.uid,name:p.name||user.displayName||user.email.split('@')[0],email:user.email};
      }catch(e){state.user={uid:user.uid,name:user.displayName||user.email.split('@')[0],email:user.email};}
      if(_unsub)_unsub();
      _unsub=db.collection('bookings').where('clientId','==',user.uid)
        .onSnapshot(snap=>{
          TRIPS.length=0;
          const docs=snap.docs.map(d=>({_docId:d.id,...d.data()}));
          docs.sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0));
          docs.forEach(d=>TRIPS.push({
            id:d.ref||d._docId,service:d.serviceLabel||'Airport Transfer',
            pickup:d.pickup||'',dropoff:d.airport||d.dropoff||'',
            date:d.date||'',time:d.time||'',vehicle:d.vehicle||'Mercedes S-Class',
            status:d.status||'confirmed',price:'£'+(d.price||0),
            driver:d.driverName||'TBA',rating:d.driverRating||4.9,
            plate:d.driverPlate||'',flight:d.flight||''
          }));
          if(['home','trips'].includes(state.screen))render();
        },()=>{});
      state._loginErr=null;
      if(['splash','login'].includes(state.screen))go('home');else render();
    }else{
      state.user=null;
      if(_unsub){_unsub();_unsub=null;}
      TRIPS.length=0;
      if(!['splash','login','register'].includes(state.screen))go('splash');
    }
  });
}

function render(){
  const fn=screens[state.screen];
  app.innerHTML=fn?fn():`<div style="padding:40px;text-align:center;color:#333">Screen not found</div>`;
}

render();
</script>
