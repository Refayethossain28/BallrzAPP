            <div style="font-size:14px;font-weight:700">${h.name}</div>
            <div style="font-size:11px;color:var(--fg-3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.area} · ★ ${h.rating.toFixed(1)}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:14px;font-weight:800;color:#D4A843">£${hotelRate(h).nightly.toLocaleString()}</div>
            <div style="font-size:9px;color:var(--fg-4)">avg / night</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="state.booking.dropoff='${h.name.replace(/'/g,"\\'")}';state.booking.serviceType='airport';state._conciergeHotels=null;state._conciergeParsed={serviceType:'airport',dropoff:'${h.name.replace(/'/g,"\\'")}'};render()" style="flex:1;padding:9px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--fg-2);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Car to hotel</button>
          <button onclick="openHotelBooking('${h.url}','${h.name.replace(/'/g,"\\'")}')" style="flex:1;padding:9px;background:var(--gold);border:none;border-radius:10px;color:#0c0b09;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit">Book hotel ↗</button>
        </div>
      </div>`).join('')}
      <button onclick="state._conciergeHotels=null;go('hotels')" style="background:none;border:none;color:#D4A843;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;padding:6px;align-self:center">View all hotels →</button>
    </div>` : ''}

    ${state._pendingModify ? `
    <div style="align-self:stretch;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-top:4px">
      <div style="font-size:12px;color:var(--fg-3);margin-bottom:10px">Confirm change to booking <strong>${state._pendingModify.ref}</strong>?</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" style="flex:1;font-size:13px" onclick="applyModifyBooking()">Confirm</button>
        <button class="btn btn-glass" style="flex:1;font-size:13px" onclick="state._pendingModify=null;render()">Cancel</button>
      </div>
    </div>` : ''}

    ${state._pendingRecurring ? `
    <div style="align-self:stretch;background:var(--surface);border:1px solid rgba(212,168,67,.3);border-radius:14px;padding:14px 16px;margin-top:4px">
      <div style="font-size:10px;color:var(--fg-4);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Recurring Booking</div>
      <div style="font-size:15px;font-weight:700;margin-bottom:10px">Every ${state._pendingRecurring.recurringPattern?.dayOfWeek} at ${state._pendingRecurring.recurringPattern?.time}</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" style="flex:1;font-size:13px" onclick="saveRecurringBooking()">Set up →</button>
        <button class="btn btn-glass" style="flex:1;font-size:13px" onclick="state._pendingRecurring=null;render()">Cancel</button>
      </div>
    </div>` : ''}

    ${state._pendingFlightUpdate ? `
    <div style="align-self:stretch;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-top:4px">
      <div style="font-size:12px;color:var(--fg-3);margin-bottom:10px">Update pickup time to <strong>${state._pendingFlightUpdate.newTime||'new time'}</strong>?</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" style="flex:1;font-size:13px" onclick="applyFlightUpdate()">Update</button>
        <button class="btn btn-glass" style="flex:1;font-size:13px" onclick="state._pendingFlightUpdate=null;render()">Dismiss</button>
      </div>
    </div>` : ''}

    ${state._conciergeParsed && !state._quotedPrice && !state._pendingRecurring ? `<button class="btn btn-gold" style="margin-top:8px" onclick="conciergeReview()">Review &amp; Confirm Booking →</button>` : ''}
  </div>
  <div style="padding:12px 20px max(40px,calc(env(safe-area-inset-bottom,0px) + 20px));border-top:1px solid var(--divider);background:var(--bg);position:sticky;bottom:0">
    <div class="field" style="display:flex;align-items:center;gap:8px;padding:10px 14px">
      <!-- Mic button — styled by _setUI() directly, no render() dependency -->
      <button data-mic-btn onclick="startVoiceInput()" title="Voice input"
        style="background:var(--surface-2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .2s,border-color .2s">
        <svg width="15" height="15" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="color:var(--fg-3)">
          <rect x="9" y="2" width="6" height="11" rx="3" fill="currentColor"/>
          <path d="M5 11a7 7 0 0 0 14 0" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          <line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="9" y1="22" x2="15" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

      </button>
      <input id="concierge-inp" placeholder="Tell me where you'd like to go…" style="flex:1;font-size:15px"

      </button>
    </div>
    <div id="voice-ind" style="display:none;text-align:center;font-size:11px;color:#ff3b30;letter-spacing:.5px;margin-top:2px;animation:micPulse .75s ease-in-out infinite">● Recording — speak now</div>
  </div>
</div>`,

function loginTransition(){
  const logo=document.getElementById('login-logo');
  if(!logo){go('home');return;}
  const rect=logo.getBoundingClientRect();
  // Full-screen overlay keeps the background solid while home screen renders beneath
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;z-index:9999;pointer-events:none;background:var(--bg)';
  const cl=document.createElement('div');
  cl.textContent='ApexVIP';
  cl.style.cssText=`position:absolute;left:${rect.left}px;top:${rect.top}px;font-family:'Cormorant Garamond',Georgia,serif;font-size:40px;font-weight:300;color:#fff;letter-spacing:1px;line-height:1;white-space:nowrap;will-change:transform,opacity;transform-origin:left top`;
  ov.appendChild(cl);
  document.body.appendChild(ov);
  // Render home underneath
  go('home');
  // Two rAFs ensure DOM is painted before we start the transition
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    const dx=22-rect.left;
    const dy=52-rect.top;
    cl.style.transition='transform .7s cubic-bezier(0.16,1,0.3,1),opacity .4s ease .38s';
    cl.style.transform=`translate(${dx}px,${dy}px) scale(0.25)`;
    cl.style.opacity='0';
    ov.style.transition='opacity .55s ease .15s';
    ov.style.opacity='0';
    setTimeout(()=>ov.remove(),950);
  }));
}

async function doLogin(){
  const e=$('lemail')?.value||'',p=$('lpass')?.value||'';
  const btn=document.querySelector('[onclick="doLogin()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:spin .7s linear infinite"><path d="M12 2a10 10 0 0 1 10 10"/></svg>';}
  if(!FIREBASE_ENABLED){
    // Real accounts only — sign-in requires the live backend.
    state._loginErr='Sign-in requires a connection. Please try again online.';haptic('error');render();
    return;
  }
  if(!e||!p){state._loginErr='Please enter your email and password.';haptic('error');render();return;}
  try{
    await auth.signInWithEmailAndPassword(e,p);
    haptic('success');
  } catch(err){
    state._loginErr=_authErrorMsg(err);haptic('error');render();
  }
}
// Map Firebase auth error codes to clear, friendly copy
function _authErrorMsg(err){
  const c=(err&&err.code)||'';
  switch(c){
    case 'auth/invalid-email': return 'That email address doesn\'t look right.';
    case 'auth/user-disabled': return 'This account has been disabled. Contact support.';
    case 'auth/user-not-found':
    case 'auth/wrong-password':
    case 'auth/invalid-credential': return 'Email or password is incorrect.';
    case 'auth/too-many-requests': return 'Too many attempts. Please try again shortly.';
    case 'auth/email-already-in-use': return 'An account with this email already exists.';
    case 'auth/weak-password': return 'Please choose a stronger password (8+ characters).';
    case 'auth/popup-closed-by-user': return 'Sign-in was cancelled.';
    case 'auth/operation-not-allowed': return 'This sign-in method isn\'t enabled yet.';
    case 'auth/network-request-failed': return 'Network error — check your connection.';
    default: return (err&&err.message)||'Something went wrong. Please try again.';
  }
}
async function forgotPassword(){
  const e=$('lemail')?.value||'';
  if(!FIREBASE_ENABLED){ alert('Password reset is available once connected to the live service.'); return; }
  if(!e){ state._loginErr='Enter your email above, then tap “Forgot password?”.'; render(); return; }
  try{
    await auth.sendPasswordResetEmail(e);
    state._loginErr=null; haptic('success');
    alert('If an account exists for '+e+', a password-reset link is on its way. Check your inbox.');
  }catch(err){ state._loginErr=_authErrorMsg(err); render(); }
}
async function socialSignIn(which){
  if(!FIREBASE_ENABLED){ alert('Social sign-in is available once connected to the live service.'); return; }
  try{
    const provider = which==='apple'
      ? new firebase.auth.OAuthProvider('apple.com')
      : new firebase.auth.GoogleAuthProvider();
    const cred = await auth.signInWithPopup(provider);
    // First social sign-in: create a client profile if missing
    const u = cred.user;
    if(u){
      const ref = db.collection('users').doc(u.uid);
      const snap = await ref.get().catch(()=>null);
      if(snap && !snap.exists){
        await ref.set({ name:u.displayName||'', email:u.email||'', phone:u.phoneNumber||'',
          role:'client', tier:'standard', bookings:0, spent:0,
          joined:new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
          createdAt:firebase.firestore.FieldValue.serverTimestamp() }, {merge:true}).catch(()=>{});
      }
    }
    track('user_login',{method:which,src:'client'}); haptic('success');
  }catch(err){ state._loginErr=_authErrorMsg(err); haptic('error'); render(); }
}
function saveRegStep1(){
  state._regName=($('rfn')?.value||'')+' '+($('rln')?.value||'');

async function doRegister(){
  const pw=state._regPass||$('rpw')?.value||'';
  if(pw.length<8){alert('Password must be at least 8 characters');return;}
  if(!FIREBASE_ENABLED){state._regStep=4;render();return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(state._regEmail,pw);
    await cred.user.updateProfile({displayName:state._regName});
    cred.user.sendEmailVerification().catch(()=>{}); // verify email (non-blocking)
    try{
      await db.collection('users').doc(cred.user.uid).set({
        name:state._regName,email:state._regEmail,phone:state._regPhone||'',
        role:'client',tier:'standard',bookings:0,spent:0,
        joined:new Date().toLocaleDateString('en-GB',{month:'short',year:'numeric'}),
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(fsErr){console.warn('Profile save:',fsErr.message);}
    state.user={uid:cred.user.uid,name:state._regName,email:state._regEmail};
    state._regStep=4;render();
  }catch(err){state._loginErr=_authErrorMsg(err);alert(_authErrorMsg(err));}
}

async function runSquarePayment(){
  const btn = document.getElementById('sq-pay-btn');
  const errEl = document.getElementById('sq-error');
  if(errEl) errEl.style.display='none';
  if(!_sqCard){alert('Payment form not ready yet — please wait a moment and try again.');return;}
  if(btn){btn.disabled=true;btn.textContent='Processing…';}
  try{
    const result = await _sqCard.tokenize();
    if(result.status!=='OK'){
      const msg = result.errors?.map(e=>e.message).join(', ')||'Card error';
      if(errEl){errEl.textContent=msg;errEl.style.display='block';}
      if(btn){btn.disabled=false;btn.textContent='Pay £'+(state._payTotal||0);}
      return;
    }
    const sourceId = result.token;
    const total = state._payTotal||0;
    const ref = 'APX-'+(Math.floor(1000+Math.random()*9000));
    state._confirmedRef = ref;

    // Strong Customer Authentication (UK/EU SCA / 3-D Secure) — required for most
    // card payments. Produces a verification token the server passes to Square.
    let verificationToken = null;
    if(btn) btn.textContent='Verifying…';
    try{
      const nm=(state.user?.name||'').trim().split(' ');
      const vr = await _sqPayments.verifyBuyer(sourceId, {
        amount:String(total), currencyCode:'GBP', intent:'CHARGE',
        billingContact:{ givenName:nm[0]||'', familyName:nm.slice(1).join(' ')||'', email:state.user?.email||'' }
      });
      verificationToken = vr && vr.token || null;
    }catch(vErr){ console.warn('SCA verifyBuyer:', vErr.message); }
    if(btn) btn.textContent='Processing…';

    // Idempotency key so a retry never double-charges the customer.
    const idempotencyKey = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (ref+'-'+Date.now());
    let paymentId = null;
    // Try Cloud Function; fall back to storing token for manual processing
    if(FIREBASE_ENABLED && fns){
      try{
        const fn = fns.httpsCallable('processSquarePayment');
        const resp = await fn({sourceId, verificationToken, idempotencyKey, amount:total, currency:'GBP', bookingRef:ref});
        paymentId = resp.data.paymentId;
        track('payment_charged',{ref,total,paymentId,src:'client'});
      }catch(fnErr){
        await db.collection('pending_payments').add({
          sourceId, verificationToken, idempotencyKey, amount:total, currency:'GBP', bookingRef:ref, status:'pending',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        }).catch(()=>{});
        track('payment_token_stored',{ref,total,src:'client'});
      }
    } else {
      track('payment_demo',{ref,total,src:'client'});
    }
    state._squarePaymentId = paymentId;
    await confirmBooking(ref);
  }catch(e){
    if(errEl){errEl.textContent='Payment failed: '+e.message;errEl.style.display='block';}
    if(btn){btn.disabled=false;btn.textContent='Pay £'+(state._payTotal||0);}
  }
}

async function confirmBooking(overrideRef){
  // Subscription gate — after the free trial ends, booking requires membership.
  if (subState().mode === 'expired') { state._subOpen = true; render(); return; }
  const ref = overrideRef || state._confirmedRef || ('APX-'+(Math.floor(1000+Math.random()*9000)));
  const base=state.booking.price||185;
  // Fare math (discount + VAT-inclusive total) — shared, unit-tested engine.
  const {discount:disc,total,vat}=ApexEngine.quoteFare(base,!!state._promoApplied);
  const svcLabel={airport:'Airport Transfer',hourly:'By the Hour',day:'By the Day'}[state.booking.serviceType]||'Airport Transfer';
  if(FIREBASE_ENABLED&&auth.currentUser){
    try{
      const _bookingDoc = await db.collection('bookings').add({
        ref,clientId:auth.currentUser.uid,clientName:state.user?.name||'',
        clientEmail:auth.currentUser.email||'',
        serviceType:state.booking.serviceType||'airport',serviceLabel:svcLabel,
        pickup:state.booking.pickup||'',dropoff:state.booking.dropoff||'',
        airport:state.booking.airport||'',flight:state.booking.flight||'',
        date:state.booking.date||'',time:state.booking.time||'',
        vehicle:state.booking.vehicle||'Mercedes S-Class',vehicleId:state.booking.vehicleId||'',
        price:total,baseFare:base,discount:disc,vat,
        promoApplied:state._promoApplied||false,status:'confirmed',
        squarePaymentId:state._squarePaymentId||null,
        paymentStatus:state._squarePaymentId?'paid':'pending',
        driverName:'',driverRating:null,driverPlate:'',
        location:'london',
        concierge:state.booking.concierge||null,
        paMode: state.paMode || false,
        paPassenger: state.paMode ? state.paPassenger : null,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
      // open_jobs broadcast is handled exclusively by the onBookingCreated Cloud Function
      // to avoid duplicates. The function checks dispatch mode before broadcasting.
      state._chatDocId = _bookingDoc.id;
      state.booking.id = _bookingDoc.id;
    }catch(err){console.warn('Booking save:',err.message);}
  }
  state._confirmedRef=ref;state._promoApplied=false;state._squarePaymentId=null;
  pushBookingHistory();
  const _axcAmt=Math.round(total*0.05);
  earnApex(_axcAmt,'Trip booking');
  if(state._useApexCoin) track('apex_redeemed',{amount:total,src:'client'});
  track('booking_confirmed',{
    service:state.booking.serviceType||'airport',
    vehicle:state.booking.vehicle||'',
    price:total, base:base, disc:disc, vat,
    apex_earned:_axcAmt,
    paid_with_apex:!!(state._useApexCoin),
    pickup:state.booking.pickup||'',
    dropoff:state.booking.dropoff||state.booking.airport||'',
    scheduled_date:state.booking.date||'',
    scheduled_time:state.booking.time||'',
    user:state.user?.name||'Guest',
    ref,
    src:'client'
  });
  go('booking-confirmed');
}

async function useMyLocation(inputId){

  if(!input||!navigator.geolocation){alert('Geolocation not available on this device.');return;}
  const btn=input.nextElementSibling;
  const origPh=input.placeholder;
  input.placeholder='Locating…';
  input.disabled=true;
  if(btn)btn.style.opacity='.4';
  navigator.geolocation.getCurrentPosition(async({coords})=>{
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${coords.latitude}&lon=${coords.longitude}&format=json&addressdetails=1`,{headers:{'Accept-Language':'en'}});
      const d=await r.json();
      const a=d.address||{};
      const parts=[a.house_number,a.road,a.suburb||a.neighbourhood||a.quarter,a.city||a.town||a.village||a.county].filter(Boolean);
      const addr=parts.length>=2?parts.join(', '):(d.display_name||`${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`);
      input.value=addr;
      state.booking.pickup=addr;
    }catch(e){
      const coords_str=`${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`;
      input.value=coords_str;state.booking.pickup=coords_str;
    }
    input.placeholder=origPh;input.disabled=false;
    if(btn)btn.style.opacity='1';
  },()=>{
    alert('Location access was denied. Please allow location access in your browser settings, or type your address manually.');
    input.placeholder=origPh;input.disabled=false;
    if(btn)btn.style.opacity='1';
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

// ── Firebase auth ──────────────────────────────────────────────────────────
if(FIREBASE_ENABLED){
  let _unsub=null;
  auth.onAuthStateChanged(async user=>{
    if(user&&user.isAnonymous)return; // anonymous track-link viewers: no profile, no navigation
    if(user){
      try{
        const doc=await db.collection('users').doc(user.uid).get();
        const p=doc.exists?doc.data():{};
        state.user={uid:user.uid,name:p.name||user.displayName||user.email.split('@')[0],email:user.email};
      }catch(e){state.user={uid:user.uid,name:user.displayName||user.email.split('@')[0],email:user.email};}
      ensureSubscription();
      if(_unsub)_unsub();
      _unsub=db.collection('bookings').where('clientId','==',user.uid)
        .onSnapshot(snap=>{
          TRIPS.length=0;
          const docs=snap.docs.map(d=>({_docId:d.id,...d.data()}));
          docs.sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0));
          docs.forEach(d=>{
            const raw=d.status||'confirmed';
            // Map Firestore statuses → display status
            // 'confirmed','offered','accepted','en_route','arrived','onboard' → 'upcoming'
            // 'completed' and 'cancelled' stay as-is
            const dispStatus=['completed','cancelled'].includes(raw)?raw:'upcoming';
            TRIPS.push({
              id:esc(d.ref||d._docId),docId:d._docId,service:esc(d.serviceLabel||'Airport Transfer'),
              pickup:esc(d.pickup||''),dropoff:esc(d.airport||d.dropoff||''),
              date:esc(d.date||''),time:esc(d.time||''),vehicle:esc(d.vehicle||'Mercedes S-Class'),
              status:dispStatus,rawStatus:raw,price:'£'+(Number(d.price)||0),
              driver:esc(d.driverName||'TBA'),driverId:d.driverId||null,rating:Number(d.driverRating)||4.9,
              myRating:d.rating||null,
              plate:esc(d.driverPlate||''),flight:esc(d.flight||'')
            });
          });
          if(['home','trips'].includes(state.screen))render();
        },()=>{});
      // Watch latest booking for real-time status
      let _statusUnsub=null;
      function watchLatestBooking(){
        if(_statusUnsub){_statusUnsub();_statusUnsub=null;}
        if(!FIREBASE_ENABLED||!auth.currentUser)return;
        _statusUnsub=db.collection('bookings')
          .where('clientId','==',user.uid)
          .where('status','in',['confirmed','offered','accepted','en_route','arrived','onboard','completed'])
          .orderBy('createdAt','desc').limit(1)
          .onSnapshot(snap=>{
            if(!snap.empty){
              const d=snap.docs[0].data();
              if(!state._activeBooking)state._activeBooking={};
              const _bDocId=snap.docs[0].id;
              state._activeBooking.docId=_bDocId;
              state._chatDocId=_bDocId;
              state._confirmedRef=state._confirmedRef||d.ref||_bDocId;
              state._activeBooking.ref=d.ref||_bDocId;
              state._activeBooking.status=d.status;
              state._activeBooking.driverId=d.driverId||null;
              state._activeBooking.driverName=d.driverName?esc(d.driverName):null;
              state._activeBooking.driverPlate=esc(d.driverPlate||'');
              state._activeBooking.vehicle=esc(d.vehicle||'');
              if(d.status==='completed'&&state.screen==='active-trip'){
                state._lastTrip={ref:esc(d.ref),pickup:esc(d.pickup),dropoff:esc(d.dropoff||d.airport),base:d.baseFare||d.price,discount:d.discount||0,vat:d.vat||0,price:d.price};
                go('receipt');
              } else if(state.screen==='active-trip'||state.screen==='booking-confirmed')render();
            }
          },()=>{});
      }
      watchLatestBooking();
      state._loginErr=null;
      // Resume pending screen (e.g. payment gate intercepted before login)
      if(state._pendingScreen){
        const next=state._pendingScreen, pay=state._pendingPayment;
        state._pendingScreen=null; state._pendingPayment=null;
        go(next);
        if(pay==='arrival') setTimeout(payOnArrival, 500);
      } else if(state.screen==='login'){
        loginTransition();
      } else if(state.screen==='splash'){
        go('home');
      } else {
        render();
      }
      // Register FCM push token
      if('serviceWorker' in navigator && FIREBASE_ENABLED){
        navigator.serviceWorker.register('firebase-messaging-sw.js')
          .then(reg=>{
            try{
              const messaging=firebase.messaging();
              messaging.getToken({
                vapidKey:(typeof APEXVIP_VAPID_KEY !== 'undefined' && APEXVIP_VAPID_KEY ? APEXVIP_VAPID_KEY : ''),
                serviceWorkerRegistration:reg
              }).then(token=>{
                if(token&&auth.currentUser){
                  db.collection('fcm_tokens').doc(auth.currentUser.uid).set({
                    token,updatedAt:firebase.firestore.FieldValue.serverTimestamp()
                  }).catch(()=>{});
                }
              }).catch(()=>{});
            }catch(e){}
          }).catch(()=>{});
      }
    }else{
      state.user=null;
      if(_unsub){_unsub();_unsub=null;}
      TRIPS.length=0;
      if(!['splash','login','register'].includes(state.screen))go('splash');
    }
  });
}

function initTrackScreen(){
  const el=document.getElementById('track-map');
  if(!el||typeof L==='undefined')return;
  // Clean up any previous session
  if(state._trackUnsub){state._trackUnsub();state._trackUnsub=null;}
  if(state._trackSimInterval){clearInterval(state._trackSimInterval);state._trackSimInterval=null;}

  let dLat=51.5074+(Math.random()-.5)*.02;
  let dLng=-0.1278+(Math.random()-.5)*.02;
  const tLat=51.5245,tLng=-0.0865;
  const dark=state.theme!=='light';
  const tiles=dark
    ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

  const tMap=L.map('track-map',{zoomControl:false,attributionControl:false,scrollWheelZoom:false})
    .setView([dLat,dLng],14);
  L.tileLayer(tiles,{maxZoom:19}).addTo(tMap);

  const dIcon=L.divIcon({className:'',html:`<div style="width:38px;height:38px;border-radius:50%;background:#0c0b09;border:2.5px solid var(--gold,#C8A97E);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(200,169,126,.4)"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#C8A97E" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3m-1 9h-5m-1 0a2 2 0 100 4 2 2 0 000-4zm8 0a2 2 0 100 4 2 2 0 000-4zm-6-9h5l3 5"/></svg></div>`,iconSize:[38,38],iconAnchor:[19,19]});
  let dMarker=L.marker([dLat,dLng],{icon:dIcon}).addTo(tMap);

  L.polyline([[dLat,dLng],[tLat,tLng]],{color:'rgba(200,169,126,.45)',weight:2,dashArray:'6,8'}).addTo(tMap);

  // Live Firebase tracking
  if(FIREBASE_ENABLED&&state._trackDriverId){
    const trackFn=()=>{
      state._trackUnsub=db.collection('drivers').doc(state._trackDriverId).onSnapshot(doc=>{
        if(!doc.exists)return;
        const d=doc.data();
        if(!d.lat||!d.lng)return;
        if(!state._trackLive){
          state._trackLive=true;
          if(state._trackSimInterval){clearInterval(state._trackSimInterval);state._trackSimInterval=null;}
          const dot=document.getElementById('track-dot');
          const lbl=document.getElementById('track-lbl');
          if(dot){dot.style.background='#22c55e';dot.style.boxShadow='0 0 8px rgba(34,197,94,.5)';}
          if(lbl)lbl.textContent='Live · Your driver is on the way';
        }
        const pos=[d.lat,d.lng];
        dMarker.setLatLng(pos);
        if(!tMap.getBounds().contains(pos))tMap.panTo(pos,{animate:true});
      },()=>{});
    };
    // May need anonymous auth for non-logged-in viewers
    if(auth.currentUser){trackFn();}
    else{auth.signInAnonymously().then(trackFn).catch(()=>{});}
  } else {
    // Simulation
    const stepLat=(tLat-dLat)/180, stepLng=(tLng-dLng)/180;
    let steps=0;
    state._trackSimInterval=setInterval(()=>{
      if(steps>120)return;
      steps++;
      dLat+=stepLat*(0.5+Math.random());
      dLng+=stepLng*(0.5+Math.random());
      dMarker.setLatLng([dLat,dLng]);
    },3000);
  }

  // ETA countdown
  const etaInterval=setInterval(()=>{
    state._trackEta=Math.max(0,state._trackEta-3);
    const el=document.getElementById('track-eta');
    if(el)el.textContent=formatEtaMin(state._trackEta);
    if(state._trackEta===0)clearInterval(etaInterval);
  },3000);
}
function formatEtaMin(s){
  if(s<=0)return'Arriving now';
  const m=Math.ceil(s/60);
  return m<2?'1 min':m+' mins';
}

// render() coalesces bursts of state changes into a single repaint per frame:
// many handlers may call it in one tick, but the DOM is rebuilt only once (on the
// next animation frame). Use renderNow() when you must read the fresh DOM
// synchronously right after rendering.
let _renderQueued=false;
function render(){
  if(_renderQueued) return;
  _renderQueued=true;
  requestAnimationFrame(()=>{ _renderQueued=false; renderNow(); });
}
function renderNow(){
  try{
    document.body.setAttribute('data-screen',state.screen);
    const fn=screens[state.screen];
    app.innerHTML=(fn?fn():`<div style="padding:40px;text-align:center;color:var(--fg-4)">Screen not found</div>`)+subscribeSheet();
    renderAirportPickerPortal();
    if(state.screen==='home') setTimeout(initMap,60);
    if(state.screen==='payment') setTimeout(initSquare,60);
    if(state.screen==='active-trip') setTimeout(initTrackingMap,60);
    if(state.screen==='active-trip') setTimeout(startEtaCountdown,80);
    if(state.screen==='track') setTimeout(initTrackScreen,60);
    if(state.screen==='active-trip'||state.screen==='client-chat') setTimeout(()=>{ setupChatListener(state._chatDocId||state._activeBooking?.docId); },0);
    if(state.screen==='client-chat') setTimeout(()=>{ const el=document.getElementById('chat-msgs'); if(el)el.scrollTop=el.scrollHeight; },50);
    if(state.screen==='profile') setTimeout(loadReferralCode,100);
    if(state.screen==='hotels') setTimeout(refreshHotelRates,0);
    if(state.screen==='concierge') setTimeout(sizeConciergeFrame,0);
    enhanceA11y();
  }catch(err){
    reportError('render', (err&&err.stack)||err);
    try{
      app.innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;text-align:center;background:var(--bg)">
        <div style="font-size:40px">⚠️</div>
        <div style="font-family:var(--font-serif);font-size:22px;font-weight:300">Something went wrong</div>
        <div style="font-size:13px;color:var(--fg-3);max-width:280px;line-height:1.6">We hit an unexpected error. Please try again — your bookings are safe.</div>
        <button class="btn btn-gold" style="max-width:220px" onclick="location.reload()">Reload</button>
      </div>`;
    }catch(_){}
  }
}

generateMemberNumber();
renderNow();
maybeShowConsent();

// Auto-check flight for upcoming trip with a flight number
setTimeout(() => {
  const t = TRIPS.find(t => t.status === 'upcoming' && t.flight);
  if (t && !state._flightStatus) checkFlight(t.flight);
}, 3000);
</script>

<script>
// ── PWA install banner (iOS instructions / Android native prompt) ─────────
(function(){
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInstalled = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
  const isDismissed = localStorage.getItem('apexvip_pwa_dismissed');
  const fromQR = new URLSearchParams(location.search).has('join');
  const banner = document.getElementById('ios-install-banner');
  let deferredPrompt = null;

  window.addEventListener('beforeinstallprompt', (e)=>{
    e.preventDefault();
    deferredPrompt = e;
    // Android/Chrome: offer one-tap install — immediately when arriving via QR
    if(!isInstalled && (fromQR || !isDismissed)){
      const btn = document.getElementById('pwa-install-btn');
      const hint = document.getElementById('pwa-install-hint');
      if(hint) hint.textContent = 'Book in one tap, straight from your home screen';
      if(btn){
        btn.style.display = 'block';
        btn.onclick = async ()=>{
          if(!deferredPrompt) return;
          deferredPrompt.prompt();
          await deferredPrompt.userChoice;
          deferredPrompt = null;
          banner.classList.add('hidden');
        };
      }
      banner.classList.remove('hidden');
    }
  });

  window.addEventListener('appinstalled', ()=>{ if(banner) banner.classList.add('hidden'); });

  if(isIOS && !isInstalled && (fromQR || !isDismissed)){
    // From QR show at once; organic visits get it after the splash settles — but
    // never on top of the cookie-consent banner (wait until consent is resolved)
    setTimeout(()=>{ if(banner && localStorage.getItem('apex_consent')) banner.classList.remove('hidden'); }, fromQR ? 600 : 4000);
  }
  // Mark body so safe-area padding applies when running installed
  if(window.navigator.standalone === true) document.body.classList.add('ios-pwa');
  // Register the service worker unconditionally so offline shell caching + the
  // offline booking queue work whether or not Firebase push is enabled. The
  // FCM token registration later reuses this same registration (idempotent).
  if('serviceWorker' in navigator){
    window.addEventListener('load', ()=>{
      navigator.serviceWorker.register('firebase-messaging-sw.js').catch(()=>{});
    });
  }
})();
</script>
