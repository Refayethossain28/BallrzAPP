<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#000000"/>
<title>ApexVIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>
<script src="https://web.squarecdn.com/v1/square.js"></script>
<script src="firebase.js"></script>
<script src="apexvip-core.js"></script>
<style>
/* ── Design tokens ─────────────────────────────────────────────────── */
body{
  --bg:#050505;--fg:#f4f0ea;
  --fg-2:rgba(244,240,234,.72);--fg-3:rgba(244,240,234,.44);
  --fg-4:rgba(244,240,234,.28);--fg-5:rgba(244,240,234,.16);
  --fg-6:rgba(244,240,234,.09);
  --gold:#C8A97E;--gold-2:rgba(200,169,126,.22);--gold-3:rgba(200,169,126,.12);
  --gold-glow:0 0 32px rgba(200,169,126,.18);
  --surface:rgba(255,255,255,.055);--surface-2:rgba(255,255,255,.09);
  --surface-3:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.1);--border-2:rgba(255,255,255,.07);
  --divider:rgba(255,255,255,.06);
  --r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:28px;--r-2xl:36px;
  --sheet-bg:rgba(5,5,5,.92);
  --ease-spring:cubic-bezier(0.16,1,0.3,1);
  --ease-out:cubic-bezier(0.22,1,0.36,1);
  --ease-in-out:cubic-bezier(0.45,0,0.55,1);
  --font-serif:'Cormorant Garamond',Georgia,serif;
  --font-sans:'Inter',-apple-system,'Helvetica Neue',sans-serif;
}
body.light{
  --bg:#f7f4ef;--fg:#0c0b09;
  --fg-2:rgba(12,11,9,.66);--fg-3:rgba(12,11,9,.42);
  --fg-4:rgba(12,11,9,.28);--fg-5:rgba(12,11,9,.16);
  --fg-6:rgba(12,11,9,.08);
  --surface:rgba(0,0,0,.04);--surface-2:rgba(0,0,0,.07);
  --surface-3:rgba(0,0,0,.055);
  --border:rgba(0,0,0,.08);--border-2:rgba(0,0,0,.05);
  --divider:rgba(0,0,0,.06);
  --sheet-bg:rgba(247,244,239,.95);
}

/* ── Reset & base ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--fg);
  font-family:var(--font-sans);
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  letter-spacing:-.015em;min-height:100vh;overflow:hidden;
  transition:background .4s,color .4s;
  font-size:15px;line-height:1.5;
}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}
*::-webkit-scrollbar{display:none}

/* ── Keyframes ─────────────────────────────────────────────────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes logoReveal{
  0%{opacity:0;transform:scale(.96) translateY(8px);filter:blur(4px)}
  60%{filter:blur(0)}
  100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}
}
@keyframes subtitleReveal{
  0%{opacity:0;letter-spacing:10px}
  100%{opacity:1;letter-spacing:5px}
}
@keyframes goldShimmer{
  0%{background-position:200% center}
  100%{background-position:-200% center}
}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}40%,60%{opacity:1;transform:scale(1) rotate(72deg)}}
@keyframes sparkleB{0%,100%{opacity:0;transform:scale(0) rotate(45deg)}45%,55%{opacity:.8;transform:scale(1) rotate(135deg)}}
@keyframes sheenSweep{from{transform:translateX(-150%) skewX(-18deg)}to{transform:translateX(280%) skewX(-18deg)}}
@keyframes auroraDrift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(55px,45px) scale(1.12)}}
@keyframes auroraDrift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-65px,-38px) scale(1.06)}}
@keyframes auroraDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(38px,-65px) scale(1.16)}}
@keyframes diamondShimmer{0%{background-position:250% center}100%{background-position:-250% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Sparkle decorators ───────────────────────────────────────────── */
.sp{position:absolute;opacity:0;color:rgba(255,255,255,.85);pointer-events:none;font-style:normal;line-height:1}
.sp1{top:-14px;left:12%;font-size:12px;animation:sparkle 3s 2.2s ease-in-out infinite}
.sp2{top:-8px;right:9%;font-size:17px;animation:sparkleB 3.4s 2.7s ease-in-out infinite}
.sp3{bottom:-6px;left:5%;font-size:9px;animation:sparkle 2.6s 3.2s ease-in-out infinite}
.sp4{top:18px;right:3%;font-size:13px;animation:sparkleB 3.8s 2.4s ease-in-out infinite}
.sp5{bottom:2px;right:23%;font-size:8px;animation:sparkle 2.3s 3.9s ease-in-out infinite}
.sp6{top:-4px;left:41%;font-size:10px;animation:sparkleB 3s 4.3s ease-in-out infinite}
.sp7{bottom:10px;left:28%;font-size:7px;animation:sparkle 3.5s 3s ease-in-out infinite}

/* ── Diamond logo text ───────────────────────────────────────────── */
.diamond-text{
  background:linear-gradient(108deg,
    #fff 0%,#f0e8d0 8%,#C8A97E 16%,#fff 22%,
    #ede0c8 28%,#fff 34%,#d4bb8a 40%,#fff 46%,
    #f5edd8 52%,#fff 58%,#C8A97E 64%,#fff 70%,
    #e8d8b8 76%,#fff 82%,#d0bc90 88%,#fff 94%,
    #e8dcc8 100%);
  background-size:400% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:diamondShimmer 5s 2s linear infinite;
  filter:drop-shadow(0 0 24px rgba(200,169,126,.35)) drop-shadow(0 0 4px rgba(255,255,255,.4));
}

/* ── Aurora background ───────────────────────────────────────────── */
.aurora{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.aurora i{position:absolute;border-radius:50%;filter:blur(100px);will-change:transform}
.aurora i:nth-child(1){width:480px;height:480px;top:-160px;left:-120px;background:radial-gradient(circle,rgba(70,70,140,.12),transparent 65%);animation:auroraDrift1 26s ease-in-out infinite}
.aurora i:nth-child(2){width:400px;height:400px;bottom:10%;right:-140px;background:radial-gradient(circle,rgba(160,130,70,.07),transparent 65%);animation:auroraDrift2 32s ease-in-out infinite}
.aurora i:nth-child(3){width:360px;height:360px;top:40%;left:24%;background:radial-gradient(circle,rgba(65,65,140,.08),transparent 65%);animation:auroraDrift3 20s ease-in-out infinite}
body.light .aurora{display:none}

/* ── Stagger entrance ────────────────────────────────────────────── */
.stagger>*{opacity:0;animation:fadeUp .45s var(--ease-spring) forwards}
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.09s}
.stagger>*:nth-child(3){animation-delay:.14s}
.stagger>*:nth-child(4){animation-delay:.19s}
.stagger>*:nth-child(5){animation-delay:.24s}
.stagger>*:nth-child(6){animation-delay:.29s}
.stagger>*:nth-child(7){animation-delay:.34s}
.stagger>*:nth-child(8){animation-delay:.38s}
.stagger>*:nth-child(n+9){animation-delay:.42s}

/* ── Sheet ───────────────────────────────────────────────────────── */
.sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--sheet-bg);
  backdrop-filter:blur(60px) saturate(180%);
  -webkit-backdrop-filter:blur(60px) saturate(180%);
  border-radius:32px 32px 0 0;
  border-top:1px solid rgba(255,255,255,.14);
  box-shadow:0 -1px 0 rgba(255,255,255,.06) inset, 0 -40px 80px rgba(0,0,0,.4);
  animation:slideUpSheet .5s cubic-bezier(0.32,0.72,0,1);
  z-index:10;
}
body.light .sheet{
  background:rgba(247,244,239,.97);
  border-top-color:rgba(0,0,0,.07);
  box-shadow:0 -8px 40px rgba(0,0,0,.08);
}
.sheet-handle{width:36px;height:4px;background:var(--fg-5);border-radius:2px;margin:16px auto 0}

/* ── Top bar ─────────────────────────────────────────────────────── */
.top-bar{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:clamp(48px,12vw,60px) 22px 16px;z-index:5;
}

/* ── Inputs ──────────────────────────────────────────────────────── */
input,textarea,select{
  width:100%;background:transparent;border:none;
  color:var(--fg);font-size:15px;outline:none;
  font-family:inherit;-webkit-appearance:none;
}
input::placeholder,textarea::placeholder{color:var(--fg-4)}
.field{
  background:var(--surface);border-radius:var(--r-md);
  padding:15px 18px;border:1px solid var(--border);
  transition:border-color .2s,box-shadow .2s;
}
.field:focus-within{
  border-color:rgba(255,255,255,.28);
  box-shadow:0 0 0 3px rgba(255,255,255,.05);
}
body.light .field:focus-within{box-shadow:0 0 0 3px rgba(0,0,0,.04)}
.inp-card{
  background:var(--surface);border-radius:var(--r-lg);
  padding:2px 18px;border:1px solid var(--border);
  transition:border-color .2s;
}
.inp-card:focus-within{border-color:rgba(255,255,255,.26)}
.inp-row{display:flex;align-items:center;gap:14px;padding:14px 0}
.inp-row+.inp-row{border-top:1px solid var(--divider)}

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn{
  width:100%;padding:17px 24px;
  border-radius:var(--r-lg);font-size:15px;font-weight:600;
  border:none;cursor:pointer;font-family:inherit;
  letter-spacing:.01em;
  transition:transform .15s var(--ease-spring),opacity .15s,box-shadow .15s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn:active{transform:scale(.972);opacity:.9}
.btn-white{
  background:#ffffff;color:#0c0b09;
  box-shadow:0 1px 0 rgba(255,255,255,.25) inset,0 4px 12px rgba(0,0,0,.25);
}
.btn-white:active{box-shadow:none}
.btn-gold{
  background:linear-gradient(135deg,#C8A97E 0%,#a8884e 100%);color:#0c0b09;
  box-shadow:0 1px 0 rgba(255,255,255,.3) inset,var(--gold-glow);
  font-weight:700;
}
.btn-glass{
  background:var(--surface-2);color:var(--fg);
  border:1px solid var(--border);
}
.btn-ghost{
  background:transparent;color:var(--fg-2);
  font-size:14px;font-weight:600;border:none;cursor:pointer;
  font-family:inherit;padding:14px;
}
.btn-green{
  background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;
  font-weight:700;box-shadow:0 4px 14px rgba(34,197,94,.25);
}
.btn-danger-outline{
  width:100%;padding:16px;background:transparent;
  border:1px solid rgba(239,68,68,.18);border-radius:var(--r-md);
  color:#f87171;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;
}

/* ── Cards ───────────────────────────────────────────────────────── */
.card{
  background:var(--surface);border-radius:var(--r-lg);
  border:1px solid var(--border);
  box-shadow:0 1px 0 rgba(255,255,255,.04) inset;
  transition:transform .18s var(--ease-spring),border-color .18s;
}
.card:active{transform:scale(.983)}

/* ── Vehicle card ─────────────────────────────────────────────────── */
.vcard{
  background:var(--surface);border-radius:var(--r-xl);
  overflow:hidden;border:1.5px solid var(--border);
  cursor:pointer;position:relative;
  transition:border-color .2s,transform .15s var(--ease-spring),box-shadow .2s;
}
.vcard:active{transform:scale(.988)}
.vcard.sel{
  border-color:var(--gold);
  box-shadow:0 0 0 1px var(--gold-3), var(--gold-glow);
}
.vcard.sel::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:linear-gradient(105deg,transparent 30%,rgba(200,169,126,.08) 50%,transparent 70%);
  animation:sheenSweep 1.2s .1s cubic-bezier(.4,0,.2,1) forwards;
  transform:translateX(-150%) skewX(-18deg);
}
.vcard-check{
  position:absolute;top:12px;right:12px;z-index:3;
  width:26px;height:26px;border-radius:50%;
  background:var(--gold);display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(200,169,126,.4);
  animation:successPop .4s .1s var(--ease-spring) both;
}
.vcard-media{
  height:180px;position:relative;
  background:linear-gradient(160deg,#0d0d0d 0%,#181818 60%,#111 100%);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
body.light .vcard-media{background:linear-gradient(160deg,#e8e5e0 0%,#ddd9d3 100%)}
.vcard-badge{
  position:absolute;top:14px;left:14px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.18);
  color:#fff;padding:4px 11px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;
  backdrop-filter:blur(8px);
}

/* ── Trip card ───────────────────────────────────────────────────── */
.tcard{padding:18px 0;border-bottom:1px solid var(--divider);cursor:pointer}
.tcard:last-child{border-bottom:none}

/* ── Navigation ──────────────────────────────────────────────────── */
.nav{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;
  background:rgba(5,5,5,.88);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-top:1px solid rgba(255,255,255,.07);
  padding:10px 0 max(34px,env(safe-area-inset-bottom));
  z-index:20;
}
body.light .nav{
  background:rgba(247,244,239,.94);
  border-top:1px solid rgba(0,0,0,.07);
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;color:var(--fg-4);
  font-size:10px;font-weight:500;padding:6px 0;
  letter-spacing:.4px;text-transform:uppercase;
  transition:color .2s;
}
.nav-item.on{color:var(--fg)}
.nav-pip{
  width:4px;height:4px;border-radius:50%;
  background:var(--gold);opacity:0;margin-top:-1px;
  transition:opacity .25s var(--ease-spring),transform .25s var(--ease-spring);
  transform:scale(0);
}
.nav-item.on .nav-pip{opacity:1;transform:scale(1)}

/* ── Service grid ────────────────────────────────────────────────── */
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.svc-card{
  background:var(--surface);border-radius:var(--r-md);
  border:1px solid var(--border);
  padding:14px 6px 12px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  cursor:pointer;
  transition:transform .15s var(--ease-spring),background .15s,border-color .15s;
}
.svc-card:active{transform:scale(.94);background:var(--surface-2)}

/* ── Tags ────────────────────────────────────────────────────────── */
.tag{
  display:inline-flex;align-items:center;
  padding:4px 11px;border-radius:20px;
  font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
}
.tag-gold{background:var(--gold-3);color:var(--gold);border:1px solid var(--gold-2)}
.tag-gray{background:var(--surface-2);color:var(--fg-3)}
.tag-green{background:rgba(34,197,94,.1);color:#22c55e;border:1px solid rgba(34,197,94,.18)}
.tag-red{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.18)}
.tag-blue{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.18)}
.tag-purple{background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.18)}

/* ── Misc components ─────────────────────────────────────────────── */
.back-row{display:flex;align-items:center;gap:14px;padding:clamp(48px,12vw,60px) 22px 20px}
.back-btn{
  width:40px;height:40px;border-radius:50%;
  background:var(--surface-2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;
  transition:transform .15s var(--ease-spring),background .15s;
}
.back-btn:active{transform:scale(.9);background:var(--surface-3)}
.section-label{
  font-size:10px;font-weight:700;letter-spacing:2.5px;
  color:var(--fg-4);text-transform:uppercase;
}
.err{
  background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);
  color:#f87171;padding:12px 16px;border-radius:var(--r-md);
  font-size:13px;margin-bottom:16px;
}
.divider{height:1px;background:var(--divider);margin:4px 0}
.tnum{font-variant-numeric:tabular-nums}

/* ── Scroll utility ──────────────────────────────────────────────── */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* ── Map ─────────────────────────────────────────────────────────── */
#map{position:absolute;inset:0;z-index:0}
#map .leaflet-control-attribution{display:none!important}

/* ── Recommendation cards ───────────────────────────────────────── */
.rec-row{
  display:flex;gap:10px;overflow-x:auto;
  -webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none;
}
.rec-row::-webkit-scrollbar{display:none}
.rec-card{
  flex-shrink:0;width:130px;
  background:var(--surface-2);border:1px solid var(--border-2);
  border-radius:var(--r-md);padding:14px 12px;
  cursor:pointer;
  transition:transform .15s var(--ease-spring),opacity .15s;
}
.rec-card:active{transform:scale(.95);opacity:.85}

/* ── SilentService card ──────────────────────────────────────────── */
.ss-card{
  background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.2);border-radius:var(--r-lg);
  padding:16px 18px;margin-bottom:18px;cursor:pointer;
  box-shadow:0 0 28px rgba(255,255,255,.05),0 1px 0 rgba(255,255,255,.12) inset;
  transition:transform .15s var(--ease-spring);
}
.ss-card:active{transform:scale(.98)}

/* ── Route dots ──────────────────────────────────────────────────── */
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rdot-gold{background:var(--gold);box-shadow:0 0 0 3px var(--gold-3)}
.rdot-outline{background:transparent;border:1.5px solid var(--fg-3)}
.rline{width:1px;height:20px;background:var(--fg-6);margin-left:4px}

/* ── Booking confirmed check ─────────────────────────────────────── */
@keyframes checkDraw{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
@keyframes checkCircle{from{stroke-dashoffset:130;opacity:0}to{stroke-dashoffset:0;opacity:1}}
@keyframes successPop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
.check-anim{animation:successPop .5s .1s var(--ease-spring) both}

/* ── Light mode overrides ────────────────────────────────────────── */
body.light .vcard-badge{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.1);color:var(--fg)}
body.light .nav-pip{background:var(--gold)}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase ──────────────────────────────────────────────────────────────
let auth, db, fns, FIREBASE_ENABLED = false;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth(); db = firebase.firestore(); fns = firebase.functions(); FIREBASE_ENABLED = true;
  }
} catch(e) { console.warn('Firebase init:', e.message); }

const SQUARE_APP_ID = 'sq0idp-8Z5MqX7GA3M0Xnv-0utwMA';
const SQUARE_LOCATION_ID = '1ZX0F29TX12HB';
let _sqCard = null, _sqPayments = null;

function track(event, props){
  try{
    const ev={event,ts:Date.now(),...props};
    const key='apexvip_events';
    const arr=JSON.parse(localStorage.getItem(key)||'[]');
    arr.push(ev);
    if(arr.length>2000) arr.splice(0,arr.length-2000);
    localStorage.setItem(key,JSON.stringify(arr));

// ── AI Concierge Chat ──────────────────────────────────────────────────────
const CONCIERGE_MSGS = [];
let _conciergeLoading = false;

// Client-side intent parser — runs when Cloud Functions are unavailable
function _parseIntentLocal(msg) {
  const lower = msg.toLowerCase();
  const out = { serviceType: null, pickup: null, dropoff: null, airport: null, flight: null, date: null, time: null, reply: '' };

  // Service type
  if (/airport|terminal|heathrow|gatwick|stansted|luton|city airport|arrivals|departures|flying|flight|BA\d|EK\d/i.test(msg)) {
    out.serviceType = 'airport';
  } else if (/\bhour(ly)?\b|\bby the hour\b/i.test(msg)) {
    out.serviceType = 'hourly';
  } else if (/\bfull.?day\b|\ball.?day\b|\bday hire\b|\bday chauffeur\b/i.test(msg)) {
    out.serviceType = 'day';
  }

  // Airport terminals
  const AP = [
    [/heathrow\s*(t|terminal)?\s*5/i, 'Heathrow T5'],
    [/heathrow\s*(t|terminal)?\s*4/i, 'Heathrow T4'],
    [/heathrow\s*(t|terminal)?\s*3/i, 'Heathrow T3'],
    [/heathrow\s*(t|terminal)?\s*2/i, 'Heathrow T2'],
    [/heathrow/i, 'Heathrow T5'],
    [/gatwick\s*(north|south)?/i, 'Gatwick North'],
    [/stansted/i, 'Stansted'],
    [/luton/i, 'Luton'],
    [/city\s*airport|london\s*city/i, 'London City Airport'],
    [/biggin\s*hill/i, 'Biggin Hill'],
    [/farnborough/i, 'Farnborough'],
  ];
  for (const [re, label] of AP) {
    if (re.test(msg)) { out.airport = label; out.serviceType = out.serviceType || 'airport'; break; }
  }

  // Flight number (BA247, EK034, LH456 etc.)
  const flt = msg.match(/\b([A-Z]{2}\s*\d{3,4})\b/i);
  if (flt) { out.flight = flt[1].toUpperCase().replace(/\s+/, ''); out.serviceType = 'airport'; }

  // Time — "3pm", "14:30", "3:30 pm", "at 9"
  const tm = msg.match(/\b(\d{1,2}(?::\d{2})?\s*(?:am|pm))\b/i) || msg.match(/\bat\s+(\d{1,2}(?::\d{2})?)\b/i) || msg.match(/\b(\d{2}:\d{2})\b/);
  if (tm) out.time = tm[1].trim();

  // Date keywords
  const now = new Date();
  if (/\btoday\b/i.test(msg)) out.date = now.toISOString().slice(0,10);
  else if (/\btomorrow\b/i.test(msg)) { const d=new Date(now); d.setDate(d.getDate()+1); out.date=d.toISOString().slice(0,10); }
  else {
    const days = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    for (let i=0;i<days.length;i++) {
      if (lower.includes(days[i])) { const d=new Date(now); const diff=(i-now.getDay()+7)%7||7; d.setDate(d.getDate()+diff); out.date=d.toISOString().slice(0,10); break; }
    }
  }

  // "from X to Y" / "from X" / "to Y"
  const fromTo = msg.match(/\bfrom\s+([^,\.]+?)\s+to\s+([^,\.]+)/i);
  if (fromTo) {
    out.pickup = fromTo[1].trim();
    if (!out.airport) out.dropoff = fromTo[2].trim();
  } else {
    const fm = msg.match(/\bfrom\s+([A-Z][^,\.]{3,40})/i);
    if (fm) out.pickup = fm[1].trim();
    const tm2 = msg.match(/\bto\s+([A-Z][^,\.]{3,40})/i);
    if (tm2 && !out.airport) out.dropoff = tm2[1].trim();
  }

  // Pickup fallback — "pick me up at X", "collect me from X"
  if (!out.pickup) {
    const pu = msg.match(/(?:pick(?:ing)?\s+(?:me|us)\s+up|collect(?:ing)?\s+(?:me|us))(?:\s+(?:at|from))?\s+([A-Z][^,\.]{3,40})/i);
    if (pu) out.pickup = pu[1].trim();
  }

  // Build natural reply
  const dest = out.airport || out.dropoff;
  const timeStr = out.time ? ` at ${out.time}` : '';
  const dateStr = out.date ? ` on ${new Date(out.date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}` : '';
  if (out.serviceType === 'airport' && dest && out.pickup) {
    out.reply = `Of course. I'll arrange an airport transfer from ${out.pickup} to ${dest}${out.flight ? `, monitoring flight ${out.flight}` : ''}${dateStr}${timeStr}. Please review your booking details and select a vehicle.`;
  } else if (out.serviceType === 'airport' && dest) {
    out.reply = `Certainly. I'll arrange a transfer to ${dest}${out.flight ? ` for flight ${out.flight}` : ''}${dateStr}${timeStr}. What is your pickup address?`;
  } else if (out.pickup && dest) {
    out.reply = `Understood — a chauffeur from ${out.pickup} to ${dest}${dateStr}${timeStr}. I'll prepare your vehicle options now.`;
  } else if (out.serviceType === 'hourly') {
    out.reply = `I'll arrange an hourly hire${out.pickup ? ` from ${out.pickup}` : ''}${dateStr}${timeStr}. Please proceed to select your vehicle and duration.`;
  } else if (out.serviceType === 'day') {
    out.reply = `A full-day chauffeur is a wonderful choice. Where would you like your driver to collect you${dateStr}?`;
  } else if (out.pickup || out.dropoff) {
    out.serviceType = out.serviceType || 'airport';
    out.reply = `I have${out.pickup ? ` ${out.pickup}` : ''}${dest ? ` → ${dest}` : ''}${dateStr}${timeStr}. Shall I proceed to vehicle selection?`;
  } else {
    out.reply = `Of course. Could you tell me your pickup address${out.airport ? '' : ' and destination'}, and when you need the car?`;
    out.serviceType = null;
  }

  return out;
}

async function sendConciergeMsg() {
  const inp = document.getElementById('concierge-inp');
  if (!inp || !inp.value.trim()) return;
  const msg = inp.value.trim();
  inp.value = '';
  CONCIERGE_MSGS.push({ role: 'user', content: msg });
  _conciergeLoading = true;
  render();
  try {
    let d;
    if (FIREBASE_ENABLED && fns) {
      try {
        const fn = fns.httpsCallable('parseBookingIntent');
        const res = await fn({ message: msg });
        d = res.data;
      } catch(fnErr) {
        // Cloud Function unavailable — fall back to local parser
        await new Promise(r => setTimeout(r, 520));
        d = _parseIntentLocal(msg);
      }
    } else {
      await new Promise(r => setTimeout(r, 520));
      d = _parseIntentLocal(msg);
    }
    CONCIERGE_MSGS.push({ role: 'assistant', content: d.reply || 'Let me arrange that for you.' });
    if (d.serviceType) {
      state.booking.serviceType = d.serviceType;
      if (d.pickup)  state.booking.pickup  = d.pickup;
      if (d.dropoff) state.booking.dropoff = d.dropoff;
      if (d.airport) state.booking.airport = d.airport;
      if (d.flight)  state.booking.flight  = d.flight;
      if (d.date)    state.booking.date    = d.date;
      if (d.time)    state.booking.time    = d.time;
      CONCIERGE_MSGS.push({ role: 'system', content: '✓ Details understood — tap "Review & Confirm" to select your vehicle.' });
      state._conciergeParsed = d;
    }
  } catch(e) {
    CONCIERGE_MSGS.push({ role: 'assistant', content: 'I apologise — please try rephrasing, or call us directly on +44 20 1234 5678.' });
  }
  _conciergeLoading = false;
  render();
  setTimeout(() => {
    const el = document.getElementById('concierge-msgs');
    if (el) el.scrollTop = el.scrollHeight;
  }, 60);
}

async function runApplePay() {
  if (!window.ApplePaySession || !ApplePaySession.canMakePayments()) {
    alert('Apple Pay is not available on this device. Please use the card form below.');
    return;
  }
  const total = state._payTotal || 0;
  const request = {
    countryCode: 'GB', currencyCode: 'GBP',
    supportedNetworks: ['visa', 'masterCard', 'amex'],
    merchantCapabilities: ['supports3DS'],
    total: { label: 'ApexVIP', amount: total.toFixed(2) }
  };
  const session = new ApplePaySession(3, request);
  session.onvalidatemerchant = () => session.completeMerchantValidation({});
  session.onpaymentauthorized = async (event) => {
    session.completePayment(ApplePaySession.STATUS_SUCCESS);
    track('apple_pay_used', { total, src: 'client' });
    await confirmBooking();
  };
  session.begin();
}
async function runGooglePay() {
  alert('Google Pay: Please complete payment via the secure card form below. Google Pay wallet integration requires app store deployment.');
  track('google_pay_tapped', { src: 'client' });
}

async function loadReferralCode() {
  if (state._referralCode) return;
  if (FIREBASE_ENABLED && fns) {
    try {
      const fn = fns.httpsCallable('generateReferralCode');
      const res = await fn({});
      state._referralCode = res.data.code;
      render();
    } catch(e) {}
  } else {
    state._referralCode = 'APEX' + (state.user?.uid?.slice(0,4)?.toUpperCase() || 'DEMO') + '247';
    render();
  }
}
function copyReferralCode() {
  if (!state._referralCode) { loadReferralCode(); return; }
  navigator.clipboard?.writeText(state._referralCode).catch(() => {});
  const el = document.querySelector('#referral-code-display button');
  if (el) { el.textContent = 'COPIED!'; setTimeout(() => { el.textContent = 'COPY'; }, 2000); }
  track('referral_code_copied', { src: 'client' });
}
async function applyReferral() {
  const inp = document.getElementById('referral-inp');
  if (!inp || !inp.value.trim()) return;
  const code = inp.value.trim().toUpperCase();
  if (FIREBASE_ENABLED && fns) {
    try {
      const fn = fns.httpsCallable('applyReferralCode');
      const res = await fn({ code });
      state._referralMsg = '✓ ' + res.data.message;
      state.apexBalance += res.data.creditsAwarded || 50;
    } catch(e) {
      state._referralMsg = e.message?.includes('already') ? 'You\'ve already used this code.' : e.message?.includes('not-found') ? 'Invalid code — check and try again.' : 'Could not apply code — try again.';
    }
  } else {
    state._referralMsg = '✓ 50 APEX credits added (demo mode)';
    state.apexBalance += 50;
  }
  render();
}

function nextGuideStep() {
  state.guideStep = (state.guideStep || 0) + 1;
  if (state.guideStep >= 4) skipGuide();
  else render();
}
function skipGuide() {
  localStorage.setItem('apexvip_guide_seen', '1');
  state.guideStep = 0;
  go('home');
}

// ── Saved Addresses ───────────────────────────────────────────────────────
function saveAddress(addr, label, icon) {
  if (!addr || !addr.trim()) return;
  const entry = { label: label || addr, addr: addr.trim(), icon: icon || '📍', id: Date.now() };
  state.savedAddresses = [entry, ...state.savedAddresses.filter(a => a.addr !== addr.trim())].slice(0, 8);
  localStorage.setItem('apexvip_saved_addrs', JSON.stringify(state.savedAddresses));
}
function deleteAddress(id) {
  state.savedAddresses = state.savedAddresses.filter(a => a.id !== id);
  localStorage.setItem('apexvip_saved_addrs', JSON.stringify(state.savedAddresses));
  render();
}

// ── Trip Sharing ──────────────────────────────────────────────────────────
function shareTrip() {
  const ref = state._confirmedRef || state._activeBooking?.ref || 'APX-4821';
  const dn = encodeURIComponent(state._activeBooking?.driverName || 'James Harrison');
  const dp = encodeURIComponent(state._activeBooking?.driverPlate || 'LX73 ABC');
  const url = `https://refayethossain28.github.io/BallrzAPP/track.html?ref=${ref}&d=${dn}&p=${dp}`;
  track('trip_shared', { ref, src: 'client' });
  if (navigator.share) {
    navigator.share({ title: 'Track my ApexVIP ride', text: `I'm in a black Mercedes — track me live`, url }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(url).catch(() => {});
    state._shareCopied = true; render();
    setTimeout(() => { state._shareCopied = false; render(); }, 2500);
  }
}

// ── Amenity Toggle ────────────────────────────────────────────────────────
function toggleAmenity(item) {
  if (!state.booking.amenities) state.booking.amenities = [];
  const idx = state.booking.amenities.indexOf(item);
  if (idx > -1) state.booking.amenities.splice(idx, 1);
  else state.booking.amenities.push(item);
  render();
}

// ── ETA Countdown ─────────────────────────────────────────────────────────
let _etaTimer = null;
function startEtaCountdown() {
  if (_etaTimer) return;
  if (!state._etaSeconds) state._etaSeconds = (4 + Math.floor(Math.random() * 7)) * 60;
  _etaTimer = setInterval(() => {
    if (state.screen !== 'active-trip') { clearInterval(_etaTimer); _etaTimer = null; return; }
    if (state._etaSeconds > 0) {
      state._etaSeconds--;
      const el = document.getElementById('eta-countdown');
      if (!el) { clearInterval(_etaTimer); _etaTimer = null; return; }
      const m = Math.floor(state._etaSeconds / 60);
      const s = state._etaSeconds % 60;
      el.textContent = m > 0 ? `${m} min ${s < 10 ? '0' : ''}${s} sec` : `${s} seconds`;
    } else {
      clearInterval(_etaTimer); _etaTimer = null;
      const el = document.getElementById('eta-countdown');
      if (el) el.textContent = 'Arriving now';
    }
  }, 1000);
}

function go(screen, data) {
  if (data) state.selectedTrip = data;
  if (state.screen==='home' && screen!=='home' && mapInstance){mapInstance.remove();mapInstance=null;mapTileLayer=null;}
  state.screen = screen;
  window.scrollTo(0,0);
  track('screen_view',{screen,src:'client'});
  render();
}

  const sel = state.booking.vehicleId||'';
  const vehicles = [
    {id:'sClass',name:'S-Class',full:'Mercedes S-Class',sub:'Business Sedan · Up to 3 passengers',price:sp.s,badge:'EXECUTIVE',features:['WiFi','Water','Charger','Meet & Greet'],img:'vehicles/s-class.jpg'},
    {id:'vClass',name:'V-Class',full:'Mercedes V-Class',sub:'Business Van · Up to 7 passengers',price:sp.v,badge:'BUSINESS',features:['WiFi','Water','Charger','Child Seat'],img:'vehicles/v-class.jpg'}
  ];
  return `

  const eta = (state.booking.serviceType==='airport' && typeof ApexCore!=='undefined')

async function doLogin(){
  const e=$('lemail')?.value||'',p=$('lpass')?.value||'';
  if(!FIREBASE_ENABLED){
    if(e==='client@apexvip.com'&&p==='password'){state.user={name:'Alexandra Stone',email:e};state._loginErr=null;track('user_login',{method:'demo',src:'client'});go('home');}
    else{state._loginErr='Invalid email or password.';render();}
    return;
  }
  try{
    await auth.signInWithEmailAndPassword(e,p);
  } catch(err){
    // Auto-create demo account on first run
    if(e==='client@apexvip.com'&&p==='password'){
      if(err.code==='auth/configuration-not-found'||err.code==='auth/operation-not-allowed'){
        state.user={name:'Alexandra Stone',email:e};track('user_login',{method:'demo-fallback',src:'client'});go('home');return;
      }
      try{
        const cred=await auth.createUserWithEmailAndPassword(e,p);
        await db.collection('users').doc(cred.user.uid).set({name:'Alexandra Stone',email:e,role:'client',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      }catch(e2){
        if(e2.code==='auth/configuration-not-found'||e2.code==='auth/operation-not-allowed'){
          state.user={name:'Alexandra Stone',email:e};track('user_login',{method:'demo-fallback',src:'client'});go('home');
        } else {state._loginErr='Setup error. Try again.';render();}
      }
    } else {
      state._loginErr='Invalid email or password.';render();
    }
  }
}

      style:{

async function runSquarePayment(){
  const btn = document.getElementById('sq-pay-btn');
  const errEl = document.getElementById('sq-error');
  if(errEl) errEl.style.display='none';
  if(!_sqCard){alert('Payment form not ready yet — please wait a moment and try again.');return;}
  if(btn){btn.disabled=true;btn.textContent='Processing…';}
  try{
    const result = await _sqCard.tokenize();
    if(result.status!=='OK'){
      const msg = result.errors?.map(e=>e.message).join(', ')||'Card error';
      if(errEl){errEl.textContent=msg;errEl.style.display='block';}
      if(btn){btn.disabled=false;btn.textContent='Pay £'+(state._payTotal||0);}
      return;
    }
    const sourceId = result.token;
    const total = state._payTotal||0;
    const ref = 'APX-'+(Math.floor(1000+Math.random()*9000));
    state._confirmedRef = ref;
    let paymentId = null;
    // Try Cloud Function; fall back to storing token for manual processing
    if(FIREBASE_ENABLED && fns){
      try{
        const fn = fns.httpsCallable('processSquarePayment');
        const resp = await fn({sourceId, amount:total, bookingRef:ref});
        paymentId = resp.data.paymentId;
        track('payment_charged',{ref,total,paymentId,src:'client'});
      }catch(fnErr){
        await db.collection('pending_payments').add({
          sourceId, amount:total, bookingRef:ref, status:'pending',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        }).catch(()=>{});
        track('payment_token_stored',{ref,total,src:'client'});
      }
    } else {
      track('payment_demo',{ref,total,src:'client'});
    }
    state._squarePaymentId = paymentId;
    await confirmBooking(ref);
  }catch(e){
    if(errEl){errEl.textContent='Payment failed: '+e.message;errEl.style.display='block';}
    if(btn){btn.disabled=false;btn.textContent='Pay £'+(state._payTotal||0);}
  }
}

async function confirmBooking(overrideRef){
  const ref = overrideRef || state._confirmedRef || ('APX-'+(Math.floor(1000+Math.random()*9000)));
  const base=state.booking.price||185;
  const disc=state._promoApplied?Math.round(base*.2):0;
  const vat=Math.round((base-disc)*.2);
  const total=base-disc+vat;
  const svcLabel={airport:'Airport Transfer',hourly:'By the Hour',day:'By the Day'}[state.booking.serviceType]||'Airport Transfer';
  if(FIREBASE_ENABLED&&auth.currentUser){
    try{
      await db.collection('bookings').add({
        ref,clientId:auth.currentUser.uid,clientName:state.user?.name||'',
        serviceType:state.booking.serviceType||'airport',serviceLabel:svcLabel,
        pickup:state.booking.pickup||'',dropoff:state.booking.dropoff||'',
        airport:state.booking.airport||'',flight:state.booking.flight||'',
        date:state.booking.date||'',time:state.booking.time||'',
        vehicle:state.booking.vehicle||'Mercedes S-Class',vehicleId:state.booking.vehicleId||'',
        price:total,baseFare:base,discount:disc,vat,
        promoApplied:state._promoApplied||false,status:'confirmed',
        squarePaymentId:state._squarePaymentId||null,
        paymentStatus:state._squarePaymentId?'paid':'pending',
        driverName:'James Harrison',driverRating:4.9,driverPlate:'LX73 ABC',
        concierge:state.booking.concierge||null,
        paMode: state.paMode || false,
        paPassenger: state.paMode ? state.paPassenger : null,
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(err){console.warn('Booking save:',err.message);}
  }
  state._confirmedRef=ref;state._promoApplied=false;state._squarePaymentId=null;
  pushBookingHistory();
  const _axcAmt=Math.round(total*0.05);
  earnApex(_axcAmt,'Trip booking');
  if(state._useApexCoin) track('apex_redeemed',{amount:total,src:'client'});
  track('booking_confirmed',{
    service:state.booking.serviceType||'airport',
    vehicle:state.booking.vehicle||'',
    price:total, base:base, disc:disc, vat,
    apex_earned:_axcAmt,
    paid_with_apex:!!(state._useApexCoin),
    pickup:state.booking.pickup||'',
    dropoff:state.booking.dropoff||state.booking.airport||'',
    scheduled_date:state.booking.date||'',
    scheduled_time:state.booking.time||'',
    user:state.user?.name||'Guest',
    ref,
    src:'client'
  });
  go('booking-confirmed');
}

async function useMyLocation(inputId){
  const input=document.getElementById(inputId);
  if(!input||!navigator.geolocation){alert('Geolocation not available on this device.');return;}
  const btn=input.nextElementSibling;
  const origPh=input.placeholder;
  input.placeholder='Locating…';
  input.disabled=true;
  if(btn)btn.style.opacity='.4';
  navigator.geolocation.getCurrentPosition(async({coords})=>{
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${coords.latitude}&lon=${coords.longitude}&format=json&addressdetails=1`,{headers:{'Accept-Language':'en'}});
      const d=await r.json();
      const a=d.address||{};
      const parts=[a.house_number,a.road,a.suburb||a.neighbourhood||a.quarter,a.city||a.town||a.village||a.county].filter(Boolean);
      const addr=parts.length>=2?parts.join(', '):(d.display_name||`${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`);
      input.value=addr;
      state.booking.pickup=addr;
    }catch(e){
      const coords_str=`${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`;
      input.value=coords_str;state.booking.pickup=coords_str;
    }
    input.placeholder=origPh;input.disabled=false;
    if(btn)btn.style.opacity='1';
  },()=>{
    alert('Location access was denied. Please allow location access in your browser settings, or type your address manually.');
    input.placeholder=origPh;input.disabled=false;
    if(btn)btn.style.opacity='1';
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

// ── Firebase auth ──────────────────────────────────────────────────────────
if(FIREBASE_ENABLED){
  let _unsub=null;
  auth.onAuthStateChanged(async user=>{
    if(user){
      try{
        const doc=await db.collection('users').doc(user.uid).get();
        const p=doc.exists?doc.data():{};
        state.user={uid:user.uid,name:p.name||user.displayName||user.email.split('@')[0],email:user.email};
      }catch(e){state.user={uid:user.uid,name:user.displayName||user.email.split('@')[0],email:user.email};}
      if(_unsub)_unsub();
      _unsub=db.collection('bookings').where('clientId','==',user.uid)
        .onSnapshot(snap=>{
          TRIPS.length=0;
          const docs=snap.docs.map(d=>({_docId:d.id,...d.data()}));
          docs.sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0));
          docs.forEach(d=>TRIPS.push({
            id:d.ref||d._docId,service:d.serviceLabel||'Airport Transfer',
            pickup:d.pickup||'',dropoff:d.airport||d.dropoff||'',
            date:d.date||'',time:d.time||'',vehicle:d.vehicle||'Mercedes S-Class',
            status:d.status||'confirmed',price:'£'+(d.price||0),
            driver:d.driverName||'TBA',rating:d.driverRating||4.9,
            plate:d.driverPlate||'',flight:d.flight||''
          }));
          if(['home','trips'].includes(state.screen))render();
        },()=>{});
      // Watch latest booking for real-time status
      let _statusUnsub=null;
      function watchLatestBooking(){
        if(_statusUnsub){_statusUnsub();_statusUnsub=null;}
        if(!FIREBASE_ENABLED||!auth.currentUser)return;
        _statusUnsub=db.collection('bookings')
          .where('clientId','==',user.uid)
          .where('status','in',['confirmed','accepted','en_route','arrived','onboard'])
          .orderBy('createdAt','desc').limit(1)
          .onSnapshot(snap=>{
            if(!snap.empty){
              const d=snap.docs[0].data();
              if(!state._activeBooking)state._activeBooking={};
              state._activeBooking.status=d.status;
              state._activeBooking.driverId=d.driverId||null;
              state._activeBooking.driverName=d.driverName||'James Harrison';
              state._activeBooking.driverPlate=d.driverPlate||'';
              state._activeBooking.vehicle=d.vehicle||'';
              if(state.screen==='active-trip')render();
            }
          },()=>{});
      }
      watchLatestBooking();
      state._loginErr=null;
      if(['splash','login'].includes(state.screen))go('home');else render();
      // Register FCM push token
      if('serviceWorker' in navigator && FIREBASE_ENABLED){
        navigator.serviceWorker.register('/BallrzAPP/firebase-messaging-sw.js')
          .then(reg=>{
            try{
              const messaging=firebase.messaging();
              messaging.getToken({
                vapidKey:'REPLACE_WITH_VAPID_KEY',
                serviceWorkerRegistration:reg
              }).then(token=>{
                if(token&&auth.currentUser){
                  db.collection('fcm_tokens').doc(auth.currentUser.uid).set({
                    token,updatedAt:firebase.firestore.FieldValue.serverTimestamp()
                  }).catch(()=>{});
                }
              }).catch(()=>{});
            }catch(e){}
          }).catch(()=>{});
      }
    }else{
      state.user=null;
      if(_unsub){_unsub();_unsub=null;}
      TRIPS.length=0;
      if(!['splash','login','register'].includes(state.screen))go('splash');
    }
  });
}

function render(){
  const fn=screens[state.screen];
  app.innerHTML=fn?fn():`<div style="padding:40px;text-align:center;color:var(--fg-4)">Screen not found</div>`;
  if(state.screen==='home') setTimeout(initMap,60);
  if(state.screen==='payment') setTimeout(initSquare,60);
  if(state.screen==='active-trip') setTimeout(initTrackingMap,60);
  if(state.screen==='active-trip') setTimeout(startEtaCountdown,80);
  if(state.screen==='profile') setTimeout(loadReferralCode,100);
}

render();
