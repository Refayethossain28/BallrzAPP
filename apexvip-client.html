<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>ApexVIP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="https://web.squarecdn.com/v1/square.js"></script>
<script src="firebase.js"></script>
<style>
body{--bg:#000;--fg:#fff;--fg-muted:rgba(255,255,255,.38);--fg-dim:rgba(255,255,255,.3);--fg-subtle:rgba(255,255,255,.25);--fg-ghost:rgba(255,255,255,.2);--fg-faint:rgba(255,255,255,.15);--surface:rgba(255,255,255,.06);--surface-b:rgba(255,255,255,.1);--surface-c:rgba(255,255,255,.09);--border:rgba(255,255,255,.12);--border-b:rgba(255,255,255,.11);--divider:rgba(255,255,255,.05)}
body.light{--bg:#f8f6f1;--fg:#0d0d0d;--fg-muted:rgba(0,0,0,.42);--fg-dim:rgba(0,0,0,.38);--fg-subtle:rgba(0,0,0,.32);--fg-ghost:rgba(0,0,0,.28);--fg-faint:rgba(0,0,0,.18);--surface:rgba(0,0,0,.04);--surface-b:rgba(0,0,0,.07);--surface-c:rgba(0,0,0,.09);--border:rgba(0,0,0,.09);--border-b:rgba(0,0,0,.13);--divider:rgba(0,0,0,.06)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--fg);font-family:'Inter','Helvetica Neue',system-ui,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;min-height:100vh;overflow:hidden;transition:background .3s,color .3s}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow:hidden}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes logoReveal{0%{opacity:0;transform:scale(.97) translateY(6px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes subtitleReveal{0%{opacity:0;letter-spacing:8px}100%{opacity:1;letter-spacing:5px}}
@keyframes slideUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* Diamond glitter */
@keyframes diamondShimmer{0%{background-position:250% center}100%{background-position:-250% center}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}35%,65%{opacity:1;transform:scale(1) rotate(72deg)}}
@keyframes sparkleB{0%,100%{opacity:0;transform:scale(0) rotate(45deg)}40%,60%{opacity:.85;transform:scale(1) rotate(135deg)}}
.diamond-text{
  background:linear-gradient(108deg,
    #fff 0%,#e8f4ff 7%,#9ed8ff 13%,#fff 19%,
    #ece0ff 25%,#fff 31%,#b8eaff 37%,#fff 43%,
    #ffd8f0 49%,#fff 55%,#a8d8ff 61%,#fff 67%,
    #e0d0ff 73%,#fff 79%,#c8f0ff 85%,#fff 91%,
    #ffe0c8 97%,#fff 100%);
  background-size:400% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 22px rgba(200,220,255,.45)) drop-shadow(0 0 6px rgba(255,255,255,.6));
}
.sp{position:absolute;opacity:0;color:#fff;pointer-events:none;font-style:normal;line-height:1}
.sp1{top:-14px;left:12%;font-size:13px;animation:sparkle 2.8s 2.1s ease-in-out infinite}
.sp2{top:-8px;right:8%;font-size:18px;animation:sparkleB 3.2s 2.6s ease-in-out infinite}
.sp3{bottom:-6px;left:4%;font-size:10px;animation:sparkle 2.5s 3.1s ease-in-out infinite}
.sp4{top:18px;right:2%;font-size:14px;animation:sparkleB 3.6s 2.3s ease-in-out infinite}
.sp5{bottom:2px;right:22%;font-size:9px;animation:sparkle 2.2s 3.8s ease-in-out infinite}
.sp6{top:-4px;left:40%;font-size:11px;animation:sparkleB 2.9s 4.2s ease-in-out infinite}
.sp7{bottom:10px;left:28%;font-size:8px;animation:sparkle 3.4s 2.9s ease-in-out infinite}

/* Map */

/* Glass sheet */
.sheet{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,rgba(6,6,6,.86) 0%,rgba(0,0,0,.97) 50%);backdrop-filter:blur(50px) saturate(160%);-webkit-backdrop-filter:blur(50px) saturate(160%);border-radius:28px 28px 0 0;border-top:1px solid rgba(255,255,255,.18);animation:slideUpSheet .45s cubic-bezier(.16,1,.3,1);z-index:10}
body.light .sheet{background:linear-gradient(180deg,rgba(244,242,237,.9) 0%,rgba(248,246,241,.98) 50%);border-top:1px solid rgba(0,0,0,.08)}
.sheet-handle{width:30px;height:4px;background:var(--fg-ghost);border-radius:2px;margin:14px auto 0}

/* Top bar */
.top-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:56px 22px 16px;z-index:5}

/* Inputs */
input,textarea,select{width:100%;background:transparent;border:none;color:var(--fg);font-size:16px;outline:none;font-family:inherit;-webkit-appearance:none}
input::placeholder,textarea::placeholder{color:var(--fg-ghost)}
.field{background:var(--surface);border-radius:16px;padding:15px 18px;border:1px solid var(--border);transition:border-color .2s}
.field:focus-within{border-color:rgba(255,255,255,.35)}
.inp-card{background:var(--surface);border-radius:18px;padding:2px 16px;border:1px solid var(--border);transition:border-color .2s}
.inp-card:focus-within{border-color:rgba(255,255,255,.3)}
.inp-row{display:flex;align-items:center;gap:12px;padding:13px 0}
.inp-row+.inp-row{border-top:1px solid var(--divider)}

/* Buttons */
.btn{width:100%;padding:18px;border-radius:18px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;letter-spacing:.2px;transition:transform .12s,opacity .15s}
.btn:active{transform:scale(.975);opacity:.88}
.btn-white{background:#fff;color:#000}
.btn-gold{background:linear-gradient(135deg,#fff 0%,#ddd 100%);color:#000}
.btn-glass{background:var(--surface-b);color:var(--fg);border:1px solid var(--border-b)}
.btn-ghost{background:transparent;color:rgba(255,255,255,.9);font-size:15px;font-weight:600;border:none;cursor:pointer;font-family:inherit;padding:14px}
.btn-danger-outline{width:100%;padding:16px;background:transparent;border:1px solid rgba(239,68,68,.2);border-radius:16px;color:#f87171;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}

/* Route */
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.rdot-gold{background:#ffffff;box-shadow:0 0 0 3px rgba(255,255,255,.18)}
.rdot-outline{background:transparent;border:1.5px solid var(--fg-dim)}
.rline{width:1px;height:20px;background:var(--fg-faint);margin-left:4px}

/* Vehicle card */
.vcard{background:var(--surface);border-radius:22px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;transition:border-color .2s,transform .15s}
.vcard:active{transform:scale(.99)}
.vcard.sel{border-color:#ffffff}
.vcard-media{height:180px;position:relative;background:linear-gradient(145deg,#0a0a0a 0%,#151515 100%);display:flex;align-items:center;justify-content:center;overflow:hidden}
body.light .vcard-media{background:linear-gradient(145deg,#e0deda 0%,#d4d2cd 100%)}
.vcard-badge{position:absolute;top:14px;left:14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);color:#ffffff;padding:4px 11px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1.2px}

/* Trip card */
.tcard{padding:18px 0;border-bottom:1px solid var(--divider);cursor:pointer}
.tcard:last-child{border-bottom:none}

/* Nav */
.nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:rgba(4,4,4,.93);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.06);padding:10px 0 34px;z-index:20}
body.light .nav{background:rgba(248,246,241,.96);border-top:1px solid rgba(0,0,0,.07)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--fg-ghost);font-size:10px;font-weight:500;padding:6px 0;letter-spacing:.3px;transition:color .2s}
.nav-item.on{color:var(--fg)}
.nav-pip{width:4px;height:4px;border-radius:50%;background:#ffffff;opacity:0;margin-top:-1px;transition:opacity .2s}
.nav-item.on .nav-pip{opacity:1}

/* Cards */
.card{background:var(--surface);border-radius:20px;border:1px solid var(--border)}

/* Service grid */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.svc-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;transition:all .15s}
.svc-card:active{background:var(--surface-b);transform:scale(.96)}

/* Scroll */
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}

/* Tags */
.tag{display:inline-flex;align-items:center;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.4px}
.tag-gold{background:rgba(255,255,255,.1);color:#ffffff}
.tag-gray{background:var(--surface-b);color:var(--fg-muted)}
.tag-green{background:rgba(34,197,94,.1);color:#22c55e}
.tag-red{background:rgba(239,68,68,.1);color:#f87171}

/* Misc */
.back-row{display:flex;align-items:center;gap:12px;padding:56px 22px 20px}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--surface-b);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.section-label{font-size:10px;font-weight:700;letter-spacing:2.5px;color:var(--fg-subtle);text-transform:uppercase}
.err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.18);color:#f87171;padding:12px 16px;border-radius:14px;font-size:14px;margin-bottom:16px}
.divider{height:1px;background:var(--divider);margin:4px 0}

/* Leaflet map */
#map{position:absolute;inset:0;z-index:0}
#map .leaflet-control-attribution{display:none!important}
/* Recommendation cards */
.rec-row{display:flex;gap:10px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
.rec-row::-webkit-scrollbar{display:none}
.rec-card{flex-shrink:0;width:128px;background:var(--surface-b);border:1px solid var(--border);border-radius:16px;padding:14px 12px;cursor:pointer;transition:transform .12s,opacity .12s}
.rec-card:active{transform:scale(.96);opacity:.85}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase ──────────────────────────────────────────────────────────────
let auth, db, fns, FIREBASE_ENABLED = false;
try {
  if (typeof APEXVIP_FIREBASE_CONFIG !== 'undefined' && APEXVIP_FIREBASE_CONFIG.apiKey !== 'YOUR_API_KEY') {
    firebase.initializeApp(APEXVIP_FIREBASE_CONFIG);
    auth = firebase.auth(); db = firebase.firestore(); fns = firebase.functions(); FIREBASE_ENABLED = true;
  }
} catch(e) { console.warn('Firebase init:', e.message); }

const SQUARE_APP_ID = 'sq0idp-8Z5MqX7GA3M0Xnv-0utwMA';
const SQUARE_LOCATION_ID = '1ZX0F29TX12HB';
let _sqCard = null, _sqPayments = null;

function track(event, props){
  try{
    const ev={event,ts:Date.now(),...props};
    const key='apexvip_events';
    const arr=JSON.parse(localStorage.getItem(key)||'[]');
    arr.push(ev);
    if(arr.length>2000) arr.splice(0,arr.length-2000);
    localStorage.setItem(key,JSON.stringify(arr));
    if(FIREBASE_ENABLED) db.collection('analytics').add(ev).catch(()=>{});
  }catch(e){}
}

const $ = id => document.getElementById(id);
const app = document.getElementById('app');

let state = {
  screen: 'splash', user: null, booking: {}, selectedTrip: null,
  theme: localStorage.getItem('apexvip_theme') || 'dark',
  apexBalance: parseInt(localStorage.getItem('apex_balance')||'0'),
  apexTransactions: JSON.parse(localStorage.getItem('apex_txs')||'[]'),
  _lastApexEarned: 0,
  cards: [
    {id:1,brand:'Visa',last4:'4242',expiry:'09/27',color:'linear-gradient(135deg,#2a2a2a,#111)',isDefault:true},
    {id:2,brand:'Mastercard',last4:'8888',expiry:'03/26',color:'linear-gradient(135deg,#1a1a2e,#16213e)',isDefault:false}
  ]
};

document.body.classList.toggle('light', state.theme === 'light');
let TRIPS = [
  {id:'APX-4821',service:'Airport Transfer',pickup:'Heathrow Terminal 5',dropoff:'Mayfair, London W1',date:'29 May 2026',time:'14:30',vehicle:'Mercedes S-Class',status:'upcoming',price:'£185',driver:'James H.',rating:4.9,plate:'LX73 ABC',flight:'BA0247'},
  {id:'APX-4788',service:'Airport Transfer',pickup:'Mayfair, London W1',dropoff:'Gatwick North Terminal',date:'24 May 2026',time:'06:15',vehicle:'Mercedes V-Class',status:'completed',price:'£225',driver:'Michael T.',rating:4.8,plate:'LX72 DEF'},
  {id:'APX-4751',service:'By the Hour',pickup:'Knightsbridge',dropoff:'—',date:'18 May 2026',time:'10:00',vehicle:'Mercedes S-Class',status:'completed',price:'£260',driver:'David K.',rating:4.7,plate:'LX71 GHI'},
];

const NOTIFS = [
  {id:1,icon:'🚗',title:'Driver Assigned',body:"James Harrison will be your chauffeur for tomorrow's trip.",time:'2h ago',read:false},
  {id:2,icon:'✅',title:'Booking Confirmed',body:'Your Airport Transfer on 29 May is confirmed. Ref: APX-4821',time:'2h ago',read:false},
  {id:3,icon:'⭐',title:'Exclusive Offer',body:'Enjoy 20% off your next booking with code APEX20.',time:'1d ago',read:true},
];

const RECENT = ['Heathrow Terminal 5','Mayfair, London W1','Gatwick North Terminal','Canary Wharf E14'];

const POIS = [
  {name:'The Ritz London',    cat:'Hotel',      emoji:'🏨', lat:51.5067, lng:-0.1438},
  {name:'Nobu London',        cat:'Dining',     emoji:'🍽', lat:51.5075, lng:-0.1458},
  {name:'Harrods',            cat:'Shopping',   emoji:'🛍', lat:51.4994, lng:-0.1632},
  {name:'The Shard',          cat:'Attraction', emoji:'🏙', lat:51.5045, lng:-0.0865},
  {name:'Sketch London',      cat:'Dining',     emoji:'🍸', lat:51.5127, lng:-0.1421},
  {name:"Claridge's",         cat:'Hotel',      emoji:'✨', lat:51.5120, lng:-0.1479},
];

let mapInstance=null,mapTileLayer=null;

function initMap(){
  const el=document.getElementById('map');
  if(!el)return;
  if(mapInstance){mapInstance.remove();mapInstance=null;mapTileLayer=null;}
  const dark=state.theme!=='light';
  const tileUrl=dark
    ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
    :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';
  mapInstance=L.map('map',{center:[51.5074,-0.1278],zoom:13,zoomControl:false,attributionControl:false,scrollWheelZoom:false,dragging:true});
  mapTileLayer=L.tileLayer(tileUrl,{maxZoom:19}).addTo(mapInstance);
  POIS.forEach(p=>{
    const icon=L.divIcon({className:'',html:`<div style="width:11px;height:11px;border-radius:50%;background:#ffffff;border:2px solid rgba(255,255,255,.4);box-shadow:0 0 8px rgba(255,255,255,.6)"></div>`,iconSize:[11,11],iconAnchor:[5,5]});
    L.marker([p.lat,p.lng],{icon}).addTo(mapInstance).bindPopup(`<b style="font-family:sans-serif;font-size:13px">${p.name}</b><br><span style="color:#888;font-size:11px">${p.cat}</span>`);
  });
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(({coords})=>{
      if(!mapInstance)return;
      mapInstance.setView([coords.latitude,coords.longitude],14);
      const uIcon=L.divIcon({className:'',html:'<div style="width:14px;height:14px;border-radius:50%;background:#fff;border:3px solid #ffffff;box-shadow:0 0 0 5px rgba(255,255,255,.22)"></div>',iconSize:[14,14],iconAnchor:[7,7]});
      L.marker([coords.latitude,coords.longitude],{icon:uIcon}).addTo(mapInstance).bindPopup('You are here');
    },()=>{});
  }
}

function go(screen, data) {
  if (data) state.selectedTrip = data;
  if (state.screen==='home' && screen!=='home' && mapInstance){mapInstance.remove();mapInstance=null;mapTileLayer=null;}
  state.screen = screen;
  window.scrollTo(0,0);
  track('screen_view',{screen,src:'client'});
  render();
}

function mapBg(){return'<div id="map" style="position:absolute;inset:0;z-index:0"></div>';}

function bottomNav(active) {
  const items = [
    {id:'home',label:'Home',svg:`<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>`},
    {id:'trips',label:'Trips',svg:`<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>`},
    {id:'profile',label:'Profile',svg:`<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`}
  ];
  return `<nav class="nav">${items.map(i=>`
    <div class="nav-item ${active===i.id?'on':''}" onclick="go('${i.id}')">
      ${i.svg}
      <span>${i.label}</span>
      <div class="nav-pip"></div>
    </div>`).join('')}</nav>`;
}

// ── Screens ────────────────────────────────────────────────────────────────
const screens = {

splash: () => `
<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;position:relative">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% 100%,rgba(255,255,255,.055),transparent);animation:fadeIn 2s 1s both ease"></div>
  <div style="position:absolute;width:700px;height:700px;top:-260px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(255,255,255,.032),transparent 62%);animation:orb1 14s ease-in-out infinite alternate"></div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;position:relative;z-index:1">
    <div style="text-align:center">
      <div style="position:relative;display:inline-block;margin-bottom:18px;animation:logoReveal 1.4s .3s both cubic-bezier(.16,1,.3,1)">
        <div class="diamond-text" style="font-family:'Cormorant Garamond',Georgia,serif;font-size:72px;font-weight:300;letter-spacing:2px;line-height:1;animation:diamondShimmer 4s 1.8s linear infinite">ApexVIP</div>
        <i class="sp sp1">✦</i><i class="sp sp2">✧</i><i class="sp sp3">✦</i>
        <i class="sp sp4">✧</i><i class="sp sp5">✦</i><i class="sp sp6">✧</i><i class="sp sp7">✦</i>
      </div>
      <div style="font-family:-apple-system,system-ui,sans-serif;font-size:12px;font-weight:400;color:rgba(255,255,255,.38);text-transform:uppercase;animation:subtitleReveal 1.2s 1s both ease-out">Luxury Concierge Services</div>
    </div>
  </div>
  <div style="padding:0 28px 52px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1;animation:slideUp .6s 1.8s both cubic-bezier(.16,1,.3,1)">
    <button class="btn btn-white" onclick="go('register')">Get started</button>
    <button class="btn btn-glass" onclick="go('login')">Sign in</button>
  </div>
</div>`,

login: () => {
  const err = state._loginErr ? `<div class="err">${state._loginErr}</div>` : '';
  return `
<div style="min-height:100vh;display:flex;flex-direction:column;background:var(--bg);padding:0 24px;animation:fadeIn .3s ease">
  <div style="padding:52px 0 36px;position:relative">
    <div class="back-btn" onclick="go('splash')" style="position:absolute;left:0;top:52px">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    </div>
    <div style="text-align:center;padding-top:4px">
      <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:40px;font-weight:300;color:#fff;letter-spacing:1px;line-height:1;margin-bottom:8px">ApexVIP</div>
      <div style="font-size:13px;color:var(--fg-dim);letter-spacing:.3px">Sign in to continue</div>
    </div>
  </div>

      </div>

        ${[

      <div onclick="go('trip-detail',TRIPS.find(x=>x.id==='${t.id}'))" style="display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:15px 16px;cursor:pointer">

async function doLogin(){
  const e=$('lemail')?.value||'',p=$('lpass')?.value||'';
  if(!FIREBASE_ENABLED){
    if(e==='client@apexvip.com'&&p==='password'){state.user={name:'Alexandra Stone',email:e};state._loginErr=null;track('user_login',{method:'demo',src:'client'});go('home');}
    else{state._loginErr='Invalid email or password.';render();}
    return;
  }
  try{
    await auth.signInWithEmailAndPassword(e,p);
  } catch(err){
    // Auto-create demo account on first run
    if(e==='client@apexvip.com'&&p==='password'){
      if(err.code==='auth/configuration-not-found'||err.code==='auth/operation-not-allowed'){
        state.user={name:'Alexandra Stone',email:e};track('user_login',{method:'demo-fallback',src:'client'});go('home');return;
      }
      try{
        const cred=await auth.createUserWithEmailAndPassword(e,p);
        await db.collection('users').doc(cred.user.uid).set({name:'Alexandra Stone',email:e,role:'client',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
      }catch(e2){
        if(e2.code==='auth/configuration-not-found'||e2.code==='auth/operation-not-allowed'){
          state.user={name:'Alexandra Stone',email:e};track('user_login',{method:'demo-fallback',src:'client'});go('home');
        } else {state._loginErr='Setup error. Try again.';render();}
      }
    } else {
      state._loginErr='Invalid email or password.';render();
    }
  }
}

async function runSquarePayment(){
  const btn = document.getElementById('sq-pay-btn');
  const errEl = document.getElementById('sq-error');
  if(errEl) errEl.style.display='none';
  if(!_sqCard){alert('Payment form not ready yet — please wait a moment and try again.');return;}
  if(btn){btn.disabled=true;btn.textContent='Processing…';}
  try{
    const result = await _sqCard.tokenize();
    if(result.status!=='OK'){
      const msg = result.errors?.map(e=>e.message).join(', ')||'Card error';
      if(errEl){errEl.textContent=msg;errEl.style.display='block';}
      if(btn){btn.disabled=false;btn.textContent='Pay £'+(state._payTotal||0);}
      return;
    }
    const sourceId = result.token;
    const total = state._payTotal||0;
    const ref = 'APX-'+(Math.floor(1000+Math.random()*9000));
    state._confirmedRef = ref;
    let paymentId = null;
    // Try Cloud Function; fall back to storing token for manual processing
    if(FIREBASE_ENABLED && fns){
      try{
        const fn = fns.httpsCallable('processSquarePayment');
        const resp = await fn({sourceId, amount:total, bookingRef:ref});
        paymentId = resp.data.paymentId;
        track('payment_charged',{ref,total,paymentId,src:'client'});
      }catch(fnErr){
        await db.collection('pending_payments').add({
          sourceId, amount:total, bookingRef:ref, status:'pending',
          createdAt:firebase.firestore.FieldValue.serverTimestamp()
        }).catch(()=>{});
        track('payment_token_stored',{ref,total,src:'client'});
      }
    } else {
      track('payment_demo',{ref,total,src:'client'});
    }
    state._squarePaymentId = paymentId;
    await confirmBooking(ref);
  }catch(e){
    if(errEl){errEl.textContent='Payment failed: '+e.message;errEl.style.display='block';}
    if(btn){btn.disabled=false;btn.textContent='Pay £'+(state._payTotal||0);}
  }
}

async function confirmBooking(overrideRef){
  const ref = overrideRef || state._confirmedRef || ('APX-'+(Math.floor(1000+Math.random()*9000)));
  const base=state.booking.price||185;
  const disc=state._promoApplied?Math.round(base*.2):0;
  const vat=Math.round((base-disc)*.2);
  const total=base-disc+vat;
  const svcLabel={airport:'Airport Transfer',hourly:'By the Hour',day:'By the Day'}[state.booking.serviceType]||'Airport Transfer';
  if(FIREBASE_ENABLED&&auth.currentUser){
    try{
      await db.collection('bookings').add({
        ref,clientId:auth.currentUser.uid,clientName:state.user?.name||'',
        serviceType:state.booking.serviceType||'airport',serviceLabel:svcLabel,
        pickup:state.booking.pickup||'',dropoff:state.booking.dropoff||'',
        airport:state.booking.airport||'',flight:state.booking.flight||'',
        date:state.booking.date||'',time:state.booking.time||'',
        vehicle:state.booking.vehicle||'Mercedes S-Class',vehicleId:state.booking.vehicleId||'',
        price:total,baseFare:base,discount:disc,vat,
        promoApplied:state._promoApplied||false,status:'confirmed',
        squarePaymentId:state._squarePaymentId||null,
        paymentStatus:state._squarePaymentId?'paid':'pending',
        driverName:'James Harrison',driverRating:4.9,driverPlate:'LX73 ABC',
        createdAt:firebase.firestore.FieldValue.serverTimestamp()
      });
    }catch(err){console.warn('Booking save:',err.message);}
  }
  state._confirmedRef=ref;state._promoApplied=false;state._squarePaymentId=null;
  const _axcAmt=Math.round(total*0.05);
  earnApex(_axcAmt,'Trip booking');
  if(state._useApexCoin) track('apex_redeemed',{amount:total,src:'client'});
  track('booking_confirmed',{
    service:state.booking.serviceType||'airport',
    vehicle:state.booking.vehicle||'',
    price:total, base:base, disc:disc, vat,
    apex_earned:_axcAmt,
    paid_with_apex:!!(state._useApexCoin),
    pickup:state.booking.pickup||'',
    dropoff:state.booking.dropoff||state.booking.airport||'',
    scheduled_date:state.booking.date||'',
    scheduled_time:state.booking.time||'',
    user:state.user?.name||'Guest',
    ref,
    src:'client'
  });
  go('booking-confirmed');
}
function goPayment(total){state._payTotal=total;state._payCardId=state.cards[0]?.id||null;state._addingCard=false;track('checkout_started',{total,src:'client'});go('payment');}
function apexTier(b){return b>=5000?'Platinum':b>=2000?'Gold':b>=500?'Silver':'Bronze';}
function apexTierColor(t){return{Bronze:'#cd7f32',Silver:'#a8a9ad',Gold:'#ffffff',Platinum:'#b9f2ff'}[t];}
function earnApex(amount,reason){
  state.apexBalance+=amount;
  state._lastApexEarned=amount;
  track('apex_earned',{amount,reason,src:'client'});
  const tx={id:Date.now(),amount,reason,ts:new Date().toISOString()};
  state.apexTransactions=[tx,...state.apexTransactions].slice(0,50);
  localStorage.setItem('apex_balance',state.apexBalance);
  localStorage.setItem('apex_txs',JSON.stringify(state.apexTransactions));
}
function fmtCard(el){let v=el.value.replace(/\D/g,'').slice(0,16);el.value=v.replace(/(.{4})/g,'$1 ').trim();}
function fmtExpiry(el){let v=el.value.replace(/\D/g,'').slice(0,4);if(v.length>2)v=v.slice(0,2)+' / '+v.slice(2);el.value=v;}
function removeCard(id){state.cards=state.cards.filter(c=>c.id!==id);render();}
function toggleTheme(){
  state.theme=state.theme==='light'?'dark':'light';
  localStorage.setItem('apexvip_theme',state.theme);
  document.body.classList.toggle('light',state.theme==='light');
  if(state.screen==='home'&&mapInstance&&mapTileLayer){
    mapInstance.removeLayer(mapTileLayer);
    mapTileLayer=L.tileLayer(state.theme!=='light'
      ?'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
      :'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(mapInstance);
  }else{render();}
}
function signOut(){if(FIREBASE_ENABLED)auth.signOut();else{state.user=null;go('splash');}}

async function useMyLocation(inputId){
  const input=document.getElementById(inputId);
  if(!input||!navigator.geolocation){alert('Geolocation not available on this device.');return;}
  const btn=input.nextElementSibling;
  const origPh=input.placeholder;
  input.placeholder='Locating…';
  input.disabled=true;
  if(btn)btn.style.opacity='.4';
  navigator.geolocation.getCurrentPosition(async({coords})=>{
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${coords.latitude}&lon=${coords.longitude}&format=json&addressdetails=1`,{headers:{'Accept-Language':'en'}});
      const d=await r.json();
      const a=d.address||{};
      const parts=[a.house_number,a.road,a.suburb||a.neighbourhood||a.quarter,a.city||a.town||a.village||a.county].filter(Boolean);
      const addr=parts.length>=2?parts.join(', '):(d.display_name||`${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`);
      input.value=addr;
      state.booking.pickup=addr;
    }catch(e){
      const coords_str=`${coords.latitude.toFixed(4)}, ${coords.longitude.toFixed(4)}`;
      input.value=coords_str;state.booking.pickup=coords_str;
    }
    input.placeholder=origPh;input.disabled=false;
    if(btn)btn.style.opacity='1';
  },()=>{
    alert('Location access was denied. Please allow location access in your browser settings, or type your address manually.');
    input.placeholder=origPh;input.disabled=false;
    if(btn)btn.style.opacity='1';
  },{enableHighAccuracy:true,timeout:10000,maximumAge:0});
}

// ── Firebase auth ──────────────────────────────────────────────────────────
if(FIREBASE_ENABLED){
  let _unsub=null;
  auth.onAuthStateChanged(async user=>{
    if(user){
      try{
        const doc=await db.collection('users').doc(user.uid).get();
        const p=doc.exists?doc.data():{};
        state.user={uid:user.uid,name:p.name||user.displayName||user.email.split('@')[0],email:user.email};
      }catch(e){state.user={uid:user.uid,name:user.displayName||user.email.split('@')[0],email:user.email};}
      if(_unsub)_unsub();
      _unsub=db.collection('bookings').where('clientId','==',user.uid)
        .onSnapshot(snap=>{
          TRIPS.length=0;
          const docs=snap.docs.map(d=>({_docId:d.id,...d.data()}));
          docs.sort((a,b)=>(b.createdAt?.toMillis()||0)-(a.createdAt?.toMillis()||0));
          docs.forEach(d=>TRIPS.push({
            id:d.ref||d._docId,service:d.serviceLabel||'Airport Transfer',
            pickup:d.pickup||'',dropoff:d.airport||d.dropoff||'',
            date:d.date||'',time:d.time||'',vehicle:d.vehicle||'Mercedes S-Class',
            status:d.status||'confirmed',price:'£'+(d.price||0),
            driver:d.driverName||'TBA',rating:d.driverRating||4.9,
            plate:d.driverPlate||'',flight:d.flight||''
          }));
          if(['home','trips'].includes(state.screen))render();
        },()=>{});
      state._loginErr=null;
      if(['splash','login'].includes(state.screen))go('home');else render();
    }else{
      state.user=null;
      if(_unsub){_unsub();_unsub=null;}
      TRIPS.length=0;
      if(!['splash','login','register'].includes(state.screen))go('splash');
    }
  });
}

function render(){
  const fn=screens[state.screen];
  app.innerHTML=fn?fn():`<div style="padding:40px;text-align:center;color:var(--fg-ghost)">Screen not found</div>`;
  if(state.screen==='home') setTimeout(initMap,60);
  if(state.screen==='payment') setTimeout(initSquare,60);
}

render();
</script>
