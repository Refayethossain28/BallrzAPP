<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>ApexVIP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#fff;font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}
.screen{padding:0 20px 100px;min-height:100vh;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
input,textarea,select{width:100%;padding:14px 16px;background:#1a1a1a;border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#fff;font-size:16px;outline:none;font-family:inherit;-webkit-appearance:none}
input:focus,textarea:focus,select:focus{border-color:#C9A84C}
select option{background:#1a1a1a}
textarea{resize:none}
.btn{width:100%;padding:16px;border-radius:10px;font-size:16px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-gold{background:#C9A84C;color:#000}
.btn-outline{background:transparent;color:#C9A84C;border:1.5px solid #C9A84C}
.btn-red{background:transparent;color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.card{background:#111;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:16px}
.label{font-size:12px;color:#666;margin-bottom:6px;display:block;font-weight:500}
.input-group{margin-bottom:14px}
.section-title{font-size:17px;font-weight:700;margin-bottom:14px}
.gold{color:#C9A84C}
.muted{color:#888;font-size:13px}
.pill{padding:9px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:transparent;color:#888;cursor:pointer;font-size:14px;font-family:inherit}
.pill.active{background:#C9A84C;color:#000;border-color:#C9A84C;font-weight:700}
.tab{flex:1;padding:11px;text-align:center;cursor:pointer;font-size:14px;color:#666;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:#C9A84C;border-bottom-color:#C9A84C}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#111;border-top:1px solid rgba(255,255,255,.08);display:flex;padding:8px 0 28px;z-index:100}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:#555;font-size:10px;padding:6px 0}
.nav-item.active{color:#C9A84C}
.menu-row{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer}
.menu-row:last-child{border-bottom:none}
.back-btn{background:none;border:none;color:#C9A84C;font-size:15px;cursor:pointer;padding:20px 0 10px;display:flex;align-items:center;gap:6px;font-family:inherit;font-weight:500}
.divider{height:1px;background:rgba(255,255,255,.06);margin:12px 0}
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-gold{background:rgba(201,168,76,.15);color:#C9A84C}
.badge-green{background:rgba(34,197,94,.15);color:#22c55e}
.badge-gray{background:rgba(100,100,100,.2);color:#888}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444}
.dot-gold{width:8px;height:8px;border-radius:50%;background:#C9A84C;flex-shrink:0}
.dot-gray{width:8px;height:8px;border-radius:2px;background:#555;flex-shrink:0}
.step-line{width:1px;height:22px;background:rgba(255,255,255,.1);margin-left:3px;margin-bottom:6px}
.toggle{width:44px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle-knob{position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:12px;border-radius:8px;font-size:14px;margin-bottom:14px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const $ = id => document.getElementById(id);
const app = document.getElementById('app');

let state = {
  screen: 'splash',
  user: null,
  booking: {},
  selectedTrip: null,
  cards: [
    {id:1,brand:'Visa',last4:'4242',expiry:'09/27',color:'linear-gradient(135deg,#C9A84C,#8B6914)',isDefault:true},
    {id:2,brand:'Mastercard',last4:'8888',expiry:'03/26',color:'linear-gradient(135deg,#1a1a2e,#16213e)',isDefault:false}
  ]
};

const TRIPS = [
  {id:'APX-4821',service:'Airport Transfer',pickup:'Heathrow Terminal 5',dropoff:'Mayfair, London W1',date:'29 May 2026',time:'14:30',vehicle:'Mercedes S-Class',status:'upcoming',price:'£185',driver:'James H.',rating:4.9,plate:'LX73 ABC',flight:'BA0247'},
  {id:'APX-4788',service:'Airport Transfer',pickup:'Mayfair, London W1',dropoff:'Gatwick North Terminal',date:'24 May 2026',time:'06:15',vehicle:'Mercedes V-Class',status:'completed',price:'£225',driver:'Michael T.',rating:4.8,plate:'LX72 DEF'},
  {id:'APX-4751',service:'By the Hour',pickup:'Knightsbridge',dropoff:'—',date:'18 May 2026',time:'10:00',vehicle:'Mercedes S-Class',status:'completed',price:'£260',driver:'David K.',rating:4.7,plate:'LX71 GHI'},
];

const NOTIFS = [
  {id:1,icon:'🚗',color:'rgba(201,168,76,.12)',title:'Driver Assigned',body:"James Harrison will be your chauffeur for tomorrow's trip.",time:'2h ago',read:false},
  {id:2,icon:'✅',color:'rgba(34,197,94,.12)',title:'Booking Confirmed',body:'Your Airport Transfer on 29 May is confirmed. Ref: APX-4821',time:'2h ago',read:false},
  {id:3,icon:'⭐',color:'rgba(168,85,247,.12)',title:'Exclusive Offer',body:'Enjoy 20% off your next booking with code APEX20.',time:'1d ago',read:true},
  {id:4,icon:'💳',color:'rgba(59,130,246,.12)',title:'Payment Received',body:'£185.00 processed for booking APX-4821.',time:'2d ago',read:true},
];

function go(screen, data) {
  if (data) state.selectedTrip = data;
  state.screen = screen;
  window.scrollTo(0,0);
  render();
}

function topBar(left, right='') {
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:22px 0 10px">${left}${right}</div>`;
}

function backBtn(dest, label='Back') {
  return `<button class="back-btn" onclick="go('${dest}')">&#8592; ${label}</button>`;
}

function bottomNav(active) {
  const items = [
    {id:'home',label:'Home',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>'},
    {id:'trips',label:'Trips',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>'},
    {id:'notifications',label:'Alerts',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>'},
    {id:'profile',label:'Profile',svg:'<svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>'}
  ];
  return `<nav class="nav">${items.map(i=>`<div class="nav-item ${active===i.id?'active':''}" onclick="go('${i.id}')">${i.svg}<span>${i.label}</span></div>`).join('')}</nav>`;
}

function tripCard(t, onclick) {
  const badge = {upcoming:'badge-gold',completed:'badge-gray',cancelled:'badge-red'};
  const label = {upcoming:'Upcoming',completed:'Completed',cancelled:'Cancelled'};
  return `<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="${onclick}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
      <span class="muted">${t.date} · ${t.time}</span>
      <span class="badge ${badge[t.status]}">${label[t.status]}</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><div class="dot-gold"></div><span style="font-size:14px">${t.pickup}</span></div>
    <div class="step-line"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div class="dot-gray"></div><span style="font-size:14px">${t.dropoff}</span></div>
    <div class="divider"></div>
    <div style="display:flex;justify-content:space-between;font-size:13px"><span class="muted">${t.vehicle}</span><span style="color:#C9A84C;font-weight:700">${t.price}</span></div>
  </div>`;
}

const screens = {

splash: () => `
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:linear-gradient(180deg,#0a0a0a,#111)">
  <div style="text-align:center;margin-bottom:64px">
    <div style="width:80px;height:80px;border-radius:50%;border:2px solid #C9A84C;display:flex;align-items:center;justify-content:center;margin:0 auto 28px;background:rgba(201,168,76,.07)">
      <svg width="34" height="34" fill="none" viewBox="0 0 24 24" stroke="#C9A84C" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3l14 9-14 9V3z"/></svg>
    </div>
    <div style="font-size:54px;font-weight:800;letter-spacing:14px;color:#C9A84C;line-height:1">APEX</div>
    <div style="font-size:26px;font-weight:300;letter-spacing:18px;color:rgba(201,168,76,.55);margin-top:4px">VIP</div>
    <div style="margin-top:22px;color:#555;font-size:13px;letter-spacing:3px;text-transform:uppercase">Premium Chauffeur & Concierge</div>
  </div>
  <div style="width:100%;display:flex;flex-direction:column;gap:12px">
    <button class="btn btn-gold" onclick="go('register')">Get Started</button>
    <button class="btn btn-outline" onclick="go('login')">Sign In</button>
  </div>
  <p style="margin-top:28px;color:#333;font-size:11px;text-align:center">By continuing you agree to our Terms &amp; Privacy Policy</p>
</div>`,

login: () => {
  const err = state._loginErr ? `<div class="error">${state._loginErr}</div>` : '';
  return `
<div style="min-height:100vh;display:flex;flex-direction:column;padding:64px 24px 40px">
  <div style="text-align:center;margin-bottom:40px">
    <div style="font-size:28px;font-weight:800;letter-spacing:6px;color:#C9A84C">APEX VIP</div>
    <div class="muted" style="margin-top:6px">Welcome back</div>
  </div>
  ${err}
  <div class="input-group"><label class="label">Email Address</label><input id="lemail" type="email" placeholder="your@email.com" value="client@apexvip.com"/></div>
  <div class="input-group"><label class="label">Password</label><input id="lpass" type="password" placeholder="••••••••" value="password"/></div>
  <div style="text-align:right;margin-bottom:22px"><button style="background:none;border:none;color:#888;font-size:14px;cursor:pointer">Forgot Password?</button></div>
  <button class="btn btn-gold" onclick="doLogin()">Sign In</button>
  <p style="text-align:center;margin-top:22px;color:#666;font-size:14px">No account? <span class="gold" style="cursor:pointer" onclick="go('register')">Register</span></p>
  <div style="margin-top:auto;background:#1a1a1a;border-radius:10px;padding:14px;font-size:13px;color:#666">
    <div style="color:#888;font-weight:600;margin-bottom:4px">Demo credentials</div>
    <div>Email: client@apexvip.com</div><div>Password: password</div>
  </div>
</div>`;
},

register: () => {
  const s = state._regStep || 1;
  const bars = `<div style="display:flex;gap:6px;margin-top:12px">${[1,2].map(i=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<=s?'#C9A84C':'#222'}"></div>`).join('')}</div>`;
  if (s===3) return `
<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center">
  <div style="width:80px;height:80px;border-radius:50%;background:rgba(34,197,94,.1);border:2px solid #22c55e;display:flex;align-items:center;justify-content:center;margin-bottom:24px;animation:scaleIn .4s ease">
    <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="#22c55e" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
  </div>
  <div style="font-size:24px;font-weight:700;margin-bottom:8px">Welcome to ApexVIP!</div>
  <div class="muted" style="margin-bottom:40px">Your account has been created.</div>
  <button class="btn btn-gold" onclick="state.user={name:'Alexandra',email:'client@apexvip.com'};state._regStep=1;go('home')">Go to Home</button>
</div>`;
  return `
<div class="screen">
  ${backBtn(s>1?'#':' splash')}
  <div style="margin-bottom:24px">
    <div style="font-size:22px;font-weight:700">Create Account</div>
    <div class="muted">Step ${s} of 2</div>
    ${bars}
  </div>
  ${s===1?`
  <div class="input-group"><label class="label">First Name</label><input id="rfn" placeholder="Alexandra"/></div>
  <div class="input-group"><label class="label">Last Name</label><input id="rln" placeholder="Stone"/></div>
  <div class="input-group"><label class="label">Email</label><input id="rem" type="email" placeholder="your@email.com"/></div>
  <div class="input-group"><label class="label">Phone</label><input id="rph" type="tel" placeholder="+44 7700 900000"/></div>
  <button class="btn btn-gold" onclick="state._regStep=2;render()">Continue</button>
  `:`
  <div class="input-group"><label class="label">Password</label><input id="rpw" type="password" placeholder="Min. 8 characters"/></div>
  <div class="input-group"><label class="label">Confirm Password</label><input id="rpc" type="password" placeholder="Repeat password"/></div>
  <p style="font-size:13px;color:#666;margin-bottom:20px">By creating an account you agree to our <span class="gold">Terms</span> and <span class="gold">Privacy Policy</span>.</p>
  <button class="btn btn-gold" onclick="state._regStep=3;render()">Create Account</button>
  `}
</div>`;
},

home: () => {
  const h = new Date().getHours();
  const greet = h<12?'Good morning':h<17?'Good afternoon':'Good evening';
  const name = state.user?.name || 'Guest';
  const upcoming = TRIPS.filter(t=>t.status==='upcoming');
  const recent = TRIPS.filter(t=>t.status==='completed').slice(0,2);
  return `
<div class="screen">
  ${topBar(`<div><div class="muted" style="font-size:13px">${greet},</div><div style="font-size:20px;font-weight:700">${name}</div></div>`,
  `<div style="cursor:pointer;position:relative" onclick="go('notifications')"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg><div style="position:absolute;top:-3px;right:-3px;width:8px;height:8px;border-radius:50%;background:#C9A84C"></div></div>`)}
  <div style="background:#1a1a1a;border-radius:14px;border:1px solid rgba(255,255,255,.08);padding:4px;margin-bottom:20px">
    <div style="display:flex;align-items:center;padding:4px 8px">
      <div class="dot-gold" style="margin:0 12px 0 4px"></div>
      <input id="pickup" style="background:transparent;border:none;padding:10px 0;font-size:15px" placeholder="Pickup location" oninput="state.booking.pickup=this.value"/>
    </div>
    <div style="display:flex;align-items:center;gap:8px;padding:0 8px">
      <div style="flex:1;height:1px;background:rgba(255,255,255,.06)"></div>
      <button onclick="swapLocations()" style="background:#111;border:1px solid rgba(255,255,255,.1);border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#C9A84C;flex-shrink:0">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
      </button>
      <div style="flex:1;height:1px;background:rgba(255,255,255,.06)"></div>
    </div>
    <div style="display:flex;align-items:center;padding:4px 8px">
      <div class="dot-gray" style="margin:0 12px 0 4px"></div>
      <input id="dropoff" style="background:transparent;border:none;padding:10px 0;font-size:15px" placeholder="Dropoff location" oninput="state.booking.dropoff=this.value"/>
    </div>
  </div>
  <div class="section-title">Our Services</div>
  <div style="display:flex;gap:10px;margin-bottom:24px">
    ${[
      {t:'airport',l:'Airport Transfer',d:'Door to terminal',svg:'<svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>'},
      {t:'hourly',l:'By the Hour',d:'From 2 hours',svg:'<svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 6v6l4 2"/></svg>'},
      {t:'day',l:'By the Day',d:'Full concierge',svg:'<svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>'}
    ].map(s=>`<div onclick="goBook('${s.t}')" style="flex:1;background:#111;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px 10px;text-align:center;cursor:pointer">
      <div style="color:#C9A84C;margin-bottom:8px;display:flex;justify-content:center">${s.svg}</div>
      <div style="font-size:11px;font-weight:700;line-height:1.3;margin-bottom:2px">${s.l}</div>
      <div style="font-size:10px;color:#555">${s.d}</div>
    </div>`).join('')}
  </div>
  ${upcoming.length?`<div class="section-title">Upcoming</div>${upcoming.map(t=>tripCard(t,`go('trip-detail',TRIPS.find(x=>x.id==='${t.id}'))`)).join('')}`:''}
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="section-title" style="margin-bottom:0">Recent Trips</div>
    <span class="gold" style="font-size:13px;cursor:pointer" onclick="go('trips')">View all</span>
  </div>
  ${recent.map(t=>tripCard(t,`go('trip-detail',TRIPS.find(x=>x.id==='${t.id}'))`)).join('')}
  ${bottomNav('home')}
</div>`;
},

'book-airport': () => `
<div class="screen">
  ${backBtn('home')}
  <div style="margin-bottom:20px"><div style="font-size:22px;font-weight:700">Airport Transfer</div><div class="muted" style="margin-top:4px">Door-to-terminal service</div></div>
  <div class="input-group"><label class="label">Pickup Address</label><input id="ba_pu" placeholder="e.g. 14 Park Lane, Mayfair" value="${state.booking.pickup||''}"/></div>
  <div class="input-group"><label class="label">Airport</label>
    <select id="ba_ap">
      ${['Heathrow T2','Heathrow T3','Heathrow T4','Heathrow T5','Gatwick North','Gatwick South','Stansted','Luton','City Airport'].map(a=>`<option>${a}</option>`).join('')}
    </select>
  </div>
  <div class="input-group"><label class="label">Flight Number</label><input id="ba_fl" placeholder="e.g. BA0247"/></div>
  <div style="display:flex;gap:12px">
    <div class="input-group" style="flex:1"><label class="label">Date</label><input id="ba_dt" type="date"/></div>
    <div class="input-group" style="flex:1"><label class="label">Time</label><input id="ba_tm" type="time"/></div>
  </div>
  <div class="input-group"><label class="label">Passengers</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap" id="ba_pax">
      ${[1,2,3,4,5,6,7,8].map(n=>`<button class="pill${n===2?' active':''}" onclick="setPax(${n},this)">${n}</button>`).join('')}
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06)">
    <div><div style="font-size:15px;font-weight:500">Child Seats</div><div class="muted" style="margin-top:2px">For children under 12</div></div>
    <div id="cs_toggle" class="toggle" style="background:#333" onclick="toggleCS()"><div class="toggle-knob" id="cs_knob" style="left:2px"></div></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 0;margin-bottom:20px">

<div class="screen">
  ${backBtn('profile')}
  <div style="font-size:22px;font-weight:700;margin-bottom:20px">Payment Methods</div>
  ${state.cards.map(c=>`
  <div style="background:${c.color};border-radius:14px;padding:20px;margin-bottom:12px;position:relative">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="font-size:12px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.7)">${c.brand.toUpperCase()}</div>
      ${c.isDefault?`<span style="background:rgba(255,255,255,.2);border-radius:10px;padding:2px 8px;font-size:10px;color:#fff">DEFAULT</span>`:''}
    </div>
    <div style="font-size:20px;letter-spacing:4px;margin-top:20px;font-weight:500">•••• •••• •••• ${c.last4}</div>
    <div style="display:flex;justify-content:space-between;margin-top:16px;align-items:flex-end">
      <div style="font-size:12px;color:rgba(255,255,255,.7)">EXPIRES<br/><span style="color:#fff;font-size:14px;font-weight:600">${c.expiry}</span></div>
      <button onclick="removeCard(${c.id})" style="background:rgba(0,0,0,.3);border:none;color:#fff;padding:6px 12px;border-radius:8px;font-size:13px;cursor:pointer">Remove</button>
    </div>
  </div>`).join('')}
  <button class="btn btn-outline" style="margin-bottom:16px">+ Add New Card</button>
  <div class="card" style="opacity:.5">
    <div class="muted" style="font-size:12px;margin-bottom:10px">DIGITAL WALLETS</div>
    <div style="display:flex;gap:10px">
      <div style="flex:1;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center;font-size:14px;color:#555">Apple Pay<br/><span style="font-size:11px">Coming Soon</span></div>
      <div style="flex:1;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;text-align:center;font-size:14px;color:#555">Google Pay<br/><span style="font-size:11px">Coming Soon</span></div>
    </div>
  </div>
</div>`

};

// Actions
function doLogin(){
  const e=$('lemail')?.value||'',p=$('lpass')?.value||'';
  if(e==='client@apexvip.com'&&p==='password'){state.user={name:'Alexandra',email:e};state._loginErr=null;go('home');}
  else{state._loginErr='Invalid email or password.';render();}
}
function swapLocations(){
  const pu=$('pickup'),do_=$('dropoff');
  if(!pu||!do_)return;
  const t=pu.value;pu.value=do_.value;do_.value=t;
  state.booking.pickup=pu.value;state.booking.dropoff=do_.value;
}
function goBook(type){state.booking.serviceType=type;go('book-'+type);}
function goTrip(id){const t=TRIPS.find(x=>x.id===id);if(t)go('trip-detail',t);}
function setPax(n,el){document.querySelectorAll('#ba_pax .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');state.booking.passengers=n;}
function setPaxH(n,el){document.querySelectorAll('#bh_pax .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}
function setPaxD(n,el){document.querySelectorAll('#bd_pax .pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');}
let _csOn=false,_lug=1,_dur={h:3,p:195};
function toggleCS(){_csOn=!_csOn;const t=$('cs_toggle'),k=$('cs_knob');if(t)t.style.background=_csOn?'#C9A84C':'#333';if(k)k.style.left=_csOn?'22px':'2px';}
function changeLuggage(d){_lug=Math.max(0,_lug+d);const el=$('lug_count');if(el)el.textContent=_lug;}
function setDur(h,p,el){_dur={h,p};document.querySelectorAll('#bh_dur .pill').forEach(x=>x.classList.remove('active'));el.classList.add('active');const s=$('bh_sel'),pr=$('bh_price');if(s)s.textContent=h+' hours';if(pr)pr.textContent='£'+p;}
function saveAirport(){state.booking={...state.booking,pickup:$('ba_pu')?.value||'',airport:$('ba_ap')?.value||'',flight:$('ba_fl')?.value||'',date:$('ba_dt')?.value||'',time:$('ba_tm')?.value||'',childSeats:_csOn,luggage:_lug};go('vehicle-select');}
function saveHourly(){state.booking={...state.booking,pickup:$('bh_pu')?.value||'',date:$('bh_dt')?.value||'',time:$('bh_tm')?.value||'',duration:_dur.h,hourlyPrice:_dur.p};go('vehicle-select');}
function saveDay(){state.booking={...state.booking,pickup:$('bd_pu')?.value||'',date:$('bd_dt')?.value||'',notes:$('bd_notes')?.value||''};go('vehicle-select');}
function selectVehicle(id,price,name){state.booking.vehicleId=id;state.booking.price=price;state.booking.vehicle=name;render();}
function goSummary(){if(state.booking.vehicleId)go('booking-summary');}
function applyPromo(){const v=$('promo_in')?.value||'';if(v.toUpperCase()==='APEX20'){state._promoApplied=true;render();}else{alert('Invalid promo code');}}
function removeCard(id){state.cards=state.cards.filter(c=>c.id!==id);render();}
function signOut(){state.user=null;go('splash');}

function render(){
  const fn=screens[state.screen];
  app.innerHTML=fn?fn():`<div class="screen"><div style="padding:40px;text-align:center;color:#555">Screen not found</div></div>`;
}

render();
</script>
</body>
</html>
