<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#6e8bff"/>
      <stop offset="0.5" stop-color="#8b7cff"/>
      <stop offset="1" stop-color="#39e6b4"/>
    </linearGradient>
    <radialGradient id="bg" cx="0.5" cy="0.32" r="0.9">
      <stop offset="0" stop-color="#161b2e"/>
      <stop offset="1" stop-color="#080a14"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- the "cusp": a dial ring with a single hand pointing to the one next thing -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#g)" stroke-width="22" opacity="0.92"/>
  <circle cx="256" cy="256" r="26" fill="url(#g)"/>
  <rect x="247" y="120" width="18" height="150" rx="9" fill="url(#g)"
        transform="rotate(38 256 256)"/>
  <circle cx="368" cy="150" r="20" fill="#39e6b4"/>
</svg>
