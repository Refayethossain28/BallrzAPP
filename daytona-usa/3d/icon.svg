<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="80%">
      <stop offset="0%" stop-color="#1b2240"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="38%" stop-color="#ffe066"/>
      <stop offset="52%" stop-color="#ff9a1a"/>
      <stop offset="62%" stop-color="#fff6d8"/>
      <stop offset="100%" stop-color="#aac4ee"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#b81f1f"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- apex chevron: a stylised "A" / mountain peak with a red racing core -->
  <g filter="url(#glow)">
    <path d="M256 74 L412 340 L344 340 L256 182 L168 340 L100 340 Z" fill="url(#chrome)"/>
    <path d="M256 214 L322 340 L190 340 Z" fill="url(#red)"/>
  </g>

  <!-- checkered finish strip under the apex -->
  <g transform="translate(96,364)">
    <rect width="320" height="44" rx="8" fill="#0d1018"/>
    <g fill="#e9e9ee">
      <rect x="10" y="8"  width="20" height="14"/><rect x="50" y="8"  width="20" height="14"/>
      <rect x="90" y="8"  width="20" height="14"/><rect x="130" y="8" width="20" height="14"/>
      <rect x="170" y="8" width="20" height="14"/><rect x="210" y="8" width="20" height="14"/>
      <rect x="250" y="8" width="20" height="14"/><rect x="290" y="8" width="20" height="14"/>
      <rect x="30" y="22" width="20" height="14"/><rect x="70" y="22" width="20" height="14"/>
      <rect x="110" y="22" width="20" height="14"/><rect x="150" y="22" width="20" height="14"/>
      <rect x="190" y="22" width="20" height="14"/><rect x="230" y="22" width="20" height="14"/>
      <rect x="270" y="22" width="20" height="14"/>
    </g>
  </g>

  <!-- GP badge, top-right -->
  <g transform="translate(346,88)">
    <rect x="-14" y="-38" width="120" height="76" rx="16" fill="url(#red)" transform="skewX(-8)"/>
    <text x="44" y="17" text-anchor="middle" font-family="Arial, Helvetica, sans-serif"
          font-size="52" font-weight="900" font-style="italic" fill="#ffffff">GP</text>
  </g>
</svg>
