<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>APEX GP — Arcade Circuit Racer</title>
<!-- PWA: installable + offline + native-feeling on the home screen -->
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="theme-color" content="#05060a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ApexGP" />
<link rel="apple-touch-icon" href="./icon.svg" />
<link rel="icon" href="./icon.svg" />
<style>
  :root { --neon:#ff3b3b; --blue:#1f6dff; --yellow:#ffd400; }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#05060a;
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:#fff;overflow:hidden;
    -webkit-user-select:none;user-select:none;}
  #wrap{position:fixed;inset:0;}
  #gl{display:block;width:100%;height:100%;}
  #hud2d{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  /* ---- text HUD ---- */
  #hud{position:absolute;inset:0;pointer-events:none;font-weight:800;letter-spacing:1px;}
  .ol{-webkit-text-stroke:3px #000;paint-order:stroke fill;text-shadow:3px 3px 0 rgba(0,0,0,.55);}
  #lapinfo,#timer,#pos{position:absolute;}
  #lapinfo{left:16px;top:10px;line-height:1;}
  #lapinfo .laplabel{font-size:13px;letter-spacing:2px;}
  #lapinfo .lap{font-size:40px;}
  #lapinfo .ltime{font-size:18px;margin-top:4px;font-variant-numeric:tabular-nums;}
  #timer{left:50%;top:6px;transform:translateX(-50%);text-align:center;}
  #timer .timerval{font-size:56px;color:var(--yellow);line-height:1;}
  #timer .timerlabel{font-size:11px;letter-spacing:3px;opacity:.9;}
  #pos{right:16px;top:8px;text-align:right;line-height:1;}
  #pos .poslabel{font-size:12px;letter-spacing:2px;}
  #pos .posval{font-size:50px;color:#2bd451;}
  /* ---- overlays ---- */
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;overflow-y:auto;
    padding:max(10px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right))
            max(10px,env(safe-area-inset-bottom)) max(12px,env(safe-area-inset-left));
    background:radial-gradient(ellipse at center,rgba(10,12,30,.75),rgba(0,0,0,.92));z-index:5;}
  #overlay.hidden{display:none;}
  /* on-screen pause button (always reachable, esp. on touch) */
  #pauseBtn{position:absolute;left:50%;transform:translateX(-50%);
    bottom:calc(10px + env(safe-area-inset-bottom));z-index:4;pointer-events:auto;cursor:pointer;
    font-family:inherit;font-weight:800;font-size:14px;letter-spacing:1px;color:#fff;
    background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.3);border-radius:22px;padding:7px 18px;}
  #pauseBtn:active{transform:translateX(-50%) translateY(2px);}
  /* view-toggle button (chase <-> cockpit) */
  #viewBtn{position:absolute;left:50%;transform:translateX(-50%);
    top:calc(78px + env(safe-area-inset-top));z-index:4;pointer-events:auto;cursor:pointer;
    font-family:inherit;font-weight:800;font-size:13px;letter-spacing:1px;color:#fff;
    background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.3);border-radius:22px;padding:6px 16px;}
  #viewBtn:active{transform:translateX(-50%) translateY(2px);}
  #viewBtn.hidden{display:none;}
  .title{font-size:64px;font-weight:900;letter-spacing:4px;margin:0;font-style:italic;
    transform:skewX(-8deg);
    background:linear-gradient(180deg,#ffffff 14%,#ffe066 38%,#ff9a1a 50%,#fff6d8 60%,#aac4ee 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    filter:drop-shadow(0 0 16px rgba(255,70,70,.85)) drop-shadow(4px 5px 0 rgba(0,0,0,.9));
    animation:titlePulse 2.4s ease-in-out infinite;}
  .title .red{background:linear-gradient(180deg,#ff8d8d 12%,#ff4b4b 45%,#8f1212 92%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  @keyframes titlePulse{50%{filter:drop-shadow(0 0 30px rgba(255,90,90,1)) drop-shadow(4px 5px 0 rgba(0,0,0,.9));}}
  .checker{height:14px;border-radius:3px;pointer-events:none;
    background:repeating-conic-gradient(#e9e9ee 0% 25%, #0d1018 0% 50%) 0 0/28px 14px;
    animation:checkerScroll 1.1s linear infinite;
    box-shadow:0 0 12px rgba(0,0,0,.6);}
  @keyframes checkerScroll{to{background-position:-56px 0;}}
  .menu-card.arcade{border-color:rgba(255,75,75,.55);
    box-shadow:0 0 26px rgba(255,60,60,.28), inset 0 0 46px rgba(28,38,80,.4);
    animation:cardGlow 2.8s ease-in-out infinite;}
  @keyframes cardGlow{50%{border-color:rgba(90,150,255,.6);
    box-shadow:0 0 30px rgba(80,140,255,.32), inset 0 0 46px rgba(28,38,80,.4);}}
  .subtitle{font-size:16px;opacity:.9;margin:6px 0 28px;letter-spacing:3px;}
  .menu-card{background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.18);
    border-radius:14px;padding:22px 30px;max-width:560px;}
  .menu-card h2{margin:0 0 10px;font-size:22px;color:var(--yellow);}
  .keys{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:15px;margin:14px 0 20px;text-align:left;}
  .keys b{background:#111;border:1px solid #444;border-radius:6px;padding:2px 8px;}
  .diff{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
  /* vehicle / circuit selection cards */
  .cards{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:6px 0 16px;}
  .selcard{pointer-events:auto;cursor:pointer;width:200px;max-width:42vw;text-align:center;
    background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.2);border-radius:12px;
    padding:14px 12px;color:#fff;font-family:inherit;transition:transform .06s,border-color .06s,background .06s;}
  .selcard:active{transform:scale(.97);}
  .selcard.sel{border-color:var(--yellow);background:rgba(255,212,0,.12);box-shadow:0 0 16px rgba(255,212,0,.3);}
  .cardicon{font-size:42px;line-height:1;}
  .cardname{font-size:16px;font-weight:800;margin-top:6px;letter-spacing:1px;}
  .carddesc{font-size:12px;opacity:.82;margin-top:5px;line-height:1.35;}
  .navrow{display:flex;gap:10px;justify-content:center;}
  .navrow .btn{flex:1;max-width:200px;}
  .diff button{flex:1;}
  button.btn{pointer-events:auto;cursor:pointer;font-family:inherit;font-weight:800;letter-spacing:1px;
    font-size:18px;color:#fff;padding:12px 26px;border:none;border-radius:10px;
    background:linear-gradient(180deg,var(--neon),#b81f1f);
    box-shadow:0 4px 0 #6e0d0d,0 8px 18px rgba(0,0,0,.5);transition:transform .05s ease;}
  button.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #6e0d0d;}
  button.btn.sel{outline:3px solid var(--yellow);}
  button.ghost{background:linear-gradient(180deg,#2a2f45,#1a1d2c);box-shadow:0 4px 0 #0c0e16;}
  .flash{animation:blink 1s steps(2) infinite;}
  .padsel{outline:3px solid var(--yellow) !important;box-shadow:0 0 16px rgba(255,212,0,.55) !important;}
  @keyframes blink{50%{opacity:.25;}}
  #countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:160px;font-weight:900;color:var(--yellow);
    text-shadow:0 0 30px var(--neon),6px 6px 0 #000;pointer-events:none;z-index:6;}
  #countdown.hidden{display:none;}
  #banner{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%) skewX(-8deg);
    font-size:72px;font-weight:900;color:var(--yellow);
    text-shadow:0 0 24px var(--neon),5px 5px 0 #000;z-index:6;pointer-events:none;}
  #banner.hidden{display:none;}
  #banner.intro{font-size:clamp(22px,6vw,54px);white-space:normal;width:92%;text-align:center;line-height:1.12;}
  #touch{position:absolute;inset:0;z-index:4;display:none;touch-action:none;pointer-events:none;}
  .tbtn{position:absolute;pointer-events:auto;touch-action:none;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;font-weight:800;letter-spacing:1px;
    border-radius:20px;border:2px solid rgba(255,255,255,.4);
    background:rgba(18,22,38,.40);backdrop-filter:blur(3px);
    box-shadow:0 5px 14px rgba(0,0,0,.4);transition:transform .05s,background .05s;
    -webkit-user-select:none;user-select:none;}
  .tbtn:active{transform:scale(.92);background:rgba(255,255,255,.34);}
  .tbtn .ic{font-size:40px;line-height:1;pointer-events:none;}
  .tbtn .lbl{font-size:11px;opacity:.85;margin-top:2px;pointer-events:none;}
  /* steering pair, bottom-left */
  #tleft,#tright{width:94px;height:94px;bottom:calc(22px + env(safe-area-inset-bottom));}
  #tleft{left:calc(18px + env(safe-area-inset-left));}
  #tright{left:calc(120px + env(safe-area-inset-left));}
  /* pedals, bottom-right */
  #tgas,#tbrake{width:104px;height:104px;bottom:calc(22px + env(safe-area-inset-bottom));}
  #tgas{right:calc(18px + env(safe-area-inset-right));
    background:rgba(34,170,80,.42);border-color:rgba(140,255,170,.65);}
  #tbrake{right:calc(132px + env(safe-area-inset-right));
    background:rgba(225,60,60,.42);border-color:rgba(255,150,150,.65);}
  /* nitro boost button, above the steering pair */
  #tboost{width:88px;height:88px;left:calc(58px + env(safe-area-inset-left));
    bottom:calc(128px + env(safe-area-inset-bottom));
    background:rgba(255,150,30,.42);border-color:rgba(255,210,120,.75);}
  .credit{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:11px;opacity:.5;}
  #err{position:absolute;inset:0;display:none;align-items:center;justify-content:center;text-align:center;
    padding:30px;z-index:9;font-size:16px;line-height:1.5;}
  @media (max-width:760px){.title{font-size:44px;}#timer .timerval{font-size:40px;}}
  /* short / landscape-phone viewports: compress the menu so START always fits.
     Placed last so it overrides the base rules above (equal specificity). */
  @media (max-height:520px){
    #overlay{justify-content:center;}
    .title{font-size:24px;} .subtitle{margin:1px 0 5px;font-size:10px;}
    .menu-card{padding:9px 16px;border-radius:10px;}
    .menu-card h2{font-size:13px;margin:0 0 6px;}
    .keys{display:none;}                 /* touch controls on screen — hide key list */
    .diff{margin-bottom:8px;} .diff button{padding:7px 8px;font-size:13px;}
    button.btn{font-size:14px;padding:8px 18px;}
    .cards{gap:8px;margin:2px 0 8px;} .selcard{width:150px;padding:8px 10px;}
    .cardicon{font-size:28px;} .cardname{font-size:13px;margin-top:3px;} .carddesc{font-size:10px;margin-top:3px;}
    .credit{font-size:9px;}
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gl"></canvas>
  <canvas id="hud2d"></canvas>

  <div id="hud">
    <div id="lapinfo">
      <div class="laplabel ol">LAP</div>
      <div class="lap ol"><span id="lapNum">1</span>/<span id="lapTotal">8</span></div>
      <div class="ltime ol" id="lapTimeVal">0'00"00</div>
    </div>
    <div id="timer">
      <div class="timerval ol" id="timerVal">50</div>
      <div class="timerlabel ol" id="trackName">THREE-SEVEN SPEEDWAY</div>
    </div>
    <div id="pos">
      <div class="poslabel ol">POSITION</div>
      <div class="posval ol"><span id="posNum">40</span>/<span id="posTotal">40</span></div>
    </div>
  </div>

  <button id="pauseBtn" aria-label="Pause">❚❚ PAUSE</button>
  <button id="viewBtn" class="hidden" aria-label="Change view">👁 CHASE VIEW</button>
  <div id="banner" class="hidden"></div>
  <div id="countdown" class="hidden"></div>

  <div id="overlay">
    <h1 class="title">APEX <span class="red">GP</span></h1>
    <div class="subtitle">ARCADE CIRCUIT RACING</div>
    <div class="menu-card arcade">
      <h2>SELECT RACE MODE</h2>
      <p style="font-size:13px;opacity:.85;margin:0 0 16px">Loading…</p>
      <button class="btn" id="startBtn">START ▶</button>
    </div>
    <div class="credit">Fan-made, non-commercial. •
      <a href="../index.html" style="color:#9fe">2D version</a></div>
  </div>

  <div id="err"></div>

  <div id="touch">
    <div id="tleft" class="tbtn"><span class="ic">◀</span></div>
    <div id="tright" class="tbtn"><span class="ic">▶</span></div>
    <div id="tbrake" class="tbtn"><span class="ic">⊘</span><span class="lbl">BRAKE</span></div>
    <div id="tgas" class="tbtn"><span class="ic">▲</span><span class="lbl">GAS</span></div>
    <div id="tboost" class="tbtn"><span class="ic">🔥</span><span class="lbl">NITRO</span></div>
  </div>
</div>

<!-- Apple MusicKit JS (lets the player stream from their own Apple Music account).
     Loads from Apple's CDN; harmless if it fails (Apple Music option degrades gracefully). -->
<script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" async></script>
<!-- Optional: pre-set your MusicKit developer token here instead of pasting it in-game:
     <script>window.APPLE_MUSIC_DEV_TOKEN = 'eyJ...';</script> -->
<!-- Renderer selection. Default = the proven vendored WebGL build. Opt into the
     EXPERIMENTAL WebGPU build (real bloom etc.) with ?webgpu=1 on a WebGPU device
     (iOS 17.4+ / desktop Chrome). The WebGPU build also has its own WebGL2 fallback. -->
<script>
  (function(){
    var wantGPU = /[?&]webgpu=1/.test(location.search) && !!navigator.gpu;
    var V='0.170.0', cdn='https://cdn.jsdelivr.net/npm/three@'+V;
    var map = wantGPU ? { imports:{
        "three": cdn+'/build/three.webgpu.js',
        "three/tsl": cdn+'/build/three.tsl.js',
        "three/addons/": cdn+'/examples/jsm/'
      } } : { imports:{
        "three": "./vendor/three.module.js",
        "three/addons/": "./vendor/addons/"
      } };
    var s=document.createElement('script'); s.type='importmap'; s.textContent=JSON.stringify(map);
    document.currentScript.after(s);
    window.__WEBGPU_REQUESTED = wantGPU;
  })();
</script>
<script type="module">
  // Cache-bust the gameplay code so a reload always gets the latest build
  // (raw.githack / Safari cache modules aggressively). Libraries stay cached.
  const v = Date.now();
  const load = src => new Promise(res => { const s = document.createElement('script'); s.src = src; s.onload = res; s.onerror = res; document.head.appendChild(s); });
  await load('../music.js?v=' + v);
  await load('./applemusic.js?v=' + v);
  try {
    await import('./game3d.js?v=' + v);
  } catch (e) {
    // If the experimental WebGPU build (loaded from CDN) failed, self-heal back
    // to the proven WebGL renderer by reloading without the ?webgpu flag.
    if (window.__WEBGPU_REQUESTED) { location.replace(location.pathname); }
    else { throw e; }
  }
  // register the service worker (installable + offline); harmless if unsupported
  if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('./sw.js'); } catch(e){} }
</script>
<noscript><div style="padding:40px">This game needs JavaScript and WebGL.</div></noscript>
</body>
</html>
