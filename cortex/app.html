<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cortex</title>
<link rel="manifest" href="cortex.webmanifest" />
<link rel="icon" type="image/png" href="cortex-icon-192.png" />
<meta name="theme-color" content="#0b0e14" />
<link rel="apple-touch-icon" href="cortex-icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Cortex" />
<!-- Cortex split back into TWO apps — a mining client and a wallet — because
     the separation is now real: the mining client signs with a disposable rig
     key and pays rewards to a wallet address it holds no key for. This page
     stays as the launcher for installs that predate the split. -->
<style>
  :root { color-scheme: dark; --bg:#0b0e14; --panel:#141a24; --line:#232c3b; --ink:#e6edf6; --dim:#8ea1bd; --accent:#5ad1a8; --accent2:#6aa9ff; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); -webkit-font-smoothing:antialiased; display:grid; place-items:center; min-height:100vh; padding:20px; }
  .box { max-width:420px; width:100%; display:grid; gap:14px; }
  h1 { margin:0 0 2px; font-size:22px; letter-spacing:-.02em; text-align:center; } h1 span { color:var(--accent); }
  p { color:var(--dim); font-size:13.5px; margin:0 0 8px; text-align:center; }
  a.app { display:flex; align-items:center; gap:14px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px; text-decoration:none; color:var(--ink); }
  a.app .ico { font-size:28px; }
  a.app b { display:block; font-size:16px; }
  a.app small { color:var(--dim); font-size:12.5px; }
  a.app.mine b { color:var(--accent); } a.app.wallet b { color:var(--accent2); }
  .links { text-align:center; font-size:13px; } .links a { color:var(--accent2); text-decoration:none; margin:0 8px; }
</style>
</head>
<body>
<div class="box">
  <h1>Cortex <span>·</span> two apps</h1>
  <p>The mining client and the wallet are separate — the miner pays rewards to your wallet's address and <b>never holds its key</b>.</p>
  <a class="app mine" href="mine.html"><span class="ico">⛏️</span><span><b>Mining client</b><small>Train the model, earn MIND to your payout address</small></span></a>
  <a class="app wallet" href="wallet.html"><span class="ico">👛</span><span><b>Wallet</b><small>Your key, balance, send &amp; receive, encrypted backup</small></span></a>
  <div class="links"><a href="network.html">📊 Network</a><a href="guide.html">❓ Guide</a><a href="index.html">📈 Demo</a></div>
</div>
</body>
</html>
