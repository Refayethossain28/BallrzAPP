<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas — Node Registry</title>
<style>
  :root { color-scheme: dark; --bg:#0b0d10; --panel:#14181d; --line:#232a31; --ink:#e7edf3; --dim:#8a97a6;
          --ok:#3fb950; --warn:#d29922; --bad:#f85149; --stale:#6e7681; --accent:#58a6ff; }
  * { box-sizing: border-box; }
  body { margin:0; font:15px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--ink); }
  header { padding:18px 22px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  h1 { font-size:19px; margin:0; letter-spacing:.3px; }
  h1 small { color:var(--dim); font-weight:400; font-size:13px; }
  .pills { display:flex; gap:8px; flex-wrap:wrap; margin-left:auto; }
  .pill { padding:3px 10px; border-radius:999px; background:var(--panel); border:1px solid var(--line); font-size:13px; color:var(--dim); }
  .pill b { color:var(--ink); }
  main { padding:18px 22px; }
  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:9px 12px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th { color:var(--dim); font-weight:600; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
  td.caps, td.svcs { white-space:normal; }
  .dot { display:inline-block; width:9px; height:9px; border-radius:50%; margin-right:7px; vertical-align:middle; }
  .s-healthy .dot { background:var(--ok); } .s-degraded .dot { background:var(--warn); }
  .s-unhealthy .dot { background:var(--bad); } .s-stale .dot { background:var(--stale); }
  .status { text-transform:capitalize; }
  .s-stale td { opacity:.55; }
  .tag { display:inline-block; padding:1px 8px; margin:2px 4px 2px 0; border-radius:6px; background:#1b232c; border:1px solid var(--line); font-size:12px; color:var(--accent); }
  .svcs .tag { color:var(--dim); }
  .load-bar { position:relative; width:70px; height:8px; border-radius:4px; background:var(--line); display:inline-block; vertical-align:middle; margin-right:8px; overflow:hidden; }
  .load-fill { position:absolute; inset:0 auto 0 0; background:var(--accent); }
  .empty { color:var(--dim); padding:40px; text-align:center; }
  footer { padding:12px 22px; color:var(--dim); font-size:12px; border-top:1px solid var(--line); }
  code { background:var(--panel); padding:1px 6px; border-radius:5px; }
</style>
</head>
<body>
  <header>
    <h1>Atlas <small>LAN node registry &amp; scheduler</small></h1>
    <div class="pills" id="pills"></div>
  </header>
  <main>
    <table>
      <thead>
        <tr>
          <th>Status</th><th>Host</th><th>IP</th><th>CPU</th><th>RAM</th><th>GPU</th><th>Load</th><th>Capabilities</th><th>Services</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div class="empty" id="empty" hidden>No nodes yet — start an agent with <code>node atlas/agent.mjs</code>.</div>
  </main>
  <footer id="foot">Polling <code>/api/nodes</code> every 3s…</footer>

<script>
  // Plain, dependency-free dashboard. Polls the registry and repaints. Kept
  // defensive so a transient fetch error never blanks the screen.
  var POLL_MS = 3000;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
    });
  }
  function gib(mb) {
    var n = Number(mb) || 0;
    return n >= 1024 ? (n / 1024).toFixed(n >= 10240 ? 0 : 1) + ' GB' : n + ' MB';
  }
  function tags(list, cls) {
    if (!list || !list.length) return '<span style="color:var(--stale)">—</span>';
    return list.map(function (t) { return '<span class="tag">' + esc(t) + '</span>'; }).join('');
  }
  function loadCell(load) {
    var pct = Math.round((Number(load) || 0) * 100);
    return '<span class="load-bar"><span class="load-fill" style="width:' + pct + '%"></span></span>' + pct + '%';
  }

  function renderPills(sum) {
    if (!sum) return '';
    var parts = [
      ['total', sum.total], ['healthy', sum.healthy], ['degraded', sum.degraded],
      ['down', sum.unhealthy], ['stale', sum.stale],
    ];
    return parts.map(function (p) {
      return '<span class="pill">' + p[0] + ' <b>' + (p[1] || 0) + '</b></span>';
    }).join('');
  }

  function rowHtml(n) {
    return '<tr class="s-' + esc(n.status) + '">' +
      '<td class="status"><span class="dot"></span>' + esc(n.status) + '</td>' +
      '<td>' + esc(n.hostname) + '</td>' +
      '<td>' + esc(n.ip || '—') + '</td>' +
      '<td>' + (Number(n.cpuCores) || 0) + '</td>' +
      '<td>' + gib(n.ramMB) + '</td>' +
      '<td>' + (esc(n.gpuName) || '—') + (n.vramMB ? ' · ' + gib(n.vramMB) : '') + '</td>' +
      '<td>' + loadCell(n.load) + '</td>' +
      '<td class="caps">' + tags(n.capabilities) + '</td>' +
      '<td class="svcs">' + tags(n.services) + '</td>' +
    '</tr>';
  }

  function paint(data) {
    var rows = document.getElementById('rows');
    var empty = document.getElementById('empty');
    var pills = document.getElementById('pills');
    var foot = document.getElementById('foot');
    var nodes = (data && data.nodes) || [];
    if (pills) pills.innerHTML = renderPills(data && data.summary);
    if (rows) rows.innerHTML = nodes.map(rowHtml).join('');
    if (empty) empty.hidden = nodes.length > 0;
    if (foot) foot.innerHTML = 'Updated · ' + nodes.length + ' node(s) · polling /api/nodes every 3s';
  }

  function refresh() {
    fetch('/api/nodes', { cache: 'no-store' })
      .then(function (r) { return r.json(); })
      .then(function (data) { paint(data); })
      .catch(function () {
        var foot = document.getElementById('foot');
        if (foot) foot.textContent = 'Registry unreachable — retrying…';
      });
  }

  refresh();
  setInterval(refresh, POLL_MS);
</script>
</body>
</html>
