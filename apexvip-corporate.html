<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#080808"/>
<title>ApexVIP Corporate</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;
  --bg:#050505;--fg:#f4f0ea;--fg-muted:#c8bfb0;--fg-dim:#8a8278;--fg-subtle:#5a5550;
  --fg-ghost:#3a3632;--fg-faint:#28251f;
  --surface:rgba(255,255,255,.045);--surface-b:rgba(255,255,255,.03);--surface-c:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border-b:rgba(255,255,255,.05);--divider:rgba(255,255,255,.04);
  --gold:#C8A97E;--gold-2:rgba(200,169,126,.22);--gold-3:rgba(200,169,126,.12);--gold-dim:rgba(200,169,126,.14);--gold-glow:rgba(200,169,126,.08);
  --radius:16px
}
body{--ease-spring:cubic-bezier(0.16,1,0.3,1);}

/* Aurora background */
body::before,body::after{content:'';position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
body::before{width:600px;height:600px;left:20%;top:-16%;background:radial-gradient(circle,rgba(200,169,126,.07),transparent 70%);animation:auroraA 28s ease-in-out infinite alternate}
body::after{width:500px;height:500px;right:-10%;bottom:-14%;background:radial-gradient(circle,rgba(90,80,160,.055),transparent 70%);animation:auroraB 34s ease-in-out infinite alternate}
@keyframes auroraA{from{transform:translate(0,0) scale(1)}to{transform:translate(130px,100px) scale(1.2)}}
@keyframes auroraB{from{transform:translate(0,0) scale(1.1)}to{transform:translate(-150px,-100px) scale(.9)}}

/* Keyframes */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:translateY(0)}}
@keyframes logoReveal{0%{opacity:0;letter-spacing:22px}60%{opacity:1}100%{opacity:1;letter-spacing:12px}}
@keyframes subtitleFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulseGold{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}

/* App wrapper */
#app{position:relative;z-index:1;min-height:100vh}

/* Screen transitions */
.screen{animation:fadeIn .25s ease}

/* ── Splash ── */
.splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;gap:0}
.splash-logo{font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:700;color:var(--gold);letter-spacing:12px;animation:logoReveal 1.4s ease forwards;text-align:center}
.splash-sub{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:var(--fg-dim);margin-top:8px;animation:subtitleFade .6s ease .9s both}
.splash-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:36px 0;animation:fadeIn .5s ease 1.2s both}
.splash-tagline{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--fg-muted);text-align:center;animation:fadeIn .5s ease 1.4s both;margin-bottom:48px}
.splash-btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:320px;animation:slideUp .5s ease 1.6s both}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:transform .18s,border-color .18s}
.card:hover{border-color:rgba(200,169,126,.18)}
.card-inset{background:var(--surface-b);border:1px solid var(--border-b);border-radius:12px;padding:16px}

/* ── Stat cards ── */
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;flex:1;min-width:140px;position:relative;overflow:hidden;transition:transform .18s,border-color .18s}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(200,169,126,.2)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
.stat-wm{position:absolute;right:10px;bottom:6px;font-size:40px;line-height:1;opacity:.05;pointer-events:none;user-select:none}

/* ── Buttons ── */
.btn{padding:11px 22px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .12s;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
.btn:active{opacity:.82;transform:scale(.97)}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:#e0b84e}
.btn-glass{background:var(--surface-c);border:1px solid var(--border);color:var(--fg)}
.btn-glass:hover{background:rgba(255,255,255,.1)}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--fg-dim)}
.btn-ghost:hover{color:var(--fg);border-color:rgba(255,255,255,.15)}
.btn-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.btn-sm{padding:7px 14px;font-size:13px;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:12px;border-radius:7px}
.btn-full{width:100%}

/* ── Tags ── */
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.tag-gold{background:rgba(200,169,126,.14);color:var(--gold)}
.tag-green{background:rgba(34,197,94,.14);color:#22c55e}
.tag-blue{background:rgba(59,130,246,.14);color:#3b82f6}
.tag-amber{background:rgba(245,158,11,.14);color:#f59e0b}
.tag-purple{background:rgba(168,85,247,.14);color:#a855f7}
.tag-red{background:rgba(239,68,68,.14);color:#ef4444}
.tag-gray{background:rgba(120,120,120,.14);color:var(--fg-dim)}
.tag-cyan{background:rgba(6,182,212,.14);color:#06b6d4}

/* ── Inputs ── */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--fg-subtle)}
input,select,textarea{background:var(--surface-c);border:1px solid var(--border);border-radius:10px;color:var(--fg);padding:11px 14px;font-size:14px;outline:none;font-family:inherit;width:100%;transition:border-color .18s;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder,textarea::placeholder{color:var(--fg-ghost)}
select option{background:#111;color:var(--fg)}
textarea{resize:vertical;min-height:80px;line-height:1.5}
.input-with-icon{position:relative}
.input-with-icon input{padding-right:42px}
.input-icon-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg-dim);cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;transition:color .15s}
.input-icon-btn:hover{color:var(--gold)}

/* ── Toggle ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;background:var(--surface-c);border:1px solid var(--border);border-radius:12px;transition:.25s}
.toggle input:checked~.toggle-track{background:var(--gold);border-color:var(--gold)}
.toggle-thumb{position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:.25s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.toggle input:checked~.toggle-thumb{left:23px}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;gap:12px;padding:16px 20px;background:rgba(8,8,8,.85);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:40}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--gold);letter-spacing:4px}

/* ── Bottom nav ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:rgba(5,5,5,.92);border-top:1px solid var(--border);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;cursor:pointer;color:var(--fg-subtle);font-size:10px;font-weight:600;letter-spacing:.5px;transition:color .15s;text-transform:uppercase}
.bnav-item svg{transition:transform .15s}
.bnav-item.on{color:var(--gold)}
.bnav-item.on svg{transform:scale(1.12)}
.bnav-item:active{opacity:.7}

/* ── Page layout ── */
.page{padding:20px 16px 96px;max-width:540px;margin:0 auto}
.page-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;margin-bottom:4px}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fg-subtle)}

/* ── Avatar ── */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:13px}

/* ── Active trip card ── */
.trip-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.trip-card::after{content:'';position:absolute;top:0;right:0;width:60px;height:100%;background:linear-gradient(90deg,transparent,var(--gold-glow));pointer-events:none}

/* ── Tab bar ── */
.tabbar{display:flex;gap:4px;background:var(--surface-b);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:8px;border-radius:9px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--fg-subtle);transition:.15s;border:none;background:none;font-family:inherit}
.tab.on{background:var(--surface-c);color:var(--fg);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── Stagger ── */
.stagger>*{opacity:0;animation:fadeUp .35s ease forwards}
.stagger>*:nth-child(1){animation-delay:.04s}
.stagger>*:nth-child(2){animation-delay:.09s}
.stagger>*:nth-child(3){animation-delay:.14s}
.stagger>*:nth-child(4){animation-delay:.19s}
.stagger>*:nth-child(5){animation-delay:.24s}
.stagger>*:nth-child(6){animation-delay:.29s}
.stagger>*:nth-child(7){animation-delay:.34s}

/* ── Login card ── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{background:rgba(12,11,10,.9);border:1px solid var(--border);border-radius:24px;padding:36px 28px;width:100%;max-width:380px;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);animation:slideUp .5s ease;box-shadow:0 32px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.login-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--gold);letter-spacing:6px;text-align:center;margin-bottom:4px}

/* ── Bar chart CSS ── */
.bar-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.bar-track{flex:1;height:8px;background:var(--surface-c);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),rgba(200,169,126,.5));animation:barGrow .7s ease both;width:var(--w)}
@keyframes barGrow{from{width:0}to{width:var(--w)}}

/* ── Segment bar ── */
.seg-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:2px;margin:8px 0}
.seg{height:100%;border-radius:3px;transition:width .5s ease}

/* ── Cost savings badge ── */
.savings-badge{background:linear-gradient(135deg,rgba(34,197,94,.1),rgba(16,185,129,.05));border:1px solid rgba(34,197,94,.2);border-radius:14px;padding:18px;text-align:center}

/* ── Chip ── */
.chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-c);border:1px solid var(--border);border-radius:20px;padding:4px 10px 4px 12px;font-size:12px;font-weight:600;color:var(--fg-muted)}
.chip-del{background:none;border:none;cursor:pointer;color:var(--fg-dim);padding:0;line-height:1;font-size:14px;transition:color .15s}
.chip-del:hover{color:#ef4444}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}

/* ── Pulse dot ── */
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:pulseGold 1.5s ease infinite;flex-shrink:0}
.pulse-dot.amber{background:var(--gold)}
.pulse-dot.blue{background:#3b82f6}

/* ── Divider ── */
.divider{height:1px;background:var(--divider);margin:16px 0}

/* ── Spinner ── */
.spinner{width:36px;height:36px;border:3px solid var(--surface-c);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}

/* ── Back button ── */
.back-btn{display:inline-flex;align-items:center;gap:6px;color:var(--fg-dim);font-size:13px;cursor:pointer;transition:color .15s;margin-bottom:20px;background:none;border:none;font-family:inherit;padding:0}
.back-btn:hover{color:var(--fg)}

/* ── Company badge (topbar) ── */
.company-init{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--gold),#8B6020);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#000;flex-shrink:0;letter-spacing:.5px}

/* ── Confirm screen ── */
.confirm-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,rgba(200,169,126,.2),rgba(200,169,126,.06));border:2px solid rgba(200,169,126,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:32px}
.ref-badge{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold);letter-spacing:3px;text-align:center;padding:14px;background:var(--gold-dim);border-radius:12px;border:1px solid rgba(200,169,126,.2)}

/* ── Employee list item ── */
.emp-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--divider)}
.emp-item:last-child{border-bottom:none}

/* ── Spend meter ── */
.spend-meter{height:3px;border-radius:2px;background:var(--surface-c);margin-top:4px;overflow:hidden}
.spend-meter-fill{height:100%;border-radius:2px;background:var(--gold)}

/* ── Settings section ── */
.settings-section{margin-bottom:28px}
.settings-section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fg-subtle);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--divider)}

/* ── Route chip ── */
.route-pill{font-size:13px;color:var(--fg-muted);display:flex;align-items:center;gap:6px}
.route-arrow{color:var(--fg-ghost);font-size:11px}

/* ── Scrollable horizontal ── */
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-x::-webkit-scrollbar{display:none}

/* ── Inline add form ── */
.inline-form{background:var(--surface-b);border:1px solid rgba(200,169,126,.15);border-radius:14px;padding:18px;margin-bottom:16px;animation:slideUp .3s ease}

/* ── Quick action row ── */
.qaction{display:flex;align-items:center;gap:12px;padding:13px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:.15s}
.qaction:hover{border-color:rgba(200,169,126,.2);background:var(--surface-c)}

/* ── Period selector ── */
.period-sel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.period-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);border:1px solid var(--border);color:var(--fg-dim);transition:.15s;font-family:inherit}
.period-btn.on{background:var(--gold-dim);border-color:rgba(200,169,126,.3);color:var(--gold)}

/* ── API key input ── */
.api-key-wrap{position:relative}
.api-key-wrap input{font-family:monospace;font-size:13px;letter-spacing:1px}

/* ── Responsive ── */
@media(max-width:380px){
  .stat-cards{gap:8px}
  .stat-card{padding:14px}
}
</style>
</head>

<div id="app"></div>

<script>

/* ── Helpers ── */
function initials(name) {
  return name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
}

function statusTag(status) {
  const map = {
    en_route: ['blue','En Route'],
    onboard:  ['green','Onboard'],
    arrived:  ['amber','Arrived'],
    confirmed:['gray','Confirmed'],
    active:   ['green','Active'],
    completed:['gray','Completed'],
    cancelled:['red','Cancelled'],
    pending:  ['amber','Pending'],
  };
  const [cls, label] = map[status] || ['gray', status];
  return `<span class="tag tag-${cls}">${label}</span>`;
}

function vehicleIcon(v) {
  if (!v) return '🚗';
  if (v.includes('Rolls')) return '👑';
  if (v.includes('V-Class')) return '🚐';
  return '🚗';
}

function fmt(n) { return '£' + n.toLocaleString('en-GB'); }

function genRef() {
  return 'APX-CORP-' + (Math.floor(Math.random()*9000)+1000);
}

/* ── Render ── */
function render() {
  const app = document.getElementById('app');
  const pages = {
    splash,
    login,
    home,
    book,
    'booking-sent': bookingSent,
    trips,
    team,
    reports,
    settings,
  };
  const fn = pages[S.screen];
  app.innerHTML = fn ? fn() : splash();
  bindEvents();
}

function bindEvents() {
  // nothing needed — inline onclick handlers used throughout
}

function getEmpColour(name) {
  const emp = TEAM.find(t=>t.name===name);
  return emp ? emp.colour : '#C8A97E';
}

async function doLogin() {
  const email = document.getElementById('l-email')?.value || '';
  const pass  = document.getElementById('l-pass')?.value  || '';
  const code  = document.getElementById('l-code')?.value  || '';

  // Demo fallback — always works
  if (email === 'travel@apexcapital.co.uk' && pass === 'corporate123') {
    S.user = {email, name:'Travel Manager'};
    go('home'); return;
  }

  if (FIREBASE_ENABLED && email && pass) {
    try {
      await auth.signInWithEmailAndPassword(email, pass);
      S.user = {email};
      go('home'); return;
    } catch(e) {
      // fall through to demo
    }
  }

  // Allow any non-empty email + valid corp code for demo
  if (email && code.startsWith('APEX-CORP')) {
    S.user = {email, name:'Travel Manager'};
    go('home');
  } else {
    showToast('Invalid credentials. Try the demo button below.');
  }
}

function demoLogin() {
  S.user = {email:'travel@apexcapital.co.uk', name:'Travel Manager'};
  go('home');
}

function doLogout() {
  if (FIREBASE_ENABLED) auth.signOut().catch(()=>{});
  S.user = null;
  go('splash');
}

function requestAccess() {
  showToast('Request sent! Our corporate team will contact you within 24 hours.');
}

function togglePaxFields() {
  const el = document.getElementById('pax-fields');
  if (el) el.style.display = el.style.display === 'none' ? 'flex' : 'none';
}

function renderDropoff() {
  const svc = document.getElementById('b-svc')?.value;
  const wrap = document.getElementById('dropoff-wrap');
  if (!wrap) return;
  if (svc === 'airport') {
    wrap.innerHTML = `<div class="field" style="margin-bottom:10px"><label>Airport</label><select id="b-dropoff">
      <option value="">Select airport…</option>
      <option>Heathrow Terminal 2</option><option>Heathrow Terminal 3</option>
      <option>Heathrow Terminal 4</option><option>Heathrow Terminal 5</option>
      <option>Gatwick North</option><option>Gatwick South</option>
      <option>London City Airport</option><option>Stansted</option><option>Luton</option>
    </select></div>`;
  } else if (svc === 'hour') {
    wrap.innerHTML = `<div class="field" style="margin-bottom:10px"><label>Duration (Hours)</label><select id="b-hours">
      <option>2 Hours</option><option>3 Hours</option><option>4 Hours</option>
      <option>6 Hours</option><option>8 Hours</option><option>10 Hours</option>
    </select></div>`;
  } else if (svc === 'day') {
    wrap.innerHTML = `<div class="field" style="margin-bottom:10px"><label>Duration</label><select id="b-hours">
      <option>Full Day (10 hrs)</option><option>Half Day (5 hrs)</option>
    </select></div>`;
  } else {
    wrap.innerHTML = `<div class="field" style="margin-bottom:10px"><label>Dropoff Address</label>
      <input type="text" id="b-dropoff" placeholder="Enter dropoff address"/></div>`;
  }
}

function selectVehicle(v) {
  document.querySelectorAll('.vehicle-opt').forEach(el=>{
    const isSelected = el.dataset.veh === v;
    el.style.borderColor = isSelected ? 'var(--gold)' : '';
    el.style.background   = isSelected ? 'var(--gold-dim)' : '';
    el.querySelector('div:last-child').style.color = isSelected ? 'var(--gold)' : 'var(--fg-muted)';
  });
  S.bookingDraft.vehicle = v;
}

function useCurrentLocation() {
  const input = document.getElementById('b-pickup');
  if (!input) return;
  if (navigator.geolocation) {
    showToast('Fetching location…');
    navigator.geolocation.getCurrentPosition(
      ()=>{ input.value = '1 Canada Square, Canary Wharf, London E14 5AB'; },
      ()=>{ input.value = '1 Canada Square, Canary Wharf, London E14 5AB'; }
    );
  } else {
    input.value = '1 Canada Square, Canary Wharf, London E14 5AB';
  }
}

function submitBooking() {
  const emp      = document.getElementById('b-emp')?.value;
  const pickup   = document.getElementById('b-pickup')?.value;
  const code     = document.getElementById('b-code')?.value;
  const purpose  = document.getElementById('b-purpose')?.value;
  const dateEl   = document.getElementById('b-date')?.value;
  const timeEl   = document.getElementById('b-time')?.value;
  const veh      = S.bookingDraft.vehicle || 'S-Class';
  const dropEl   = document.getElementById('b-dropoff')?.value || document.getElementById('b-hours')?.value || 'Heathrow Terminal 5';

  if (!emp)    { showToast('Please select a travelling employee'); return; }
  if (!pickup) { showToast('Please enter a pickup address'); return; }

  S.bookingDraft = {
    ref: genRef(),
    employee: emp,
    pickup: pickup || '—',
    dropoff: dropEl,
    datetime: dateEl && timeEl ? `${dateEl}, ${timeEl}` : 'Tomorrow, 09:00',
    vehicle: veh,
    code: code || 'CC-DEAL-047',
    purpose: purpose || 'Airport Transfer',
  };

  // Attempt Firestore write
  if (FIREBASE_ENABLED) {
    db.collection('corporate_bookings').add({
      ...S.bookingDraft,
      companyCode: S.company.code,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
  }

  go('booking-sent');
}

function addToCalendar() {
  const d = S.bookingDraft;
  const title = encodeURIComponent(`ApexVIP: ${d.employee} — ${d.route||d.pickup+' → '+d.dropoff}`);
  const details = encodeURIComponent(`Ref: ${d.ref}\nVehicle: ${d.vehicle}\nCost Code: ${d.code}`);
  const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&details=${details}`;
  window.open(url, '_blank');
}

function setTripsTab(tab) {
  S.tripsTab = tab;
  render();
}

function cancelTrip(id) {
  if (confirm('Cancel this trip? This cannot be undone.')) {
    showToast('Trip cancelled. You will receive a confirmation email.');
  }
}

function setPeriod(p) {
  S.reportPeriod = p;
  render();
}

function openAddForm() {
  S.teamAddOpen = true;
  render();
}

function closeAddForm() {
  S.teamAddOpen = false;
  render();
}

function saveNewEmployee() {
  const name  = document.getElementById('new-emp-name')?.value?.trim();
  const email = document.getElementById('new-emp-email')?.value?.trim();
  const role  = document.getElementById('new-emp-role')?.value?.trim();
  if (!name) { showToast('Please enter a name'); return; }
  const colours = ['#7c3aed','#0ea5e9','#10b981','#f59e0b','#ec4899','#ef4444','#C8A97E'];
  TEAM.push({
    id: 'T' + (TEAM.length+1),
    name,
    role: role || 'Employee',
    trips: 0,
    spend: 0,
    colour: colours[TEAM.length % colours.length],
  });
  S.teamAddOpen = false;
  showToast(`${name} added to your team`);
  render();
}

function toggleEmpStatus(checkbox, id) {
  const label = checkbox.parentElement.nextElementSibling;
  if (label) {
    label.textContent = checkbox.checked ? 'Active' : 'Inactive';
    label.style.color = checkbox.checked ? '#22c55e' : 'var(--fg-dim)';
  }
}

function removeCode(idx) {
  S.costCodes.splice(idx, 1);
  render();
}

function addCodePrompt() {
  S.showAddCode = true;
  render();
  setTimeout(()=>document.getElementById('new-code-input')?.focus(), 50);
}

function saveNewCode() {
  const val = document.getElementById('new-code-input')?.value?.trim();
  if (val) {
    S.costCodes.push(val);
    S.showAddCode = false;
    render();
  }
}

function toggleSecret() {
  S.showSecret = !S.showSecret;
  render();
}

function testWebhook() {
  showToast('Webhook test sent — check your server logs');
}

function saveSettings() {
  const name = document.getElementById('s-name')?.value;
  if (name) S.company.name = name;
  const limit = document.getElementById('s-limit')?.value;
  if (limit) S.spendLimitAmount = parseInt(limit);
  const wh = document.getElementById('s-webhook')?.value;
  if (wh) S.webhookUrl = wh;
  showToast('Settings saved successfully');
}

/* ── Toast notification ── */
function showToast(msg, duration=3000) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(20,18,16,.95);color:var(--fg);border:1px solid var(--border);border-radius:10px;padding:12px 20px;font-size:13px;font-weight:500;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,.4);transition:opacity .3s`;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>{ t.style.opacity = '0'; }, duration);
}

/* ── Init ── */
if (FIREBASE_ENABLED) {
  auth.onAuthStateChanged(user => {
    if (user && S.screen === 'login') {
      S.user = {email: user.email, name: user.displayName || 'Travel Manager'};
      go('home');
    }
  });
}

render();
</script>
</body>
</html>
