<link rel="apple-touch-startup-image" media="(device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3)" href="splashes/splash-1206x2622.png"/>
<link rel="apple-touch-startup-image" media="(device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3)" href="splashes/splash-1125x2436.png"/>
<link rel="apple-touch-startup-image" media="(device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2)" href="splashes/splash-750x1334.png"/>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase.js"></script>
<script src="apexvip-core.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:-webkit-fill-available}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;min-height:-webkit-fill-available;overscroll-behavior:none;-webkit-touch-callout:none;
  --bg:#050505;--fg:#f4f0ea;--fg-muted:#c8bfb0;--fg-dim:#8a8278;--fg-subtle:#5a5550;--fg-ghost:#3a3632;--fg-faint:#28251f;
  --surface:rgba(255,255,255,.045);--surface-b:rgba(255,255,255,.03);--surface-c:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.08);--border-b:rgba(255,255,255,.05);--divider:rgba(255,255,255,.04);
  --gold:#C8A97E;--gold-2:rgba(200,169,126,.22);--gold-3:rgba(200,169,126,.12);--gold-dim:rgba(200,169,126,.18);--gold-glow:rgba(200,169,126,.28)}
body.light{
  --bg:#f5f0e8;--fg:#1a1612;--fg-muted:#3d3730;--fg-dim:#6b6258;--fg-subtle:#9a9088;--fg-ghost:#c8bfb0;--fg-faint:#e0d8cc;
  --surface:rgba(0,0,0,.04);--surface-b:rgba(0,0,0,.025);--surface-c:rgba(0,0,0,.065);
  --border:rgba(0,0,0,.08);--border-b:rgba(0,0,0,.05);--divider:rgba(0,0,0,.04)}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:-webkit-fill-available;position:relative}
body.ios-pwa{padding-top:env(safe-area-inset-top)}
input,select,textarea{font-size:16px !important}

/* ── Keyframes ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes growBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes orbDrift1{from{transform:translate(0,0) scale(1)}to{transform:translate(60px,40px) scale(1.14)}}
@keyframes orbDrift2{from{transform:translate(0,0) scale(1.06)}to{transform:translate(-70px,-50px) scale(.9)}}
@keyframes orbDrift3{from{transform:translate(0,0) scale(1)}to{transform:translate(50px,-60px) scale(1.1)}}
@keyframes logoReveal{
  0%{opacity:0;transform:scale(.97) translateY(6px);filter:blur(6px)}
  40%{opacity:.25;filter:blur(3px)}
  75%{opacity:.8;filter:blur(.5px)}
  100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}
}
@keyframes subtitleReveal{0%{opacity:0;letter-spacing:10px}100%{opacity:1;letter-spacing:6px}}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}40%,60%{opacity:1;transform:scale(1) rotate(72deg)}}
@keyframes sparkleB{0%,100%{opacity:0;transform:scale(0) rotate(45deg)}45%,55%{opacity:.8;transform:scale(1) rotate(135deg)}}
@keyframes diamondShimmer{0%{background-position:250% center}100%{background-position:-250% center}}
@keyframes auroraDrift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(55px,45px) scale(1.12)}}
@keyframes auroraDrift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-65px,-38px) scale(1.06)}}
@keyframes auroraDrift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(38px,-65px) scale(1.16)}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUpSheet{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 20px rgba(34,197,94,0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}

/* ── Splash aurora ── */
.aurora{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.aurora i{position:absolute;border-radius:50%;filter:blur(110px);will-change:transform}
.aurora i:nth-child(1){width:520px;height:520px;top:-180px;left:-140px;background:radial-gradient(circle,rgba(90,65,150,.16),transparent 65%);animation:auroraDrift1 28s ease-in-out infinite}
.aurora i:nth-child(2){width:440px;height:440px;bottom:8%;right:-160px;background:radial-gradient(circle,rgba(180,140,55,.1),transparent 65%);animation:auroraDrift2 34s ease-in-out infinite}
.aurora i:nth-child(3){width:380px;height:380px;top:38%;left:22%;background:radial-gradient(circle,rgba(75,55,145,.11),transparent 65%);animation:auroraDrift3 22s ease-in-out infinite}

/* ── Diamond shimmer text ── */
.diamond-text{
  background:linear-gradient(108deg,
    #fff8ee 0%,#f2e4c0 6%,#D4AF6E 14%,#fff 20%,
    #f0e0b8 26%,#fff 32%,#e0c878 38%,#fff8ee 44%,
    #f8f0dc 50%,#fff 56%,#D4AF6E 62%,#fff 68%,
    #ecdcb0 74%,#fff 80%,#d8be84 86%,#fff8ee 94%,
    #eedcc4 100%);
  background-size:400% auto;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:diamondShimmer 6s 2s linear infinite;
  filter:drop-shadow(0 0 28px rgba(212,175,110,.4)) drop-shadow(0 0 6px rgba(255,255,255,.35));
}

/* ── Sparkle decorators ── */
.sp{position:absolute;opacity:0;color:rgba(255,255,255,.85);pointer-events:none;font-style:normal;line-height:1}
.sp1{top:-14px;left:12%;font-size:12px;animation:sparkle 3s 2.2s ease-in-out infinite}
.sp2{top:-8px;right:9%;font-size:17px;animation:sparkleB 3.4s 2.7s ease-in-out infinite}
.sp3{bottom:-6px;left:5%;font-size:9px;animation:sparkle 2.6s 3.2s ease-in-out infinite}
.sp4{top:18px;right:3%;font-size:13px;animation:sparkleB 3.8s 2.4s ease-in-out infinite}
.sp5{bottom:2px;right:23%;font-size:8px;animation:sparkle 2.3s 3.9s ease-in-out infinite}
.sp6{top:-4px;left:41%;font-size:10px;animation:sparkleB 3s 4.3s ease-in-out infinite}
.sp7{bottom:10px;left:28%;font-size:7px;animation:sparkle 3.5s 3s ease-in-out infinite}

/* ── Aurora orbs (home bg) ── */
.orb-bg{position:absolute;inset:0;overflow:hidden;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(90px);will-change:transform}
.orb-1{width:340px;height:340px;background:radial-gradient(circle,#C8A97E,transparent 70%);opacity:.2;top:-80px;left:-60px;animation:orbDrift1 24s ease-in-out infinite alternate}
.orb-2{width:280px;height:280px;background:radial-gradient(circle,#8a6020,transparent 70%);opacity:.18;bottom:80px;right:-80px;animation:orbDrift2 30s ease-in-out infinite alternate}
.orb-3{width:280px;height:280px;background:radial-gradient(circle,rgba(90,80,160,.9),transparent 70%);opacity:.14;top:38%;left:28%;animation:orbDrift3 27s ease-in-out infinite alternate}

/* ── Staggered entrances ── */
.stagger>*{opacity:0;animation:fadeUp .4s ease forwards}
.stagger>*:nth-child(1){animation-delay:.03s}
.stagger>*:nth-child(2){animation-delay:.08s}
.stagger>*:nth-child(3){animation-delay:.13s}
.stagger>*:nth-child(4){animation-delay:.18s}
.stagger>*:nth-child(5){animation-delay:.23s}
.stagger>*:nth-child(6){animation-delay:.28s}
.stagger>*:nth-child(7){animation-delay:.33s}
.stagger>*:nth-child(8){animation-delay:.38s}

/* ── Components ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px;margin-bottom:12px;transition:transform .18s,border-color .18s}
.card:active{transform:scale(.99)}
.btn{width:100%;padding:15px;border-radius:14px;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .12s}
.btn:active{opacity:.85;transform:scale(.97)}
.btn-gold{background:var(--gold);color:#000}
.btn-green{background:#22c55e;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-glass{background:var(--surface-c);border:1px solid var(--border);color:var(--fg);backdrop-filter:blur(12px)}
input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--fg);font-size:16px;outline:none;font-family:inherit;transition:border-color .2s}
input:focus{border-color:var(--gold)}

/* ── Nav ── */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg);border-top:1px solid var(--border);display:flex;padding:10px 0 30px;z-index:100;backdrop-filter:blur(20px)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:var(--fg-ghost);font-size:10px;padding:4px 0;position:relative;transition:color .2s}
.nav-item.on{color:var(--gold)}
.nav-pip{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .2s}
.nav-item.on .nav-pip{opacity:1}

/* ── Tags ── */
.tag{display:inline-flex;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.2px}
.tag-gold{background:rgba(200,169,126,.14);color:var(--gold)}
.tag-green{background:rgba(34,197,94,.14);color:#22c55e}
.tag-gray{background:rgba(120,120,120,.14);color:var(--fg-dim)}
.tag-red{background:rgba(239,68,68,.14);color:#ef4444}
.tag-blue{background:rgba(59,130,246,.14);color:#3b82f6}
.tag-purple{background:rgba(168,85,247,.14);color:#a855f7}

/* ── Misc ── */
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--fg-subtle)}
.back-row{display:flex;align-items:center;padding:20px 0 10px}
.back-btn{background:none;border:none;color:var(--gold);font-size:15px;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;font-weight:600}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:22px 0 10px}
.menu-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--divider);cursor:pointer}
.menu-row:last-child{border-bottom:none}
.stepper{display:flex;align-items:center;margin-bottom:20px}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.step-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.step-line{flex:1;height:2px;background:var(--border);margin-top:-14px}
.bar-row{display:flex;align-items:flex-end;gap:6px;height:80px;margin:12px 0}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-fill{border-radius:4px 4px 0 0;background:var(--gold);width:100%;transform-origin:bottom;animation:growBar .5s ease both}
.bar-col:nth-child(2) .bar-fill{animation-delay:.05s}
.bar-col:nth-child(3) .bar-fill{animation-delay:.1s}
.bar-col:nth-child(4) .bar-fill{animation-delay:.15s}
.bar-col:nth-child(5) .bar-fill{animation-delay:.2s}
.bar-col:nth-child(6) .bar-fill{animation-delay:.25s}
.bar-col:nth-child(7) .bar-fill{animation-delay:.3s}
.screen{padding:0 22px 100px;min-height:100vh;animation:fadeIn .25s ease}
@keyframes spin{to{transform:rotate(360deg)}}
@media(orientation:landscape)and(max-height:500px){body[data-screen="login"] #rotate-prompt{display:flex!important}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
</style>
</head>
<body>
<div id="app"></div>
<div id="rotate-prompt" style="display:none;position:fixed;inset:0;z-index:99999;background:#050505;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-size:48px;animation:spin 2s linear infinite">↻</div>
  <div style="font-family:'Cormorant Garamond',Georgia,serif;font-size:28px;font-weight:300;color:#fff;letter-spacing:2px">ApexVIP</div>
  <div style="font-size:12px;color:rgba(255,255,255,.5);letter-spacing:3px;text-transform:uppercase">Please rotate your device</div>
</div>
