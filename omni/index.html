<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080a12">
<meta name="description" content="Omni — one offline-first home for your day: tasks, notes, calculator, converter, timers, habits, money, text tools and more. No account, no cloud.">
<title>Omni — do everything</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Omni">
<style>
  :root{
    color-scheme: dark;
    --accent:#6e8bff; --accent2:#39e6b4;
    --bg:#080a12; --panel:#11141f; --panel2:#171b29; --hover:#1e2334;
    --line:rgba(255,255,255,.08); --line2:rgba(255,255,255,.14);
    --text:#e8ecf6; --muted:#93a0c0; --faint:#6b779a;
    --good:#39e6b4; --warn:#ffb454; --bad:#ff6b6b;
    --radius:16px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  [data-theme="light"]{
    color-scheme: light;
    --bg:#eef1f8; --panel:#ffffff; --panel2:#f4f6fb; --hover:#e8edf7;
    --line:rgba(12,16,40,.10); --line2:rgba(12,16,40,.16);
    --text:#121626; --muted:#5b647e; --faint:#8a93ad;
    --shadow:0 10px 30px rgba(20,30,70,.10);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    background:
      radial-gradient(1100px 700px at 85% -15%, color-mix(in srgb, var(--accent) 16%, transparent), transparent 60%),
      radial-gradient(900px 600px at -10% 110%, color-mix(in srgb, var(--accent2) 12%, transparent), transparent 55%),
      var(--bg);
    color:var(--text); -webkit-font-smoothing:antialiased; overscroll-behavior:none;
  }
  a{color:var(--accent); text-decoration:none}
  kbd{font:inherit; font-size:11px; background:var(--panel2); border:1px solid var(--line); border-bottom-width:2px; border-radius:6px; padding:1px 6px; color:var(--muted)}
  ::selection{background:color-mix(in srgb, var(--accent) 40%, transparent)}

  #app{display:grid; grid-template-columns:248px 1fr; min-height:100dvh}

  /* ---- sidebar ---- */
  .nav{
    position:sticky; top:0; height:100dvh; overflow-y:auto; padding:18px 14px;
    border-right:1px solid var(--line); background:color-mix(in srgb, var(--panel) 70%, transparent);
    backdrop-filter:blur(12px); z-index:40;
  }
  .navhead{display:flex; align-items:center; gap:10px; padding:6px 8px 16px; font-weight:700; letter-spacing:-.01em; font-size:18px}
  .logo{width:26px; height:26px; border-radius:8px; flex:0 0 auto;
        background:conic-gradient(from 200deg, var(--accent), var(--accent2), var(--accent)); box-shadow:0 0 0 1px var(--line2)}
  .navitem{
    display:flex; align-items:center; gap:11px; padding:9px 11px; border-radius:11px; color:var(--muted);
    cursor:pointer; font-weight:550; user-select:none; transition:background .12s, color .12s;
  }
  .navitem .ic{width:22px; text-align:center; font-size:16px}
  .navitem:hover{background:var(--hover); color:var(--text)}
  .navitem.on{background:color-mix(in srgb, var(--accent) 18%, transparent); color:var(--text)}
  .navitem.on .ic{filter:drop-shadow(0 0 6px color-mix(in srgb, var(--accent) 70%, transparent))}
  .navgroup{font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); padding:14px 11px 6px}

  .scrim{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:39; backdrop-filter:blur(2px)}

  /* ---- main ---- */
  .main{display:flex; flex-direction:column; min-width:0}
  .topbar{
    position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:12px;
    padding:12px 20px; padding-top:max(12px, env(safe-area-inset-top));
    border-bottom:1px solid var(--line); background:color-mix(in srgb, var(--bg) 78%, transparent); backdrop-filter:blur(12px);
  }
  .menu{display:none}
  .icbtn{
    appearance:none; border:1px solid var(--line); background:var(--panel); color:var(--text);
    width:38px; height:38px; border-radius:11px; font-size:17px; cursor:pointer; display:grid; place-items:center;
  }
  .icbtn:hover{background:var(--hover)}
  .searchbtn{
    flex:1; max-width:420px; display:flex; align-items:center; gap:10px; cursor:text;
    border:1px solid var(--line); background:var(--panel); color:var(--faint);
    padding:9px 12px; border-radius:11px; font:inherit; text-align:left;
  }
  .searchbtn:hover{border-color:var(--line2)}
  .searchbtn kbd{margin-left:auto}
  .topclock{margin-left:auto; font-variant-numeric:tabular-nums; font-weight:600; color:var(--muted); white-space:nowrap}
  @media (max-width:560px){ .topclock{display:none} .searchbtn span.ph{display:none} .searchbtn{flex:0 0 auto} }

  .view{padding:22px 20px 64px; max-width:980px; width:100%; margin:0 auto}
  @media (min-width:1500px){ .view{max-width:1120px} }

  /* ---- generic UI ---- */
  h1.page{font-size:24px; margin:2px 0 2px; letter-spacing:-.02em}
  .page-sub{color:var(--muted); margin:0 0 20px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px}
  .card + .card{margin-top:14px}
  .grid{display:grid; gap:14px}
  .g2{grid-template-columns:repeat(2,1fr)} .g3{grid-template-columns:repeat(3,1fr)} .g4{grid-template-columns:repeat(4,1fr)}
  @media (max-width:720px){ .g2,.g3,.g4{grid-template-columns:1fr} .g3.keep,.g4.keep{grid-template-columns:repeat(2,1fr)} }
  .row{display:flex; gap:10px; align-items:center}
  .wrap{flex-wrap:wrap}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .right{margin-left:auto}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
  .pill{font-size:12px; padding:3px 9px; border-radius:999px; border:1px solid var(--line); color:var(--muted)}

  input,textarea,select,button{font:inherit; color:inherit}
  .in,select.in,textarea.in{
    width:100%; background:var(--panel2); border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:11px; outline:none; transition:border-color .12s, box-shadow .12s;
  }
  .in:focus,textarea.in:focus,select.in:focus{border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent)}
  textarea.in{resize:vertical; min-height:120px; line-height:1.55}
  label.fld{display:block; font-size:12.5px; color:var(--muted); margin:0 0 6px; font-weight:600}

  .btn{
    appearance:none; cursor:pointer; border:1px solid var(--line); background:var(--panel2); color:var(--text);
    padding:9px 14px; border-radius:11px; font-weight:600; transition:background .12s, border-color .12s, transform .05s;
  }
  .btn:hover{background:var(--hover); border-color:var(--line2)}
  .btn:active{transform:translateY(1px)}
  .btn.pri{background:linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 55%, var(--accent2))); border-color:transparent; color:#0a0c14}
  .btn.pri:hover{filter:brightness(1.06)}
  .btn.ghost{background:transparent}
  .btn.sm{padding:6px 10px; border-radius:9px; font-size:13px}
  .btn.danger{color:var(--bad); border-color:color-mix(in srgb, var(--bad) 40%, var(--line))}
  .btn.danger:hover{background:color-mix(in srgb, var(--bad) 14%, transparent)}
  .iconbtn{appearance:none; border:none; background:transparent; color:var(--faint); cursor:pointer; padding:6px; border-radius:8px; font-size:15px}
  .iconbtn:hover{background:var(--hover); color:var(--text)}

  .empty{text-align:center; color:var(--faint); padding:40px 16px}
  .empty .big{font-size:34px; margin-bottom:8px; opacity:.7}

  /* ---- home ---- */
  .hero{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:18px}
  .hero h1{font-size:30px; margin:0 0 2px; letter-spacing:-.02em}
  .bigclock{font-variant-numeric:tabular-nums; font-size:40px; font-weight:700; letter-spacing:-.02em; line-height:1}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px 16px}
  .stat .n{font-size:26px; font-weight:700; letter-spacing:-.01em}
  .stat .l{color:var(--muted); font-size:13px}
  .tiles{display:grid; grid-template-columns:repeat(4,1fr); gap:12px}
  @media (max-width:720px){ .tiles{grid-template-columns:repeat(3,1fr)} }
  @media (max-width:420px){ .tiles{grid-template-columns:repeat(2,1fr)} }
  .tile{display:flex; flex-direction:column; gap:8px; padding:16px; border-radius:14px; background:var(--panel); border:1px solid var(--line); cursor:pointer; transition:transform .12s, border-color .12s, background .12s}
  .tile:hover{transform:translateY(-2px); border-color:var(--line2); background:var(--hover)}
  .tile .ic{font-size:22px}
  .tile .t{font-weight:650}
  .tile .d{font-size:12.5px; color:var(--muted)}

  /* ---- lists (tasks/notes/etc) ---- */
  .list{display:flex; flex-direction:column; gap:8px}
  .item{display:flex; align-items:center; gap:12px; padding:11px 13px; border:1px solid var(--line); border-radius:12px; background:var(--panel)}
  .item.done .tx{text-decoration:line-through; color:var(--faint)}
  .chk{width:22px; height:22px; flex:0 0 auto; border-radius:7px; border:2px solid var(--line2); cursor:pointer; display:grid; place-items:center; color:transparent; transition:.12s}
  .chk.on{background:var(--good); border-color:var(--good); color:#06231b}
  .tx{flex:1; min-width:0; word-break:break-word}
  .seg{display:inline-flex; background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:3px; gap:3px}
  .seg button{appearance:none; border:none; background:transparent; color:var(--muted); padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px}
  .seg button.on{background:var(--accent); color:#0a0c14}
  .prio{font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px}
  .prio.p0{color:var(--faint); border:1px solid var(--line)}
  .prio.p1{color:var(--warn); border:1px solid color-mix(in srgb,var(--warn) 45%,var(--line))}
  .prio.p2{color:var(--bad); border:1px solid color-mix(in srgb,var(--bad) 45%,var(--line))}

  /* ---- calc ---- */
  .calc-disp{background:var(--panel2); border:1px solid var(--line); border-radius:14px; padding:14px 16px; text-align:right}
  .calc-disp .ex{color:var(--faint); min-height:18px; word-break:break-all; font-size:13px}
  .calc-disp .res{font-size:34px; font-weight:700; word-break:break-all; font-variant-numeric:tabular-nums}
  .keys{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:12px}
  .key{padding:16px 0; font-size:18px; font-weight:600; border-radius:12px; border:1px solid var(--line); background:var(--panel2); cursor:pointer; transition:.1s}
  .key:hover{background:var(--hover)} .key:active{transform:translateY(1px)}
  .key.op{color:var(--accent)} .key.fn{font-size:14px; color:var(--muted)} .key.eq{background:var(--accent); color:#0a0c14; border-color:transparent}
  .key.wide{grid-column:span 2}

  /* ---- timer ---- */
  .bigtime{font-variant-numeric:tabular-nums; font-weight:700; letter-spacing:-.02em; text-align:center; line-height:1}
  .laps{margin-top:14px; max-height:230px; overflow:auto}
  .lap{display:flex; justify-content:space-between; padding:8px 4px; border-bottom:1px solid var(--line); font-variant-numeric:tabular-nums}

  /* ---- habits ---- */
  .hgrid{display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; padding:12px 0; border-bottom:1px solid var(--line)}
  .days{display:flex; gap:6px}
  .day{width:30px; height:30px; border-radius:9px; border:1px solid var(--line); display:grid; place-items:center; cursor:pointer; font-size:11px; color:var(--faint)}
  .day.on{background:var(--accent2); border-color:var(--accent2); color:#06231b; font-weight:700}
  .day.today{box-shadow:0 0 0 2px color-mix(in srgb,var(--accent) 60%,transparent)}

  /* ---- meters ---- */
  .meter{height:8px; border-radius:999px; background:var(--panel2); overflow:hidden; border:1px solid var(--line)}
  .meter > i{display:block; height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2))}

  /* ---- palette ---- */
  .palette{position:fixed; inset:0; z-index:80; display:flex; align-items:flex-start; justify-content:center; padding:14vh 16px 16px; background:rgba(4,6,12,.55); backdrop-filter:blur(4px)}
  .palette[hidden]{display:none}
  .palbox{width:100%; max-width:600px; background:var(--panel); border:1px solid var(--line2); border-radius:16px; box-shadow:var(--shadow); overflow:hidden}
  .palbox input{width:100%; border:none; background:transparent; padding:16px 18px; font-size:16px; outline:none; border-bottom:1px solid var(--line)}
  .palresults{max-height:50vh; overflow:auto; padding:6px}
  .palitem{display:flex; align-items:center; gap:12px; padding:11px 12px; border-radius:11px; cursor:pointer}
  .palitem .ic{width:22px; text-align:center}
  .palitem .sub{margin-left:auto; font-size:12px; color:var(--faint)}
  .palitem.sel{background:var(--accent); color:#0a0c14}
  .palitem.sel .sub{color:#0a0c14; opacity:.8}

  /* ---- toast ---- */
  .toast{position:fixed; left:50%; bottom:26px; transform:translate(-50%,20px); opacity:0; pointer-events:none;
         background:var(--panel); border:1px solid var(--line2); color:var(--text); padding:11px 16px; border-radius:12px;
         box-shadow:var(--shadow); z-index:90; transition:opacity .2s, transform .2s; font-weight:550}
  .toast.show{opacity:1; transform:translate(-50%,0)}

  /* ---- responsive ---- */
  @media (max-width:860px){
    #app{grid-template-columns:1fr}
    .nav{position:fixed; left:0; top:0; width:280px; transform:translateX(-100%); transition:transform .22s ease}
    body.navopen .nav{transform:none; box-shadow:var(--shadow)}
    body.navopen .scrim{display:block}
    .menu{display:grid}
  }
</style>
</head>
<body>
  <div id="app">
    <aside id="nav" class="nav"></aside>
    <div id="scrim" class="scrim" data-act="closeNav"></div>
    <div class="main">
      <header class="topbar">
        <button class="icbtn menu" data-act="toggleNav" aria-label="Menu">☰</button>
        <button class="searchbtn" data-act="openPalette" aria-label="Search">
          <span>🔎</span><span class="ph">Search or jump to…</span><kbd>⌘K</kbd>
        </button>
        <div class="topclock" id="topclock"></div>
      </header>
      <section id="view" class="view"></section>
    </div>
  </div>

  <div id="palette" class="palette" hidden>
    <div class="palbox">
      <input id="palinput" type="text" placeholder="Search tools & actions…" autocomplete="off" spellcheck="false">
      <div id="palresults" class="palresults"></div>
    </div>
  </div>
  <div id="toast" class="toast"></div>

<script>
(function(){
'use strict';

/* ============================================================ utilities */
var $  = function(s, r){ return (r||document).querySelector(s); };
var $$ = function(s, r){ return Array.prototype.slice.call((r||document).querySelectorAll(s)); };
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function uid(){ try{ return crypto.randomUUID(); }catch(e){ return 'id-'+Math.random().toString(36).slice(2)+Date.now().toString(36); } }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
function pad(n){ return (n<10?'0':'')+n; }
function plural(n,w){ return n+' '+w+(n===1?'':'s'); }
function nowGreeting(h){ return h<5?'Late night':h<12?'Good morning':h<18?'Good afternoon':'Good evening'; }
function todayKey(d){ d=d||new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

/* ============================================================ store */
var NS = 'omni:';
var DB = {
  get:function(k, fb){ try{ var v=localStorage.getItem(NS+k); return v==null?fb:JSON.parse(v); }catch(e){ return fb; } },
  set:function(k, v){ try{ localStorage.setItem(NS+k, JSON.stringify(v)); }catch(e){} },
  del:function(k){ try{ localStorage.removeItem(NS+k); }catch(e){} },
  keys:function(){ var out=[]; try{ for(var i=0;i<localStorage.length;i++){ var key=localStorage.key(i); if(key&&key.indexOf(NS)===0) out.push(key.slice(NS.length)); } }catch(e){} return out; }
};

/* ============================================================ toast */
var toastT=0;
function toast(msg){
  var t=$('#toast'); if(!t) return; t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); }, 1900);
}
function copy(text){
  try{ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text); } }catch(e){}
  toast('Copied');
}

/* ============================================================ registries */
var VIEWS = {};        // id -> { label, icon, group, body(), mount() }
var ACTIONS = {};      // data-act -> fn(el,e)
var INPUTS  = {};      // data-inp / data-chg -> fn(el,e)
var NAV = [];          // ordered list of view ids for the sidebar

function def(id, cfg){ VIEWS[id]=cfg; if(cfg.nav!==false) NAV.push(id); }
function on(name, fn){ ACTIONS[name]=fn; }
function oninput(name, fn){ INPUTS[name]=fn; }

/* ============================================================ router */
var cur = 'home';
function parseRoute(){
  var h = String(location.hash||'').replace(/^#\/?/, '');
  h = h.split('?')[0];
  return VIEWS[h] ? h : 'home';
}
function renderNav(){
  var groups=[]; var seen={};
  NAV.forEach(function(id){ var g=VIEWS[id].group||'Tools'; if(!seen[g]){seen[g]=[]; groups.push(g);} seen[g].push(id); });
  var html='<div class="navhead"><span class="logo"></span>Omni</div>';
  groups.forEach(function(g){
    html+='<div class="navgroup">'+esc(g)+'</div>';
    seen[g].forEach(function(id){
      var v=VIEWS[id];
      html+='<div class="navitem'+(id===cur?' on':'')+'" data-nav="'+id+'"><span class="ic">'+v.icon+'</span>'+esc(v.label)+'</div>';
    });
  });
  var nav=$('#nav'); if(nav) nav.innerHTML=html;
}
function renderView(){
  var v=VIEWS[cur]||VIEWS.home;
  var el=$('#view'); if(el){ el.innerHTML=v.body(); el.scrollTop=0; }
  try{ window.scrollTo(0,0); }catch(e){}
  if(v.mount) try{ v.mount(); }catch(e){ console&&console.warn&&console.warn(e); }
  renderNav();
}
function go(id){ if(!VIEWS[id]) id='home'; cur=id; try{ location.hash='#/'+id; }catch(e){ renderView(); } closeNav(); }
function rerender(){ renderView(); }

/* ============================================================ nav drawer */
function closeNav(){ try{ document.body.classList.remove('navopen'); }catch(e){} }
on('toggleNav', function(){ try{ document.body.classList.toggle('navopen'); }catch(e){} });
on('closeNav', closeNav);

/* ============================================================ settings */
function settings(){ return DB.get('settings', {}); }
function setSetting(k,v){ var s=settings(); s[k]=v; DB.set('settings', s); }
function applyTheme(){
  var s=settings();
  try{
    var r=document.documentElement;
    r.setAttribute('data-theme', s.theme==='light'?'light':'dark');
    if(s.accent) r.style.setProperty('--accent', s.accent);
    var m=document.querySelector('meta[name=theme-color]'); if(m) m.setAttribute('content', s.theme==='light'?'#eef1f8':'#080a12');
  }catch(e){}
}
function currency(){ return settings().currency || '$'; }
function money(n){ var v=Number(n)||0; return currency()+v.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2}); }

/* ============================================================ HOME */
def('home', { label:'Home', icon:'🏠', group:'Overview', body:function(){
  var d=new Date(), s=settings();
  var name=s.name?(', '+esc(s.name)):'';
  var tasks=DB.get('tasks',[]); var open=tasks.filter(function(t){return !t.done;}).length;
  var habits=DB.get('habits',[]); var tk=todayKey();
  var hdone=habits.filter(function(h){return (h.log||{})[tk];}).length;
  var notes=DB.get('notes',[]);
  var tx=DB.get('money',[]); var bal=tx.reduce(function(a,t){return a+(t.type==='in'?t.amount:-t.amount);},0);
  var tiles='';
  ['tasks','notes','calc','convert','timer','habits','money','text','password','clock'].forEach(function(id){
    var v=VIEWS[id]; tiles+='<div class="tile" data-nav="'+id+'"><span class="ic">'+v.icon+'</span><span class="t">'+esc(v.label)+'</span><span class="d">'+esc(v.tag||'')+'</span></div>';
  });
  return ''+
  '<div class="hero">'+
    '<div><h1>'+nowGreeting(d.getHours())+name+'</h1><p class="muted" style="margin:0">'+
      d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})+'</p></div>'+
    '<div class="bigclock" id="homeclock">'+pad(d.getHours())+':'+pad(d.getMinutes())+'</div>'+
  '</div>'+
  '<div class="card" style="margin-bottom:14px"><label class="fld">Quick capture</label>'+
    '<form data-submit="home.capture"><div class="row">'+
      '<input class="in" name="q" placeholder="Add a task, or start with &quot;note:&quot; / &quot;$&quot; amount…" autocomplete="off">'+
      '<button class="btn pri" type="submit">Add</button>'+
    '</div></form>'+
    '<div class="faint" style="font-size:12.5px; margin-top:8px">Try “Pay rent”, “note: ideas for the weekend”, or “$12.50 lunch”.</div>'+
  '</div>'+
  '<div class="tiles" style="margin-bottom:18px">'+

function mdToHtml(src){
  var lines=String(src||'').split('\n'), out=[], inList=false;
  function inline(s){
    s=esc(s);
    s=s.replace(/`([^`]+)`/g,'<code style="background:var(--panel2);padding:1px 5px;border-radius:5px">$1</code>');
    s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/(^|[^*])\*([^*]+)\*/g,'$1<em>$2</em>');
    s=s.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    return s;
  }
  lines.forEach(function(ln){
    var m;
    if((m=ln.match(/^(#{1,3})\s+(.*)$/))){ if(inList){out.push('</ul>');inList=false;} var lvl=m[1].length; out.push('<h'+(lvl+1)+' style="margin:.6em 0 .3em">'+inline(m[2])+'</h'+(lvl+1)+'>'); return; }
    if((m=ln.match(/^\s*[-*]\s+(.*)$/))){ if(!inList){out.push('<ul style="margin:.3em 0 .3em 1.1em">');inList=true;} out.push('<li>'+inline(m[1])+'</li>'); return; }
    if(!ln.trim()){ if(inList){out.push('</ul>');inList=false;} out.push('<div style="height:.5em"></div>'); return; }
    if(inList){out.push('</ul>');inList=false;}
    out.push('<div>'+inline(ln)+'</div>');
  });
  if(inList) out.push('</ul>');
  return out.join('');
}

/* ============================================================ CALCULATOR */
var CALC_FNS={ sqrt:Math.sqrt, sin:Math.sin, cos:Math.cos, tan:Math.tan, ln:Math.log, log:function(x){return Math.log(x)/Math.LN10;}, abs:Math.abs, round:Math.round, floor:Math.floor, ceil:Math.ceil };
var CALC_CONST={ pi:Math.PI, e:Math.E };
function calcEval(expr){
  var s=String(expr).replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
  var toks=[], i=0;
  while(i<s.length){
    var c=s[i];
    if(c===' '){ i++; continue; }
    if(/[0-9.]/.test(c)){ var num=''; while(i<s.length&&/[0-9.]/.test(s[i])) num+=s[i++]; toks.push({t:'num',v:parseFloat(num)}); continue; }
    if(/[a-zA-Z]/.test(c)){ var id=''; while(i<s.length&&/[a-zA-Z]/.test(s[i])) id+=s[i++]; id=id.toLowerCase();
      if(CALC_CONST.hasOwnProperty(id)) toks.push({t:'num',v:CALC_CONST[id]});
      else if(CALC_FNS.hasOwnProperty(id)) toks.push({t:'fn',v:id});
      else throw new Error('unknown '+id); continue; }
    if('+-*/%^'.indexOf(c)>=0){ toks.push({t:'op',v:c}); i++; continue; }
    if(c==='('){ toks.push({t:'(',v:c}); i++; continue; }
    if(c===')'){ toks.push({t:')',v:c}); i++; continue; }
    throw new Error('bad char '+c);
  }
  // shunting yard with unary minus
  var prec={'+':1,'-':1,'*':2,'/':2,'%':2,'^':3,'u-':4}, right={'^':true,'u-':true};
  var out=[], ops=[], prev=null;
  toks.forEach(function(tk){
    if(tk.t==='num'){ out.push(tk); }
    else if(tk.t==='fn'){ ops.push(tk); }
    else if(tk.t==='op'){
      var op=tk.v;
      if(op==='-'&&(prev===null||prev.t==='op'||prev.t==='(')) op='u-';
      while(ops.length){ var top=ops[ops.length-1];
        if(top.t==='fn'||(top.t==='op'&&(prec[top.v]>prec[op]||(prec[top.v]===prec[op]&&!right[op])))){ out.push(ops.pop()); } else break; }
      ops.push({t:'op',v:op});
    }
    else if(tk.t==='('){ ops.push(tk); }
    else if(tk.t===')'){ while(ops.length&&ops[ops.length-1].t!=='(') out.push(ops.pop()); if(!ops.length) throw new Error('paren'); ops.pop(); if(ops.length&&ops[ops.length-1].t==='fn') out.push(ops.pop()); }
    prev=tk;
  });
  while(ops.length){ var o=ops.pop(); if(o.t==='(') throw new Error('paren'); out.push(o); }
  // eval RPN
  var st=[];
  out.forEach(function(tk){
    if(tk.t==='num'){ st.push(tk.v); }
    else if(tk.t==='fn'){ var a=st.pop(); st.push(CALC_FNS[tk.v](a)); }
    else if(tk.t==='op'){
      if(tk.v==='u-'){ st.push(-st.pop()); return; }
      var b=st.pop(), x=st.pop();
      st.push(tk.v==='+'?x+b:tk.v==='-'?x-b:tk.v==='*'?x*b:tk.v==='/'?x/b:tk.v==='%'?x%b:Math.pow(x,b));
    }
  });
  if(st.length!==1||!isFinite(st[0])) throw new Error('bad');
  return st[0];
}

function sentenceCase(s){ return s.toLowerCase().replace(/(^\s*\w|[.!?]\s+\w)/g, function(c){ return c.toUpperCase(); }); }
function slugify(s){ return s.toLowerCase().trim().replace(/[^\w\s-]/g,'').replace(/[\s_]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,''); }
function textStatPills(t){

  return '<span class="pill">'+words+' words</span><span class="pill">'+chars+' chars</span><span class="pill">'+lines+' lines</span><span class="pill">~'+read+' min read</span>';
}

    else if(op==='sentence') r=sentenceCase(t);
    else if(op==='trim') r=t.split('\n').map(function(l){return l.trim();}).join('\n');
    else if(op==='noblank') r=t.split('\n').filter(function(l){return l.trim();}).join('\n');
    else if(op==='sort') r=t.split('\n').sort(function(a,b){return a.localeCompare(b);}).join('\n');
    else if(op==='dedupe'){ var seen={}; r=t.split('\n').filter(function(l){ if(seen[l]) return false; seen[l]=1; return true; }).join('\n'); }
    else if(op==='reverse') r=t.split('\n').reverse().join('\n');
    else if(op==='slug') r=slugify(t);
    else if(op==='b64e') r=btoa(unescape(encodeURIComponent(t)));
    else if(op==='b64d') r=decodeURIComponent(escape(atob(t.trim())));
    else if(op==='jsonp') r=JSON.stringify(JSON.parse(t),null,2);

    '<div class="row wrap" style="gap:8px; margin-top:14px">'+toggles.map(function(t){return '<button class="btn sm '+(o[t[0]]?'pri':'ghost')+'" data-act="pw.toggle" data-k="'+t[0]+'">'+t[1]+'</button>';}).join('')+'</div></div>';
}});
function genPw(o){
  var sets=''; if(o.lower)sets+='abcdefghijkmnpqrstuvwxyz'+(o.amb?'':'lo'); if(o.upper)sets+='ABCDEFGHJKLMNPQRSTUVWXYZ'+(o.amb?'':'IO');
  var lower=o.amb?'abcdefghjkmnpqrstuvwxyz':'abcdefghijklmnopqrstuvwxyz';
  var upper=o.amb?'ABCDEFGHJKMNPQRSTUVWXYZ':'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var digit=o.amb?'23456789':'0123456789'; var sym='!@#$%^&*()-_=+[]{};:,.?';
  var pool=''; if(o.lower)pool+=lower; if(o.upper)pool+=upper; if(o.digit)pool+=digit; if(o.sym)pool+=sym;
  if(!pool) return '';
  var len=clamp(o.len|0,4,128); var out='';
  try{ var arr=new Uint32Array(len); crypto.getRandomValues(arr); for(var i=0;i<len;i++) out+=pool[arr[i]%pool.length]; }
  catch(e){ for(var j=0;j<len;j++) out+=pool[Math.floor(Math.random()*pool.length)]; }
  return out;
}

      '<div class="bigtime" style="font-size:26px" data-ztime="'+tz+'">'+zoneTime(tz)+'</div>'+
      '<button class="iconbtn" data-act="clock.del" data-tz="'+tz+'">✕</button></div>'; }).join('');
  var opts=ZONES.filter(function(z){return picked.indexOf(z[1])<0;}).map(function(z){return '<option value="'+z[1]+'">'+esc(z[0])+'</option>';}).join('');
  return '<h1 class="page">World clock</h1><p class="page-sub">Live across every zone, no network needed.</p>'+
    '<div class="card"><div class="row"><select class="in" data-chg="clock.add"'+(opts?'':' disabled')+'><option value="">＋ Add a city…</option>'+opts+'</select></div></div>'+
    '<div class="list" style="margin-top:14px">'+(cards||'<div class="empty"><div class="big">🌍</div>Add a city to begin.</div>')+'</div>';
}});
INPUTS['clock.add']=function(el){ var tz=el.value; if(!tz) return; var z=DB.get('zones',[]); if(z.indexOf(tz)<0) z.push(tz); DB.set('zones',z); rerender(); };
on('clock.del', function(el){ var tz=el.getAttribute('data-tz'); DB.set('zones', DB.get('zones',[]).filter(function(x){return x!==tz;})); rerender(); });

/* ============================================================ SETTINGS */
def('settings', { label:'Settings', icon:'⚙️', group:'System', body:function(){
  var s=settings(); var accents=['#6e8bff','#39e6b4','#ff6b6b','#ffb454','#c084fc','#22d3ee','#f472b6','#a3e635'];
  var used=0; DB.keys().forEach(function(k){ try{ used+=(localStorage.getItem(NS+k)||'').length; }catch(e){} });
  return '<h1 class="page">Settings</h1><p class="page-sub">Everything lives in this browser. Nothing leaves your device.</p>'+
    '<div class="card"><label class="fld">Your name (for the greeting)</label><input class="in" data-inp="set.name" value="'+esc(s.name||'')+'" placeholder="optional" style="max-width:320px"></div>'+
    '<div class="card"><label class="fld">Theme</label><div class="seg"><button class="'+(s.theme!=='light'?'on':'')+'" data-act="set.theme" data-v="dark">Dark</button><button class="'+(s.theme==='light'?'on':'')+'" data-act="set.theme" data-v="light">Light</button></div>'+
      '<label class="fld" style="margin-top:16px">Accent</label><div class="row wrap" style="gap:10px">'+accents.map(function(a){return '<button data-act="set.accent" data-v="'+a+'" style="width:34px;height:34px;border-radius:50%;border:2px solid '+(s.accent===a||(!s.accent&&a==='#6e8bff')?'var(--text)':'transparent')+';background:'+a+';cursor:pointer"></button>';}).join('')+'</div></div>'+
    '<div class="card"><label class="fld">Currency symbol</label><input class="in" data-inp="set.currency" value="'+esc(s.currency||'$')+'" maxlength="3" style="max-width:120px"></div>'+
    '<div class="card"><strong>Your data</strong><p class="muted" style="margin:6px 0 14px">Roughly '+(used/1024).toFixed(1)+' KB stored locally. Back it up or move it to another device.</p>'+
      '<div class="row wrap"><button class="btn" data-act="set.export">⬇ Export JSON</button><button class="btn" data-act="set.import">⬆ Import JSON</button>'+
      '<input type="file" id="importFile" accept="application/json" style="display:none" data-chg="set.importFile"><button class="btn danger right" data-act="set.wipe">Erase everything</button></div></div>'+
    '<p class="faint" style="text-align:center; margin-top:24px">Omni · an offline-first do-everything app · part of BallrzAPP</p>';
}});
oninput('set.name', function(el){ setSetting('name', el.value.trim()); });
oninput('set.currency', function(el){ setSetting('currency', el.value.trim()||'$'); });
on('set.theme', function(el){ setSetting('theme', el.getAttribute('data-v')); applyTheme(); rerender(); });
on('set.accent', function(el){ setSetting('accent', el.getAttribute('data-v')); applyTheme(); rerender(); });
on('set.export', function(){
  var data={}; DB.keys().forEach(function(k){ data[k]=DB.get(k); });
  var blob=new Blob([JSON.stringify({_app:'omni', _v:1, data:data}, null, 2)], {type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='omni-backup-'+todayKey()+'.json'; a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000); toast('Exported');
});
on('set.import', function(){ var f=$('#importFile'); if(f) f.click(); });
INPUTS['set.importFile']=function(el){
  var file=el.files&&el.files[0]; if(!file) return; var r=new FileReader();
  r.onload=function(){ try{ var j=JSON.parse(r.result); var d=j.data||j; Object.keys(d).forEach(function(k){ DB.set(k, d[k]); }); applyTheme(); rerender(); toast('Imported'); }catch(e){ toast('Invalid backup file'); } };
  r.readAsText(file);
};
on('set.wipe', function(){ if(confirm('Erase ALL Omni data on this device? This cannot be undone.')){ DB.keys().forEach(function(k){ DB.del(k); }); applyTheme(); go('home'); toast('All data erased'); } });

/* ============================================================ COMMAND PALETTE */
var palItems=[], palSel=0;
function buildPalItems(q){
  var items=[];
  NAV.forEach(function(id){ var v=VIEWS[id]; items.push({ic:v.icon, label:v.label, sub:v.group||'', run:function(){ go(id); }}); });
  items.push({ic:'➕', label:'New task', sub:'Tasks', run:function(){ go('tasks'); setTimeout(function(){ var i=$('input[name=t]'); if(i) i.focus(); },60); }});
  items.push({ic:'➕', label:'New note', sub:'Notes', run:function(){ ACTIONS['notes.new'](); go('notes'); }});
  items.push({ic:'🔑', label:'Generate password', sub:'Password', run:function(){ go('password'); }});
  items.push({ic:'🌗', label:'Toggle light / dark', sub:'Theme', run:function(){ setSetting('theme', settings().theme==='light'?'dark':'light'); applyTheme(); rerender(); }});
  q=(q||'').trim().toLowerCase();
  if(!q) return items;
  return items.filter(function(it){ return (it.label+' '+it.sub).toLowerCase().indexOf(q)>=0; });
}
function renderPal(){
  var box=$('#palresults'); if(!box) return;
  box.innerHTML=palItems.map(function(it,i){ return '<div class="palitem'+(i===palSel?' sel':'')+'" data-pi="'+i+'"><span class="ic">'+it.ic+'</span><span>'+esc(it.label)+'</span><span class="sub">'+esc(it.sub)+'</span></div>'; }).join('')||'<div class="palitem faint">No matches</div>';
}
function openPal(){ var p=$('#palette'); if(!p) return; p.hidden=false; palSel=0; palItems=buildPalItems(''); renderPal(); var inp=$('#palinput'); if(inp){ inp.value=''; setTimeout(function(){ try{ inp.focus(); }catch(e){} },20); } }
function closePal(){ var p=$('#palette'); if(p) p.hidden=true; }
on('openPalette', openPal);
function palMove(d){ if(!palItems.length) return; palSel=(palSel+d+palItems.length)%palItems.length; renderPal(); var sel=$('.palitem.sel'); if(sel&&sel.scrollIntoView) sel.scrollIntoView({block:'nearest'}); }
function palRun(){ var it=palItems[palSel]; closePal(); if(it&&it.run) it.run(); }

/* ============================================================ tick / clocks */
function tick(){
  var d=new Date();
  var tc=$('#topclock'); if(tc) tc.textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})+'  ·  '+d.toLocaleDateString([], {month:'short',day:'numeric'});
  var hc=$('#homeclock'); if(hc) hc.textContent=pad(d.getHours())+':'+pad(d.getMinutes());
  if(cur==='timer'){
    if(swRunning){ var e=$('#swDisp'); if(e) e.textContent=fmtSW(swElapsed+(Date.now()-swStart)); }
    if(cdRunning){ var rem=cdEnd-Date.now(); var c=$('#cdDisp'); if(c) c.textContent=fmtMS(rem); if(rem<=0){ cdRunning=false; cdRemain=0; beep(); toast('⏰ Time! Countdown finished'); rerender(); } }
    if(pmRunning){ var pr=pmEnd-Date.now(); var p=$('#pmDisp'); if(p) p.textContent=fmtMS(pr); if(pr<=0){ beep(); var was=pmMode; pmAdvance(true); toast(was==='focus'?'🎯 Focus done — take a break':'☕ Break over — back to it'); rerender(); } }
  }
  if(cur==='clock'){ $$('[data-ztime]').forEach(function(el){ el.textContent=zoneTime(el.getAttribute('data-ztime')); }); }
}

/* ============================================================ global events */
function bindGlobal(){
  document.body.addEventListener('click', function(e){
    var pi=e.target.closest&&e.target.closest('[data-pi]'); if(pi){ palSel=parseInt(pi.getAttribute('data-pi'),10); palRun(); return; }
    var palette=$('#palette'); if(palette && !palette.hidden && e.target===palette){ closePal(); return; }
    var nav=e.target.closest&&e.target.closest('[data-nav]'); if(nav){ go(nav.getAttribute('data-nav')); return; }
    var act=e.target.closest&&e.target.closest('[data-act]'); if(act){ var fn=ACTIONS[act.getAttribute('data-act')]; if(fn){ fn(act,e); } return; }
  });
  document.body.addEventListener('submit', function(e){
    var f=e.target.closest&&e.target.closest('[data-submit]'); if(f){ e.preventDefault(); var fn=ACTIONS[f.getAttribute('data-submit')]; if(fn) fn(f,e); }
  });
  document.body.addEventListener('input', function(e){
    var el=e.target.closest&&e.target.closest('[data-inp]'); if(el){ var fn=INPUTS[el.getAttribute('data-inp')]; if(fn) fn(el,e); }
  });
  document.body.addEventListener('change', function(e){
    var el=e.target.closest&&e.target.closest('[data-chg]'); if(el){ var fn=INPUTS[el.getAttribute('data-chg')]; if(fn) fn(el,e); }
  });
  var palinp=$('#palinput');
  if(palinp){ palinp.addEventListener('input', function(){ palItems=buildPalItems(palinp.value); palSel=0; renderPal(); }); }
  document.addEventListener('keydown', function(e){
    var pOpen=$('#palette') && !$('#palette').hidden;
    if((e.metaKey||e.ctrlKey) && (e.key==='k'||e.key==='K')){ e.preventDefault(); if(pOpen) closePal(); else openPal(); return; }
    if(pOpen){
      if(e.key==='Escape'){ closePal(); }
      else if(e.key==='ArrowDown'){ e.preventDefault(); palMove(1); }
      else if(e.key==='ArrowUp'){ e.preventDefault(); palMove(-1); }
      else if(e.key==='Enter'){ e.preventDefault(); palRun(); }
    } else if(e.key==='Escape'){ closeNav(); }
  });
  window.addEventListener('hashchange', function(){ var r=parseRoute(); if(r!==cur){ cur=r; renderView(); } });
}

/* ============================================================ boot */
function boot(){
  applyTheme();
  cur=parseRoute();
  bindGlobal();
  renderView();
  tick(); setInterval(tick, 1000);
  // installable PWA: register the offline service worker (https only, e.g. on Pages)
  if('serviceWorker' in navigator && location.protocol==='https:'){
    window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); });
  }
}
boot();
})();
</script>
